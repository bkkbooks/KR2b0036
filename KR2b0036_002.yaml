body:
  text: 元史續編卷二明胡粹中撰己卯十六年宋祥興二年是年宋亡春正月張𢎞範攻崖山張世傑力戰禦之𢎞範由朝陽港乘舟入海至甲子門獲斥候者知宋主所在乃至崖山或謂世傑曰北兵以舟師塞海口則我不能進退盍先據之世傑恐久在海中士卒離心動則必散須與決勝負遂悉毁行朝草市結大舶千餘作一字陳碇海中中艫外舳貫以大索四周起樓棚如城堞奉宋主居其間為死計𢎞範以舟師來薄且出騎兵斷宋汲路宋舟堅不能動𢎞範令舟載茅茨沃以膏脂乘風縱火焚之宋艦皆塗泥縳長木以拒火舟不能爇𢎞範無如之何時世傑有甥韓在𢎞範軍中使之招世傑凡三往不從曰吾知降生且富貴但義不可移耳因歷數古忠臣以答之𢎞範又命文天祥為書招世傑天祥曰吾不能扞父母反教人叛父母乎固命之遂書過零丁洲詩與之其末句云人生自古誰無死留取丹心照汗青𢎞範笑而置之𢎞範乃復使人語崖山士民曰汝陳丞相已去文丞相已為我所執汝復欲何為士民亦無叛者宋樵汲路絶兵士茹乾糧十餘日下掬海水飲之多嘔泄世傑帥蘇劉義等旦夕大戰既而李恆自廣州以師會攻𢎞範命恆守崖山北靣乃四分其軍自將一軍相去里許令諸將曰宋舟西艤崖山潮至必東遁急攻之勿令得去聞吾樂作乃戰違令者斬走麾北靣一軍乘早潮而戰為世傑所敗李恆等順潮退師張世傑兵潰左丞相陸秀夫奉宋主昺赴海死宋亡張𢎞範軍中樂作宋師以為懈不設備因急攻之宋人南北受敵兵士又疲不能戰俄而一舟檣旗仆諸舟相繼皆仆世傑知事去乃抽精兵入中軍諸軍大潰翟國秀等皆降𢎞範又薄宋中軍會日暮風雨昏霧四塞咫尺不辨世傑乃與蘇劉義等斷維以十六舟奪港而去陸秀夫走宋主舟舟大且諸舟環結不得出走乃先驅其妻子入海即負宋主同溺後宫及諸臣從死者衆餘舟尚八百盡為𢎞範所得越七日尸浮海上者十餘萬因得宋主尸及詔書之寶張世傑復還崖山收兵遇楊太后欲奉以求趙氏後而復立之楊太后始得宋主凶問拊膺大慟曰我忍死間關至此者正為趙家一塊肉耳今無望矣遂赴海死世傑葬之海濵將之安南至平章山下颶風大作舟人欲艤岸世傑曰無以為也為我取瓣香來至則仰天呼曰吾為趙氏亦至矣一君亡復立一君今又亡我未死者庶幾敵兵退别立趙氏以存宗祀耳今若此豈天意邪若天不欲存趙氏則大風覆吾舟舟遂覆世傑溺焉是嵗宋亡通得户一千一百八十四萬八百有六天下共一千三百一十九萬六千二百有六户為口五千八百八十三萬四千七百十一而山澤溪洞之民不與焉崖山既破張𢎞範置酒髙會謂文天祥曰國亡丞相忠孝盡矣能改心以事宋者事今將不失為宰相也天祥泫然出涕曰國亡不能救為人臣者死有餘罪况敢逃其死而二其心乎𢎞範義之遣使護送至燕道經吉州痛恨不食八日不死乃復食以拜竒貝勒密實同知樞密院事二月建司天臺太史令王恂請建司天臺于大都儀象圭表皆銅為之增銅表至四十尺則景長而真又請上都洛陽等處分置儀表各選監候官從之因勑郭守敬由上都抵南海測景且訪通天文厯數者評曰司者典守之謂也成周建官掌邦教者曰司徒掌邦禁者曰司冦掌邦士曰司空掌邦政曰司馬獨掌邦禮不言司而曰宗伯以其所主皆天神祠祝之事尊之也曾謂天而可司乎昔堯命羲和一則曰欽若昊天二則曰敬授人時其不敢輕褻也如此謂之欽天斯正矣詔議臺省事宜先是阿哈瑪特奏自今御史臺非白于省毋擅召倉庫吏亦毋究錢榖數及集議中書不至者罪之於是行省因請考劾行臺文卷不從阿勒巴復請行臺呈行省比內臺呈都省例詔集朝臣議之董文用曰御史臺譬如卧虎雖未噬人人猶畏其為虎虛名僅存紀綱猶不振一旦摧抑之則風采薾然無復望者矣御史大夫約蘇特穆爾亦言其不可事遂寢三月車駕幸上都詔張留孫主淮江浙西荆襄等處道教柴椿等還自安南初使使通安南止由鄯善黎化往來及椿行上命自江陵直抵雍州以達其國椿等至雍日烜遺書乞回軍舊路以進椿回牒奉命與本國使臣黎克復由雍州入安南所有導護軍兵合乘驛馬宜來界首逺迓日烜乃遣中贊杜國計先至太尉率百官自富良江岸奉迎就館日烜拜受詔椿等傳旨諭之曰汝國內附二十年向者六事猶未見從汝若弗朝則修城飭兵以待日烜言先君棄世子初嗣位生長深宫不諳風土若必親朝恐死於道路昔諭六事已蒙赦免椿曰宋主未十嵗亦長深宫尚至京師詔旨之外不敢聞命椿等遂還夏四月立江西𣙜茶運司京畿十六路蝗西僧帕克斯巴死帕克土斯巴畨人自其祖托里齊以其法佐國王霸西海者十餘世邸帕克斯巴生而聰慧國人號之曰聖童年十五謁上潛與語大恱及即位尊以國師授以玉印命製蒙古新字其字僅千餘字母凡四十一其相關鈕而成字者則有韻關之法其以一合三合四合而成字者則有語韻之還法大要以諧聲為宗字成頒之天下帕克斯巴請告西乃以其弟額琳沁嗣及是病死賜號皇天之下一人之上宣文輔治大聖至德普惠真智佑國知意大寶法王西天佛子大元國師至治問特詔郡縣建廟通祀六月浚通州運河占城馬巴兒諸國入貢秋七月安南入貢陳日烜遣杜國計奉表陳情言孤臣稟氣軟弱恐道路艱難徒暴白骨致陛下哀傷而無益天朝之萬一伏望哀憐令臣得保性命以終事陛下兼獻方物及二馴象詔求藝術之士遣伊聶濟崔彧往江南訪求西南八畨羅氏等國來附時招降西南諸畨洞寨凡千六百二十六戶十萬一千一百六十八詔各置安撫司以龍方零為小龍畨靜蠻軍龍文求為卧龍畨南寧州程延隨為程畨武威軍洪延暢為洪畨永盛軍韋昌盛為方畨河中府石延異為金石畨大平軍盧延陵為盧畨靜海軍羅闕資為羅甸國遏蠻軍並懷逺大將軍充安撫使八月丁丑車駕還宫始募人中納鹽糧中統初以解鹽一萬五千引和中陜西軍儲又命諸處市糴至元四年又令各處中納官糧續還其直後又驗諸路粟價增十分之一凡糴四十萬石至是得江南以兩淮鹽引五萬道募客旅中糧其後山東兩浙河間亦如之及出鹽引兊換民糧并和糴其價每十兩增一兩至成宗時又行鹽折草之法每鹽二斤折草十斤令有司於五月預給京畿郡縣至秋成驗數輸草以給京師秣馬九月揚州同知董仲威坐贓免先是順德總管張文煥太原監郡台哈布哈以憲司發其姦贓遣人詣省自首因反誣憲官以罪臺臣奏憲司果有罪不應因事而告宜待文煥等事決方聽其許從之既而常州監郡馬恕告浙西僉事髙源不法四十事源亦劾恕事聞詔廷辨臺憲紀綱不振故列郡不服至是仲威坐贓行臺方按其事仲威反以他事誣行臺詔免仲威官仍沒其資産十之二冬十月丙申太隂犯太微西垣上將詔皇太子參決朝政五祖真人李居壽作醮事乘間言皇太子春秋鼎盛宜預國政上喜曰行將及之明日下詔省院臺百司之事皆先啓後奏十一月癸丑太隂犯熒惑復遣柴椿使安南詔再諭日烜若果不能入朝則積金代其身兩珠以代目副以賢士方技子女各二以代其土民評曰王者之於梗化格則承之否則威之無它道也猶慮其難服故昭德修禮以招擕懷逺未聞要之以利而肯服者也安南事宋逾二百年及元氏代有天下其心未嘗不曰彼君也吾鄰也一旦改容屈膝豈無趙他倔強南海之志為世祖者施之以仁義示之以寬𢎞則彼將自服乃要以六事及其不從則又諭以積金代身兩珠代目副以賢士方技子女此果何道哉所以終不能致其服也歟雖然柴椿於此亦失奉使之義矣夫君命固不敢違茍傷國體僨事機為人臣者安得不諫止之哉以從命為忠非純臣也宣慰使張𢎞範卒𢎞範柔之子也善馬槊能為歌詩初從征李璮立功及守大名嵗大水漂民居𢎞範輒免其租朝廷詰其專擅𢎞範請入見曰國家儲栗於小倉不若儲之大倉上曰此何説也𢎞範曰今水潦不收而必責民輸粟帛倉庫實而民盡死亡明年租將安出若活其民使不逃亡則嵗嵗有收豈非陛下大倉乎上曰善其勿問及攻取宋襄樊平江南授江東宣慰使進追宋二王嶺海平磨崖之陽勒功而還入朝燕勞甚厚疾作卒贈平章政事後諡忠武加封太師淮陽王十二月增置宿衛初侍衛親軍分左右翼至元八年改立左右中三衛至是又增前後二衛專掌宿衛扈從兼營屯田國朝宿衛皆領于四集賽集賽者太祖功臣博勒呼博爾濟穆呼哩齊拉衮四族也號稱都爾本庫魯克猶華言四傑也其世領集賽之長集賽云者猶言畨直宿衛也凡宿衛三日一更申酉戌日博勒呼領之為第一亥子丑日博爾濟領之為第二寅卯辰日穆呼哩領之為第三己午未日齊拉衮領之為第四博勒呼早絶太祖命别勒呼代之而非四功臣之類因自領之名曰伊克集賽伊克者言天子自領也齊拉衮後亦絶常以丞相兼領凡集賽內其執事之名主弓矢鷹隼者曰和爾齊實保齊齊哩克齊者書寫聖旨者曰扎爾古齊主文書者曰筆且齊奉烹膳曰博囉齊司閽者曰巴勒噶齊掌酒者曰達喇齊典車馬者曰烏拉齊摩哩齊掌衣服者曰蘇庫爾齊牧駱駝者曰特默齊牧羊者曰和尼齊捕盜者曰呼拉干齊奏樂者曰浩爾齊忠勇者曰巴圗爾勇敢無敵者曰巴圗長集賽者悉世守之年勞既久即擢為一品官其預集賽者或以才能任使貴盛雖極然一日歸至內廷則執其事如故其後集賽纍增至萬四千八百而纍朝鄂爾多集賽尤多國家大費每縻於此云庚辰十七年春正月以張瑄為沿海招討使瑄與千户羅璧以追宋二王有功故授招討璧為管軍總管勑撿放降俘為民行臺大夫薑衛奏阿爾哈雅占降民為奴而以為征討所得詔免放為民凡三萬二千人二月召妖僧髙和尚張易言髙和尚有祕術能役鬼為兵遙制敵人命和爾郭斯將兵與髙和尚同赴北邊評曰聖人制五兵以威天下未聞有役鬼為兵而可以制敵者張易為大臣管樞府而薦用妖僧其失大矣他日王箸之變其及禍也宜哉此大易所以垂比之匪人之戒也夏貴致仕復置陜西行省于京兆先是商挺領秦蜀五路行四川省事後改立陜西四川行省治京兆尋移利州至是復還治京兆以李德輝為左丞三月甲辰車駕幸上都立都功德使司掌奏帝師所統僧人秩從二品遣招討使都實求河源是冬還報以圖來上其後翰林學士潘昻霄從都實之弟庫庫楚得其説撰河源志大略河源在土番朵甘斯西鄙有泉百餘泓方可七八十里名鄂端諾爾譯言星宿以其粲如列星也羣流滙為二巨澤自西而東合伊爾齊呼蘭伊拉齊三河其流浸大始名黃河又岐為八九股行二十日經昆侖至庫濟及克特二地相屬合細黃河及竒爾穆蘇二水北行轉西至河州積石洮水來會過蘭州正東行至寧夏南行至東勝與黑河合又正南流過保德葭興州與察納河合又南流與延安河合又合汾水過河中府至潼關乃折而東凡河流自土畨地至蘭州凡四千五百餘里始入中國又東北流過達靼地凡二千五百里始入河東境內又南流至河中凡一千八百餘里通計九千餘里云以王積翁為戶部尚書夏四月以賀仁傑為上都留守初仁傑父賁從軍有功家關中治室於毁垣得白金七千五百兩謂其妻鄭曰匹夫無故得千金必有非常之禍時上以皇弟駐六盤乃持五千金往獻上曰此天以與汝焉用獻為對曰殿下新封秦金出秦地殆天以授殿下臣不敢私願以助軍因言其子仁傑可用召入宿衛久之賁卒上一日召仁傑出白金謂之曰此汝父六盤所獻聞汝母來可持歸養辭不許乃歸白母盡散之宗族及是上都留守缺宰臣擬廷臣十數皆不應顧仁傑曰無以易卿尋以為中書右丞留守如故其後僧格奏本司錢榖失實召留守呼魯古爾及仁傑辨仁傑曰臣漢人不能禁吏戢姦以致耗失臣請服罪呼魯古爾曰臣為長印在臣手事未有不關白而能行者罪獨在臣上曰以爵讓人者易引咎歸已者難置勿問評曰賀賁臨財不茍世祖見利思義仁傑能承君父之美皆可謂賢矣有興王之君必有興王之臣信哉秋七月以郝禎耿仁為中書左丞從阿哈瑪特之請也己酉太隂犯南斗八月丙子又犯星宿東星又犯右執法嵗星八月許衡致仕官其子師可為懷孟路總管以便侍養髙麗王睶來朝睶言願益兵三萬征日本詔加睶開府儀同三司中書左丞相行中書省事尋又進右丞相翰林學士承旨姚樞卒樞栁城人初事太宗南伐破棗陽主將欲盡坑之樞力言非詔意乃蹙數人逃篁竹中得脫死拔德安得宋名儒趙復始傳朱程之學上在潛邸遣趙璧召見樞問以治道獻書數千言陳治天下大經凡八目曰修身力學尊賢親親畏天愛民好善逺佞次及救時之弊為三十條各疏弛張之方本末兼該細大不遺上竒其才使授世子經及憲宗大封同姓勑上於南京關中自擇其一樞勸上願有關中南征大理陳曹彬取南唐不殺一人上曰吾能為之師及城命樞裂帛為旗書止殺之書令時有讒上得中土心者憲宗使阿拉克岱爾鈎考文錢榖樞曰君臣之間事難與較莫若自歸朝廷疑將自釋上從其計入見憲宗皆泣下竟不令有所白而止上初即位以為東平宣撫使召還拜中書左丞薦安圗巴延可將兵取宋遷承旨卒諡文獻樞為人仁恕恭儉忠信未嘗疑人於德怨一無所較嘗與上論天下人才及王文統樞曰此人學術不純它日必反後果如其言是嵗賈居貞亦卒居貞弱冠時從事行臺有餽黃金五十兩者郤之太宗敕月給白金五十兩以旌其亷及為左右司郎中從上征行講説通鑑上問郎俸幾何居貞以數對謂其薄敕增之居貞辭品秩宜然不可因臣而紊其制劉秉忠奏為參政居貞言它日將有郎官援例求執政者辭不拜以宣撫使治鄂及參政江西卓有政績朝廷議征日本居貞力言民困乞罷其事卒仲子鈞仁宗朝為參政評曰辭尊居卑辭富居貧士之善行也賈居貞於善之中又有善焉其辭增俸也對以品秩宜然不可因臣而紊其制其辭執政也則言他日將由郎官而援例者可謂深得事君之義大臣之體也括江淮銅錢銅器九月壬午車駕還宫冬十月詔征日本以范文虎等帥兵往擊之先是十二年二月遣禮部侍郎杜世忠兵部侍郎何文著等往使日本不報十四年日本遣商人持金來易銅錢許之是年二月日本殺世忠等乃發兵十庭萬命范文虎等將之以文虎實都洪察球爾為右丞李張巴圖為參政並行中書省事左丞相阿珠卒阿珠巡邊至巴實伯里卒十一月甲子頒授時厯許衡楊恭懿王恂郭守敬等遍考厯書精思推算奏言舊儀難用而新者未備故日月盈縮遲疾五行周天皆未精察今參以古制創立新法推算成辛巳厯雖未或精比之前厯庶幾無愧必每嵗測驗修改積三十年庶盡其法又議合朔曰日行更四時一周謂之一嵗月踰一周復與日合謂之一月言一月之始日月相合故曰合朔自秦廢厯絶漢太初止用平朔法大小相間或有二大者故日食多在晦日或二日測驗時刻亦鮮中宋何承天進元嘉厯始以月遲速定小餘以正朔琞使食必在朔名定朔法有三大二小當時以異法罷之梁虞􅒠造大同厯劉焯造皇極厯皆用定朔為時所阻唐傅仁均造戊寅厯定朔始得行然貞觀十九年四月頻大人皆異之竟改從平朔李淳風造麟德厯雖不用平朔遇四大則避人言以平朔間之又希合當世為進朔法使無元日之食至一行造大衍厯一依前賢定論推算皆改從實今十九年厯自八月後四月併大實日月合朔之數也厯上因賜名授時頒之天下俱藍國入貢俱藍與馬八兒綱領海外諸國而俱藍又為馬八兒後障自泉州至其國約十萬里朝廷遣廣東招討使楊廷璧招之其國主必納的附降表來進貢十二月阿勒巴雅克特穆爾伏誅江淮平章阿勒巴左丞雅克特穆爾擅易命官八百員自分左右司官鑄銀銅印復違命不散防守軍勑誅之始建太廟初國俗祭祀無廟割牲奠馬湩以蒙古巫祝致詞上初即位始命設神位於中書省用登歌樂遣筆且齊致祭又命製祭器法服遷神主於聖安寺至元初立廟燕京定為八室烈祖第一太祖第二太宗第三皇伯珠徹第四察罕岱第五睿宗第六定宗第七憲宗第八及併江南詔建廟於大都於是太常為議廟制以都宫别殿及同堂異室之制上聞禮官奏始議七廟除正殿寢殿東西門已建外東西六廟不須更造餘依太常寺新圖建之遂為前廟後寢正殿東西七間南北五間內分七室殿陛二成三階東西五間南北三間環以宫城四隅為重瓦號角樓東西南三門各五至二十一年成加竇默昭文館大學士陜西運使郭琮等有罪伏誅初上以關中重地風俗強悍思得剛鯁舊臣乃授趙炳京兆尹及安西王開府以為王相豪猾斂迹秦民以安六盤守者搆變炳率兵擒其首惡平之王薨炳被旨入見上詢以民間利病炳因言運使郭琮郎中郭叔雲竊㺯威福為不法上卧聽遽起即令乘傳偕勑使往按至則琮等矯嗣王旨收炳及其妻孥囚之崆洞山炳子仁榮訴于上詔遣近侍馳馹而西令脫炳械琮等偕來琮等留使者醉以酒先遣人毒炳斃於獄上聞之拊髀嘆曰失我良臣命仁榮手刃琮叔雲發東城籍其家財畀之仁榮日不共戴天之物何忍受之上稱善别賜鈔二萬二千五百緡為治喪具辛巳十八年春正月詔求前代聖賢之後儒醫卜筮星厯術數及山林隱逸之士具以名聞丙辰車駕幸漷州二月辛未幸栁林乙未皇后鴻吉哩氏崩丙申車駕還宫后濟寧忠武王阿禪之女生裕宗中統初立為皇后性明敏逹事多所匡正四集賽官奏割京城外近地牧馬上許之后將諫先陽責太保劉秉忠曰汝何為不諫初定都時以地牧馬則可今分業已定奪之可乎上默然而止后嘗於太府監支繒帛各一上曰此軍國所須非私家物后於是率宫人拾舊弓絃練之緝為紬宣徽院羊臑皮置不用命取之合縫為地毯其勤儉類此至是崩及成宗立追諡昭睿順聖皇后三月戊戌魏國文正公許衡卒衡字仲平河內人生有異質竒志家貧無書常借人抄誦嘗暑中行道上衆取梨啖衡獨坐樹下自若或問之曰非其有而取之不可也其人曰世亂梨無主衡曰吾心有主從姚樞得程朱之書乃大有得尋居蘇門與樞及竇默相講習上在關中召見以為京兆提學及即位王文統以言利用事默每排其學術之非文統疑衡左右之乃奏樞為太子太師默為太傳衡為太保以疏之默以屢攻文統欲因東宫避禍衡曰此不安於義也在禮師傅與太子東西坐公等度能復此乎不能則師道自我廢矣樞以為然皆辭不就改衡國子祭酒衡亦謝病歸安圗為相召衡輔之衡上疏數千言皆經世大務深銜上嘉納焉阿哈瑪特當國衡數言事與之忤阿哈瑪特之亟薦衡宜任中書欲因事中傷之乃除左丞屢入辭免上不允命掖之出衡出閾還奏曰陛下命臣出豈出省耶上笑曰出殿門耳從幸上都論阿哈瑪特専權罔上蠧政害民因謝病請解機務命舉自代衡曰用人天子大柄不可使下有市恩之漸乃授集賢大學士兼祭酒衡請徴弟子王梓劉季偉韓思永耶律有尚呂端善姚燧髙凝白棟蘇郁孫安劉安中十二人為伴讀皆驛召之及致仕遂卒卒之日大雷電風拔木懷人無少長皆哭之後贈太傅諡文正封魏國公從祀孔子廟廷徙湖廣行省治武昌初巴延伐宋行省事於襄陽尋以别將分省鄂州及取潭州移治之至是復徙武昌武昌即鄂州也以田忠良為太常丞少府為諸王昌圗建宅於太廟南忠良往仆其柱少府奏之上以問忠良對曰太廟前豈諸王建宅所耶上曰善因奏太廟前無馳道非禮即勑中書為闢之國制十月上吉祀太廟或請牲不用牛忠良奏曰梁武帝用麵為犧牲後竟何如言者遂屈初忠良以隂陽家用劉秉忠薦召見上指西序第二人謂曰彼手中握何物對曰雞卵果然又問朕有何事縈心對曰以術推之當是一名僧病上笑曰然是國師也遂令司天試星厯遁甲諸書皆通詔官之司天上嘗問用兵江南纍年不決奈何對曰在酉年至元十一年七月十五日夜白氣貫三台上問何祥曰三公其死乎未幾太保劉秉忠卒一日出獵上駐輦召忠良謂曰朕有所遺汝知是何物還可復得否忠良曰失數珠耳明日二十里外當有得而來獻者已而果如其言海都叛遣皇子諾木罕丞相安圗征之忠良奏不吉上不恱兵遂出既而皇子丞相入海都上召諭忠良曰朕幾信讒言罪汝忠良曰皇子末年當還其言後果驗忠良之術巧中多類此夏四月丙午車駕幸工都立登聞鼓院秋八月范文虎等敗績于日本勑使回軍范文虎實都洪察球爾金方慶李庭諸軍入海遇颶風漂壞其船遂大失利餘軍回至髙麗什不存一二初諸將陛辭上勑之曰始因彼國使來故朝廷亦遣使往彼遂留我使且聞為其所殺故使卿輩為此行朕聞漢人言取人家國欲得百姓土地若盡殺百姓徒得地何用又有一事朕實憂之恐卿輩不和耳假若彼國人至卿等有所議當同心協謀如出一口答之後果遭風諸將不協各擇堅好船乘之棄士卒十餘萬于五龍山下方伐木作舟欲還日本人來戰盡死餘一二萬為其所虜得還者三人閏月丙午車駕還宮九月癸亥朔畋于近郊兩淮運使阿喇卜丹伏誅坐盜官鈔二萬一千五百定又盜取和買馬三百四十四匹朝命格而弗頒又以官員所佩符給家奴往來貿易等事伏誅冬十月置安南宣慰司以參政完顔特穆爾為宣慰使都元帥柴椿鴻和爾副之焚毁道經張易奏參校道書惟道德經老子所著餘皆後人偽撰宜悉焚毁從之評曰釋道皆異端聖學之巨蠧也崔浩焚佛書而信道士冦謙之張易毁道經而薦妖僧髙和尚其偏識僻見一何謬哉蓋察理不精而操心不正故也然兩人皆以誅死遂使老佛之徒得以藉口惜哉以和爾郭斯守司徒十二月以鴻吉哩岱為右丞相阿哈瑪特為左丞相翰林侍講學士竇默卒默金人初為國兵所俘脫走蔡州遇名醫李浩授以銅人針法遂以其術鳴又走德安孝感縣令謝憲子以伊洛性理之書授之楊惟中招儒道釋之士乃北歸與姚樞許衡講習其學由是知名上在潛藩召之默變姓名自晦使者先俾其友往見而微服踵其後默不得辭乃拜命既至問治道以三綱五常為對上曰然人道莫大於此默又言帝王之道在誠意正心心既正則天下無不正一日三召對皆稱旨遂命皇子珍戩從之受學拜侍講翰林王文統用事默上書力詆其非以蘇張目之又與樞衡於上前靣斥文統曰此人學術不正久居相位必禍天下上曰然則誰可默曰以臣觀之無如許衡上不悅而罷默遂罷歸文統誅上憶其言召還翰林有大政輒訪之及卒上深嘆悼嘗謂侍臣曰朕求賢三十年惟得一竇漢卿又曰若竇漢卿之心姚公茂之才合而為一斯全人矣後贈太師故世傳竇太師云壬午十九年春正月立太僕院中統初設羣牧所後改尚牧監至是改立太僕院後又改院為寺二月辛卯朔車駕幸栁林以姚文龍為江西宣慰使饒州總管姚文龍言江南財賦嵗可辦鈔五十餘萬定詔以文龍為江西宣慰使兼措置茶法詔征緬以台布為右丞伊克德濟為參政領兵以行又詔僉省亦奚不薛及思播敘三州軍同征立行樞密院詔揚州嶽州俱立行院二十一年又立沿江行院二十二年立江西行院二十八年徙嶽州行院於武昌江淮行院於建康後悉併入行省戊申車駕還宫甲寅幸上都三月俱藍入貢楊廷端再往俱藍國主及其相阿哈瑪特等迎拜璽書遣其臣祝阿里沙忙里八的入貢時伊嚕勒昆鄂則爾丕勒瑪及木速蠻主遣瑪哈穆特等亦在其國聞詔使至相率來告願納嵗幣使入覲盜殺阿哈瑪特及左丞郝禎上之北幸也皇太子從都左相阿哈瑪特留守大専權貪恣人厭苦之益都千户王著密鑄大銅鎚自誓皆願擊阿哈瑪特與髙和尚謀搆變殺之時髙觽張九思宿衛宫中著遣西僧二人至中書省言今夕皇太子與國師來建佛事省中疑之命觽等識視皆莫能識乃詰以畨語云太子國師今在何處二僧色變又以漢語問之皆倉皇失對遂執二僧屬吏訊問不伏觽乃與尚書綽和爾等集衛士執兵以備頃之樞密副使張易亦領兵駐宫外觽問果何為易曰夜後當自見固問之乃附耳語曰太子來誅左相也著又自馳見阿哈瑪特言太子將至即遣郎中托歡徹爾等往迎出關北行十餘里遇偽太子者責以無禮盡殺之奪其馬入健德門夜二鼓忽聞人馬聲遙見燭籠儀仗將至宫門傳令啓關觽謂九思曰它日太子還宫必以諤勒哲賽音先請得見二人然後啓關呼二人皆不應即語之曰太子未嘗行此門今何來此賊計窮趍南門觽亟走南門但聞傳呼省官袖姓名偽太子者立馬責阿哈瑪特數語著即牽去以所銅鎚碎其腦立死縳左丞郝禎至殺之囚右丞張惠於是髙觽張九思開門大呼曰此賊也叱衛士急捕之留守布敦持梃擊立馬者墜地衆多就擒髙和尚潰去惟著挺身請囚賊之入也矯太子令徴兵張易易不加審以兵與之因坐誅將傳首四方九思曰張易應變不審授賊以兵死復何辭若坐以與謀則過矣請免傳首從之獲髙和尚於髙梁河與著皆棄市著臨刑大呼曰王著為天下除害今死矣異日必為我書其事者評曰王著自誓擊殺阿哈瑪特為天下除害可謂有疾惡之心者觀其事敗而挺身請囚義不茍免蓋亦有烈丈夫之風焉然使之結刺客直為博浪運錐之舉雖或不成亦不失為荆軻聶政顧乃矯令竊兵以入則非矣此所以不得不以盜書之也夏四月鴻吉哩岱罷以和爾郭斯為右丞相耶律鑄為左丞相下右丞耿仁獄張惠阿里罷以敏珠爾多卜丹為右丞張雄飛為參政追治阿哈瑪特罪戮其尸阿哈瑪特死上猶不深知其姦及詢博囉乃盡得其罪惡始大怒曰王著殺之誠是也命發冡剖其棺戮尸於通玄門外縱犬食其肉籍馬駝牛羊驢三千七百五十八及其妻子親屬所營資産其奴婢悉放為民郝禎亦斫棺暴尸有司籍阿哈瑪特家藏得二人皮問之其妾引住云呪詛時置神坐其上應驗甚速又畫甲騎圍守殿幄兵皆張弦挺刃內向始得其不軌之狀如此汰省部官凡阿哈瑪特黨七百十四人和爾郭斯言已黜者一百三十三人其無過者姑存之瑪特諸以妻女姊妹獻阿哈瑪特得仕者並黜免又勑阿哈濫設官府二百四所存者三十三餘並罷之六月己丑朔日食命索多將兵討占城國降之發淮浙福建湖廣軍五千海船百戰船二百五十命索多將之往討占城迎戰兵號二十萬索多率敢死士縱擊斬溺五萬餘又敗之於大浪湖斬首六萬占城遂降索多造木為城闢地以耕諸小夷皆附積榖十五萬斛以給軍食秋七月戊午朔日食采民女子耶律鑄言有司以采室女害民請令大郡嵗取三人小郡二人擇可者厚賜其父母否則遣還八月甲寅車駕還宫庫克新耿仁等伏誅耿仁及阿里錫都鼎阿哈瑪特姪宰努蘇都爾丹皆伏誅醢庫克新與其弟瑪蘇庫詔以其罪惡頒告中外仍籍阿里家資初阿哈瑪特欲殺秦長卿劉中澤尼瑪多卜丹張雄飛持不可阿哈瑪特使謂之曰誠能殺此三人當以參政相處雄飛拒不從奏出為澧州安撫使三人竟死於獄及雄飛除中丞其長子庫克新以右丞行省江淮恐不為所容奏留之及是庫克新逮至敕中書雜問歷指宰執曰汝輩皆曽使我家錢物何得問我雄飛曰我曾受汝家財物否曰惟公獨無雄飛曰如是則我當問汝矣辜庫克新遂伏立詹事院以諤勒哲為右詹事賽音左詹事分三庫內藏主御用寶玉逺方珍異右藏主金銀貝鏹左藏主綺羅縑布冬十月遷瀛國公趙顯于上都省臣奏顯及平原公與芮翰林直學士與􅝾宜並居上都上曰與芮老矣當留大都餘如所言以扎薩克為中書平章太史令王恂卒初恂父良精究天文律厯恂生而穎悟過目成誦既得於家傳遂造其極劉秉中見而竒之言於上召見使輔導太子為贊善太子嘗問恂算術對曰算數六藝之一定國安民不在此也又問以心之所守恂曰許衡嘗言人心如印板板本不差雖摹千萬紙皆不差太子深然之至是居父喪以毁卒評曰許衡人心如印板之喻蓋即正心以正朝廷百官而逺近萬事莫不皆正之説今太子問以心之所守而恂舉以為言所對非所問矣若曰心之所守在於主敬而必自寡欲始則切於事理而於太子之心亦有所感發也帝師琳沁死逹爾瑪巴拉實哩嗣之十一月以孔洙為國子祭酒洙襲封衍聖公入覲詔以為祭酒兼提舉浙東學校仍給俸祿與護持林廟璽書勑御史臺得選用御史中書崔彧言國政得失生民休戚百官邪正雖王公將相亦宜糾察近惟御史有言臣以為凡臺官皆當建白又選用臺察若由中書必有偏徇合從本臺選擇御史初用漢人十六員今用蒙古十六員相參巡歷為宜從之十二月殺宋丞相文天祥天祥至燕館人供張甚盛天祥不寢處坐達旦遂移兵馬司設卒守之既而丞相博囉召見欲使之拜天祥長揖求死辨論百端博囉怒命囚於獄月餘再見之益不屈乃釋之留燕坐卧一小樓足不履地時上求南人有才者甚急王積翁薦之遣諭旨天祥曰國亡吾分一死倘蒙寬假得以黃冠歸故鄉他日以方外備顧問可也若遂官之非直亡國之大夫不可與圖存舉其平生而盡棄之將焉用我積翁欲合宋官謝昌元等請釋為道士留夢炎不可曰天祥出復號召江南置吾十人於何地遂止上知其不可屈也將赦之會閩僧言土星犯帝座疑有變未幾中山狂人自稱宋主有衆千人欲取文丞相有投匿名書者云某日燒蓑城葦率兩翼兵為亂丞相可無憂者時盜殺阿哈瑪特朝廷疑之遂撤蓑城葦遷瀛國公及宋宗室於上都疑丞相者天祥也乃召天祥入諭之曰汝何願曰願一死上猶未忍遽麾之退左右力贊遂從之乃詔有司殺於燕京之柴市俄有勑使止之已無及矣天祥臨刑殊從容謂吏卒曰吾事畢矣南向再拜死年四十七其衣帶中有自所為贊曰孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧後數日其妻歐陽氏收其尸面如生評曰天祥殺身成仁舍生取義其素志已定不得死不止蓋即豫讓所謂將以愧天下後世之為人臣而懷二心者惜乎世祖之不能終全之也或曰王積翁等請釋天祥為道士留夢炎恐其復出號召江南不可而止然則非世祖殺之也夢炎殺之耳夫夢炎之言未可深非之也宋厯運已盡天命人心已去天祥之力不足以興復益塗炭夫生民耳然則如之何而可全天祥以不死哉從其黃冠之請而不使歸故鄉可也詔諸路立養濟院中統初詔天下鰥寡孤獨廢疾之人命所在官給糧贍飬又勑病者給藥於糧之外復給以薪至是命各路立飬濟院以處之委憲司點治評曰鰥寡孤獨天民之窮而無告者能行仁政必自此始元世祖平江南立養濟院以收恤之可謂知政本矣召保定處士劉因以為右贊善大夫因字夢吉容城人父述世為儒家邃性理之學劉肅宣撫真定辟述武邑令以疾辭歸年四十未有子忽夢神人馬載一兒至其家既覺而生因乃名之曰駰字夢驥後更駰為因驥為吉云因天資絶人日記千百言過目成誦從詹堅受經究訓詁注釋之説嘆曰聖人精義殆不止此及得程朱之書曰我固謂當有是也至評諸子則曰卲至大也周至精也程至正也朱子極其大盡其精而貫之以正也其識髙見逺類此因家居以孝聞聚徒教授師道尊嚴然隨人才器皆有成就表所居曰靜修不忽术薦之於朝詔徴因擢承德即右贊善大夫以繼母老即辭歸養俸給一無所受元史續編卷二
