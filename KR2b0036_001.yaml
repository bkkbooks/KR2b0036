body:
  text: 元史續編卷一明胡粹中撰丙子世祖皇帝至元十三年宋端宗景炎元年春二月丁卯朔阿爾哈雅克宋潭州安撫使李芾死之湖南州縣皆降元兵圍潭芾慷慨登陴與諸將分守民老幼皆出結保伍助之勉以忠義人猶殊死戰除夕元兵蟻附而上芾時坐熊湘閣召帳下沈忠遺之金令盡殺家人而後殺己忠伏地叩頭辭芾固命之泣而許諾乃飲家人酒盡醉遍刃之芾亦引頸受刃忠縱火焚其居還家殺妻子復至火所大慟投地遂自頸幕僚陳億孫顔應焱皆死潭民聞之多舉家自盡城無虛井縊林木者相望元旦芾將劉孝忠以城降或請屠之阿爾哈雅曰是州生齒數百萬若殺之非上諭巴延以曹彬意也乃發倉廩賑飢者招徠未附旬日間湖南州縣悉降初城將陷時知衡州尹榖寓潭為二子行冠禮人曰此何時行此迂闊事榖曰正欲令兒曹冠帶見先人於地下耳禮畢率家人自焚死壬申巴延軍次嘉興府宋安撫使劉漢傑降留兵戍之仍以漢傑為安撫使癸酉宋遣使請平宋主遣軍器監劉廷端賫稱藩表詣軍前稟議又致陳宜中書於巴延會陸秀夫還言巴延不從伯姪之稱太后命用臣禮陳宜中難之太后涕泣曰茍存社稷稱臣非所較也遂復遣監察御史劉岊奉表稱臣上尊號嵗貢銀絹二十五萬兩匹乞存境土以備蒸嘗且致吳堅等書請俟福王至同詣軍前宋以吳堅為左丞相常楙參知政事文天祥知臨安府日午宣麻慈元殿文班止六人蓋皆遁也未幾楙逃去宋以益王是判福州廣王昺判泉州文天祥乞命二王出鎮以圖興復故有是命宋丞相陳宜中請遷都不果遂逃歸溫州宜中計無所出率羣臣入宫請遷都太后不許宜中慟哭以請太后命具裝以俟及暮宜中不入太后怒曰我不欲遷而大臣固請乃欺我邪脫簮珥投之地因閉閣群臣請見不納蓋宜中實以翊日行倉卒失於奏耳未幾宜中逃去宋以文天祥為右丞相兼樞密使家鉉翁僉書院事賈餘慶同僉書院事宋使還自軍前言巴延欲執政靣議太后乃拜天祥右丞相甲申巴延軍次皋亭山宋主遣使奉璽以降董文炳阿嘍罕等各以兵來會次于皋亭山宋主遣巡宣使尹甫防禦使吉甫賫傳國璽降表詣巴延其辭曰大宋國主顯謹百拜奉表于大元皇帝陛下言臣眇焉幼沖遭家多難權姦似道背盟誤國臣不及知至勤興師問罪宗社阽危生靈可念臣與太皇曰夕憂懼非不欲遷辟以求兩全實以百萬生民之命寄臣一身今天命有歸臣將焉往惟是傳國之鎮寶不敢愛惜兩浙福建江東西湖南北二廣四川見在州郡謹悉奉上聖朝欲望聖慈垂哀祖母太后耄病臣煢煢在疚不忍臣祖宗三百年宗社遽至隕絶曲賜存全再生之恩子孫世世不忘巴延受表璽遣囊嘉特以吉甫等還臨安召宰相出議下令禁軍士入城違者從軍法又遣呂文煥安諭軍民時宋三司衛兵白晝殺人張世傑部曲尤橫閭里小民乘時剽殺令下民大恱巴延又遣程鵬飛等入宫慰問太后謝氏且命取太后手詔諭州縣降附家鉉翁不肯署使者命縳之鉉翁叱曰中書無縳執政之禮乃止乙酉宋張世傑等以益王是廣王昺出奔世傑與蘇劉義等挾二王出嘉會門渡浙江遁去巴延遣阿嘍罕董文炳范文虎追之不及而還評曰世傑等出奔之謀與陳宜中遷都之請蓋懲靖康固守京城之失而覬建紹中興之福也然元氏自太祖以來立國已七十載盡有中原之地涵養生育其得民也久視金人拔興之暴突入之驟氣勢固不侔矣宋人偷安江左亦一百五十餘年文恬武嬉秦韓史賈相繼柄國君若贅旒蓋天命已去人心已離其視髙宗南渡國威士氣人才兵力又萬萬不同此宋之所以終於覆亡也歟又况宜中之忠不及世傑世傑之忠不及天祥觀清澳之逃占城之往豈為社稷死者邪特不欲茍去耳崖山一字陳奉宋主居其間為死計顧乃斷維奪港而去不與其君同溺則是未能決性命於義利之間而姑為求趙氏之嗣以自逭於一朝夕也既葬楊太后又將之安南夫君死將安之蕞爾安南豈足以興復宋室哉世傑於是乎昧所審決矣瓣香之祝大風覆舟天所以曲全世傑之忠也戊子宋丞相文天祥吳堅如師巴延執天祥遣堅還二相與樞密謝堂賈餘慶等見巴延于明因寺巴延顧天祥舉動異常天祥復乞退軍嘉興以俟講解巴延怒遣堅等還而拘留天祥庚子巴延承制以臨安為兩浙大都督府宋文武百司來見巴延命蒙固岱范文虎入城視事張惠阿嘍罕董文炳閲實倉庫收百官符印悉罷宋官府免侍衛禁軍二月日中有黑子大如雞卵相蕩久之有星鬭于中天二星相鬭一星隕宋以賈餘慶為右丞相謝堂知樞密院事劉岊同僉書院事與左丞相吳堅僉書家鉉翁並充祈請使巴延命克勒竒台偕五使及文天祥赴上都謝堂逃歸浙江潮三日不至時元兵駐沙上杭人方幸之而潮汐三日不至巴延遣范文虎追宋二王弗及二王走溫州文虎執其駙馬都尉楊鎮以歸巴延遣文虎追二王楊鎮得報即還曰我將就死於彼以緩追兵文虎遂執之以歸楊亮節負二王及楊淑妃徒步匿山中七日統制張全以兵數十追及遂同走溫州居江心寺文天祥自鎮江亡走溫州天祥至鎮江與其客杜滸等十二人夜亡入真州苖再成出迎喜且泣曰兩淮兵足以興復特二閫少隙不能合從耳天祥問計將安出再成曰今先約淮西兵趍建康彼必悉力以扞吾西兵然後指揮東諸將以通泰兵攻灣頭以高郵寶應淮安兵攻揚子橋以楊兵攻瓜步吾以舟師直搗鎮江同日大舉灣頭楊子橋皆沿江脆兵且日夜望我師之至攻之即下合攻瓜步之三靣吾自江中一靣薄之瓜步既舉以東兵入京口西兵入金陵要浙歸路其大師可坐致也天祥大稱善即遺書李庭芝夏貴遣使四出結約初天祥未至真時楊兵有脫歸者言巴延密遣一丞相入真州説降矣庭芝信之以天祥來説降使再成亟殺之再成不忍紿天祥出相城壘出制司文字示之曰閉城門復遣二人出覘天祥若果説降者當即殺之其一人與天祥語見其忠義不忍殺以兵二十人道之如揚四鼓抵城下聞候門者談制司下令備文丞相甚急衆相顧吐舌乃東入海道遇遊兵伏環琽中得免然飢莫能起從樵者乞得餘糝羮至板橋遊兵又至走伏叢篠中索之不得執杜滸金應以去滸應以金與卒得免二樵者以簣荷天祥至高郵嵇聳迎至家遣子德潤衛送至泰州遂得入海如溫州以求二王評曰苖再成之謀幾可以存宋矣而李庭芝獨疑文天祥致事終不成雖出於天意亦由天祥在當時志行未著譽望未隆不足以取信於庭芝故耳唐河北二十四郡俱陷顔真卿起兵討賊玄宗聞之曰朕不識真卿何狀嗚呼此忠臣志士每顯於板蕩之日而平居無事不能自致其用也向使天祥庭芝素相孚信同心叶力如再成所計雖未能以致其大師亦可以成和議而寡婦孤兒不至於一鼓而北行也失此機會使京都破陷帝后北遷而再成謀奪駕庭芝邀兩宫噫亦晚矣辛酉車駕幸上都三月巴延入臨安宋福王與芮來會巴延自湖州市入城大宴諸將市不易肆福王與芮亦自紹興至厚慰之宋主及太后欲與相見巴延固辭是日復出城評曰巴延可謂賢矣率長勝之兵入屢敗之國而能馴殺伐之性為仁義之師市不易肆民不知擾雖曹彬何以過是夫曹彬以中國之人服中國而巴延以敵國之人勝中國彬為其易而巴延為其難巴延於是乎可謂賢矣至其辭宋主以不見又可謂知禮者也丙子巴延遷宋主后妃北行巴延既得宋主降表國璽來上乃下詔曰間者右丞相巴延奏宋主母后及大臣百官已於正月十八日降附朕惟自古降王必有朝覲之禮今特遣使往迎爾官吏士民各守職業勿妄疑畏凡歸附前犯罪悉從原免公私逋欠不得徴理應亡命逃聚者並赦其罪山林河泊權免徴稅祕書太常圖籍禮樂器法物儀仗宗正譜牒天文地理圖册凡典故文字户版盡仰收拾前代聖賢之後高尚儒醫僧道術數隱逸之士所在官司具名以聞於是巴延發臨安命安塔哈阿嘍罕董文炳等遷三宫期會於瓜步安塔哈入宫宣詔免牽羊繫頸之禮太后謂宋主曰荷天子聖慈不殺宜拜謝遂與太后出宫獨太皇謝氏以疾留福王與芮并宗室駙馬都尉楊鎮等及文武庶僚三學生內侍等皆行太學生徐應鑣父子赴井死過真州苖再成謀奪駕至瓜步李庭芝遣薑才出兵邀兩宫欲劫以入城皆不克以董文炳行省事于臨安宋夏貴以淮西州縣降閏月戊午以郝禎參知政事至元初以安圖史天澤鑄巴延呼圖克徹爾耶律並為丞相趙璧廉希憲宋子貞阿哈瑪特為平章張文謙阿爾彬為右丞姚樞許衡張易為左丞商挺敏珠爾丹張惠為參政是年呼圖克徹爾獨為左丞相赫伯阿哈瑪特為平章張易為右丞而禎參知政事改臨安府為杭州以蒙固岱為都督鎮之又以索多為元帥鎮婺州宋相陳宜中等以益王是如福州起兵興復陸秀夫蘇劉義等聞二王在溫州以兵來會楊亮節召陳宜中於清澳共議興復又召張世傑於定海相與哭於江心寺故高宗御座下奉益王為天下兵馬都元帥廣王副之發兵除吏以秀王與睪為福建察訪使先入閩中安撫吏民敦諭百姓檄召諸路忠義同奬王室會謝太后遣二宦者以兵百人召二王還臨安宜中等沉其兵於江而奉二王入閩時黃萬石降元招諭汀建諸郡方謀送欵聞二王至閉門以拒萬石南劍守臣林起鰲遣軍逐之萬石乃走入卲武其將劉俊等多復歸宋兵勢稍振夏五月乙未朔宋益王是即皇帝位於福州改元景炎升福州為福安府以大都督府為垂拱殿便廳為延和殿武安軍為行都之門封廣王昺為衛王以陳宜中為左丞相兼樞密使陳文龍劉黻為參政張世傑為樞密副使陸秀夫僉書院事蘇劉義為殿前都指揮使王剛中知福安府楊亮節為福建處置使召李庭芝為右丞相薑才為龍虎四廂都指揮使又召吳浚趙縉傅卓李珏翟國秀等分道出師興復宋文天祥至福州以為右丞相兼知樞密院天祥命吕武招豪傑於江淮杜滸募兵於溫州以巴延同知樞密院事巴延用兵紀律嚴而不殺故所至降附或請入視降城府藏簿帳以知金榖户口多寡巴延笑曰是欲寅緣噬吾民爾乃下令諸將士敢有暴掠及入城者以軍法論由此所過不至大擾而珍竒一無所私及還上勞賜有加巴延謝曰奉陛下成算阿珠效力臣何功之有詔以陵州藤州戶六千為其食邑拜同知樞院復賜巴延阿珠所部銀鈔衣幣有差丙申宋主顯至上都封為瀛國公宋主顯與全太后入見制授顯開府儀同三司檢校大司徒封瀛國公宋主之入朝也上大宴宮中衆皆歡甚獨皇后鴻吉哩氏不樂上問其故后曰自古無千歲之國無使吾子孫及此則幸矣上以宋庫物置殿廷召后視之遍視即去上使內侍追問欲何所取后曰宋人貯此以遺子孫其子孫不能守而歸于我實不忍取也後又以全太后不習北土奏令還江南上曰爾婦人無逺慮若使南還或浮言一動即廢其家非所以愛之但時加存恤可也由是愈優待之上嘗召宋降將問曰汝等降何容易對曰賈似道專國每優禮文士而輕武臣臣等久積不平故望風送欵上使董文忠語之曰似道實輕汝曹特似道一人之過汝主何負焉正如汝言則似道之輕汝也固宜評曰興王之君必有興王之佐文王之興也有太姒以成二南之化武王之盛也有邑薑以輔九人之治蓋皆得內助焉蒙古氏起自朔漠而世祖含𢎞寬大有包括海宇之量皇后鴻吉哩氏仁厚恭儉實資之以為助觀其受宋主之朝而不樂睹寶玉之俘而不取拳拳焉監彼之所以亡而慮它日子孫之或失其識見所及雖知道之君子不是過也嗚呼兹其所以勃焉而興也歟宋吳浚復南豐宜黃寧都等縣時翟國秀亦復秀山縣秋七月宋文天祥開府南劒州遂復邵武軍天祥與陳宜中張世傑議不合乃求出督至南劒募兵得數千遂復邵武黃萬石敗走宋揚州守將朱渙以城降制置使右丞相李庭芝及其都統薑才死之二宫既北遷詔諭庭芝等猶堅守不下阿珠遣兵守髙郵寶應以絶其餉路别遣兵攻泰州之新城拔之宋薑才攻灣頭堡董士元戰死才夜帥步騎趨丁村守將史弼出戰陳岩以灣頭兵邀其後巴延徹爾踵至所將皆阿珠麾下才軍望見旗幟皆走遂破之庭芝留朱渙守城與才率步騎東出阿珠馳騎督右丞阿里萬戶劉國傑分道追及于泰州西殺步卒千餘人庭芝等僅得入阿珠遂築長圍塹而守之而自當東南靣斷其走路朱煥遂以揚州降庭芝帳下率劉發鄭俊亦開門降於阿珠執庭芝及才斬於揚州市淮東皆附真州守將苗再成亦不屈而死阿爾哈雅降下廣海州縣宋廣東經略使徐直諒遣其將梁雄飛請降阿爾哈雅假雄飛招討使使徇廣東既而直諒聞益王即位乃發兵拒雄飛戰敗直諒棄城走雄飛遂入廣州嶺海州縣多降江西都元帥遜都岱奏乞援兵詔以蘄黃等郡兵益之宋陳宜中張世傑等聚兵福建攻江西都木逹求援兵勑蘄黃等郡兵付都木逹將之都木逹言福建魏天佑遊義榮來附乃命天祐知卲武軍授義榮千户安南國入貢陳光昺遣黎克俊入貢先是詔諭光昺六事一君長親朝二子弟入質三編民數四出軍役五輸賦稅六仍置達嚕噶齊統治至是并上表謝罪乞免六事宋以王積翁等為福建招捕使積翁知南劒備禦上三州黃恮知漳州為同招捕使備禦下二州陳文龍知興化軍宋趙溍復韶廣州東莞民熊飛為黃世雄守潮惠聞溍至以兵應之攻梁雄飛于廣州雄飛遁溍遂入廣州飛又復韶州冬十月宋天祥次師於汀州天祥遣趙時賞等將一軍趨贛以取寧都吳浚取雩都劉洙蕭明哲陳子敬皆自江西來會平章趙璧卒璧雲中人上在藩時召見呼秀才而不名后親製服以賜寵遇無比命馳傳聘名士王鶚等又令譯大學衍義時從馬上聽璧講説稱旨憲宗嘗召問天下何如而治對曰先誅近侍之尤不善者璧退上曰秀才渾身都是膽邪吾亦為汝握兩手汗也為河南經略使有劉萬戶者貪淫暴戾其黨董主簿恃勢強取民女三十餘人璧按董罪立斬之劉大驚時大雪劉持酒往賀曰經略下車誅鋤豪猾故雪為瑞應璧曰如董主簿者尚有其人俟盡誅滅瑞應將大至矣劉懼竟以憂死還為平章時廟享有司失黃幔得於神庖汚弊甚上大怒曰此大不敬當斬璧曰法止杖流其人得不死是年璧卒贈大司徒賜諡忠亮車駕還宫十一月阿嘍罕董文炳入建寧府宋知邵武軍趙時賞知南劒州王積翁皆棄城走知福安府王剛中以城降時阿嘍罕兵又徇處州李珏以城降秀王與睪迎戰敗績死之宋主是走入海蒲壽庚作亂遂遷于潮州宋主舟泊泉州港招撫使蒲壽庚來謁請駐蹕張世傑不可初壽庚提舉市舶或勸世傑留之則凡海舶不令自隨世傑不從縱之歸既而舟不足乃掠其舟而沒其資壽庚怒殺宗室及士大夫與淮兵之在泉者於是世傑奉宋主趨潮阿爾哈雅克宋靜江府守臣馬塈死之塈守靜江不下阿爾哈雅遣使招之皆為所殺及宋太后遣湘山僧宗勉賫詔諭塈復殺之阿爾哈雅又為書以天命地利人心開塈許以廣西大都督反復千餘言終不聽遂進兵逼之又以上所賜靜江詔示塈塈焚詔斬使乃堰斷大勝小勝二江決埭以涸其隍城遂破塈突圍出走追執之阿爾哈雅以靜江民易叛非潭比不重威刑則廣西諸州不服因悉坑之斬塈于市評曰君子之於義無所為而為之者義也有所為而為之雖義亦利也宋已亡矣其君亦既虜矣馬塈獨守孤城欲何所為乎焚詔斬使誓死不屈雖其故主所遣亦殺之而不顧蓋土地祖宗之土地非為嗣君守乃為祖宗守也嗣君雖不能守其宗社吾為人臣豈可以不死於疆域惟求即其本心之安而已嗚呼若塈者雖豫讓何以過之哉十二月宋趙溍棄廣州蒲壽庚以泉州降知興化軍陳文龍死之時熊飛及曽逢龍皆戰死韶州遂降溍亦棄廣州王剛中既舉福建降遣使徇興化陳文龍斬之阿嘍罕復使人招文龍又斬其使而遣部將林華偵伺大兵華反導至城下通判曹澄孫開門降文龍被執逼使降伏指其腹曰此皆節義文章也可相逼邪卒不屈械送杭州不食而死宋張珏入重慶府珏雖領重慶之命不能赴官留合州以抗大兵且遣師復瀘涪二州時東西川行院各遣兵圍重慶肆為剽掠軍政不一兩院相訾故久無功城中益得自守既而圍兵自潰珏乃得入城遣將四出大兵屢為所敗以姚樞為翰林學士承旨趙與􅝾為待制時宋侍從之臣與士子至上都者皆令先謁樞詢其學行而官之與􅝾初以宗室為鄂州教授巴延渡江詣軍門上書陳不嗜殺人可以一天下且乞全其宗及巴延入朝上問宋宗室之賢者首以與􅝾對召至京師幅巾深衣以見言宋亡之故由誤用權姦詞旨激切上念之故有是命置江淮行省治揚州評曰自唐有三省中書為政本門下主封駁至尚書省而施行焉是為南牙皆宰相所居以出政令之所歷代因之今江淮有省則是以宰相行藩鎮之事矣宰相而行藩鎮之事則是內外政權皆歸之矣且天子元首也宰相股肱也都省置左右相而十二行省復置十二丞相何股肱如是之多也使一人之身而股肱以十數則將何所從令乎元之政權不歸於上而終以覆亡者蓋權輿於此矣詔諭江南吏民詔以萬戶千戶漁奪其民致令逃散今悉遣歸原籍凡軍校及宋官吏有奪民田業者各還本主無主則以給附近民之無産者其田租商稅茶鹽酒醋金銀鐵冶竹木湖泊課程從實理辦故宋繁冗科差聖節上供經制錢等百餘條悉除之詔檢核江淮諸路錢榖巴延言張惠守宋府庫不俟命擅啓管鑰詔阿珠詰其事仍諭浙淮江東西諸路官吏檢核新舊錢榖置五道宣慰司時平宋通得江淮浙東西湖南北等路三十七州一百二十八關監各一縣七百三十二戶九百三十七萬四百七十二口一千九百七十二萬一千一十五乃分浙東西江東西湖北為五道道置宣慰司立通政院國初制驛傳設托克托和斯以辨姦偽至元初立諸站都統領使司以總之至是改為通政院明年上都又置分院詔更造新厯以大明厯浸差命太子贊善王恂及郭守敬與江南日官置局更定新厯恂言今之厯家罕明厯理宜得許衡商訂詔以樞密副使張易領其事召衡參預守敬首言厯之本在測驗而測驗之器莫先儀表今司天渾儀宋汴京所造不與此處天度相符乃創簡儀高表又以天樞附極而動昔人嘗展管望之未得其的作俟極儀極辰既位天體斯正作渾天象象雖形似莫適所用作玲瓏儀又以表之矩方測天之正圓莫若以圓求圓作仰儀古有經緯結而不動守敬易之作立運儀日有中道月有九行守敬一之作證理儀表髙景虛罔象非真作景符月雖有明察景則難作窺几厯法之驗在於交會作日月食儀又作仰規覆矩圖異方渾蓋圖日出入永短圖與上諸儀互考守敬又奏唐開元間令南宫説天下測景書中所載凡十三處今疆宇比唐尤大若不逺方測驗日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同即曰測驗人少可先南北立表取直測景上然之遂設監候官十四員分道而出東至髙麗西及滇池南踰朱崖北盡鐵勒四方測驗凡三十七所髙麗王湛更名睶立提舉學校所太祖初平燕京以金樞密院為宣聖廟太宗六年設國子總教及提舉官至是給六品印改為大都路學署曰提舉學校所至十九年命諸路皆建學以祀先聖二十三年詔江南有學田者復給之評曰人君奉天時修人紀為治之先務也唐虞之世首命羲和厯象日月星辰敬授人時然後使契為司徒敬敷五教蓋帝王之治莫有先於此者元世祖雖起自朔漠而取江南之嵗即命更定新厯立提舉學校所其為治可謂知所本矣王業之興宜哉丁丑十四年宋景炎二年春正月阿嘍罕入汀州宋文天祥奔漳州二月復改福安府為福州以潛説友為宣慰使王積翁為副使以守之已而李雄殺説友淮兵亦謀殺積翁以應張世傑事覺積翁盡殺之癸亥彗星出東北長四尺餘車駕幸上都詔以康戩且琳沁嘉噶爾斡並為江南釋教總攝除僧租稅禁擾寺宇者評曰世祖混一海宇當利民阜物而首除僧租稅禁擾寺宇致嘉木揚喇勒智貪淫暴虐江南被害豈不為新政之纍哉姚樞許衡竇默皆不聞有所陳説以格其非心是可歎也嗚呼佛本西域一法國俗使然彼漢明梁武以中國之君且篤信而深敬之於元氏何足怪哉宋文天祥誅吳浚浚既降因至漳説天祥天祥責以大義縊殺之尋復梅州又復興國會昌縣吉贛兵皆會宋陳瓚起兵復興化軍瓚文龍從子也舉兵誅林華復其城廣東制置使張鎮孫亦復廣州梁雄飛去走置江淮鹽運司杭州置兩浙運司揚州置兩淮運司福建置市舶司至大四年復升為運司三月置廣西宣撫司慶懷鬱林昭賀藤梧賔融栁象雍亷容貴潯等州皆降於是置司靜江以崔斌阿爾哈雅鎮之鄭鼎等駐鄂漢賈居貞等駐潭州括民馬凡三萬二千二百六匹孕駒者還其主髙麗金方慶等作亂命其王治之仍命實都察球爾飭兵備禦五月宋張世傑復潮州尋復邵武文天祥復使趙時賞等復吉贛諸縣遂圍贛州西南蠻夷來附四川僉院咱順言比遣隆州同知趙孟烯招諭南平軍都掌蠻羅計蠻及鳯凰中隴羅韋髙崖四寨皆降既而思州安撫使田景賢播州安撫使楊邦憲特磨道將軍儂士貴知安平州李惟屏知來安州岑從毅等皆來附邦憲言本族自唐至宋世守此土將五百年昨奉旨許令仍舊乞降璽書從之而儂士貴等所屬溪洞凡一百四十七戶二十五萬六千西番酋長阿立丁寧占等三十六族亦來歸欵秋七月宋張世傑圍泉州討蒲壽庚不克世傑自將淮兵及陳弔眼許夫人諸洞番軍討壽庚兵勢稍振壽庚閉城自守而隂賂番軍遂有二志攻城不力壽庚得遣間使求援索多帥兵赴之世傑乃還八月李恆襲宋文天祥于興國天祥兵潰奔循州趙時賞等死之宣慰李恆遣兵援贛而自將攻天祥於興國天祥倉卒引兵走就鄒㵯於永澧㵯兵先潰恆追及天祥至空坑兵盡潰妻子皆被執時賞肩輿在後兵問為誰時賞曰我姓文衆以為天祥禽之天祥得脫挺身與其長子道生及杜滸等逸去遂奔循州散兵頗集幕僚客將俘虜者多獨時賞至隆興不屈有係纍至者輒麾去曰小小僉廳官執之何為由此得脫者甚衆臨刑劉沭頗自辨時賞叱曰死耳何必然既而天祥家屬皆送於燕九月置江南行御史臺以薑衛為御史大夫治揚州尋徙杭州又徙江州統淮浙江東西湖南北八道提刑按察司薑衛上奏曰陛下以臣為耳目臣以御史按察司為耳目倘非其人是臣之耳目先自閉塞下情何由上達上然之命清臺選每除目至官僚集議有不叶公論者劾去薑衛又陳便宜十五事上皆納焉諸王錫里濟叛命右丞相巴延討平之錫里濟劫北平王于阿里瑪圖之地械繫丞相安圗誘脅諸王以叛使通好于海都海都不納諸王亦弗從遂率其屬來歸與巴延軍合巴延與其衆遇于鄂勒歡河夾水而陳相持彌日俟其懈掩擊破之錫里濟走死置江西行省治隆興以托爾楚為右丞敏珠爾丹為左丞徹爾特穆爾張榮實伊德默色實勒們李恆程鵬飛蒲壽庚並參政冬十月丙辰朔日食托爾楚圍廣州張鎮孫降索多屠興化軍陳瓚死之車駕還宫十一月宋陳宜中逃入占城劉深攻淺灣張世傑戰不利奉宋主走秀山宜中欲奉之如占城乃先往諭意度事不可為遂不還竟死于暹罷大司農司十二月宋主有疾遷舟于謝女峽颶風壞舟宋主幾溺不救遂得驚疾劉深復來襲井澳乃遷舟謝女峽以耿仁為中書參政安南國王陳光昺卒子日煊立納蘇拉迪音伐緬先是遣竒徴塔特托音緬朝貢不從而率衆侵擾永昌雲南行省遣元師帥納蘇拉迪音伐之降其寨三百餘以天熱還以耶律希亮為吏部尚書希亮鑄之子也琿塔噶之亂鑄脫身歸希亮及母陷漠北凡四年得還上憐之以為符寶郎至是遷吏部尚書上嘗駐蹕齊訥格台之地希亮至奏事畢董文用問大都近事希亮曰囹圄多囚上方欹枕卧忽寤問故希亮奏近奉旨漢人盜鈔六文者死是以囚多上驚問孰傳此語省臣對托爾楚所傳上以問托爾楚對曰陛下在南坡以語蒙古兒童上曰前言戲耳曷嘗著為令式乃罪托爾楚希亮曰今既出必明其錯誤以安民心上嘉其言即令希亮至大都諭中書立諸路市舶司泉州一蒙固岱領之慶元上海澉浦各一令福建安撫使楊發督之凡舶貨十分取一粗者五分抽一其發舶回帆必著其所至之地於公牒而為之期每嵗招舶商於畨邦博易諸香貨珠翠等物回帆依例抽解方聽貨賣其自泉福販土物者所徴與畨貨等其後上海市舶司提控王楠以為言乃定單抽雙抽之制雙抽者畨貨單抽者土物又定細物二十五分取一粗物三十分取一皆免稅不抽分者斷沒最後增杭廣溫三州市舶司通七所抽分之外又三十分稅一又最後則細物十分抽二粗物十五分抽二其市舶司或𨽻泉府院或屬行省或直𨽻都省其抽分雜禁多不能載平章廉希憲卒希憲在江陵逺近向化有疾召還民皆垂涕為建祠繪像及卒上嘆曰無復有決大事如希憲者矣巴延常稱希憲宰相中真宰相男子中真男子世以為名言初希憲幼時有識量篤好經史上在藩時嘗被急召時方讀孟子懷之以進上問其説對以性善義利仁暴之旨上嘉之目曰廉孟子由是知名額爾布格琿塔噶劉太平之亂應變有功上深嘉其能權及居中書方士請煉大丹希憲曰堯舜得壽不因大丹也上然其言遂郤之時方尊禮國師命希憲受戒對曰已受孔子戒矣上曰孔子亦有戒耶對曰為臣盡忠為子當孝孔子之戒如是而已及罷政得疾醫言須用沙糖家人求不得最後得二斤於阿哈瑪特家希憲聞之曰使此物果能活人吾終不以姦人所與求活也上聞而賜之會議立門下省欲以為侍中為阿哈瑪特所沮評曰孟子在當時義利仁暴之説齊梁諸君所不樂聞豈惟齊梁之君後世漢唐賢主亦未有能表章之者顧乃千有餘年而元世祖獨喜聞之不惟喜聞之而又能行之故終以不嗜殺人一天下嗚呼賢哉然自孟子之後傳其學而能行者希憲一人而已故其於額爾布格琿塔噶劉太平之亂能權而得中諫方士煉丹却帝師受戒又深得距邪説放淫辭之義宜乎世祖以廉孟子目之也戊寅十五年宋端宗景炎三年五月宋主昺祥興元年春正月西京飢封宋福王與芮為平原郡公制授與芮金紫光祿大夫檢校大司農封平原郡公又勑其家資之在杭越者有司輦至京師給付定軍官承襲之制凡有功升秩者元職令他有功者居之不得令子姪復代陳亡者始得承襲病死者降一等總把百戶老死者不襲臨陳中傷還營病故者與陳亡同詔罷諸道提刑按察司既而復置先是立御史臺以姚天福為監察御史每廷折權臣上嘉其直賜名巴爾斯謂其不畏強禦猶虎也仍厚賜以旌之天福曰臣職居抨彈惟尸祿是懼敢貪厚賞以重臣罪乎時置二大夫綱紀無統天福言于上曰古稱一蛇九尾首動尾隨一蛇二首不能寸進今臺綱不振有二首之患不急拯之久將不可理矣上召約蘇特穆爾博囉諭之博囉以年幼自劾及罷提刑按察司天福白大夫曰是司之設所以廣視聽不但繩有司而已約蘇特穆爾入奏其言上大悟詔復立之然權臣不恱左遷天福衡州路同知天福亦辭不就二月索多克宋潮州屠其城知州馬發死之置太史院命王恂為太史令工部郎中郭守敬同知院事國子祭酒許衡兼領丁亥太隂犯太白戊子犯熒惑三月以張𢎞範為都元帥李恆副之帥師入閩廣賜𢎞範寶劒得専決軍事以攻宋廣海餘兵𢎞範薦李恆自副從之水陸之師二萬分道而南以弟𢎞正為先鋒戒之曰以驍勇見選非私汝也軍法重我不敢以私撓公汝其慎之故所向克捷宋主遷舟于碙洲四月殂弟衛王昺即位四月戊辰宋主殂年十一羣臣多欲散去陸秀夫曰度宗皇帝一子尚在將焉置之古人有以一旅一成中興者今百官有司皆具士卒數萬天若未欲絶宋此豈不可為國邪庚午乃與衆共立衛王年八嵗矣改元祥興升碙洲為翔龍縣宋雷化髙三州來降廣西宣慰司遣總管崔永千戶劉潭王德用招降雷化髙三州即以永等鎮守置光祿寺修會川縣盤古王廟祀之徴杭州等處書版用許衡言故也宋以陸秀夫為左丞相兼樞密使時播越海濵庶事疏略楊太后垂簾與羣臣語猶自稱奴每朝會獨秀夫儼然正笏立如治朝或在班行悽然泣下以朝衣收淚衣盡濕左右無不悲動及拜首相與張世傑共秉政外籌軍旅內調工役凡有所述作皆出其手雖匆遽流離猶日書大學章句以勸講以賈居貞為江西行省參政時捕民間受宋二王文帖者甚急繫巨室三百餘居貞至悉出之投其文帖于水火有挾兵入民家誣為藏匿取貨賄子女者皆痛繩以法杜萬一亂都昌居貞調兵擒之或列富民名數百來上云與賊連居貞曰首惡已誅蔓延何為焚其牒南安李子發作亂聞居貞至其黨解散子發自焚死竟不戮一人初居貞從巴延南伐留治鄂為湖北宣慰司蘄州民傅髙起兵應陳宜中官軍進討有言鄂大姓與髙通者請捕除之居貞曰髙鼠子無知大姓何預其為治以不擾為本類如此夏五月宋湖南制置使張烈良等起兵官軍擊斬之烈良與提刑劉應龍周隆賀十二起兵行省調兵往討獲賀十二斬之烈良等舉宗以餘兵奔思州為官軍所襲二人皆戰死江東按察使阿巴齊以罪免阿巴齊求呂文煥金銀器皿宅舍子女不得誣其私匿兵仗詔行臺御史薑衛詰驗無狀坐免官先是有李思敬者告運使薑毅所言悖妄指毅妻子為證上曰妻子豈為證者耶詔勿問其後劉深言王積翁通謀張世傑積翁上言兵弱暫從詔原其罪又有首髙興匿宋金者命置不問其後又以興侵用二王金三萬一千一百兩銀二十五萬兩勑遣使追理六月宋主遷舟于新會縣之崖山張世傑以碙洲不可居而崖山在海中去湖廣各四百里兩山相對中有一港可以藏舟遂移駐焉遣人入山伐木造軍屋千間立行宫正殿曰慈元楊太后居之升廣州為翔龍府時官民兵尚有二十餘萬資糧取辦於廣右諸郡復刷人匠造舟楫製器仗民不能堪始有叛志有星隕于海是月己巳有大星南流墜海中小星千餘隨之其聲如雷數刻乃已汰江南冗官中書左丞崔斌言比以江南官冗命阿里舒等沙汰之而阿哈瑪特循私一門子弟並為要官詔悉黜之又言臺臣劾阿喇卜丹侵欺官錢事未竟復授江淮參政乞追回所授仍勑自今罷免者宰執為宣慰宣慰為路官路官為州官既而淮西宣慰使昻吉爾入覲復言江南官吏太冗於是詔江南行省併入福建宣慰司十一道除額設員數餘並罷去仍罷𣙜茶營田等司𨽻本道宣慰司漕運司以其事歸行省各路依户數以上中下三等設官故宋官應入仕者付吏部銓用上因諭昻吉爾曰宰相明天道察地理盡人事兼此三者乃為稱職爾縱有功宰相非可覬者回回中如阿哈瑪特才任宰相阿里年少亦精敏南人如吕文煥范文虎或可以相位處之又顧左右曰可諭姚樞等江南官吏太冗卿輩所知而未嘗言昻吉爾乃為朕言之近侍劉特穆爾亦言阿爾哈雅屬吏張鼎今亦為參政詔即罷去遂命平章赫伯諭省院臺及翰林諸儒今宰執方靣郡守多謬濫其議所以汰之者安南入貢陳日煊初立遣中侍大夫周仲彥中亮大夫吳德邵來朝秋八月宋加文天祥少保封信國公天祥聞衛王即位自劾江西喪師之罪表請入朝不許遂加官封會軍中大疫士卒多死天祥子道生復亡家屬殆盡宋合州守將王立降川蜀悉附先是立樞密行院於東西川以經略蜀地兩院不協遂致潰敗李德輝為西川副使始克瀘涪重慶而東川恥其功不立乃辭西川而自以兵圍合州王立聞德輝威名且懼東川懷怒必肆誅殺乃遣間使請降于德輝德輝單舸至城下呼立出降於是兩川皆來附樞密院奏東川行院言立久抗王師嘗指斥憲宗而降臣李諒亦訟立殺其妻子有其財物遂詔殺立籍其家資償諒既而安西王具立降附本末來上且言東川行院爭功誣奏狀上大怒讓樞臣曰卿視人命若戲邪前所遣使計殺立久矣今追悔何及卿等妄殺人其歸待罪因叱出之會安西王使再至言未殺立即召入覲以為潼川路安撫使知合州評曰古人有言偏聽生姦獨斷成亂故聽斷者人主之大用也兩川行院不協受降爭功而東川奏誣王立世祖過聽而命殺之及安西王具陳本末始讓樞臣以人命至重叱出待罪而已其始也聽之失於偏其終也斷之失於明其為盛德纍多矣夫罔奏有造言之刑誣告有抵罪之律能舉而行之則惡人有所懲善人有所恃今以立不死而慢不加誣罔之罪假令因是不察而誤用刑焉其失豈不大哉世祖於此含𢎞雖有餘而明斷亦不足矣貽厥孫謀終以聽斷不明寬猛失宜亡天下蓋未嘗不始於此也分川蜀為四道以成都等路為四川西道廣元等路為四川北道重慶等路為四川南道順慶等路為四川東道並置宣慰司宋以姚良臣為右丞相夏士林參知政事王德同知樞密院事宋廣潮惠三州及海南郡縣皆降以許衡為集賢大學士大都路同知錫喇卜丹以罪免御史韓昺劾奏錫喇卜丹私歐部民至死詔杖之免其官仍籍家資十之二遣禮部尚書柴椿使安南詔切責之仍徴其國王入朝九月中書左丞董文炳卒文炳始以父任為稿城令治稱亷明後從征伐屢有功誅李璮收江南勞效尤多上知其忠正深器重之嘗呼為董大哥及卒巴延薦其弟文忠可相上使繼其官辭上曰汝兄有平南功可居是位辭曰臣何宣力敢叨重職乎置福建行省治泉州併江西州縣來屬十七年復置江西省於隆興二十二年又併福建入江西二十三年改𨽻江浙冬十月庚申車駕還宫弛山場樵採之禁十一月徴宋相馬庭鸞章鑑赴闕建寧民黃華作亂政和縣民黃華集鹽夫連括蒼等處畬民為亂詔調兵討之復呼遜阿繅繖等官初呼遜等以阿哈瑪特子為崔斌論列而免至是張惠為請復之惠又請復其子巴蘇從呼姪巴圖爾丹沙木斯鼎前職上疑惠不閏月張𢎞範襲宋文天祥于五坡嶺執之以歸天祥與鄒㵯劉子俊會師潮陽遂討羣盜陳懿劉興興死懿遁去因導𢎞範濟潮陽𢎞範方攻漳州得山寨百五十牒報天祥屯潮陽港遣其弟𢎞正及總管囊嘉特帥輕騎五百赴之天祥力不支帥兵走海豐𢎞正等追及于五坡嶺衆皆不戰而潰天祥遂被執吞腦子不死鄒㵯自頸劉子俊先自詭為天祥冀免天祥不追及執天祥至各爭真偽主將怒遂烹子俊天祥見𢎞範左右命之拜不屈𢎞範釋其縛以客禮見之天祥固請死𢎞範不許或曰敵人之相不可測也不宜近之𢎞範曰彼忠義士保無其他求族屬被俘者還之處之舟中以自從尋及其將校四人送京師阿爾哈雅入朝阿爾哈雅初以孤軍戍鄂不能倍萬遂定江廣凡五十八州洞夷山獠受命聽令者數十所至是嶺海悉平詔入覲因獻金三千五百八十兩銀五萬三千一百兩評曰世祖天資仁厚宇量寬𢎞獨好利之心差勝耳漢祖入關惟收圖書版籍婦女貨財一無所取其豁達大度越常人逺矣世祖得江南之後即陳宋寶玉于殿廷又檢核新舊錢榖置徴理司立規措所𣙜茶酤賣及阿爾哈雅入朝受所獻金三千六百兩銀五萬三千兩蒙古岱獻真珠一百斤故當時權姦必若阿哈瑪特僧格盧世榮皆以言利進蓋上有好者下有甚焉者矣于是阿哈瑪特欲殺崔斌則誣以盜糧四十萬僧格欲害郭佑楊居寬則奏其虧欠鈔六千餘定蒙古岱謀陷劉宣則言其沮壞錢糧終至元之世江南三省盜起不止皆由於鉤考理算刻剝生民蓋好利之弊一至於此也時阿喇卜丹生盜鈔二萬馬三百嘉木揚喇勒智發宋陵取金銀八千五百兩受獻鈔十餘萬寶玉無算盧世榮盜官物金銀二萬餘定它物稱是茍上之人不貪欲則曷由至此哉録平宋軍功巴延上平宋將校軍功及降臣姓名詔授官有差宋葬端宗于崖山辛亥太白熒惑填星聚于房阿哈瑪特殺江淮行省左丞崔斌斌馬邑人性敏多智術善騎射尤攻文學而達于政理事上潛邸從阿爾哈雅平宋功最多自湖南召還時平章阿哈瑪特擅權阿哈瑪特問斌各省撫治如何斌對以所用非人因極論阿哈瑪特姦蠧乃按黜其親黨檢劾其不法海內稱快遷斌江淮左丞凡病國妨民之政悉釐正阿之仍條具以聞阿哈瑪特恐其不利于已因誣搆斌與里布盜官糧四十萬命都事劉正等往按獄弗具復遣參政張澍等四人雜治之竟置斌于死皇太子聞其事方食投箸遣使止之不及天下寃之時又有衛士秦長生卿上書發阿哈瑪特之姦竟為所害斃之于獄評曰殺雖人主之大用而人主且不得専之無非奉行天命而已必奉行天命而與衆棄之斯謂之天討苟殺不當罪人主尚不可况人臣乎元起朔漠世祖以不嗜殺一天下可以為治朝矣獨奈何權姦得以私憾誣殺良臣如崔斌斃于阿哈瑪特楊居寬郭佑死于僧格劉宣害於蒙古岱此數人者皆宰執大臣無罪見僇而世祖漫不加省其失政刑亦甚矣夫以世祖英武明斷而猶若是哉他日特們德爾殺蕭楊賀勝哈瑪爾殺托克托尚何咎十二月黃河清自孟津東柏谷至泥子蓼子峪上下八十餘里澄瑩見底數月始如故元史續編卷一
