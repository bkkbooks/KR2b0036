body:
  text: 元史續編卷九明胡粹中撰辛酉英宗皇帝至治元年春正月修佛事於玉德殿召高麗王章入朝始親享太廟始服衮冕親祠太廟左丞相拜珠亞獻知院庫春貝終獻乃詔羣臣曰一嵗惟四祀使人代之不能致如在之誠自今嵗必親祀以終朕身廷臣或言祀事畢宜赦上曰恩可常施赦不可屢下使殺人或免則死者何辜評曰祀畢肆赦蓋出於近代非古先哲王之令典先王之所赦者過誤蠢愚而已非故釋有罪也英宗廟享禮成而不肯肆赦其知此乎但其言曰恩可常施赦不可屢下蓋一嵗再赦善良喑啞其曰赦不可屢下誠是矣若夫恩可常施則非也夫有功者賞無功者不賞則受賞者感其恩不賞者知所勸苟不論其功之有無而一槩施賞非惟有功者不以為恩而無功者亦不勸矣元世諸君往往濫賞橫施病根正在於恩可常施故終以惠䙝而威不振至於覆亡也噫罷元夕張燈於宫中上欲於元夕張燈宫中中書參議張養浩諫上遽命罷之曰有臣如是朕復何憂自今朕凡有過豈獨臺臣當諫人皆得言賜養浩尚服金幣以旌其直甲辰熒惑太白鎮星辰星聚奎二月殺監察御史觀音保等御史觀音保索約勒哈逹默色及成圭李謙亨諫造壽安山佛寺上怒殺觀音保等三人杖謙亨圭流尼嚕罕辛酉太白犯熒惑以僧法洪為司徒釋源宗主三月廷試進士賜台哈布哈宋本等六十四人及第出身有差辛巳車駕幸上都遣使取佛經遣呪師多爾濟往牙濟班卜一國取佛經又遣賜西畨薩斯嘉地僧金二百五十兩銀二千二百兩袈裟二萬幣帛幡茶有差製御服珠袈裟評曰𫝊有之曰服堯之服誦堯之言行堯之行是堯而已矣服桀之服誦桀之言行桀之行是桀而已矣袈裟佛子之服也以堂堂天下之主舍十二章服而服袈裟是將為天下主乎將為一佛子乎英宗於此其不能君亦已見矣以特克實為御史大夫夏四月江西饑造象駕金脊殿賜特們德爾先墓碑五月遷親王圖卜特穆爾于海南圖卜特穆爾武宗次子周王之弟也中政使約爾珠托歡徹爾等與交通於是徙海南六月癸卯朔日食敬儼罷為西臺中丞辛酉太白經天冬十月甲午復經天禁妄言時政趙宏祚等以言事勒歸田里仍禁妄言時政以濟爾哈朗為中書平章秋七月盩厔僧圓明作亂遣樞密院判章臺討捕郃陽道士劉志先謀反志先以奸術謀亂復遣章臺捕之畿內山東大水大都保定真定大名濟寧東平東昌永平髙唐濮曹等州水八月特穆爾圖罷駐驆興和左右以寒請還上曰衆以牛馬為重民以稼穡為本朕遲留蓋欲馬得芻牧民得刈穫一舉兩得何計乎寒丁未太陰犯心九月還宫達實哈雅有罪免坐受贓杖免冬十月僧圓明伏誅河南平章鼐智密鼎有罪免坐殘忍故也十一月遣雅克特穆爾行邉命特克實領左右阿克蘇衛己亥幸大護國仁王寺立故丞相安圖碑立于保定新城丞相拜珠奉㫖親往立碑時特們德爾久稱疾聞拜珠行將出涖省事入廟至內門上遣蘇蘇賜之酒且曰卿年老宜自愛待新年入朝未晚遂怏怏而還然其黨猶布列于朝每事必稟于其家十二月立皇后伊竒哩氏作壽安山寺佛像冶銅五十萬斤是嵗開府上卿知集賢院張留孫卒壬戌二年春正月畿內山東河南饑發米三十九萬五千石賑之建行殿于柳林以西僧羅卜藏為司徒二月賜特克實先墓碑以竒徹瑪魯為中書平章王居仁為參政薛處敬罷造流杯池行殿以太廟役軍造免河間河南陜西十二郡民租之半以春旱秋霖民飢故也復張圭司徒三月建故太師魯王穆呼哩祠于東平停嵗賜以國用匱竭停諸王及皇后嵗賜省臣復奏請節賞賚以紓民力上曰朕思所出倍於所入出納之際卿輩宜慎之朕當撙節其用蘇克伏誅蘇克駙馬許納之子訴父謀叛母私漢人上曰事親有隱無犯今有過不諫乃復告訐命誅之夏四月戊戌朔車駕幸上都五月喀喇托克托罷以濟爾哈朗為御史大夫托克托出為南臺大夫甲申幸五臺山免雲南平章達實特穆爾多爾濟官二人坐贓杖免以巴勒丹知樞密院巴勒丹特們德爾之子也六月丁未朔至五臺山戊午次應州翰林學士承㫖趙孟俯卒諡文敏封魏國公孟俯所著有尚書注琴原樂原得律吕不傳之妙詩文清邃竒逸篆籕分𨽻行草無不冠絶古今遂以書名天下其畫山水木石花竹人馬尤精緻楊載常稱其才頗為書畫所掩知其書畫者不知其文章知其文章者不知其經濟之學人以為知言道州民符翼軫作亂討平之秋七月甲戌次奉聖州張思明坐罪免八月特們德爾卒丙辰太皇太后鴻吉哩氏崩即興聖太后武宗母也時有司將以十月戊辰有事於太廟太常奏國哀以日易月旬有二日之外乃舉祀事上曰太廟禮不可廢迎香去樂可也九月辛亥幸夀安山癸亥地震冬十月杖南臺大夫喀喇托克托謫之雲南坐請告未得㫖輒去職故評曰御史大夫在漢為三公在唐宋為風紀之長蓋朝廷之所謂大臣也唐宋璟坐監杖朝堂杖輕貶秩前史譏璟監所不當監𤣥宗貶所不當貶夫御史大夫監杖他人且不可况親自受杖乎以御史大夫而受杖則國家之禮義亡而斯人之亷耻喪矣以拜珠為右丞相初特們德爾貪險屢殺大臣賣官鬻獄廣立朋黨每以事去不附己者尤惡平章王毅右丞髙昉因在京倉糧失陷奏誅之拜珠言宰相論道經邦不可責以金榖細務上然之得釋既而特們德爾引張思明為左丞以自助思明為盡力謀中害拜珠左右得其情乘間言請備之拜珠曰大臣叶和國家之利今以右丞讎我我求報之非特吾二臣不幸亦國家之不幸吾知盡吾心上不負君父下不負士民而已及特們德爾在告思明亦稱疾不出拜珠謂僚屬曰左丞病省事遂廢乎郎中李處恭曰選擇不得其人未敢遽擬拜珠曰汝為賣官計耶遣人善慰思明乃出拜珠為相每以學校政化大源而主者不務盡心以致廢弛議拯治之有言佛教可治天下者上問之對曰清净寂滅自治可也治天下舍仁義則綱常亂矣又嘗謂拜珠曰當今亦有魏徴者乎對曰盤圓則水圓盂方則水方有太宗納諫之君則有魏徴敢諫之臣上皆然之至是進右丞相欲爵以三公懇辭遂不置左相獨任其事十一月甲午朔日食癸卯地震翰林學士元明善卒明善弱冠游吳中名能文章董士選為江西左丞辟署省掾轉中書左曹以太子文學事仁宗於東宫升翰林直學士譯尚書節文以進每奏一篇必稱善遂為學士卒諡文敏封清河公明善早以詩文自豪初在江西與虞集相切磋明善言集治諸經惟朱子所定者漢以來諸儒所嘗盡心者考之殊未博集亦言凡為文辭得所欲言而止必如明善所云若雷霆之震驚鬼神之靈變然後可非性情之正也兩人初相得甚歡至京師乃不能相下士選之自中臺行省江浙也二人俱送出都門士選曰伯生職教導當早還復初宜更送我集還明善送至二十里士選下馬入邸舍出酒殽同飲乃舉酒屬明善曰士選以功臣子出入臺省無補國家惟求得佳士數人為朝廷用如復初與伯生他日必光顯然恐為人搆間復初中原人仕必當道伯生南人將為復初所摧折今為我飲此酒慎勿如是明善受巵酒跽飲立言曰誠如公言無論它日今隙已開矣請再賜一巵明善終身不敢忘公言乃再飲而别真人吳全節交明善尤密嘗求明善作文明善謂全節曰伯生見吾文必有譏評吾所欲知成季為我治具招伯生來覲明日集至明善出其文問何如集曰公能從集言去百餘字則善矣明善即泚筆屬集凡芟一百二十字而文益精明善大喜乃歡好如初然集每見明經之士亦必以明善之言告之真人蔡遁泰伏誅刑部尚書布逹實哩坐受其金范德郁坐詭隨並杖免平江大水捐官民田四萬九千六百三十頃免其租十二月甲子朔南康建昌大水山崩乙丑太白熒惑嵗星聚奎戊寅太白犯嵗星瑪魯亷恂罷以張圭為中書平章瑪魯為大司農恂集賢大學士巴爾濟蘇伏誅宣政院使巴爾濟蘇特們德爾子也坐受司徒劉䕫冒獻田地伏誅籍其家䕫亦尋坐罪以蘇蘇為中書左丞瑪喇勒為參政濟爾哈朗知樞密院竒徹罷皇太后鴻吉哩氏崩仁宗后也諡莊懿慈聖皇后癸亥三年春正月詔行省平章復兼軍政重者以聞輕者就决以吳圭王約韓原益並商議中書省事以趙居信為翰林承㫖吳澄為學士拜珠言二人皆有德老儒請徴用之上喜曰卿言正副朕意然更當搜訪岩穴遺才故有是命時方書金字藏經成帝在上京使左丞蘇蘇詔澄為序澄曰主上寫經為民祈福甚盛意也若用追薦臣所未諭蓋福田利益雖人所樂聞而輪回之說不過謂為善者死則上通髙明其極品與日月齊光為惡者死則下淪汚濁其極下與沙蟲同類遂創為薦拔之論以惑世人今列聖之神上同日月何庸薦拔且自國初以來寫經者不知其幾若未效是無佛法矣若已效是誣其祖矣撰為文辭不可以示後世請俟駕還奏之㑹南坡之變乃止罷上都諸路金銀冶上都雲州興和宣德蔚州奉聖州及雞鳴房山黃蘆三山諸金銀冶並罷聼民自採煉以十分之三輸官出四川平章趙世延于獄世延初為中丞劾特們德爾十三罪坐奪官既而復相誘世延從弟索約爾哈呼誣告世延罪逮至䕫路遇赦特們德爾遣使督捕至京煆煉使成獄有㫖事經赦原勿復問又妄舉他事白上擊之逼令自裁世延不為動拘囚再嵗其弟自以所言涉誣亡去丞相拜珠為言其無辜乃得釋回著令原告逃亡百日不出則釋待對者二月癸亥朔太白熒惑鎮星聚胃國史院進仁宗實録先一日拜珠詣國史院聼讀首卷書大德十一圖年事不書左丞相哈喇哈遜定䇿功惟書越王喇勇决從容謂史官曰無左丞相雖百越王何益録鷹犬微勞而略發縱指示之人可乎立命書之他筆削未盡者悉令補正人服其識作上都華嚴寺又作帝師寺營丞相拜珠第役軍六千二百人頒行大元通制先是命樞密副使完顔納丹侍御史曹伯啓等聼讀仁宗時纂集纍朝格例至是凡二千五百三十九條內斷例七百一十七條格千一百五十一詔赦九十四令類五百七十七名曰大元通制頒行天下而富珠哩翀為序封鷹師布哈為趙國公丙戌雨土以富珠哩翀為中書右司員外郎上畋柳林駐東平王安圖碑所翀為左司都事獻駐蹕頌稱㫖次龍虎臺拜珠命翀傳㫖中書翀領之行數步還曰命翀傳否拜珠歎曰真謹飭人也間謂翀曰爾可作宰相否對曰宰相固不敢當然所學宰相事也夫為宰相必福德才量四者皆偹乃足當耳拜珠大恱入見行在故有是命三月壬辰朔車駕幸上都免監察御史拜珠嘉琿官坐舉巴爾濟蘇也西畨咱巴凌諸族叛敕鎮西武靖王綽斯巴勒討之夏四月壬戌朔敕天下諸司命僧誦經十萬部尋敕諸寺作水陸佛事七畫夜釋罪囚敕都功德使科爾羅至京師釋囚大辟二十一人杖五十七以上者六十九人放籠禽十萬令有司償其直詔行助役法遣使考視稅籍髙下出田若干畝使應役之人更掌之收其嵗入以助役官不得預五月戊戌太白經天庚子大風雨雹拔柳林行宫內外大木三千七百株詔中外開言路他日臺臣請復降㫖上曰言路何曽不開但卿等選人未當耳毁所賜特們德爾碑從御史蓋繼先宋翼之請也奉先行宫正殿災上都利用監庫火上語羣臣曰世皇建此宫室朕嗣登大寶而燬則朕不能圖治之故也嘗御大安閣見太祖世祖遺衣皆縑素木綿重加補綴嗟歎良久謂侍臣曰祖宗創業艱難服用節儉乃如此朕焉敢頃刻忘之評曰前志有之君髙其臺孽火為災英宗在位四年建夀安寺詔各部立帝師殿造流杯池行殿作華嚴寺及鑄佛像冶銅五十萬斤勞民傷財甚矣至是災及先皇所遺之宫亦其應也雖遇災而懼知其不能圖治之故而不察其所以不能圖治之由故終不能側身修行以消去之也六月置太廟夾室省臺集議夾室制度太常博士議曰爾雅室有東西廂曰廟注云夾室前堂禮曰西夾南向注云西廂夾室明有東西夾室也夾室猶今耳房之類其制度則未之聞晉太廟十六間東西儲各一所謂儲者非夾室歟唐貞觀故事遷廟之主藏於夾室西壁南北三間宋哲宗亦嘗於東夾室奉安是唐宋夾室與諸室制度無大異也今廟制皆不合古權宜一時宜取今廟十五間南北六間東西兩頭二間准唐南北三間之制壘至棟為三間壁以紅泥以准東西序南向為門如今室户之制虛外以准廂所謂夾室前堂也雖未盡合古於今為宜從之七月辛卯落成巴勒丹坐罪免仍籍特們德爾家資秋八月車駕發上都癸亥駐驆南坡御史大夫特克實弒帝於行幄及其右丞相拜珠特克實與知院額森特穆爾大司農實達爾前平章沁特穆爾前雲南平章旺扎勒特們德爾子前治書侍御樞密史索諾木特克實弟宣徽使索諾木典瑞院使托和濟副使哈克繖僉院章臺衛士圖們諸王諳達布哈伊埓布衛哈綽羅布哈烏魯斯布哈等謀逆以特克實所領阿克蘇兵為外應特克實與齊琳特穆爾先殺丞相拜珠遂弒帝于行幄時年二十一帝性剛明嘗以地震避殿徹樂减膳近臣有稱觴賀者帝叱曰朕方修德不暇汝為大臣不能匡輔反為諂耶拜珠進曰咎在臣等宜求賢自代上曰毋多遜朕之過也嘗戒羣臣曰卿等髙位厚祿當勉力圖報苟或貧乏朕不惜賜汝若為非法必刑無赦巴爾濟蘇下獄上謂左右曰祖宗法令非朕得私巴爾濟蘇雖事朕日久今有罪當論如法又謂宰執曰中書選人署事旬日御史臺即改除之臺除者中書亦然今山林遺逸良多卿等不能盡心求訪惟以親故更相引用其明斷類此然果於刑戮奸黨畏誅遂搆大變云評曰英宗享國四年無一善可紀特們德爾殺蕭楊賀勝下趙世延于獄則威福下移矣阿薩爾赫嚕等受誣而死則刑罰失中矣御史受戮禁言時政則言路塞下情壅矣水旱災荒迭見而且寫經造寺鑄銅像作佛事則政治乖舛甚矣前有讒而不見後有賊而不知雖曰明斷英果然明不足以燭奸斷不足以去惡是以不能免於南坡之禍也九月癸巳晉王伊遜特穆爾即皇帝位於龍居河大赦天下初裕宗長子晉王噶瑪拉生伊遜特穆爾襲封鎮北邉成武之立咸與翊戴有盟書焉王府內史道拉實得幸嘗偵伺朝廷事機以其子哈克繖事丞相拜珠因入宿衛久之哈克繖歸言特克實與拜珠意忤欲傾之是年三月宣徽使塔坦來王邸為道拉實言主上將不利于晉王由此二人深相要結八月二日晉王獵于圖喇之地特克實密遣烏魯斯來告晉王曰我與哈克繖額森特穆爾實達爾謀已定事成推立王為皇帝又以告道拉實曰汝與瑪蘇庫知之勿令舒瑪爾節得聞也於是晉王囚烏魯斯博囉默色等赴上京以逆謀告未至英宗南還遇弒諸王諳達布哈及額森特穆爾等奉璽綬北迓位晉王九月癸巳即以額森特穆爾為中書右丞相道拉實為平章奈曼岱為右丞特克實薩題勒密實諤勒哲茂穆蘇並知樞密事瑪蘇庫章台並同知院事圖們同僉院事哈克繖為御史中丞博囉宣徽院使舒瑪爾節宣政院使實達爾為大司農冬十月甲子遣使至京師告祭天地廟社告以即位故額森特穆爾等伏誅與旺扎勒及特克實弟在索諾木並誅于行以舒瑪爾節為中書右丞相圖嚕寧珠並御史大夫蘇蘇為中丞特克實齊琳特穆爾等並伏誅遣舒瑪爾節寧珠入京師收特克實及其黨實逹爾托和齊章台等皆伏誅戮其子孫籍入家産評曰昔趙盾亡不越境反不討賊春秋以弒君之惡加之原其情王也今特克實與道拉實相交結謀弒英宗而立晉王晉未必知也囚其使送赴上京未至而難作晉王之志固亦未白也至是而誅特克實盡討其黨而顯置之重戮固異於趙盾矣惜乎其猶不能致辟於道拉實也以阿勒坦綽克為太師知樞密院額卜德哷勒為中書平章十一月己丑朔車駕次中都辛丑入京師免御史中丞董守庸蘇蘇等官守庸及御史實勒塔克鄂都瑪勒額森呼圖克經厯多爾濟巴勒並坐黨特克實蘇蘇坐貪淫並免官遣使祠曲阜陵廟以宦者噶逹爾為中政院使詔雪楊多爾濟蕭拜珠賀勝等寃御史言特們德爾専愛誣殺蕭楊賀勝及觀音保索約勒哈迪默色黥竄李謙亨成圭王毅髙昉張志弼請昭雪之詔存者召還録用死者贈官有差盜入太廟竊仁宗及莊懿慈聖皇后金主壬申作仁宗主仍督有司捕盜索諾木伊嚕托克托等伏誅御史托克托趙成慶奏特們德爾在先朝包藏禍心離間親藩誅戮大臣使先帝孤立卒罹大禍其子前治書索諾木親預謀逆乞正天誅以快元元之心伊嚕托克托哈蘇台皆特克實之黨不宜寬宥遂皆伏誅以道拉實為中書左丞相監察御史許有壬上正始十事有壬先上書為王毅等訟寃至是上正始十事一曰輔翼太子宜先訓導二曰遴選長官宜先培養三曰通籍宫禁宜别貴賤四曰欲謹兵權宜削兼領五曰武偹廢弛宜加修飭六曰賊臣妻子宜禁勢官徴索七曰前赦權以止變宜再詔以正名八曰特們德爾諸子宜誅籍以懲惡九曰考驗經費以减民賦十曰撙節浮費以紓國用上多從之封邁努為泰寧王舒瑪爾節奏而坡之變諸王邁努逃赴潛邸願效死力且言不除元凶則陛下善名不著天下後世何從知之上契宸衷嘗䝉奬諭今臣等議宗戚中能自拔黨逆者惟有邁努乞加封賞以示激勸遂封泰寧王論討逆功賜舒瑪爾節等有差舒瑪爾節金十定銀三十定鈔七千定餘各有差流貶諸王伊埒特穆爾等伊埒特穆爾流雲南諳達布哈貶海南圗吉布哈流尼嚕罕博囉烏魯斯布哈流海島命嶺北諸王徹辰圗月修佛事以却冦兵浚治鎮江運河江浙行省言鎮江運河全籍練湖之水為上源漕運商販舟楫無不由此以供億京師宋朝嘗濬此湖瀦蓄潦水若運河水淺開放湖水一寸可添河水一尺近年淤淺以致遞運不通乞加修治自鎮江至吕城壩一百三十里約役夫萬五千餘人二十日可畢又用三千餘人浚滌練湖九十日可完奏可於是行省㑹議取泥之法用船千艘撈泥每船日可三載月計九萬三月可取二十七萬載就用所取泥增築湖岸開河面濶五丈底三丈深四尺與見有水通積深六尺凡役夫一萬三千五百人工畢又置湖兵百人專任修治詔改元詔曰朕荷天洪禧嗣大厯服側躬圖治夙夜祗懼惟祖宗是遵乃開嵗甲子景運伊始思與天下更新稽諸典禮踰年改元其以明年為泰定元年免大都興和差稅三年八畨兩廣洞寨一年江淮創利包銀三年四川雲南甘肅秋糧河南陜西遼陽絲鈔各三分除虛增田稅免斡脫逋錢賑恤雲南廣海戍軍求直言賜髙年帛禁獻山場湖泊之利帝師衮噶諾爾布喇實嘉勒燦巴勒藏布死班珠爾戩藏嗣泰定二年又燦死衮噶伊實巴絅喇實嘉勒巴勒藏布嗣其年又死十二月戊辰追尊皇考妣為帝后皇考晉王噶瑪拉為光聖仁孝皇帝廟號顯宗妣曰宣懿淑聖皇后太常博士劉致建議本朝宗廟未有定制今方繼統宜定一代不刋之典為萬世法蓋周制天子七廟太祖居中三昭處東三穆處西所以别父子親疏之序而不使亂也今聖朝取法唐宋為九世遂以舊廟八室而為六世昭穆不分父子列坐不合禮經新廟十五間東西二間為夾室太祖既居中則唐宋之制不可依惟當以昭穆列之父昭子穆則睿宗當居昭之第一世祖穆之第一裕宗昭之第二兄弟共為一世則成順顯三宗皆當居穆之第二武仁二宗居昭之第三如此則昭穆分明秩然有序不違禮經若以纍朝定制依室次於新廟遷安則顯宗躋順宗之上順宗又躋成宗之上矣昔魯僖在閔公之上春秋以為逆祀然僖公猶是有國之君尚不可居故君之上况順顯未嘗正帝位者乎省臣是其議以聞從之評曰夫有天下者始得正廟漢宣帝繼昭帝而立終不列戻悼二園於昭穆以其未嘗繼體而正位也元之諸君各顧其私親而尊其所生於是乎廟制紛紜昭穆混殽瀆禮不經甚矣彼劉致者徒知兄弟當共為一世而不知顯順二君不當稱宗徒知父子當自為一世而不知睿裕二宗亦不當立廟况即天子位者謂之君其未嘗即位者皆臣也致徒知父子列坐不合禮經而不知君臣同食其不合禮經多矣若欲合禮則太祖居中太宗居西夾室定宗居昭之第一憲宗居穆之第一世祖居東夾室成宗居昭之第二武宗居穆之第二仁宗居昭之第三英宗居穆之第三親盡則祧各藏於其夾室而睿裕順顯各袝食於禰廟如此則情文皆稱而於禮不悖矣末哉劉致之為儒也甲子泰定皇帝泰定元年春正月以奈曼岱為中書平章舒蘇為右丞録故丞相拜珠後以拜珠子達爾瑪實哩為宗人衛親軍都指揮使齊哩克為左右衛阿蘇親軍都指揮使贈拜珠清忠一德功臣太師開府上柱國進封東平王諡忠獻時又賜故監察御史觀音保索約勒哈迪默色妻子鈔各千定明年又以籍沒巴爾濟蘇地人各十頃賜之召親王圗卜特穆爾於瓊州阿瑪噶於大同二月修西畨佛事於壽安寺曰桑節辰類曰科爾羅普爾普曰楚多人三年爾瑪曰薩戩布勒納木扎勒經僧四十乃罷又命僧一百八人作佛事于京及倡優百戲迎導帝師開經筵用江浙右丞趙簡言命平章張圭翰林學士吳澄集賢院學士鄧文原等以帝範資治通鑑大學衍義貞觀政要等書進講以楊廷玉為中書參政額爾吉納知樞密院上先帝諡號諡曰睿聖文孝皇帝廟號英宗立詹事院以太傅托迪宣徽使圗們岱爾桓國公實德哩太尉綽羅並為詹事中書參政王居仁副之三月廷試賜進士巴拉張益等八十四人及第出身有差省臣言改元之初恩澤宜渥蒙古色目三十以上并兩舉不中第者與教授三十以下與學正山長漢人南人五十以上并兩舉不中第者同丙午立皇后皇太子御大明殿冊妃巴拜哈斯氏為皇后皇子阿勒濟雅巴為皇太子封巴特瑪雅爾藏布為嗣晉王額爾吉納竒徹罷額爾吉納為雲南行省左丞相竒徹為西臺大夫夏四月甲子車駕幸上都以普爾普為中書右丞多岱為參政瑪喇勒罷以圗們岱爾為中書平章監察御史宋本等言事不報御史宋本趙成慶李嘉賔傅岩起言盜竊太廟神主由太常守衛不謹請加其罪太尉司空司徒三公之職濫假僧人及㑹福殊祥二院並辱名爵請皆黜罷不報董鵬南劉潛邉笥慕旺舒卜又以災異上言平章奈曼岱圗們岱爾宣徽使特穆爾布哈黨附逆徒遼王擅殺宗親布哈濟蘭矯制亂法皆䝉寬宥甚為失刑乞正其罪以消天災亦不允上嘗諭道拉實曰朕即位以來無一人能執成法為朕言者自今凡有所知宜悉以聞使朕明知法度斷不自縱非獨朕身一切政務皆當守法則天下乂安反是將不勝其害矣凡事防之於小則易救之於大則難其以朕言明告於衆於是臺臣圗呼嚕等奏御史言災異屢見宰相宜避位臣等不能糾察慢官失守宜先退避以授賢能上曰御史所言其失在朕卿何必遽爾圗呼嚕又言臣已老病乞先解職省臣額卜德哷勒張圭楊廷玉皆抗疏求罷政既而道拉實舒瑪爾莭亦言臺省大臣皆引罪自劾臣等為左右相才下識昏無所贊襄以致災祲所當黜退諸臣何罪上曰卿等皆辭去國事朕孰與圖之其各相諭以勉乃職及侍御史髙奎上書請求直言辨邪正明賞罰上雖善其言而不能用最後張圭又言逆黨未討奸惡未除忠憤未雪寃枉未理政令不信賞罰不公賦役不均國用不節請裁擇之亦不報帝受佛戒於帝師作禮拜寺於上都評曰昔韓愈有言齊梁以下事佛彌謹年代尤促自當時觀之以為非所宜言且國家運祚人主夀命既不因事佛而修長亦未必因事佛而短促也然觀元氏自世祖至順帝立國百有五年傳八君雖皆尊信帝師營建塔寺其最甚者無若至治泰定二君其受禍之酷亦莫二君若也蓋英宗鑿山開寺寫經鑄像作佛事釋重囚放籠禽十萬施金帛以千萬而有南坡之變泰定入國三受佛戒皇后太子相繼受持修佛事于夀安寺建殊祥寺於五臺山賜延夀寺田千頃不五年而身死國亂子殞於兵后為强臣逼娶由是而言事佛徼福乃更得禍韓愈之言雖聖人不能易也六月山東河北三十一郡蝗江淮湖廣河南旱詔决繫囚恤軍士免和買雜役秋七月吳澄辭歸臨川冬十月徙雲南旺沁為梁王封武宗子圗卜特穆爾為懷王食瑞州六萬五千户增賜嵗幣一千匹命左右丞相日直禁十一月以凖台兼知樞密院造金寶蓋飾以七寶貯佛舍利十二月庚申同州地震鹽官州海溢辛未新作棕殿成上以災異詔百官集議平章張圭與省院翰林集賢極論當世得失奏之大略言特們德爾專政日久搆結特克實之徒卒成弒逆雖夷滅未足當罪今復回給財産其諸子尚在京師夤緣宿衛當明不共戴天之義以正綱常諸王諳達布哈等雖已流竄乞加顯戮以謝天骨下遼王托克托幸國有變讐殺親王妃主百餘人殘忍肉合正天刑武偹卿濟蘭太尉布哈詐稱奉㫖强收鄭國保妻古哈刑曹逮鞫服實竟原其非夫匹婦銜寃三年不雨以此觀之誠非細務宜正各人之罪又世祖時不聞中賣寶物今分珠寸石售直數萬妄稱呈獻冒給回賜以至纍朝未酬寶價四十餘萬定天下所徴嵗入止十一萬四年所入僅足以償皆生民膏血請俟國用饒足之日議還西山建寺損害軍民費以億萬動經年嵗宜自停罷盜竊廟主宜罪太常嶺海採珠勞擾宜悉罷遣至蕭楊及特克實之變死節守義之臣皆未申理宜加褒贈優叙其子孫天下繫囚不無寃滯宜命省臺選官審録結正邉鎮利害宜令行省臺憲體究興除中外署置官吏非世祖創設者宜悉减汰以節濫費比來惟務徼福僧道厲民病國宜罷功德使司諸宿衛宦官之屬宜如世祖敕定之數給之凡數千言詞甚切至上不能從乙亥太白經天乙丑二年春正月懷王圗卜特穆爾出居建康閠月壬子詔赦天下浚吳松江初江浙省臣言浙西諸水受之太湖下為吳松江東滙澱山湖以入海而潮汐來往涌沙堙塞河口宋時設置撩洗軍人専一修治入國朝軍既罷散勢家又占為田蕩有司不以為意遂致堙塞公私失利委官講究按視合開浚計河渠於是右丞相舒瑪爾節奏疏滌吳松江等處河道用四萬人二年可畢丁夫合於諸色户內差依練湖例給傭直口糧若丁夫數多一年可畢命江浙丞相托歡左丞多爾濟巴勒提調自去年十月入役至是月畢工二月庚寅熒惑填星辰星聚畢三月以舒蘇為中書平章普爾普為右丞加圗呼嚕太保阿爾默色封和國公張圭蔡國公造玉御牀夏四月封皇后父浩里烏齊爾為威靖王以許思敬為中書左丞馮亨為參政伏羌縣山崩五月雲南蠻冦邉車里陶剌孟及大阿哀蠻兵萬人乘象冦陷朵剌等十四寨木邦路蠻率𤏡夷萬人冦陷倒入漢寨敕邊將嚴偹之檀州大水平地深丈有五尺汴梁蝗龍興平江等路饑關陜大旱汴梁十五縣蝗龍興等十二郡饑六月立都水庸田使司治松江葺萬嵗山殿以張養浩為西臺御史中丞關中大飢旱人相食拜養浩中丞道經華山禱于嶽祠一雨三日到官復禱于社壇大雨如注水三尺乃止禾黍自生秦人大喜時斗米十三緡鈔稍昏即不用詣庫倒換纍日不能得民大窘養浩輸庫中未毁昏鈔得一千八十五萬悉以印識其背又刻十貫五貫為劵給貧民命米商視印記其糶詣庫驗數易與新鈔由是民得糴又率冨商出粟及奏行納粟補官之令養浩自到官四月未嘗家居止宿公署夜禱于天晝出賑飢民終日無少怠每一念至即拊膺痛哭竟得疾而卒秋七月廣西諸徭反冦城邑敕行省遣兵討之湖廣右丞徹珠兵部尚書李大成將兵二萬二千進討九月分天下為十八道遣使宣撫遣奉使宣撫分行諸道按問官吏不法詢民疾苦審理寃滯凡可以興利除害宜從舉行有罪者四品以上停職申請五品以下就决有政績卓異及晦迹丘園才堪輔治者以名聞東以湖廣參政瑪哈穆特河東宣慰使李處恭往兩浙江道江東亷訪使多勒圗太史院使齊履謙往江西福建都功德使竒哩巴荆湖宣慰使䝉弼往江南湖廣禮部尚書李嘉努工部尚書朱蕡往河南河北樞密院同知昂吉爾御史中丞曹立往燕南山東太子詹事拜特穆爾宣徽院判韓讓往河東陜西吏部尚書納克楚董訥往山兆遼東中書斷事官韓廷茂陜西運使衆嘉努往雲南湖南宣慰使哈沙冀寧路總管劉文往甘肅山東宣慰使圗薩特穆爾陜西右丞亷惇往四川翰林侍講學士特穆爾布哈祕書卿吳秉道往京畿舒瑪爾節罷張圭告還保定以道拉實為御史大夫募民入粟補官以郡縣飢饉詔運粟十五萬貯瀕河諸倉以偹賑救仍敕有司治義倉禁大都順德等十郡釀酒又募富民入粟補官二千石從七品正八品五百石從八品三百石正九品不願仕者旌其門冬十月上及皇后受佛戒於帝師十二月以達實特穆爾為中書右丞相道拉實復為左丞相立捕盜賞格申禁圖䜟收藏不首獻者罪之召張圭於保定以病辭不允制贈故翰林學士巴哈等官爵以巴哈及中政使布延圗指揮使布延呼喇為特克實所擊死特贈功臣號及階勳爵諡丙寅三年春正月封諸王庫春布哈為威順王邁努為宣靖王威順王鎮湖廣宣靖王鎮益都召前翰林學士吳澄不至緬國亂其王答里也伯遣使來乞師且獻方物京師饑賑糧六萬石薩題勒密實罷二月以奈曼岱知樞密院察納為中書平章甲辰幸上都詔建殊祥寺於五臺山三月旱上以不雨自責命審决重囚遣使分祀嶽瀆名山大川及京城寺觀敕授皇太子皇圖大訓翰林學士承穆㫖額哩音特爾許師敬譯帝訓成更名皇圖大訓敕授皇太子庚牛太白嵗星鎮星聚井泉州民院鳯子作亂冦陷城邑軍民官坐失討治罪畿內河北山東饑夏五月敕臺憲勿妄奏劾御史劾宣撫使多爾濟巴勒學士李塔喇海劉紹祖庸鄙不勝任中書議三人皆勳舊子孫罪無實狀乞復其職仍敕臺臣勿以空言妄劾六月命梁王旺沁等鎮撫北邉旺沁及徹辰圗同撫北邊軍皇后受雅滿達噶戒於水晶殿甲寅上幸大乾元寺敕鑄五方佛銅像遣日本僧瑞興等歸國凡四十人戊辰太白經天至於十二月九月壬戌犯太微右執法河决陽武漂民居萬六千五百餘家九月復壞汴梁樂利隄發丁夫六萬四千人築之京畿縣水大風雹凡一晝夜壞民居九百家秋八月鹽官州海溢壞隄防三十餘里命江浙行省及南臺庸田司㑹議修治造木匱石囤以塞其要處時崇明州亦海溢九月庚申車駕還宫賜大天源延夀寺田千頃賜吉安臨江田千頃鈔三萬定於是省臣言養給軍民必藉地利世祖建大宣文𢎞教寺賜永業當時已號虛費而成宗復搆天夀萬寧寺較之世祖用增倍半若武宗之崇恩福先仁宗之承華普慶租𣙜所入抑又甚焉英宗鑿山開寺損兵傷農而卒無益夫土地祖宗所有子孫當共惜之臣恐兹後藉為口實妄興工役徼福利以逞私欲也上嘉納之然不能用遼陽江東諸路饑復平章李孟官封諸王特穆爾布哈為鎮南王鎮揚州冬十一月至大皇后鴻吉哩氏崩后諱珍格托里子班巴爾之女諡宣慈惠聖皇后升祔武帝廟十二月庚寅赦平章額卜德呼勒以星變地震議赦天下持詔藁示左司都事宋本仍命中書酬纍朝獻物之直擢用英廟至今為臺憲奪官者本因言今天警災變而畏獻物未酬直者憤怨形諸王言恐貽笑天下司憲褫有罪者官世祖成法也今上即位詔法世祖而廢成憲是汙前詔也復有邪佞贓穢將治之耶置不問耶不從明日宣詔本稱疾不出大寧路水亳州河溢大寧壞田五千五百頃漂民舍八百餘區亳州壞田二千三百頃漂民居亦八百餘丁卯四年春正月己酉太白犯牛市珠寶首飾評曰易曰聖人之大寶曰位故古帝王之位謂之大寶以天下之大四海之冨用之無窮取之不竭故也古昔賢哲之君抵璧投珠而不顧者豈非以其所寶者在此而不在彼也歟乃元泰定君踐天子之位不寶其寶之大而屑屑焉市珠寶以為首飾是豈足以君臨萬國哉皇子允丹藏布受佛戒於智泉寺二月出鎮北邊以瑪蘇庫為雲南平章鹽官州海溢壞捍海隄二千餘步四月又溢命都水少監張仲仁及行省官發工匠二萬餘人塞之不能止二月辛卯白虹貫日三月癸卯和寧地震丙午廷試賜進士阿恰齊李黼等八十五人及第出身有差以多岱為太師圗呼魯為太傅博迪蘇為太保召張圭等商議中書省事召圭與集賢大學士亷恂太子賔客王毅悉復舊職西臺中丞敬儼為集賢大學士同議省事圭仍領經筵壬戌車駕幸上都以阿薩爾和卓知樞密院夏四月辛未盜入太廟竊武宗金主及他祭器以典守不嚴罷太常禮儀院官評曰元年十一月盜入太廟竊仁宗金主四月盜復入太廟竊武宗金主則國幾乎無人矣夫宫闕以居人君宗廟以奉祖考其禁防護衛固當嚴謹今盜得屢入太廟竊祖宗神主典守者果安在哉太常守宗祏不謹當以不敬論僅免去其官失政刑矣壬申作武宗主六月罷營繕録繫囚畿內江南旱蝗至治皇后伊竒哩氏崩諡曰莊靜懿聖皇后敕經筵講讀官非有代不得去職秋八月滹沱河溢鳳翔興元成都陜州江陵同日地震碉門亦地震天全道山崩飛石斃人九月丙申朔日食閠月己巳太白經天至于十二月車駕還宫壬申赦以灾異赦天下廣西徭冦邉冬十月乙巳晝有流星以趙世延為中書右丞王士熙為參政十一月陽曲縣地震前南臺大夫喀喇托克托卒托克托哈阿舒布之弟也姿貌魁梧成宗時嘗奉詔以名鷹賜巴延巴延見之驚問曰汝為何人子對曰雅雅次子因語之曰吾老矣他日可大用者未見汝比也後又從武宗討海都以忠勇聞及至大翊戴以功入樞府武宗以潛邸時濟爾哈呼有不遜語將置于法托克托諫曰陛下即位大信未立而先事報仇恐人人自危遂宥之乃歎曰博勒呼博爾珠前朝人傑托克托今世人傑也仁宗時為丞相出舊鎮江浙及特們德爾隂謀固位議定英宗譖托克托武宗臣逮至京師居數日兩宫使綽和爾諭托克托曰初疑汝私於所事故召汝今察無之其復還鎮托克托頓首謝曰臣雖受先帝知遇而受太后及今上恩不為不深豈敢昧所自乎卒諡忠獻追封和寧王京師饑發米三十萬賑之十二月己未嵗星退犯太微西垣上將蔡國公張圭卒元史續編卷九
