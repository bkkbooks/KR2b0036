body:
  text: 元史續編卷四明胡粹中撰己丑二十六年春正月丙戌地震江廣盜起御史大夫約蘇特穆爾奏江南盜賊凡四百餘處宜選將討之上曰雲丹密實屢以捷聞蒙固岱已往卿無以為慮開㑹通河壽張縣尹韓仲暉太史院令史邊源相繼上言請開河置閘起須城縣安山之西南由壽張西北至東昌又西北至臨清引汶水以達蒙御河以便漕販乃出楮幣一百五十萬緡米四百石鹽五萬斤為傭直及備器用徵旁郡丁夫三萬遣斷事官蒙果勒禮部尚書張孔孫兵部尚書李處巽等董其役是月己亥興工至六月辛亥成凡二百五十里建閘三十一用工二百五十一萬賜名㑹通河二月丁卯車駕幸上都丞相巴延出鎮和林以巴塔爾為中書平章巴延以丞相兼知樞密院和林置知院自巴延始三月庚辰朔日食台州楊鎮龍作亂討平之鎮龍聚衆寧海僭號大興國冦義烏東陽浙東大震諸王鴻吉岱時謫婺州帥兵討平之陜西甘肅飢乙未鑄渾天儀成夏四月加御史大夫約蘇特穆爾太傅五月廣東賊鍾明亮等來降明亮初冦贛州掠寧都據秀嶺詔發江淮戍兵五千命江西參政管如德將以討之至是率一萬八千五百七十二人來降雲丹密實請以明亮知循州宋士賢為梅州判官丘應祥等十八人為縣尹巡尉上不允並令赴都是年信州賊鮑惠日等三十三人皆伏誅以實都為尚書左丞何榮祖為參政張天佑為中書參政御河溢御河溢入㑹通渠漂東昌民居七月又溢海都犯邊和林宣慰使竒卜同知奈曼之岱副使巴爾特穆爾皆反應六月絳州大旱秋七月戊子太白經天凡四十五日辛卯太白犯牛上親征海都立雲南行臺以程思廉為中丞思廉奉宣上意綏懷逺人聞者懾服雲南舊有學校而禮教不興思廉力振起之始有從學問禮者八月置回回國子監尚書省言伊斯題費文字宜施於用今翰林院伊普迪哈魯鼎能通其字乞授以學士凡公卿子弟與俊民依漢人入學肄習為便遂置回回國子監九月置高麗國儒學提舉司冬閏十月車駕還宫鍾明亮復反寇梅州明亮以萬人寇梅州江羅等以八千人寇漳州韶雄諸賊二十餘處皆舉兵應明亮詔雲丹密實合江西福建兵討之婺州民葉萬五作亂萬五以萬人寇武義殺一千户江浙平章布哷齊將兵收討之十一月漳州賊陳機察等降機察等以八千人冦龍岩福建行省兵破之遂與丘老大張順等以其黨降行省請誅之下樞密院議范文虎曰賊固當誅然既降而殺之何以示信宜遣赴闕從之評曰范文虎言殺降何以示信其論當矣然文虎降臣之首所謂恕己之心恕人者也十二月括馬一品二品許乘五匹三品三匹四品以下二匹六品以下一匹餘者悉括入官封皇子庫庫楚為寧逺王南臺侍御史程文海入朝時僧格專政法令苛急四方騷動文海入朝上疏曰臣聞天子之職在擇相宰相之職在進賢不進賢而殖貨非為上為德為下為民之意也昔陳平以不對決獄錢榖為知相業今權姦立尚書省鈎校錢榖以刻剝生民致江南盜起臣以為宜清尚書之政損行省之權罷言利之官行恤民之政為便僧格大怒六事請殺之上皆不許遣還行臺評曰僧格為相以利動人主政務刻虐凶焰熏灼當是時安圗以勳戚居相位崔彧董文用以忠直居言路皆畏其强無敢誦言攻之者文海獨上疏排其姦可謂忠且勇矣庚寅二十七年春正月安南王陳日烜卒子日燇立遣禮部尚書張立道使安南日烜屢召不至遣族父遺愛入貢朝廷因封為安南王遺愛還日烜隂害之遣使問罪拒不受命發兵討之失利天而還上怒欲再發兵諤勒哲博果密言小夷不足重煩兵張立道再使安南若復使之往宜無不聽命上召立道至香殿諭遣之既至安南世子日燇伏謁道左迎入聽詔立道傳上命數其罪日燇曰比三辱公使何以見教立道曰昔鎮南王致討汝非能勝之以不用鄉導深入不戰而自潰天子亦既知之汝所恃者瘴癘險惡今將發雲南嶺海之人與汝習俗同而技力等者繼以北方徑卒汝決不能抗汝戰不利不過走入海島夷乘敝必冦抄汝汝力不能支必為之屈與其屈於彼孰若為天子臣乎日燇謝曰公言良是我不知出此前日之戰救死而已寧不知懼天子使公來必能活我北靣再拜誓死不敢忘因出竒寶為賄立道一無所受但要之入朝日燇曰貪生畏死人之常情誠有詔貸死臣將何辭乃遣其臣阮代之等隨立道入朝謝罪修嵗貢如初有害其功者以為必先朝而後赦日燇懼竟不敢至夏四月癸酉車駕幸上都河北十七郡蝗五月鍾明亮降既而復叛管如德雲丹密實合兵討明亮明亮降詔縛至闕下如德等留不遣明亮復帥衆冦贛州樞密院請詰如德等違詔縱賊從之是嵗江西賊華大老黃大老等掠樂昌建昌丘元等掠南豐諸郡太平葉大五等冦寧國處州吕重二楊元六等冦東陽縉雲及徽州賊胡發饒必成等泉州陳七師等建平賊王靜照蕪湖賊徐汝安孫惟俊等杭州賊唐珍等皆討斬之秋七月太原平陽大同隕霜殺禾八月辛未朔日食車駕還宫沁水溢癸巳京師地大震武平尤甚壓死官民七千二百二十八壞官府四百八十間民居不可勝計監察御史商琥上言昔漢文帝有此異而無其應蓋以躬行德化而弭也因條漢文時政以進又言為國在立法任人法不徒立須人而行人不濫用惟賢是擇因舉天下名士十餘人上嘉納焉琥挺之子也九月御河決高唐冬十月封皇孫噶瑪拉為梁王故太子珍戩長子也出鎮雲南後改封晉王江南諸路大水江隂寧國等路大水民流移者四十五萬八千餘人尚書省以聞上曰此亦何待上聞當速賑之凡出粟五十八萬餘石十一月河決祥符縣太康通許陳潁二州大被其患易水溢雄莫任丘新安民居漂沒無遺命有司築隄障之十二月蠲大都等路逋租蠲大都平灤保定河間自至元二十四年至二十六年逋租十三萬五百六十二石明年復免江淮貧民至元十二年至二十六年逋租三百萬石鈔一千一百五十定絲綿九千四百餘斤又免太原上都飢民逋租三萬八千五百石以趙孟俯為集賢直學士孟俯為兵部郎中僧格以鐘鳴時即坐省署六曹官有後至者笞之孟俯一日偶後至斷事官遽引孟俯受笞孟俯入訴於都堂右丞葉李曰古者刑不上大夫以辱士大夫乃辱朝廷也僧格遽慰孟俯使出自是所笞惟曹吏以下他日孟俯行東御牆外道狹馬跌墮河僧格聞之為言於上移御墻稍西二丈許上聞其素賢賜鈔五千定遷集賢直學士安圗罷安圖自立尚書省切諫不聽乃奏曰臣力不能回天乞不用僧格别任賢相猶不至誤國虐民亦不報見天下大權盡歸尚書省屢求退不許至是罷相仍領宿衛辛卯二十八年春正月壬寅金火土三星聚奎甲寅虎入南城翰林侍講學士趙與􅝾上疏言權臣專政之咎退而家居待罪詔諸郡縣皆立學凡師儒府州曰教授學正學録縣曰教諭書院曰山長及隂陽醫學皆設教授詔選用守令詔諸路州縣除達嚕噶齊外守令並選漢人有聲望及勳臣故家儒吏資品相應者為之佐二色目漢人參用期於政平訟理民安盜息評曰古稱立賢無方今選舉守令而猶限以勳臣故家拘以儒吏資品則求士之途狹矣又况佐二期以參用色目漢人安能得真才而用之哉二月加封嶽鎮海瀆上謂省臣曰五嶽四瀆宜遣重臣代朕往祠之於是加封東嶽為天齊大生仁聖帝南嶽司天大化昭聖帝中嶽中天大寧崇聖帝西嶽金天大利順聖帝北嶽安天大貞𤣥聖帝加封東鎮沂山元德東安王南鎮㑹稽山昭德順應王中鎮霍山崇德應靈王西鎮吳山成德永靖王北鎮醫無閭貞德廣寧王江瀆為廣元順濟王河瀆靈源𢎞濟王淮瀆長源溥濟王濟瀆清源善濟王東海廣德靈㑹王南海廣利靈孚王西海廣潤靈通王北海廣澤靈佑王敕有司嵗時奉祀僧格以罪罷以諤勒哲為尚書右丞相罷徴理司車駕幸上都諤爾根薩哩葉李罷以博果密為尚書平章何榮祖為右丞賀勝為參政改諸道提刑按察司為肅政廉訪司三月庚戌太隂犯太微東垣上相以崔彧為中書右丞仆僧格輔政碑夏四月治西僧嘉木揚喇勒智罪坐盜用官物及私收宋陵寶玉并盜詐為贓不可勝計省臺乞正典刑勒貸其罪沒入妻子資産評不可曰嘉木揚喇勒智竊浮屠之名為盜賊之行貪淫暴虐勝誅置之極典尚有餘罪乃貸其死但沒入其家資而已則是分贓而縱盜元之政刑於是乎不振矣召葉李赴京師未至卒以王謜為高麗王世子賜銀印以廉希恕為湖廣右丞行海南宣慰使立左右兩江宣慰司五月罷尚書省諤勒哲為中書右丞相敏珠爾多卜丹博果密並中書平章何榮祖為中書右丞馬紹為中書左丞賀勝高翥並中書參政何榮祖上至元新格榮祖以公規治民禦盜理財等十事輯為一書名曰至元新格上之命刻板印行以默德齊為御史大夫秋七月僧格等伏誅僧格既伏誅命械逮其親黨召約蘇穆爾於湖廣得其正旦百官至家受賀方詣省拜闕及隂召卜人有不軌謀等罪籍其家資凡為金五千斤它物稱是併誅之又僧格妻弟巴爾濟蘇為燕南宣慰使受賄積贓亦坐誅其弟達爾瑪達實為鞏昌宣慰使亦懼誅自殺給還故太保劉秉忠田僧格以秉忠無子收其田土其妻竇氏言秉忠嘗鞠猶子蘭章為嗣敕以地百頃還之以李淦為江隂州教授揚州學正李淦上言人皆知僧格用羣小之罪而不知右丞葉李妄舉僧格之罪宜斬李以謝天下勒驛召至京師㑹李已卒遷淦教授以旌敢言召監察御史李祚于哈達遜祚嘗劾僧格黨庇蒙固岱嘉琿達罪納蘇拉迪音摩里奸贓因誣以他流祚哈達遜沒入其妻子家資及是崔彧以為言召還之八月己丑朔平陽地震壞民居一萬八百二十六區壓死百五十人九月以咱喜魯迪音為中書平章必都喇迪音為左丞命尚衣局織無縫衣評曰帛有邊幅衣有殺縫此必然之理織無縫衣無乃作為竒巧者歟非盛德之君所宣御也遣宣撫使楊祥等招諭琉球不至而還琉球在南海之東與彭湖諸島相對其西北岸皆水至彭湖漸低近琉球則謂之落漈漈者水趨下而不回也凡舟遇颶風發作漂流落漈回者百一蓋外夷之最小而險者漢唐以來不通中國至是命海船萬户楊祥哈密張文虎並為都元帥將兵往征之既而閩人吳志斗言祥不可信宜先招諭乃以祥為宣撫使授阮監兵部員外郎志斗禮部員外郎賫詔以往明年祥監果不能達而還志斗卒于行人疑為祥所殺詔福建行省按問㑹赦不治召劉因為集賢學士辭不至因固辭疾貽書宰相曰因自幼讀書它無所得至於君臣之義見之甚明凡吾人得以安居暇食遂其生聚之樂者皆君上之賜也故有生之民或給力役或出智謀亦必各有以自效因生四十三年未嘗效尺寸之力以報國家養育生成之德而恩命沓至尚敢偃蹇自高負知遇之恩而得罪於中庸也哉向者先儲皇以贊善之命來召即行再奉至教學亦輒應命後以老母中風請告歸省不報竟遭憂制遂不復出豈初有意於不仕耶今朝廷用賢一新時政雖前日隱者亦將出仕况因平日素非隱者乎又况加以不次之寵處以優崇之地奈何形留意往命與心違因素有羸疾去年喪子今嵗瘧疾自五月至八月病勢益增使者持恩命至因初聞之惶怖不知所措徐而思之以為供職雖未能扶病而行而恩命則不敢不扶病而拜若稍遲疑則不惟心不自安而蹤跡高峻將不近於人情矣是以即日拜受候病稍减即行而服藥百無一效竟遲延至今因踈逺賤臣與帷幄諸公不同其進退苦非難處惟閣下始終成就之上聞之曰古有所謂不召之臣其斯人與遂不强致評曰劉因風節與嚴光相似然子陵羊裘釣水過為殊絶之行加足帝腹又失君臣之禮峻厲峭直不可以為法而靜修聞命即拜受任則辭進不失義退不違理卑不可踰高不過抗從容自然得賢人之高致者也尚論元世遺逸靜修一人而已以哈喇哈遜為湖廣行省平章哈喇哈遜威喇諾爾氏曾祖竒爾實勒事王汗後歸太祖父囊嘉特從憲宗伐蜀卒于軍至是録功臣後以為大宗正用法平允拜湖廣平章臺臣言宗正決獄哈喇哈遜即去恐難為繼上曰湖廣非斯人不可遂行時江湖間多盜商旅不行哈喇哈遜至發卒擒誅之水陸始通冬十月以蘇蘇德濟為中書平章罷鈎考錢榖自理算天下錢榖已徴入數百萬未徴尚數千萬民不聊生自殺者相屬逃山林者則發兵捕之皆莫敢沮其事趙孟俯與阿哩衮薩哩善勸令奏請降赦除免可弭天變上從之詔草已具僧格怒謂其必非上意孟俯徐曰錢糧未徴而人死亡何所從取非及是時除免他日言事者倘以失陷歸咎尚書省豈不為丞相纍僧格悟怒稍解至是被誅臺臣言鈎考錢黨榖自中統迄今三十年更阿哈瑪特僧格設法已極其公取賄賂民不堪命乃詔罷鈎考其昔年逋負錢榖文卷令聚置一室其非朕詔而視之者有罪十二月以崔彧為御史中丞彧奏行臺言建寧總管馬謀因捕盜榜死良民俘掠人財迫通處女獄具㑹赦臣等議以為非罪殺人不在原例宜令正罪又奏實都黨庇僧格更亂銓選楮幣􅐭酒稅法理算逋賦殃民最慘天下莫不願食其肉宜從公論罪以謝天下又言色徹肯為河西宣慰吏有詣廉訪司告其三十六事不法者檄僉事簿問而色徹肯率衆奪告者去侵辱憲官宜先停色徹肯官職遣御史鞫治又奏僧格時使臣或不持璽書口傳聖㫖縱有罪籍人家財請禁之上曰何人乃敢爾對曰伊喇伊努巴延徹爾比嘗傳㫖釋放罪人上悉可其奏彧又言松州守臣長孫自言不願治州願備員憲官令茂巴爾斯上聞傳㫖至臺時令委用臣等所宜奉行但其人徑自陳獻又嘗有罪僧理應區别又鄂州舊有按察司約蘇穆爾惡其害己令格奏罷今宜復置又舊日諸官吏受賕在內則詣臺在外則赴憲司首告僧格時不赴臺憲而赴諸司首故反復牽延事久不究宜如前制又御史特克實言女直人嘉琿達妄言去年以米千石餉羅壘特穆爾軍奏交鈔四百定宜從本道廉訪司究問追償議罪並從之頒農桑雜令上之初即位也詔天下以民為本民以衣食為本衣食以農桑為本於是令民崇本抑末立勸農司農等司巡行郡邑察舉勤惰牧民者視以為殿最風憲常加體察又頒農桑之制十四條多不能載其略每村以五十家立一社擇高年曉農事者為長增至百家别設長一人不及五十家者與别村合社地逺不能合者聽自立社社長專教督農民凡種田者立牌撅於田側書某社某人於上社長以時㸃視勸誡不率教者籍其姓名以授提㸃官行罰仍大書所犯於門候改過乃除之不改則罰其代充本社夫役社中有喪病不能耕種者合衆力助之一社災病多者兩社均助疏浚河渠以防旱暵地高者造水車貧不能造者官給材木田無水者鑿井井深不能得水者聽種區田又每丁課種桑棗二十本雜果十本土性不宜者種榆栁等其數以生成為凖願多種者聽其無地及有疾者不與各社種苜蓿以防飢饉近水之家許鑿池養魚牧鵝鴨蒔蓮藕菱芡蒲葦以助衣食荒閒之地悉以付民每年十月令州縣正官一員巡視有蝗蝻遺子者設法除之後以勸課官吏擾民罷其巡行之制命止移文勸諭故終上之世家給人足天下為户凡一千一百六十三萬三千二百八十一口五千三百六十五萬四千三百三十七評曰古之善養民者使耕田鑿井出作入息不知其誰之力所謂王者之民皥皥如也頒農桑雜令固養民之先務然條目繁多過為之制曲為之防而不出於自然猶種樹者爪其膚以驗生枯搖其本以觀疏密則雖曰愛之其實害之雖曰憂之其實讎之誠有若栁宗元之論者矣故其後果以官吏擾民罷勸課然則善養民者其必曰敬事而信節用而愛人使民以時將不勞勸課而衣食自足矣定科差法國初科差之名有二曰絲科曰包銀絲科始於太宗朝每二户出絲一斤并隨路絲線顔色輸於官五户出絲一斤輸於本官包銀定於憲宗時漢民每户科銀六兩後定為四兩以二兩輸銀二兩折收絲絹顔料等物及中統初定户籍科差條例然其户不一有元管户交參户漏籍户協濟户於諸户中又有絲銀全料户减半户止納絲户止納鈔户又有復業户攤絲户漸成户名項不同科納絲銀鈔物亦各有差然絲銀之外又有俸鈔之科亦以户之高下為凖俱以合科之數分為三限輸納被災之地聽折收它物物各以時估為則凡儒士軍站僧道等户皆不與至是以至元新格定科差法諸差稅皆州縣正官監視人吏置局均科夫役皆先富强後貧弱貧富等者先多丁後少丁評曰包銀絲科蓋即宋之所謂免役錢也既輸於官又輸於本官即唐所謂送使留州者也但絲銀之外又有顔料之徴俸鈔之科亦重斂矣然當是時民安不以為厚斂者意其取民之財雖多而用民之力甚少也蓋民有餘力方有餘財若用竭其力則生財之路狹民之衣食且不足何以應國家之求哉然則欲裕民財莫若寬民力孔子曰使民以時斯之謂也王安石主免役蓋亦有見乎此而司馬公力主差役之便豈非執一之見歟壬辰二十九年春正月甲午朔日食左右有珥上有抱氣詔免朝賀開通惠河都水監郭守敬建言疏鑿通州至大都河道導昌平縣白浮村神山泉過雙塔榆河引一畝玉泉諸水至西門入都城南匯為積水潭出文明門至通州高麗社長一百六十四里塞清水口一十二處置壩閘二十座節水通漕為便從之明年秋河成賜名通惠凡役軍匠二萬餘人為工二百八十五萬用鈔一百五十二萬定糧三萬八千七百石丞相以下皆親操畚鍤為之倡掘地往往得舊時磚木人服其識見船既通行公私兩便先是通州至都五十里陸挽糧運嵗若干萬民不勝其病至是悉罷焉二月征爪哇國以萬户史弼福建右丞髙興並為本省平章將軍二萬船五百艘往征加高麗王太保賜功臣號誅王巨濟等臺臣言納蘇拉迪音摩里實都王巨濟黨助僧格為不法及理算江南錢榖極其急虐民至嫁妻賣女害及親鄰揚州錢塘受禍最慘廡辜死者五百餘人此三人者莫不思啖其肉乞依條論坐從之獨實都特免以汪惟和為鞏昌二十四處都總帥翰林學士閻復罷坐撰僧格輔政碑故也三月以特克琳沁並為中書平章阿里為右丞梁德圭為參政省臣言何榮爾祖以疾敏珠多卜丹以久任乞令免署惟食其祿與議省事從之車駕幸上都以王惲為翰林學士惲有才幹操履端方好學善屬文初拜御史論列凡百五十餘章嘗劾都水劉晸陷沒官糧四十餘萬及監修太廟不敬晸以憂卒遷惲福建廉訪使黜貪汚理寃滯召至京師見上栁林行宫上萬言書極論時政故有是命皇孫達爾瑪巴拉薨珍戩第二子也是為順宗生武宗仁宗仁宗生英宗武宗生明宗文宗明宗生順帝寧宗評曰元世諸君其統緒傳授最為不正其嫡庶亦不可考裕宗既以世祖之嫡為太子而成宗居次第三於裕宗諸子又以嫡為皇孫則噶瑪拉乃裕宗之庶長達爾瑪巴拉庶次也成宗無子若以庶繼嫡則噶瑪拉之子泰定帝以次當立但當時以安西屬疏于統乃迎立逹爾瑪巴拉之子哈尚是為武宗武宗以定難之功傳其弟仁宗仁宗違盟而傳其子英宗英宗無嗣而泰定方入繼未為不正也雅克特穆爾因其死又援立哈尚之子圖卜特穆爾為文宗然則自成宗之外皆非正矣篡弒相尋年代短促豈無所自哉是以君子貴居正而重大本也夏六月兩浙水八月車駕還宫廣西安撫使賽甫鼎有罪誅坐誹謗朝政専權縱恣以風聞三十餘事妄告省官上以其有傷政體下吏論誅其黨杖而徒之秋九月遣吏部尚書梁曾等使安南曾先使安南至是遣與禮部郎中陳孚偕行既至其國有三門中曰陽明左曰日新右曰雲㑹使者至郊迎將由日新門入曾大怒回館又請開雲㑹門曾曰奉詔不由中門是辱君命也執不可乃自陽明門入又責日燇親出迎且講新朝尚名之禮以書往復者三宣布朝廷威德日燇大感服冬十月以張師道為翰林直學士師道由福建廉訪司知事召赴闕因乞汰內外冗官詔與敏珠爾多卜丹何榮祖馬紹燕公楠等區别之授師道翰林直學士十二月罷福建寧國等路銀冶初福建參政魏天佑獻計發民一萬鑿山煉銀嵗可得萬五千兩既而所得不充乃賦民鈔市銀輸官而私其鈔一百七十定臺臣請追贓罷煉從之中書亦奏寧國民六百户冶銀嵗輸二千四百兩皆市銀納官未嘗採之於山乞罷之制可癸巳三十年春正月右丞相安圗卒安圗穆呼哩四世孫母鴻吉哩氏昭睿皇后之姊年十三入宿衛上嘗見其母問及安圖嘆曰安圗雖幼公輔器也一日上欲殺阿里布格黨人千餘安圖曰人各為其主今甫定大難以私憾殺人恐不足以懷服未附上驚曰卿年幼何從得老成語由是深器重之卒以為相凡再入中書雅敬姚樞許衡惡阿哈瑪特僧格然逼於權奸不得展其志卒年四十九上震悼曰人言丞相病朕弗之信果然失吾良臣後贈太師東平忠憲王始祭社稷先是詔有司嵗祀太社太稷至是用崔彧言於和義門內少南為二壇壇高五丈方廣如之社東稷西相去約五丈社壇用青赤白黑四色土依方位築之覆以黃土稷壇如社壇之制惟土不用五色四周純用一色土為之祝文曰嗣天子敬遣某官敢昭告於太社之神配位曰后土之神太稷之神配位曰后稷之神評曰有天下國家者以宗社為重奉之以行事既曰太社太稷而詔有司嵗祀非矣世祖在位三十五年混一海宇者已十八載而始祭社稷又不親祭而遣官皆非也汰冗官凡省內外官府二百五十五所官六百六十九員二月回回獻大珠郤之先是伯克穆蘇售大珠上以其無用却之要至是回回人伯克瑪哈瑪迪沙以大珠獻價數萬上曰珠何用當留是錢以賑貧者江淮行院進鷹卻之敕自今軍官毋縱禽擾民違者論罪車駕幸上都高麗王暙更名昛三月以扎色知樞密院事括馬凡得十萬匹毁江南諸道觀及聖祖天尊祠夏四月太子贊善劉因卒因年四十五卒無子延祐中贈翰林學士封容城郡公諡文靖歐陽𤣥嘗贊其畫像曰微㸃之狂而有沂上風雩之樂資由之勇而無北鄙殺伐之聲於裕皇之仁而見不可留之四皓以世祖之略而遇不能致之兩生嗚呼麒麟鳯凰固宇內之不常有也然一鳴而六典作一出而春秋成則其志不欲遺世而獨往明矣亦將從周公孔子之後為往聖繼絶學為來世開太平者耶論者以為知言五月真定深州大水六月詔皇曾孫松山出鎮雲南以皇孫梁玉印與之秋八月梁曾等以安南使來國相陶子竒從曾等詣闕謝罪并上萬壽頌金冊表章方物皆陳於庭上命曾引所獻象曾以袖拂之如素馴者上曰汝亦懼否對曰雖懼君命不敢違上稱善解衣以賜令坐地上右丞阿里意不然上怒曰梁曾兩使外國以口舌息干戈爾何敢爾是時有親王至自和林上酌酒先賜曾謂親王曰汝所辦者汝事梁曾所辦吾與汝之事汝勿以為後也或讒曾受安南賂上以問曾曾曰安南以黃金器幣竒物遺臣臣不受以屬陶子竒上曰受之亦何不可廷臣以日燇終不入朝又議進討遂拘留子竒於江陵九月車駕還宫冬十月彗星入紫微垣抵斗魁光芒尺許凡一月乃滅以陳孚為翰林待制始孚以布衣上大一統賦署山長秩滿謁選入京時上方選朝士使安南廷臣薦孚博學有氣節以為翰林編修攝禮部郎中使還上欲用之要地朝廷以孚南人尚氣頗疾之未幾出為建德治中調衢州孚因請鄉郡遂遷台州十一月以巴延為中書平章巴延河南平章也高麗王昛入朝十二月馬紹罷以張九思為中書左丞治史弼等罪弼與高興伊埒默色坐征安南爪哇無功各杖之仍沒家資三之一甲午三十一年春正月壬子朔帝不豫庚午崩于紫檀殿先是有譖丞相巴延久居北邊與海都通好詔御史大夫約蘇特穆爾代之未至三驛海都兵復至巴延使人告約蘇特穆爾曰公姑止待我翦此冦而來未晚也乃與之交兵凡七日且戰且卻諸將以為怯詬之曰果懼何不以兵授大夫巴延曰海都懸軍涉吾地要之則遁誘其深入一戰可擒也諸君必欲速戰若失海都誰任其咎皆曰請任之還軍擊敗之海都果脫去乃授軍於約蘇特穆爾而居大同以俟後命及上不豫驛召之至上崩總百官以聽兵馬司請日出鳴晨鐘日入鳴昏鐘以防變巴延訶之曰汝將為亂耶其一如平日有盜內府財者宰執以其幸赦欲誅之巴延曰今以誰之命而誅盜人服其有識評曰夫為人臣者君命召不俟駕而行此常理也若夫將在軍雖君命有所不受謂事之垂成機不容髮權一時之輕重者耳巴延久居北邊人或譖其通好海都遣將代還而敵兵復至為巴延者明君臣之大義則以兵授大夫可也若審其事機可以制敵人之死命則滅海都而解兵可也乃戰七日而郤欲誘其深入一戰可擒又徇諸將欲戰之請還軍擊之使海都終得脫去於是乎進退皆非義矣其後托克托征高郵城垂克有詔罷其總兵人或勸之曰城破聽詔未晚也托克托曰城茍不克如君命何卒受詔論者謂元失江正淮托克托不能用權之罪愚謂人臣之義當以托克托為夏四月甲午皇孫特穆爾即位大赦天下初皇孫受皇太子寶撫軍北邊世祖崩告哀軍中遂南還宗室諸王㑹於上都太傅知樞密院約蘇特穆爾謂晉王噶瑪拉曰宫車晏駕神器不可久虛且昔儲闈符璽既有所歸王長宗盟何視而不言於是噶瑪拉合宗親大臣勸進皇孫遂即位大赦天下除兩都差稅一年餘減地丁租稅十分之三諸逋缺及逃亡差稅皆除之賜諸王駙馬依年例上大行尊諡曰聖德神功文武皇帝廟號世祖皇后曰昭睿順聖皇后追尊皇考曰裕宗皇帝尊母元妃鴻吉哩氏曰皇太后裕宗即皇太子珍戩也改太后所居曰隆福宫戊申太白晝見犯輿鬼五月以約蘇特穆爾為太師巴延為太傅伊徹察爾為太保遣安南使陶子竒歸國以楊桓為監察御史有得玉璽於穆呼哩曾孫碩迪家者桓辨其文曰此歷代傳國璽也亡之久矣今太孫龍飛而璽出天其彰瑞應乎即為文叙璽始末上之六月庚辰朔日食以特穆爾為中書平章封乳母夫完顔巴延為冀國公妻何氏為夫人敕遣宋使家鉉翁還鄉里鉉翁安置河間年逾八十賜衣服遣還詔修世祖實録以丞相諤勒哲監修以䇿喇實巴鄂爾為帝師秋七月詔振舉臺綱以伊德默色為東昌路達嚕噶齊省臣言其嘗官是郡犯法五百餘事今不可使復任上曰姑試之以賽音諤德齊為中書平章八月庚辰太白晝見九月丁巳經天冬十月戊寅車駕至上都上既即位巡狩賽音布拉克董文用言先帝新棄天下陛下巡逰不以時無以慰安元元且人君猶北長居其所而衆星共之不在勤逺略也宜趣還京師上悟車駕遂還十一月丁未上朝隆福宫上玉冊寶罷湖廣江西行樞密院以其事歸行省以巴延徹爾參議中書省事命下其兄辭曰臣叨平章政事兄弟宜相嫌避上曰卿勿復言兄平章於上弟參議於下何所嫌也以何瑋為中書參政時宰執凡十一人瑋曰古者一相専任賢也今宰執員冗政出多門轉相猜忌請損之不從詔改元詔改明年為元貞元年釋罪囚用帝師奏釋大辟三十人杖以下百人十二月太傅右丞相巴延卒巴延初入臨安宋主請見巴延曰未入朝無相見之禮及還詔百官郊迎阿哈瑪特先百官半舍道謁巴延解所服玉鈎絛遺之曰宋寶玉固多吾實無所取勿以此為薄也阿哈瑪特謂其輕已銜之乃誣其取宋玉桃盞按之無驗得釋阿哈瑪特死有獻此盞者世祖愕曰幾陷我忠良伯什里默色嘗誣巴延以死罪未幾以他罪誅敕巴延臨視與之酒愴然不顧而反世祖問故巴延曰彼自有罪以臣臨之人將不知天誅之公也上之初即位諸王有違言巴延按劍立殿陛陳顧命詞色俱厲諸王股栗趨下殿拜及有疾上問之時江南三省纍請罷行樞密院巴延因張目對曰內有省院各置為宜外而軍民分𨽻不便上是其言罷行院十二月丙申有星隕於東北遂薨巴延深沉有謀略善斷將二十萬衆伐宋如將一人諸將仰之若神明還朝未嘗言功世祖勞之謝曰奉陛下成算阿珠等效力臣何功之有定廟樂初太祖以高智耀言徴用西夏舊樂太宗用孔元措言收録亡金太常故臣及禮冊樂器於東平製習憲宗時始用以祀天地於日月山世祖中統初定名曰大成之樂至元間太廟成敕撰八室樂章舞節至是世皇裕宗祔廟命太樂署編造曲譜翰林定撰樂章世祖室曰混成之曲裕宗室曰昭成之曲元史續編卷四
