body:
  text: 元史續編卷六明胡粹中撰庚子四年春二月丁未朔日食丙辰皇太后鴻吉哩氏崩裕宗后也謚曰徽仁裕聖皇后夏四月以布埒齊為中書平章五月勅優養儒臣上諭集賢大學士諤爾根薩哩曰集賢翰林乃養賢之地自今諸老秩滿者陞之勿令輒去或有去者罪將及汝其諭中書知之六月立緬王子窟麻剌哥撒八為國王先是的立普哇拿阿迪提牙為其弟阿散吉牙等所弑其子窟麻剌哥撒八逃詣京師詔立為緬王遣忙秃魯迷帥師問罪於是阿散吉牙等奉方物入朝自言殺主之罪遂罷兵以伊徹察喇為太師諤勒哲為太傅皆賜之印御史中丞博果密卒以董士選代之貧無以𦵏賜鈔五百定初博果密為燕南憲副有彊直聲及參議中書以盧世榮故辭不拜僧格在相位尤深忌之嘗曰他日籍我家者此人也及徹爾劾僧格罪博果宻具以實聞世祖始大驚决意誅之欲用為丞相博果宻辭曰朝廷勲舊居臣右者多章今不次用臣無以服衆乃以諤勒哲為相博果宻為平勸罷征安南後其國入貢世祖喜曰卿一言之力也賜以貢物之半惟受沉水假山象牙鎮紙水晶筆格而已餘悉辭之上初即位㑹崔彧卒時命博果宻行中丞兼領侍儀司未㡬亦卒謚文貞贈魯國公秋八月更定䕃叙格正一品子叙正五從五品子叙從九中間正從以是為差䝉古色目特優一級閏月庚子車駕還宫九月戊午太白犯斗改中御府為中政院掌宫中財賦營造供給秩正二品至大三年陛從一品冬十二月黜晉州逹嚕噶齊訥古伯坐紿稱親喪歸迎其妻事聞上以其斁傷彛倫黜之評曰為人子者不忍死其親故三日而斂冀其復生也訥古伯紿稱親喪歸迎其妻則放乎人欲而滅絶天理矣屏諸四夷不與同中國猶不足以示儆今乃知其傷斁彞倫而不加重辟斯盖元之國俗本出於違親棄倫故雖聖人君主華夏而不能以變其舊也詔征八百媳婦遣劉深哈喇岱鄭佑將兵二萬征之是役也丞相諤勒哲説上以為江南盡世祖所取陛下不興此役則無功可見於後上入其言用兵意甚堅故無敢諫中丞董士選獨言劉深出師以有用之民取無用之地就令當取亦必遣使招諭不從然後聚兵積糧相時而動豈得輕信一人妄言寘百萬生靈於死地上色變士選言不止上曰事已成卿勿復言士選曰以言受罪臣之所當他日以不言罪臣臣死何益上麾之出後上聞深兵敗慨然曰董二哥之言驗矣吾愧之賜上尊以旌直言差世祖嘗呼文炳為董大哥故上以二哥呼士信云評曰昔文武開周室而言治者稱成康髙祖興漢業而稱太平者曰文景成康文景功不在闢土開邉也在於善持盈守成耳今完澤説成宗以江南盡世祖所取不興此役則無功可見於後陋矣哉小人之見也成宗入其言而諫者不入其不明一至此哉然它日兵敗而猶能賞董士選之直言亦可謂賢矣辛丑五年春二月分省于雲南以劉深哈喇岱並為右丞鄭祐為參政仍置郎中員外郎都事理問各一員又置征八百媳婦萬户府置征東行省先是庫哩濟蘇言髙麗王擅置官府三百五十八所官四千五十五員皆衣食於民而苦徴之又其大㑹王曲盖龍扆警蹕諸臣舞蹈山呼一如朝儀僭擬過甚朝廷遣刑部王泰亨特詔往諭使釐正之庫哩濟蘇又奏僉議司官不肯供報民户版籍州縣彊界本國横徴暴斂官多民少刑罰不一若止依本俗行事實難撫治上亦以庫哩濟蘇不能和輯髙麗併行省罷之仍降詔開諭昛上表言昔居海島時嘗用山呼後改呼千秋今奉明表一切皆罷又革官府九十餘所汰官吏二百七十員他如雜徭病民馹騎煩擾者亦皆省之上復詔昛曰卿其諭朕意所言當終始行之三月丁酉幸上都夏五月商州隕霜殺菽麥雲南土官宋隆濟反攻貴州知州張懐與戰死之劉深等兵至雲南右丞烏呼訥調兵供餽隆濟因紿其衆曰官軍徴𤼵汝等将悉剪髪黥面為兵身死行陣妻孥為虜矣衆惑其言遂叛率猫狫紫江諸蠻四千人攻楊黄寨殺掠甚衆攻貴州知州張懐徳戰死梁王遣雲南平章綽和爾參政布埒齊将兵禦之殺賊首撒月斬首五百級六月乙亥平江等十四路大水秋七月戊戌朔晝晦暴風起東北雨雹𤼵江湖泛溢自通泰崇明至真州民被災死者不可勝計以按巴阿固台並知樞宻院八月霖雨灤漆淝汝水溢征金齒蠻時征緬師還為金齒所遮士多戰死又接連八百媳婦諸蠻相效不輸税賦賊殺官吏遣薛超兀而等將兵討之丙辰彗出井如南河大星色白長五尺直西北復經文昌斗魁南掃太陽又掃北斗天機紫微垣三公貫索星長丈餘至天市垣巴蜀之東梁楚之南筞星上長盈尺凡四十六日而滅冬十月増海運糧以畿内嵗饑増明年海運糧為百二十萬石壬申車駕還宫辛卯夜有流星大如杯光燭地自北起近東為一星沒於危宿十一月詔發兵討宋隆濟遣劉國傑及額森和塔拉将萬人巴拉及阿勒坦將五千人討之定强竊盜條格强盜人孳畜者取一償九然後杖之是歳諸路水旱蝗歸徳唐鄧陳汝和常襄陽等處蝗楊泰滁夀光隨荆門峽州霖雨汴梁蘄黄河南旱大名宣徳濟寧奉聖登莱益都濟南東平保定河間真定等路水壬寅六年春正月晉王哈喇岱薨命封其王印及内史府印罷朱清張瑄官冮南僧右祖進告二人不法十事命御史臺詰問以陳天祥為南臺中丞天祥上書論征西南夷事曰事有不得已而不已者亦有得已而不已者惟能得已則已可使兵力永强以備不得已而不已之用向者劉深逺征八百媳婦乃得已而不已之兵荒陋逺夷取之不足為利不取不足為害而深欺上罔下經過八畨縱横自恣中途激變所在皆叛既不能制亂反為亂衆所制人饑勢蹙退走致敗喪兵十八九棄地千餘里朝廷再𤼵四省軍使劉二抜都總督以圖收復湖南北起夫運糧至播州其正夫與擔負自己糧食者計二十餘萬正當農時興此大役使所運米盡到固為幸矣然數萬之軍仰此一運之米此後兵若不休又将如何比聞敗卒言西南諸夷皆重山複嶺夹澗深林窄處僅容一人一馬上如登天下如入井賊若乗險要擊雖衆亦難施為或羣蠻逺遁阻隘以老我師將不戰自困矣乞上承天意下順人心早正深罪仍下詔招諭彼自當歸順若謂業已如此欲罷不能且宜駐兵近境使其水路逺近得通或用茶鹽引或用鈔多増米價和市軍糧但法令嚴明官不失信可使米船蔽江而上軍自足食民亦不擾此王者之師萬全之利也不報天祥遂謝病去評曰人臣論事可行則以為可行不可則以為不可必為斷絶之辭以起其君之聽猶懼其不能從况為兩可之論乎陳天祥諫不當征西南夷義理明白利害切中可謂善言事矣惜乎其終篇又言若謂業已如此欲罷不能且宜駐兵設法運糧食足而民不擾則是其前之所言利害皆臆説妄論矣使為其君者將何以從乎夫知其非義斯速已矣不當為依違兩可之論也追收民間䕶持璽書上語臺臣曰聞江南富户侵占民田致貧者流徙卿等亦聞之否對曰富民多乞䕶持璽書依倚以欺貧民官府不能詰宜悉追收為便命即行之毋越三日壬戌鎮星犯太微垣上將二月罷征八百媳婦罷劉深等官收其符印征亦乞不薩遣陜西平章蘇達拉參政汪惟勤将川陜軍湖廣平章劉國制傑將本軍一切軍務聽伊蘇岱爾劉國傑節癸巳上有疾釋京師重辟三十八人三月丁酉赦以水旱為災詔赦天下大都平灤災甚者免差税三年其餘已經賑䘏者免一年今年内郡包銀俸鈔江南夏税及諸路人户散辦門攤課並從蠲免夏四月車駕幸上都五月戊申太廟寢殿災六月癸亥朔日食太史院失於推筴詔中書議罪聞奏秋七月癸巳朔熒惑鎮星辰星聚井以呼圗布迪音為中書右丞冬十月車駕還宫以哈達知樞宻院十二月庚辰熒惑犯太㣲東垣上相辛酉雲南地震戊辰又震衡州袁舜一等作亂討平之舜一誘集二千餘人掠郴州湖南宣慰司𤼵兵捕舜一及其黨誅首謀者三人餘悉配洪澤芍陂屯田脅從者招諭復業劉國傑等来獻捷國傑及額森和塔拉来獻蛇節羅鬼等捷癸卯七年春正月禁釀酒以嵗不登禁河北陜西甘肅等處釀酒二月賽音諤徳齊罷以阿喇卜丹茂巴爾斯並為中書平章尚文為左丞董士珍托廸並參政定中書省官員數自左右丞相而下平章二員左右丞各一員參政二員定為八府罷江南都水庸田司三月遣奉使宣撫循行諸道以郝天挺托爾楚往河南伺北石珪往燕南山東耶律希逸劉賡往河東陜西特克哩托懽戎益往兩浙江東趙仁榮岳叔謨往江南湖廣茂巴爾陳英往江西福建塔齊哈雅劉敏中往山北遼東並給二品銀印降詔戒飭遣之褒賜江浙平章托克托先是命御史臺宗正府委官遣𤼵朱清張瑄妻子赴京仍籍其家貲拘收軍家器海舶等物御史杜肯搆言太傅右丞相諤勒哲受二賄賂不報至是托克托𤼵遣清瑄家屬其家以金珠重賂之托克托以聞上使諭之曰朕以江南任卿果能爾真男子也賜以黄金五十兩托克托色勒敏之子穆呼哩𤣥孫也御史又言中丞董士選貸二家鈔非義上曰臺臣稱貸不必問逸若言者不已後當杖之評曰君臣之于財非其義也一介不以與人一介不以取諸人為臺臣而至於稱貸則其亷可知雖其亷如此而不能安其貧以至於稱貸則雖亷亦不足稱矣御史言中丞董士選貸朱張家鈔非義而成宗以為臺臣稱貸不必問也不辭費而包容涵蓄多矣真人君之言也都城火巴延梁徳珪段貞諤爾根薩哩巴圗瑪克新伊埒布哈宻喇卜和卓張斯立罷以洪君祥為中書右丞坐受朱張賂當治罪詔皆罷之以君祥為右丞臺臣言其曩居宥宻以貪賄黜乞别選賢能代之不報誅劉深罷雲南分省罷征緬及八百媳婦深伏誅笞哈喇岱鄭祐索羅希岳鉉等進大一統志甲寅車駕幸上都夏四月濟南隕霜殺麥五月山東蝗閏月戊午朔日食以何瑋為御史中丞瑋陳當世要務十條時御史郭章劾郎中哈喇哈遜贓罪具服結權貴以枉問誣章瑋率臺臣論辯章乃得釋右丞相諤勒哲卒鄂勒哲錫津子也代僧格為相奏革弊政蠲中統以来逋負民賴其恵及上即位恪守成憲散財𤼵粟不惜巨萬以賑濟百姓後加太傅位望益崇而處之以安静不急於功利故吏民守職樂業當時以賢相稱之復立四川行省以雲南平章托克托湖廣平章程鵬飛並為平章雲南平章伊蘇岱爾入朝獻所獲金五百兩上曰是金卿效死所得者賜鈔千定西僧丹巴死丹巴一名衮扎克喇實西畨人㓜從西天竺薦果達木實哩傳習梵書得其法要帕克斯巴之世祖時懐孟大旱命禱之立雨又呪黒龍湫竒花異果上尊涌出水面取以進世祖大悦後以忤僧格謫潮州時雲丹密實鎮潮妻病丹巴取數珠加其身即愈又言異夢及已還期皆驗海都犯邉上命禱祈捷書果至又為禱疾良愈詔分御前校尉十人為導從上北巡過雲州丹巴曰此地有靈怪恐驚乗輿持呪厭之未㡬風雨大至惟幄殿無虞浙西霖雨民饑者十四萬詔賑糧一月仍免今年夏税并酒醋課秋七月以哈喇哈遜為中書右丞相兼知樞宻院阿固台為左丞相八月辛亥夜地震平陽太原尤甚村堡移徙地裂成渠壊廬舍萬八百區人民壓死不可勝計遣使分道賑濟戊申又大震詔問致災之由齊履謙言地為隂而主静妻道臣道子道也三者失其道則地為之不寧弭之之道大臣當反躬責已去専制之盛以答天變不可徒為禳祈也時上有疾宰臣及中宫専政故履謙言及之九月戊午車駕還宫丙寅太白書見辛未熒惑犯南斗乙亥太白犯南斗熒惑入南斗勾已而行金華處士許謙以為憂在吳楚是嵗大祲謙貌瘠或問曰食不足耶謙曰今公私匱竭道殣相望吾能獨飽乎評曰君子居廟堂之髙則憂其民處江湖之逺則憂其君許謙窮居隱約而以嵗祲為憂得非先天下之憂而憂後天下之樂而樂者歟遣刑部尚書塔齊爾等使髙麗塔齊爾與翰林直學士王約偕往且以其國相吳祈専權徴詣闕下初王昛年老傳國于子謜小人離間乗謜朝京師使賂用事者留不遣昛既復位厚斂淫刑國人羣愬于朝至是屬王約驗問宣詔諭之曰天地間至親者父子至重者君臣彼小人知自利寧肯為汝家國地耶昛感泣謝願奉表自雪且請子謜還國冬十月太白經天以濟爾哈呼知樞宻院翰林國史院進五朝實録大祖太宗定宗睿宗憲宗凡五朝實録十一月亦乞不薩部黨魏傑等降人賜以衣遣還招其首亂者己未太白復經天辛酉木氷十二月丙戌復經天帝師䇿喇實巴鄂爾嘉勒死明年年扎克嘉勒燦嗣十二月奉使宣撫奏罷贓汚官吏凡七道所奏罷官吏一萬八千四百七十三人贓四萬五千八百六十五定審寃獄五千一百七十六事詔内外官年七十聽致仕甲辰八年春正月詔天下以災異故詔天下恤民隠省刑罰雜犯當杖者減輕笞者免私鹽徒役者減一年平陽太原免差税三年隆興延安上都大同懐衛彰徳河間河南安西等路被災人户免二年大都保定一年江南佃户私租十分減二永為例併弛山場河泊之禁聽民採捕順元宣撫同知宋阿重擒其叔父隆濟来獻特陞其官賜衣一襲禁錮朱清張瑄親屬以塔斯布哈為中書右丞趙仁榮為參政平陽地震地震不止民屋脩輒毁宫觀摧圯者千四百區道士死傷者千餘人軍民不可勝計二月丙午車駕幸上都乙丑彗星見自去年十二月庚戌彗見盈尺在室十一度入紫微垣至是滅凡七十四日董士珍罷夏五月癸未朔日食秋七月辛酉罷江淮財賦總管府九月車駕還宫復以梁徳珪巴延為中書平章巴圗瑪克新為右丞宻喇卜和卓為參政阿喇卜丹罷潮州海溢冬十月封皇姪哈尚為懐寧王以平海都功封懐寧王賜金印置王𫝊宫以阿里為中書平章長夀為右丞托歡張祜並為參政十一月以特古勒徳爾為御史大夫遣制用院使呼蘭等使髙麗國相吴祈等至命省院臺鞫之得祈離間父子千户石學天輔謀歸日本等罪皆笞之徙安西遣呼蘭同翰林直士林元撫慰之乙巳九年春正月帝師年扎克嘉勒燦死賻金五百兩銀千兩弊帛萬匹鈔三千定仍建塔寺多爾濟巴勒嗣二月建大天夀萬寧寺辛丑詔赦令御史臺集賢翰林院六部於五品以上各舉亷能識治道者三人行省臺宣慰廉訪司各舉五人免大都隆興差稅内郡包銀俸鈔一年江淮以南租税及佃種官田者十分免二平陽太原地震三月丁卯朔幸上都山東燕南隕霜殺桑般陽益都河間清莫滄獻等處凡殺桑二百四十一萬七千餘本以髙興為中書平章夏四月乙酉大同路地震有聲如雷壊官民廬舍五千餘間壓死二千餘人懐仁縣地裂涌水盡黒漂出松柏朽木議行郊祀禮省臣言前代郊祀以祖宗配臣等以為今始行郊禮専祀昊天為宜從之中丞何瑋獨曰嚴父萬世不易不從五月徴陜西處士蕭㪺不至㪺隠居南山下博極羣書學者及門甚衆嘗出逢一婦人失釵道旁疑㪺得之謂曰殊無他人獨翁隨後耳㪺引至家取釵償之後婦得所遺釵愧謝来還鄉人有暮歸者遇冦詭言我蕭先生也盜驚愕釋去世祖嘗命為陜西儒學提舉不赴省憲即其家為賀使一從史先詣㪺舍㪺方汲水灌園從史令飲其馬即應之不拒及冠帶迎賔從史見之慙懼㪺不以為意累授官皆不起至是命有司具安車迎之亦不至改諸道肅政廉訪司為詳刑觀察司大都旱改平陽路為晉寧路太原路為冀寧路以地震故改名六月庚辰立皇子徳夀為皇太子遣右丞相哈喇哈遜告天地御史大夫特古勒徳爾告太廟詔告天下賜髙年帛八十者一匹九十者二匹孝子順孫堪從政者量才任之親年七十無丁者從近遷除外任五品以上官並減一資諸罪囚淹係五年之上除惡逆外疑不能决者釋之流人量移内地潼川江溢漂沒民居溺死者衆秋七月辛亥築郊壇在麗正文明門之南丙位設郊祀署令丞各一員甲寅太白經天冬十月丙戌十一月壬申並同皇姪阿裕爾巴哩巴特喇及其母鴻吉哩氏出居懐州哈尚之弟也賜金千兩銀七萬五千兩鈔十二萬定以段貞巴圖瑪克新並為中書平章哈喇曼濟為右丞宻喇卜和卓為左丞額森巴爾為參政八月給曲阜林廟灑掃户以尚珍署田五十頃供嵗祀商胡逹吉獻寳貨以鈔六萬定酬其直九月丁巳熒惑犯斗庚申車駕還宫冬十月復以詳刑觀察司為肅政亷訪司十一月庚戍太白嵗星鎮星聚亢丙寅嵗星晝見庚午祀南郊用馬一犢一羊豕鹿各九文舞曰崇徳武舞曰定功以右丞相哈喇哈遜左丞相阿哈台御史大夫特古勒徳爾為三獻官行事評曰天子祭天地諸侯祭山川社稷盖天下之主則主天下之祭祀一國之主則主一國之祭祀上下之分有截然而不可紊者今南郊祀天而以丞相大夫為三獻行事黷禮非分其失大矣吾不與祭如不祭天豈可輕也哉十二月丙子地震庚寅皇太子徳夀薨是嵗髙麗王昛卒子謜立丙午十年春正月築河防役河南民十萬閏月以特黙格徹爾阿克繖為中書平章張閭杜思敬並左丞劉原為參政晉冀地震不止二月戊辰車駕幸上都大同路大雪雨沙暴風大雪明日雨黒沙隂霾馬牛多斃道州江溢山裂夏四月詔求鷹犬詔凡匿者沒家資之半笞三十来獻者給賞評曰前古帝王有解縱鷹犬者矣未聞有求之者也名雖求而又嚴刑重令以威之醲賞以誘之果何道哉夫元起朔漢以射獵為業鷹犬固宜其好然君主華夏以禮樂為治則非曩日穹室氊裘時比矣昔唐使至凉州諷李大亮進鷹犬亮表奏太宗為之褒賞元之諸臣何獨無如大亮者哉鄭州風雹大如鷄卵損桑棗及麥命蠲今年田租以蕭㪺為太子右諭徳㪺扶病至京師入覲東宫書酒誥為獻尋以病請去人問其故㪺曰在禮東宫東面師𫝊西面此禮今可行乎固辭而歸尋卒謚貞敏五月京師旱以塔爾古岱塔喇海並知樞宻院禁西僧馳驛秋八月熒惑犯太微垣上將開城地震王宫及官民廬舍皆壊壓死故秦王妃伊囉斡等五千餘人大都宣聖廟成行釋奠禮牲用太牢樂用登歌九月己巳熒惑犯太微垣右執法壬午犯左執法冬十月甲辰犯斗中書平章徹爾卒徹爾初為南臺大夫謂都事賈鈞曰國家置臺以肅清庶官美風俗興教化也乃者御史不存大體按巡以苛察為明徴賍以多為功甚至迫子証父弟告兄奴訐主傷風敗教莫此為甚君為我語諸御史毋庸效尤為也上聞而嘉之改江浙平章召入中臺至是卒家資不滿三百緍人服其亷也十一月己巳車駕還宫甲戌熒惑犯亢辛巳太隂犯熒惑十二月壬寅太白晝見乙卯上有疾禁天下屠宰四十二日遣宣政院使實廸等禱于太廟是嵗河間民王大夏及磁州民田雲童伏誅坐弑父母磔裂于市以吴全節為江淮荆襄等處道教都提㸃丁未十一年春正月癸酉上崩于玉徳殿丙寅朔上疾甚癸酉崩在位十三年夀四十二庚午安西王阿南達入京師左丞相阿固台平延章巴圖瑪克新巴中政院使集賽道興等潛謀推戴皇后巴約特氏稱制安西王輔之於是阿南達與諸王莽賚特穆爾至京師阿固台集廷臣議祔廟攝政事中丞何瑋難之阿固台變色曰中丞獨不畏死耶衆皆懼瑋從容曰死畏不義耳苟死於義夫復何畏遂以疾去位評曰元之統緒傳授最為不正然亦無可考所以然者由於后妃不分故嫡庶無辨皇后則曰大皇后二皇后皇子則曰大太子二太子皆極其數之所至而止世祖以前勿論裕宗於世祖諸子第三而立為太子成宗又裕宗第三子疑皆為正嫡矣成宗皇太子徳夀既薨若其無嗣當立其兄弟無兄弟則次及庶長所謂庶長晉王哈喇岱是也哈喇岱既薨則其子額森特穆爾所謂泰定帝者當立若武宗則其父逹爾瑪巴拉又裕宗第二子也以嫡則非嫡以長則非長烏得而承正統哉安西王世祖之衆子所以萌窺伺之志也歟竊疑武宗兄弟在成宗時已為國人所與觀大徳九年六月立徳夀為皇太子七月出仁宗及其母鴻吉哩氏居懐州意自可見矣故論是非則安西懐寧無甚相逺論賢否則懐寧為優至於事之成敗則阿固台等謀挾皇后稱制以推戴安西已自提不正而哈喇哈遜李孟托克托何瑋諸賢深圖秘計左右挈所以能有成也二月辛亥皇姪阿裕爾巴哩巴特喇至自懐州自為監國執安西王阿南達等送上都初帝崩諸奸臣謀斷北道請皇后垂簾立安西王阿南達右丞相哈喇哈遜宻遣使北為迎懐寧王哈尚是為武宗南迎阿裕爾巴里巴特喇是仁宗先悉收百司符印封府庫稱病卧闕下中宫傳㫖日數至皆不聽文書並不署行衆欲害之而未敢𤼵及仁宗與母鴻吉哩氏俱至近郊衆猶未之知也既至有言安西王謀以三月三日偽賀仁宗千秋節因以舉事者阿舒布哈言于丞相曰先人者勝後人者敗后一垂簾我等皆受制于人矣丞相曰善乃先二日詐為懐寧使者稱召安西王計事因執送上都初裕宗皇后命布衣李孟輔導武宗仁宗於潛邸及仁宗居懐州孟單騎以從為講古今得失成敗及君臣父子之義深見信重安西之變哈喇哈遜宻使来告疑而未決孟曰宫車宴駕大太子逺在萬里殿下當急還宫庭以折奸謀不然使邪黨成謀以一紙書召還則殿下母子且不自保矣仁宗喜曰先生之言社稷之福也乃奉太后還都時哈喇哈遜稱疾不出遣孟往問之適成后使人問疾孟入長揖而坐已而前引其手診脉衆以為醫得不疑既而知安西王即位有日還報曰事急矣不可不早圖之左右皆不能決仁宗曰當以卜決之命召卜人有儒服持囊遊市者召至孟出迎語之曰大事待汝而決但言其吉乃入筮得乾之暌孟曰筮不違人是謂大同仁宗遂振袖而起上馬自延春門入哈喇哈遜自東掖来就之收首謀同惡者悉送獄奉璽北迎武宗中外遂定仁宗自為監國以孟為參政孟久在民間周知閭閻疾苦幽隠損益庶務切中利病逺近悦服然裁抑僥倖羣小多不樂孟乃辭不足重任弗許遂逃去不知所之夏五月甲申懐寧王哈尚即皇帝位于上都廢皇后巴約特氏尋殺之誅左丞相阿固台安西王阿南達等諸王莽賚特穆爾等皆被誅大赦天下免兩都隆興差稅三年諸路分量輕重優免追諡皇考曰順宗皇帝尊母元妃鴻吉哩氏為興聖皇太后以塔喇海為中書左丞相綽和爾阿舒布哈莽賚布哈並為平章劉正為左丞竒徹額森特穆爾並參政塔斯布哈為御史大夫諸宰執進秩有差加樞宻知院托多爾海太傅右丞相哈喇哈遜太保六月癸巳朔立皇弟阿裕爾巴哩巴特喇為皇太子初興聖太后至自懐孟既定内難以兩太子星命付隂陽家推筭問所宜立者曰重光大荒落有災旃䝉作噩長久重光為武宗年幹旃䝉為仁宗年幹太后頗惑之遣近臣多羅諭㫖于帝曰汝兄弟皆我所出豈有親疎隂陽家所言不可不思上黙然謂喀喇托克托曰我勤勞邉陲十年次序居長今太后以星命休咎為言天道茫昧誰能豫知使我即位上合天心下副民望雖一日之短亦足垂名萬年此殆柄臣忌我故為是動揺耳汝為我往察事機疾歸報我托克托馳至京師以所受㫖聞太后曰脩短之説雖出術家為太子逺慮乃出我深愛不速来何為既而太后及皇弟屏人語托克托曰太子孝友今汝所致言殆有讒間之者汝歸善彌縫使骨肉無間則汝功不細矣扎克托頓首謝還奏之上大悟三宫協和遂立皇弟為皇太子其後三寳努勸立皇子召托克托語故托克托曰太弟曩定宗社居東宫已久兄弟叔姪世世相承孰敢紊其序乎三寶努曰今日兄已授弟後日能保叔授其姪乎托克托曰在我不可渝彼失其信天實鑒之遂不能奪以竒塔特布濟克為中書平章綽爾齊塔海並右丞阿里為左丞喀喇托克托為御史大夫甲午立中都建行宫於翁果察圖之地立宫闕為中都封皇太子乳母李氏為夀國夫人其夫燕嘉努為夀國公上大行皇帝尊諡諡曰欽明廣孝皇帝廟號成宗祔太廟哈喇哈遜與羣臣議以皇考順宗於成宗為兄二帝神主依次序升祔為宜太祖居中睿宗西第一世祖第二裕宗第三順宗東第一成宗第二制可評曰古者祖有功宗有徳故宗廟所以祀天下一國之君者也昭穆相傳各為世次有不可紊者若小宗繼大宗旁支接正統則皆以所繼承所遺不得顧其私親此古今之通義也元之睿宗裕宗順宗皆未嘗居天子之位但當祔食於其所出之帝而各為立廟已非禮矣又况成宗為君時順宗為之臣兄弟之不先君臣尚矣豈有依次序升祔而躋順宗於成宗之上者乎失禮之中又失禮焉哈喇哈遜李孟何瑋諸臣何能逃其責乎以烏魯斯竒爾摩多並為中書右丞遥授茂穆蘇平章政事茂穆蘇以角觗屢勝故有是命置詹事院以趙仁榮為詹事王約副詹事時太子承制立左衛率府欲署軍官約持不可太子召問之約曰皇太子事不敢不為天子勒事不敢為太子悟竟罷又欲取安西兵器約謂詹事諤哲曰千里取兵器人必驚疑主上聞之奈何諤勒哲愧謝曰實慮不及此又欲取福建綉工童男女六人約以為動擾不宜乃止家令薛居敬言陜西分地事因被命往理之約不肯署且曰太子潛龍也當勿用之時為飛龍之事可乎遂寢不行時又進奉興聖宫金二千七百五十兩銀十二萬九千二百兩鈔一萬定幣帛二萬二千二百八十匹賜皇太子亦如之封皇妺祥格為魯國大長公主駙馬多阿克巴拉為魯王進髙麗王謜爵瀋陽王謜尋更名章秋七月癸亥朔封圖喇為越王甲子告謝南郊社稷命御史大夫特古勒徳爾知院塔爾呼岱平章綽和爾以即位告謝南郊社稷哈喇哈遜罷初皇太子入京師阿固台有勇力人莫能近諸王圗喇手縳之以功封越王哈喇哈遜以為祖宗非親王不得加一字之封圗喇疏屬不可以功廢舊制上不聽圗喇因譛于上曰安西謀干大統時丞相亦嘗署文書由是罷為和林行省左丞相仍太傅且以太師伊徹察喇為右丞相以塔喇海為右丞相塔斯布哈為左丞相達實哈雅嘉琿達呼嚕丹拜布哈並為平章王壽郝天挺並為左丞博囉達實為參政濟爾哈朗為御史大夫額爾吉納知樞宻院事及封爵功臣有差封班布爾錫齊王圗烈訥濟王徳勒格爾布哈北寕王伊徹察喇淇陽王喀喇托公克托奉國公特古勒徳爾鄆國公綽和爾容國遥授教坊司官為平章教坊司達嚕噶齊實廸儀奉司大使呼實哈雅特穆爾布哈並遥授平章為玉宸樂院使評曰平章政事經國大臣之任也始則茂穆蘇以角觗屢勝得居其位及是實廸等以教坊伶官遥授是職元之名爵繆濫至此烏足貴哉若夫監察御史朝廷耳目所以肅清庶政而以任豢虎人徹爾濟蘇丞相天子股肱所以表正百僚而以寵宦者李邦寧翰如此林承㫖斯文宗主而以授西僧嘉勒斡巴勒武宗用人其為政葢不言而可知也竒徹罷省臺奏銓選非法省臣言内降㫖與官者八百八十餘人已除三百未除者猶五百餘請自今越奏者勿與上曰然又言外任官帶相銜非制而臺臣亦言省院臺得自選官具有成憲今御史廉訪司官非本臺公選而從諸臣所謂降内㫖用之非祖宗成憲上曰若此者卿等皆當執而勿與八月以博囉特穆爾為中書右丞額卜徳哷勒為參政王夀為御史中丞江南饑建佛閣于五臺寺賜諸王孝經中書右丞博囉特穆爾譯孝經以進詔曰此孔子微言王公庶民皆當由是而行命刻板模印諸王以下咸賜之九月甲子車駕還宫改太常寺為太常禮儀院定中書省臣員數省臣言比議省官員數有㫖依舊制定為十二員右丞相塔喇海左丞相塔斯布哈及平章綽和爾竒塔特布濟克如故餘令臣等議請以阿舒布哈達實哈雅為平章博囉達實劉正為右丞郝天挺額森特穆爾為右丞于璋額卜徳哷勒為參政其班朝諸司冗員並宜揀汰拜布哈罷出為江浙平章以瑪努勒知樞密院建佛寺于五臺山冬十一月丙寅帝朝隆福宫上玉册寶詔議更用銀鈔銅錢改典瑞監為院至元初立符寳局後改典瑞監至是改監為院秩正二品置院使四員同知僉院同僉院判各二員詔改元改明年為至大元年封雅克呼圗克為楚王是嵗尊崇孔子為大成至聖文宣王制曰葢聞先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也朕纂承丕緒敬仰休風循治古之良規舉追封之盛典可加大成至聖文宣王遣使闕里祀以太牢於戯父子之親君臣之義永惟至教之遵天地之大日月之明奚罄名言之妙尚資神化祚我皇元主者施行元史續編卷六
