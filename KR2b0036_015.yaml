body:
  text: 元史續編卷十五明胡粹中撰丁酉十七年春正月丙子朔日食命山東團結義兵每州添設判官縣添設主簿各一員専帥義兵以事守禦仍命郡守提調聽宣慰司節制時江浙丞相達實特穆爾承制授實默伊遜穆爾固實為行樞密院判官宜孫分治處州以劉基為經歷郡人胡深葉琛章溢參謀軍事穆爾固實分院紹興與宜孫夾攻處婺山賊平之評曰兵貴乎精不必多將在乎不必衆添設帥領團結義兵不足以禦敵適足以資敵耳田豐等十萬户相繼背叛而山東先失團結果何益哉二月豫王等大破賊兵先是河南左丞相台哈布哈駐軍南陽嵩汝等州叛民皆降軍勢大振遂㑹豫王及鼎珠等同進討大捷以察罕特穆爾為陜西左丞李思齊為四川左丞河南賊出襄樊陷商州攻武關官軍敗走遂趨長安掠同華諸州陜西省臺來告急察罕即引兵入潼關長驅而前遇戰輒勝殺獲以億萬計賊潰散走入南山興元朝廷嘉其功授左丞未幾賊圍鳳翔凡數十重察罕將鐵騎晝夜馳赴與城中兵合擊敗之斬首萬級伏尸百里關中悉定三月中書左丞吕思誠卒初思誠母馮夢一丈夫烏巾白襴衫紅革帶趨而揖曰我文昌星也及寤生思誠目有神光見者異之及長從蕭㪺學中泰定元年進士歷官有政績素剛直不為勢利屈卒諡忠肅閏月泉州義兵萬户賽富鼎反大明取常州劉福通遣毛貴陷膠萊州守臣釋家訥死之山東皆陷又陷益都濵莒州朝廷命董摶霄從知院布哷齊討之已而濟南又告急乃提兵往援先按兵城中以數十騎挑賊賊悉衆來鬬騎少却至澗上伏起城中出兵奮擊破之般陽賊復來襲摶霄列兵城上弗為動賊夜攻南門禦以矢石黎明潛開東門出兵繞賊後及旦開南門下兵合擊賊敗走追殺之盡有害其功者譖於太尉努都爾噶令依前詔征益都摶霄即引兵北行曰我去濟南必不可保己而濟南果陷時王英年九十六致仕家居益都陷謂子𢎞曰世受國恩今老矣不能事戎馬以報天子尚忍食異姓之粟乎水漿不入口者數日卒毛貴聞之命具棺衾以殮舉尸不動祝曰公子𢎞請公歸葬遂起觀者莫不驚異夏四月以特哩特穆爾為御史大夫烏蘭哈達鄂蘭並中書平章成遵為左丞約約為甘肅左丞相達實巴圗爾為四川左丞相加太尉車駕幸上都五月以吹斯戬為中書右丞相太平左丞相魯逹實為御史大夫評曰君子小人如氷炭水火同器則爭太平賢者也乃與吹斯戬並相火不能勝水必矣不自引去猶隱忍同事雖曰將以共濟國難然小人實非君子所可共者惜哉太平之不能見幾而作也大明取寧國江陰六月癸酉有龍鬭于溫州之樂清江颶風大作所至有光如毬死者萬餘人秋七月乙亥京師晝霧不辨人物自旦至午方消如是者旬有五日詔免今嵗民租之半八月劉福通犯汴梁分道寇掠分軍三道關先生破頭潘馮長舊沙劉二王士誠寇晉冀白不信大刀敖李喜喜趨關中毛貴據山東其勢大振彰德萬户時公權以城降遂陷曹濮大名又窺衛輝博囉特穆爾擊之又陷澤潞陵川縣尹張輔死之又攻冀寧侵壺關為察罕特穆爾所破賊遂入太行白不信等陷興元鳳翔亦為李思齊等所破走入蜀初賊陷商州據藍田西臺侍御吕思誠議求援察罕省院忌客兵軋已議久不赴思誠曰吾兵弱旦暮失守咎將安歸乃移書趣之察罕遂將兵五千來援既而賊果以察罕援兵間之思誠乃請於朝命察罕専守關陜詔從之以旺扎勒特穆爾為中書右丞溫普為參政癸丑二龍見祥符縣鎮守黃河義兵萬户田豐叛以伯竒鼐爾為陜西平章楊旺扎勒為江浙左丞方國珍為參政車駕還宫以余闕為淮南左丞詔以張士誠為太尉初士誠俾南臺中丞曼濟哈雅為書請降江浙左丞相逹實特穆爾令參政周伯琦至平江撫諭之詔以士誠為太尉士誠因留伯琦不遣伯琦始以文藝居館閣有聲及附托克托劾劉希曽等遂不為公論所與後出走江東為亷使及索諾木巴勒陷寧國伯琦倉皇出杭州於是南臺御史俞觀糾伯琦失守宜正其罪而達實特穆爾假伯琦參政招諭士誠留平江者十餘年士誠滅乃得歸番陽尋卒故論者謂伯琦遭時多艱而善於自保於致身之義為有闕云評曰周伯琦以文藝名世固嘗在端亮之列矣一為利祿所誘諂附托克托得罪於公論遂爾改操不復顧藉居方面則失守將使命則屈節雖保身於危難而壞名毁節辱先喪家多矣惜哉大明取揚州九月詔努都爾噶進討山東以魯逹實為中書平章徐夀輝僞將陳友諒襲殺倪文俊文俊謀殺夀輝不果自漢陽奔黃州友諒襲殺之自稱平章置山東行省以大司農哈剌章為平章冬十月達實巴圗爾擊曹州賊敗績達爾瑪實哩死之靜江路山崩地陷大水河北水十一月以達蘭為中書平章巴特瑪實哩為右丞李獻為左丞巴延特穆爾哈喇諾海崔敬陳敬伯並參政十二月戊寅太白犯嵗星四月左丞相達實巴圗爾卒於軍詔以其子博囉特穆爾為河南平章代總其兵明玉珍據成都初倪文俊陷川蜀命僞元帥明玉珍守禦文俊死玉珍遂自據成都趙君用等僭稱王號君用及彭大之子早住同據淮安君用僭稱永義王早住稱魯淮王義兵千户余寶叛據棣州寶殺其知院寶保叛降毛貴遂據棣州河南大饑張禎復上疏言事不省禎上疏陳十禍其根本之禍六征討之禍四歷數其弊一曰輕大臣二曰解權綱三曰事安逸四曰杜言路五曰離人心六曰濫刑獄所謂根本之禍也至若不慎調度不資羣䇿不明賞罰不擇將帥所謂征討之禍也其言多不能載大略以謂陛下因循治安不預防慮今海宇亂離天道變常民情難保正當警省惕厲奮發思過念祖宗創造之難今日墜亡之易修實德推至誠凡土木之工聲色之樂宴安鴆毒皆宜痛撤勇改而陛下泰然若承平無事之日此事安逸所以為根本之禍者也又自四方有警調兵六年初無紀律又失激勸將帥因敗為功指虗為實大小相謾上下相依於是覆兵殘民貪婪懦怯悉無懲戒以致所經之處雞犬一空貨財罄盡而面諛游說反以克復受責且河南一省今所存者止封丘延津登封偃師四縣而河南淮北千里蕭條經兵之處固不忍言未至之境尤可軫念如此軍旅不休使天雨粟地湧金朝夕存亡且不能保况以地力有限之費供將帥無窮之欲哉蓋亦危矣陛下事佛求福飯僧消禍以天夀節而禁屠宰今天下兵起殺人不知其數陛下泰然不理而曰吾將以是求福福何自而至哉夫潁上之寇以佛法誘衆駸駸然不至於亡吾社稷不止也堂堂天朝不思靖亂而反階亂其禍毒至深其關係至大有識者為之扼腕有志者為之痛心此則不明賞罰所以為征討之禍者也疏奏上之不省評曰張禎之疏十禍善矣其曰輕大臣則非也至正之君不自為政善惡邪正進退黜陟舉付之省院臺而方面皆得以便宜行事如此而猶為不重乎若曰大臣當重選智勇端亮有德之君子而才辨口佞寡亷鮮恥之人不得而輕用焉斯可矣陳友諒寇安慶守將余闕拒却之淮南右丞余闕守安慶倚小孤山為藩蔽命義兵元帥胡伯顔統水軍戍守友諒自上流引軍直搗小孤伯顔以戰四日夜不勝奔還賊追至城下闕遣兵扼觀音橋俄而饒寇攻西門闕斬却之友諒兵乘東門紅旗登城闕簡死士奮擊賊敗去并軍攻東西二門又敗之賊恚甚乃樹柵起飛樓來攻金鼓聲振地闕分兵悍敵晝夜不得息既而池州賊趙普勝軍東門友諒軍西門饒兵軍南門四面蟻集闕徒步提戈為士卒先衆號哭止之揮戈愈力分遣部將督三門兵自以孤軍血戰斬首無數而闕亦被十餘創安慶遂危戊戌十八年春正月陳友諒陷安慶守將余闕等死之城將陷闕知不可為引刀自剄墮清水塘中死妻頁卜氏及子德生女福童亦皆赴井死同時死者守臣韓建一家被害居民不從賊焚死者以千計其知名者萬户李宗可紀守仁陳彬金承宗經歷段桂芳都事特穆爾布哈千户和爾布哈新李盧廷玉葛延齡丘巹許元琰百户黃寧奏差烏德美安慶推官黃圖嚕岱經歷楊桓知事余中懷寧縣尹陳巨濟事聞贈闕平章邠國公諡忠宣評曰余闕可無愧於張巡矣巡保障江淮唐室得以興復故世稱其節賞其功闕屏蔽揚豫當東西南北之要衝四面攻圍誓以死守然元氏終亡是以忠節見稱而功不顯也况同時死義之士不下於南霽雲諸人亦豈非闕之精忠仗節有以感激之歟嗚呼希矣大明取婺源州田豐陷東平以布埒齊知樞密院二月毛貴陷淸滄州濟南守將阿達戰沒河南右丞董摶霄死之布哷齊與貴戰于好石橋敗績走濟南貴遂陷清滄據長盧濟南守將阿逹戰死貴立賔興院選用故官以姬宗周等分守諸路又於萊州立三百六十屯每屯相去三十里造大車運糧官民田並十分收二冬則陸運夏則水運時董摶霄駐兵南皮縣魏家莊詔遣使拜為河南右丞毛貴兵卒至而營壘未完諸將白賊至當如何摶霄曰當以死報國因拔劍督戰賊突至捽摶霄問曰汝為誰曰我董老爺也衆刺殺之無血惟白氣衝天是日其弟昂霄亦死摶霄以儒生起家為能吏會天下喪亂乃復以武功奮其才略有大過人者而當時用之不能盡其才君子惜之評曰摶霄忠義固可以感天地貫金石然刺之無血惟白氣衝天則涉乎誕妄矣蓋史家之過稱人之美固不在是也田豐陷濟寧努都爾噶棄東昌走豐遂入據之努都爾噶聞田豐逼東昌棄城走豐遂陷東昌及益都廣平大掠已而復退保東昌三月己亥朔日色如血毛貴兵至柳林劉哈喇布哈擊敗之貴走保濟南貴陷般陽至薊州犯漷州至棗林樞密副使達國珍戰死遂略栁林劉哈喇布哈擊敗之貴走還丁卯太白在井失行于北至十二月戊寅生黑芒環繞其星乍東乍西乍動乍靜癸未忽眀忽暗大眀取建德路王士誠陷晉冀又侵懷慶周全擊走之士誠兵陷晋寧總管杜賽音巴哈死之又陷冀寧及大同諸縣復侵懷慶為全所敗夏四月陳友諒陷龍興省臣道通和尼齊棄城走友諒又遣王奉國攻陷饒州康泰寇邵武又陷吉安撫州初道通任章巴延布延布哈捍城頗有功未幾和尼齊來為左丞貪忍不得士心而道通素恤民能任人有功者賞無功者或不加罪二人又素不相能城陷和尼齊出走道通退保撫州欲集義兵收復而勢已不可因嘆曰身為大臣城陷不守復何面目見人追者至道通迎敵遂為所害初朝廷授吳當江西亷訪使與兵部尚書黃昭和尼齊同便宜行事復建撫二州時參政多岱總兵忌當成功搆當昭南人不宜統兵柄改當守撫州昭臨江並供億和尼齊軍而和尼齊又言二人難任牧民皆坐除名江西既陷當著道士服杜門不出友諒舁至江州拘留一年不屈放還吉水卒當澄之孫也察罕特穆爾等敗李喜喜于鞏昌喜喜走入蜀察罕特穆爾李思齊張良弼郭擇善拜特穆爾鼎珠汪長生努各以所部兵討李喜喜喜喜敗走入蜀察罕特穆爾駐清湫思齊駐斜坡良弼駐秦州擇善駐崇信拜特穆爾駐通渭鼎珠駐臨洮各自除拜府州縣官屬徵納軍需既而朝廷召察罕以兵屯涿州乃自將鋭卒赴召擊冀晉賊却之河東悉定已而良弼殺拜特穆爾李思齊殺郭擇善以察罕特穆爾兼西臺侍御同知河南行樞密院命守關陜晉冀撫鎮漢沔荆襄便宜行事察罕乃益務練兵訓農以平定四方為己責劉福通入汴梁奉其僞宋主小明王居之福通攻汴梁竹貞棄城走福通等遂入城乃自安豐迎其僞主居之以為都以台哈布哈為中書右丞相命進討山東台哈布哈拒命詔誅之以烏蘭哈達代總其兵台哈布哈既與太平相失聞其復相意不能平嘆曰我不負朝廷朝廷負我矣太平南人乃復居中用事我反在外勞苦欲耶是時朝廷復台哈布哈湖廣左丞相使進討諸將皆進兵而台哈布哈以養鋭為名反勒兵退及賊攻汴梁守臣請援十往反猶按甲不動或諫之曰賊旦夕至丞相兵不進何也台哈布哈大言曰我在何物小寇敢來若等無多言而出軍縱掠百里內蕩然玩寇養亂致河北山西相繼不守朝廷憂之兩遣重臣諭㫖授以成算皆不聽其子壽通將兵分討山東入奏事語言驕慢上由是惡之㑹山東賊愈充斥乃拜台哈布哈中書右丞相總兵進討台哈布哈即上言軍行以糧餉為先請令太平至軍供給乃可濟事不然兵不能進於是廷議喧然太平令御史劾其緩師拒命詔削奪官爵益州安置以烏蘭哈達代之台哈布哈聞有詔夜馳詣劉哈喇布哈求救哈喇布哈時駐保定見其來置酒慷慨言曰丞相國家柱石是必讒言間之我當往見上丞相勿憂即走至京先見道太平太平問其來故具以告太平曰台哈布哈大逆不今詔已下汝妄言將及禍哈喇布哈懼不敢發太平語賚之曰汝能致台哈布哈功不細矣因許之乃引見上賜良渥哈喇布哈還縳台哈布哈父子送京師未至殺之於路山東地裂天雨白毛以察罕特穆爾為陜西平章聽便宜行事六月戊辰朔日食關先生等兵陷遼州攻保定不克遂陷桓州掠大同興和諸郡前江西亷訪僉事巴延謀起兵討賊不克而死巴延初以處士徴為待制遷僉憲江西以病免歸及河南盜蔓延河北巴延言於省臣將結鄉民為行伍以自保而賊兵大至乃渡漳北行邦人從之者數十萬至磁與賊遇賊知其名生劫之誘以富貴巴延不屈引頸受刃與妻子俱死或剖其腹見其心數孔曰古稱聖人心有七竅此非賢士乎納心腹中排墻而掩之事聞諡文節巴延字宗道初師黃坦以頴悟可比顔子因命以顔為氏世呼為顔宗道云秋七月丁酉朔周全以懷慶叛附劉福通時察察特穆爾駐洛陽遣拜特穆爾守碗子城周全來戰殺拜特穆爾遂盡驅懷慶民入汴梁福通尋遣全攻洛陽守將登城以大義責全全愧謝退兵福通殺之評曰周全愧謝退兵亦理義之良心有不能亡故也然與其為福通所殺孰若堅守臣節為國死難之為美乎亦可以為人臣而懷二心者之冰鑒矣京師戒嚴有賊兵犯京城刑部郎中布哈時守西門夜開關擊退之於是命左丞相太平督諸軍防禦義兵萬户王信以滕州叛降毛貴八月江浙平章薩木丹巴勒逃入福建薩木丹巴勒討饒州貪財玩寇久而無功遂妄稱遷職福建行省為憲臣巴喇密特特穆爾所劾拘之興化蒙陰縣飢斗米金一斤京畿水九月命參政布延布哈治書李國鳳經略江南以慶通為南臺大夫陳友諒陷贑州江西參政沁布阿咱爾等死之總管噶海齊亦死友諒遂陷汀州冬十月大明取蘭溪諸暨等州十一月乙未朔以布哈特穆爾為福建平章吹斯戬罷以努都爾噶為右丞相時天下多故外則疆宇日蹙淫內則帑藏空虛而上方溺於樂不恤政務吹斯戬居相位無所匡救而公受賄賂貪聲著聞於是御史揚珠布哈劾奏其任用私人圖烈及妾弟崔旺扎勒特穆爾印造僞鈔事將敗殺旺扎勒以滅口吹斯戬乃自請罷政詔止收其印綬御史王彛達爾瑪實哩言不已上終不聽十二月戊寅太白經天大明取婺州守臣僧住及浙東亷訪使楊惠死之關先生兵陷上都焚宫闕留七日轉掠遼陽是嵗京師大饑疫時河南北山東皆被兵民攜老幼流入京師重以饑疫死者相枕藉官者保布哈請市地收瘞之上賜鈔千錠皇后及皇太后賜金銀及他物有差省院官僚施他物者無算保布哈出金玉帶各一及銀鈔米麥以為費擇地南北兩城抵盧溝橋掘深及泉男女異壙人以一尸至者隨給以鈔舁負相踵凡瘞二十萬又修水陸㑹三晝夜居民病者給藥不能喪者豫之棺翰林承㫖張翥為文頌其事曰善惠之碑評曰民之流離他域轉死於饑疫者以世亂故也世亂而不能靖則以君德之不修臣職之不共所致耳盍亦反其本哉不能靖亂以安民而區區掩埋祠祭以為惠君臣上下方有德色吁抑末矣彼張翥者不聞規正而撰文頌美何其諂哉己亥十九年春正月陳友諒寇信州江東亷訪使巴延布哈德濟引兵救之賊黨王奉國寇信巴延布哈德濟自衢往援破走其兵時鎮南王子大聖努樞密院判席閏屯兵城中開門出迎德濟登城四顧誓以破賊自許後數日賊又來攻德濟分兵為三出城奮擊斬首數千級復大破之友諒弟友德植木柵攻城范益急遣人來說降部將髙義潜與之通紿呼圖克布哈則忠等十將往見奉國皆拘囚不遣義又以計來誘德濟時德濟坐城上見義來謂曰汝誘十帥無一人還今來誘我耶我頭可斷足不可移數其罪而斬之由是日夜鏖戰糧竭矢盡而氣不衰城中食草苗茶紙括靴底掘鼠羅雀殺老弱以食評曰四海板蕩寇盜相望有民杜之寄者孰不幸封境之茍安以自免也故張巡守雎陽求救於賀蘭進明而不得蓋或懼其同禍或忌其成功能挺身赴敵者鮮矣賊寇廣信衢雖鄰壤尚可自保巴延布哈德濟即引兵往救亦異於周伯琦之出走者矣關先生等兵陷遼陽懿州總管吕震死之贈震河南左丞東平公賊引兵往高麗癸丑流星起南河沒于螣蛇將沒迸散隨落處有聲二月詔博囉特穆爾移鎮大同欲倚以捍蔽京師故也復置大都督兵農司并分司十道専督屯種以博囉領之所在侵奪民田不勝煩擾時台哈布哈潰兵數萬抄掠山西察罕特穆爾遣陳秉直分兵招撫其首領悉送河南屯種夏四月趙君用殺毛貴其黨續繼祖又執君用殺之京師大飢自正月至五月銀一錠得米八斗死者無算通州民劉五殺其子而食之五月以旺扎勒特穆爾為陜西左丞相山東西河南北關中大蝗飛蝗蔽天人馬不能行所落溝塹盡平民大飢六月辛巳以雅克科爾為御史大夫以吹斯戩為遼陽左丞相甲午陳友諒陷信州巴延布哈德濟戰死五月德濟大破賊兵王奉國復晝夜攻之不息穴地梯城以上城遂陷德濟與大聖努參謀哈喇丹皆戰死德濟之將赴援也入白其母鮮于氏曰兒今不得事母矣母曰爾為忠臣吾死何憾因命其子額森布哈奉母間道入福建以江東亷訪司印送行臺巴延布哈德濟高昌王錫錫德濟之孫鮮于氏太常典簿樞之女也秋七月丁酉太白犯上將甲辰犯右執法己酉犯左執法八月察罕特穆爾等兵討劉福通破汴梁福通以其僞主走安豐察罕大發秦晉軍討汴圍其城督諸將閻思哈吕孝李克彛圭林齊賽音諤德齊逹呼托音布文完哲賀宗哲孫翥等政破之福通等走安豐詔以察罕特穆爾為河南平章兼同知行樞密院西臺中丞賜七寶帶以旌其功九月以特哩特穆爾為陜西左丞相河決任城縣丙午白虹亘天大明取衢處州詔徵海運糧于張士誠遣兵部尚書特哩特穆爾等以御酒龍衣賜士誠徵海運糧時朝廷又遣户部尚書貢師泰分部於福建以閩鹽易糧海運給京師得糧數十萬石京師賴焉冬十一月京城十一門築甕城造弔橋評曰天子有道守在四夷築甕城造弔橋曾足以為國乎以方國珍為江浙平章壬申太白犯斗辛巳流星大如桃流星起自危東行沒于畢宿之西京師有杜鵑啼於城中居庸關亦有之十二月皇太子殺其中書左丞成遵參政趙中初毛貴據山東由河間入寇中外大駭廷議遷都避之和者知出一口左丞相太平力爭不可遣劉哈喇布哈擊敗之京師遂安會張士誠降察罕特穆爾屢捷人心翕然有中興之望而右丞相吹斯戬家人造僞鈔事覺刑部欲逮右相置對太平曰堂堂宰相烏有此事四海聞之若國體何遂止罷其相位太平又分祿餽之而吹斯戬反銜太平先是竒皇后與太子謀內禪諭意太平太平不答由此太子亦惡之以遵中皆太平所任用令御史誣其贓罪下獄死評曰太子之職在問安視膳刑政非所敢専也况成遵等執政大臣而専殺之是無君親矣所以然者太子謀內禪而丞相不從故殺其佐屬以脅之耳羣雄作亂於外太子謀亂於內烏得而不亡哉陳友諒迎其僞主徐夀輝徙都江州友諒自稱漢王制贈宋儒楊時李侗胡安國蔡沈真德秀封爵沅州路照磨胡瑜言先儒楊時等五人有功聖門未列從祀於是省部議奏俱贈太師追封時吳國公侗越國公安國楚國公沈建國公德秀福國公並從祀宣聖廟廷庚子二十年春正月以危素為中書參政丙辰五色雲見右丞相努都爾噶卒努都爾噶有識量處事平允選官不用私人為相有大臣體既卧病謂人曰太平真宰相也我疾固不起而太平亦不能久於位矣此可嘆也遂卒二月戊午朔太平罷為太保成遵等既死太子欲盡逐帝近臣決意之去太平政柄努都爾噶數於上前左右故太子之志未及逞㑹努都爾噶卒太平知勢不可留乃數以病辭位拜太保養疾於家評曰易稱君子見幾而作不俟終日吹斯戬専政而太平與之同位力辭而去可也皇后太子既有邪謀力能匡正則正之不能則去之亦可也太子殺成遵趙中剝床將及膚矣尚不知覺至於見逐而後去隱忍依達自取悔辱惜哉然太平蓋量雖寬而識不敏仁有餘而勇不足者也三月戊子朔彗星見東方甲午廷試進士賜穆珠魏元禮等三十五人及第出身有差以吹斯戬為右丞相時上益厭政宦者保布哈用事為奸利吹斯戬因與結搆相表裏匹方警報將臣功狀皆壅不上聞後又與保布哈黨庇庫庫而誣博囉以非罪卒召禍亂論者謂元之亡吹斯戬之罪居多田豐陷保定命中書都事樂元臣招諭其軍豐殺之豐殺元臣復陷永平易州廣平等處夏五月丁亥朔日食雨雹陳友諒殺其主徐夀輝遂自僭號友諒弒夀輝于太平自稱皇帝僭國號大漢改元大義回駐江州以班珠爾瑪克為平章詔諭博囉特穆爾察罕特穆爾各將所部兵分守其地初烏蘭哈達領部台哈布哈軍其將方托克托與弟拜特穆爾時保遼州烏蘭哈逹同唐琰髙托音等屯孟州與察罕特穆爾部將班布爾錫等交兵已而烏蘭哈達引達勒達軍還京方托克托等乃從博囉由是二將不睦故有是詔且命博羅守石嶺以北察罕守關南毋得互相越境侵犯所守信地張士誠貢糧于京師巴延特穆爾等至杭州傳詔命士誠輪粟方國珍具舟丞相逹實特穆爾總督之既而士誠慮國珍載粟而不輸于京國珍恐士誠掣其舟乘虗以襲已二人互相猜疑巴延特穆爾往來開諭運米十一萬石至京七月復遣户部尚書王宗禮徴如今年之數明年五月運至秋九月博囉特穆爾攻察罕特穆爾于冀寧遣使和解之察罕特穆爾不受命時朝廷遣參政額森布哈等往諭二將令講和博囉自石嶺直抵冀寧圍之三日復退屯交城察罕引兵與戰已而各於關南北守禦有詔命博囉守冀寧額森遣布哈殷興祖等倍道趨之守者不納察罕又遣兵攻其軍時朝廷以冀寧畀博囉而察罕藉晉冀以致盛强乃不奉詔託言用師汴梁尋渡河就屯澤之潞以拒之又與博囉軍戰于東勝遣部將班布爾錫援班布爾錫曰彼軍奉詔而來我何敢抗察罕怒殺之評曰首亂者博囉也察罕力若能討一舉而擒滅之可也勢不相下則宜慕亷藺之義共濟國難乃日尋干戈爭城爭地可乎且自察罕起兵收復者幾州勦絶者幾處朝廷由匹夫而擢兼三事恩寵至矣而察罕方自為謀略不憂國此豈為純臣也哉既而詔命和解以冀寧畀博囉如事關大害係國存亡則弗與而復請可也當是時中原板蕩豈一冀寧所能杜博囉之僭亂哉蓋察罕實欲藉全晉以資盛强非真能為朝廷惜土地也班布爾錫奉詔而察罕殺之則方命之迹不能掩矣冬十一月甲寅朔黃河清原武滎澤二縣界凡清三日十二月陽翟王阿爾輝特穆爾反阿爾輝特穆爾太宗第七子默埓大王七世孫時兵起四方上屢詔宗王以北方兵南討阿爾輝特穆爾知國事不可為乘間擁兵數十萬屯駐於穆爾古珠之地將犯京畿使來言曰祖宗以天下付汝汝已失其半若以國璽付我我當自為之上遣使報曰天命有在汝欲為則為之命圖沁特穆爾將兵擊之軍潰圖沁奔上都以太平為上都留守辛丑二十一年春正月癸丑朔詔赦天下二月癸未朔填星退犯太微垣三月博囉特穆爾罷兵還朝廷再命平章達實特穆爾參政七十往諭解兵博囉特穆爾乃還遣其將圖魯卜等引兵據延安以謀入陜朝廷尋命博囉於保定以東河間以西屯田夏四月辛巳朔日食以張良弼為陜西參政良弼屯藍田受節制於察罕特穆爾又陰結平章鼎珠聽陜西左丞相特哩特穆爾調遣已而移駐鹿臺評曰良弼受節制於察罕而又陰結鼎珠聽陜西行省調遣則察罕與朝廷二明矣遣子貢糧焉知非窺覘朝政也哉察罕特穆爾貢糧于京師遣其子副詹事庫庫特穆爾貢糧至京皇太子親與定約遂不復疑五月明玉珍陷嘉定等路李思齊遣兵擊敗之李武崔德降于李思齊六月乙未熒惑嵗星太白聚翼秋八月以布哈特穆爾為南臺大夫大明取江州陳友諒退保武昌察罕特穆爾討田豐等降之察罕發晉軍下井陘出邯鄲過磁相懷衛又發汴梁繼之水陸並進遂平東昌復冠州遣庫庫特穆爾閻思孝等㑹關保圭林齊將由東阿造浮橋以濟賊以二萬人奪之關保等且戰且渡拔長清進討東平田豐遣崔世英出戰大破其軍乃遣使招豐豐降令為前鋒進討余寶及王士誠楊誠皆降進兵濟南劉圭降遂圍益都九月阿爾輝特穆爾伏誅少保知院婁章以兵討陽翟王敗其衆部將托歡擒送闕下詔誅之封以其弟呼圗克特穆爾襲以太平為太傅托歡太平子額森呼圗克將也縳陽翟王阿爾輝特穆爾太平令生致之京師由是北邊以寧加太平太傅尋辭歸奉元明玉珍陷東川郡縣李思齊遣兵擊之復遣使徴糧于張士誠命兵部尚書徹辰布哈侍郎韓祺往使明年運米十三萬石至京冬十月以察罕特穆爾為中書平章仍兼知河南山東行院十一月戊辰黃河清自平陸三門磧下至孟津五百里皆清命祕書少監程徐祀之十二月石州河清至氷泮始如故明州象山縣竹實如小米可食李思齊攻張良弼詔和解之京師大飢壬寅二十二年春正月詔李思齊討四川張良弼討襄漢時兩軍不和故有是命大明取江西隆興諸路以額森特穆爾為中書右丞旺扎勒特穆爾為陜西左丞相二月丁丑朔盜殺陜西右丞塔布岱乙酉彗星見見於危宿光芒丈餘色青白丁酉犯離宫西星至二月終光芒長二丈餘三月戊申不見星形惟有白氣竟天西指掃大角壬子行過太陽前惟有星形無芒在昴宿至戊午始滅明玉珍陷雲南屯金馬山陜西參政徹爾特穆爾等擊敗之擒其弟明二加博囉特穆爾中書平章位第二李思齊攻張良弼良弼伏兵大破之夏四月丙子朔長星見其形如練長數十丈在虗危之間四十餘日乃滅乙亥熒惑不見離太陽三十九度不見當出不出五月賽富鼎敗走入海陳友定復汀州賽富鼎久據泉州福建平章揚珠布哈擊敗之其衆潰散入海陳友定遂復汀州中書參政陳祖仁上疏乞罷修上都宫闕祖仁上疏略曰自昔人君遇艱虞多難孰不欲奮發有為以光復前業茍不奉天道順人心而舉措失宜雖以守成猶或致亂况欲以撥亂反正乎上都宫闕自經兵火為臣子者所不忍言正陛下所當痛心疾首亟圖興復者也然四海瘡痍財用空竭驅疲民以供役使廢其田作何異扼其吭奪之食以速其斃乎且今日所當興復乃有大於此者假令上都宫闕未復固無妨於陛下之寢處使因是而違天道失民心或致隳廢大業則不可不深慮也願陛下以生養民力為本恢復天下為務親賢逺佞信賞必罰如是則承平之觀不日咸復豈止上都宫闕而已哉疏奏上嘉納焉明玉珍自稱隴蜀王遣兵守重慶分兵寇龍州犯興元鞏昌諸路六月辛巳彗嵗見紫微垣光芒長尺餘戊子掃上宰至七月乙卯始滅田豐等叛殺察罕特穆爾詔以庫庫特穆爾代總其兵時山東俱平獨益都孤城不下察罕環城列營重塹長闈攻具百道並進賊悉力拒守田豐王士誠陰與賊連謀復叛初豐來降察罕推誠待之不疑數入其帳中及豐謀變乃請察罕行營衆以為不可往察罕曰吾推心待人安得人人而防之左右請以力士從又不許乃從十一騎行至王信營又至豐營遂為王士誠所刺訃聞帝震悼公卿及四方之人男女老幼無不傷惜先是有白氣如索長五百餘丈起危宿掃太微垣太史奏山東當大水上曰不然山東必失一良將即馳詔戒察罕勿輕舉未至而已及於難詔贈河南左丞相封潁川王諡忠襄起復其子庫庫特穆爾為太尉平章知院代總其兵秋九月劉福通以兵援田豐庫庫特穆爾擊破之以蘇蘇為遼陽左丞相遣户部尚書托克托徹爾等徴糧于張士誠明年五月運十三萬石至冬十月庫庫特穆爾復益都田豐等伏誅庫庫既領兵銜哀討賊攻城益急而守者愈固乃穴地通道以入拔其城執賊首陳猱頭等二百餘人獻闕下而取田豐王士誠之心以祭其父餘黨皆就誅遣關保取莒州山東悉平庫庫本察罕之甥自幼養以為子云以佛嘉努為御史大夫樞密副使李士瞻上疏極論時政凡二十條一曰悔己過二曰罷造作三曰講論聖學四曰詢謀老成五曰去姑息六曰開言路七曰明賞罰八曰公選舉九曰察佞幸十曰嚴宿衛十一曰省佛事十二曰絶濫賞十三曰罷各宫屯種十四曰減常嵗計置十五曰招集衛兵十六曰廣闢屯田十七曰奬勸守令十八曰禮待藩鎮十九曰分遣大將急保山東二十曰依唐廣寧故事分道進取先是托和齊言乞罷三宫造作帝為減軍匠之半還𨽻宿衛而造作如故故士瞻首及之疏入不報是嵗加封先儒朱熹為齊國公贈熹父松諡曰獻靖癸卯二十三年春正月壬寅朔明玉珍僭號建國號曰大夏改元天統僭稱皇帝庚戌嵗星退犯軒轅大星二月庫庫特穆爾引兵還河南留索勒珠以兵守益都自還河南朝廷方倚之為安而博囉特穆爾自察罕既死數以兵爭晉冀雖屢詔諭解而讎隙日深評曰庫庫既克田豐等政當乘鋭收復中原諭告羣雄共奬王室乃引兵還河南為自安之計以爭晉冀則其心可見矣而朝廷方倚之以為安是果何倚乎三月辛丑朔彗星見東方經月乃滅丙午大赦廷試進士賜巴拜楊輗等六十二人及第出身有差分省于冀寧以平章阿治爾布哈涖立廣西行省以額爾吉納為平章時南方郡縣皆陷沒惟額爾吉納獨保廣西者十五年立膠東行省治萊州以袁宏為參政關先生餘黨復寇上都博囉特穆爾擊降之夏四月辛丑熒惑犯嵗星庫庫特穆爾遣兵攻張良弼初李思齊與察罕同起義師齒位相等及庫庫特穆爾總其兵思齊心不能平而張良弼孔興圗魯卜亦皆恃功懷異莫肯統屬遂成仇敵庫庫乃遣關保圭林齊西攻良弼於鹿臺而思齊與良弼合兵連不能罷評曰庫庫初統父兵不思效忠以靖國難既修怨博囉又開釁良弼兵連不解卒之無功以至國亡由是而言庫庫亦羣雄之一未可以言純臣也六月博囉特穆爾遣珠占襲據陜西庫庫特穆爾與李思齊合兵攻之貞遂降先是博囉遣方托克托迎匡福于彰德庫庫遣兵追之敗還匡福遂據保定庫庫部將屯兵藍田七盤李思齊攻興平據盩厔時博囉奉詔討襄漢而岱律阻道於前思齊踵襲於後乃請督庫庫東出潼關路通南討至是遣珠占等入陜西據其省治時左丞達實特穆爾與省臺有隙恐陜西為庫庫所有陰結博羅與珠占入城劫大夫旺扎勒特穆爾拘留不遣庫庫遣摩該合思齊兵攻之貞遂降庚戌星隕濟南龍山入土五尺壬戌太白晝見犯井秋七月戊辰朔京師大雨雹以馬良為中書參政河決東平慶元星墜聲如雷光數十丈久之乃滅八月丁亥朔倭人寇蓬州守將劉暹擊敗之大明討陳友諒戰于番陽湖友諒敗死其子理自立退保武昌遂圍之理改元德夀辛未太白犯左執法乙亥歲星犯右執法九月丁亥太白犯填星辰星犯亢張士誠自稱吳王來請命不報評曰名器固不可以假人然士誠比之他人猶有饋給軍餉之功况明玉珍陳友諒之徒皆僭大號朝廷不能禁也士誠稱王猶知請命獨不可以因而羈縻之哉明年徵海運糧士誠亦不與蓋自是無江浙矣詔遣使徵糧于張士誠士誠不與東南海運遂止於是嵗冬十月丙申朔山東赤氣千里博囉特穆爾遣兵攻冀寧庫庫特穆爾擊破走之先是庫庫侵博囉博囉奏其蹈襲父惡有不臣之罪乞賜處置至是博囉為庫庫所敗其將烏瑪喇殷興祖被擒軍遂不振十一月詔復故丞相托克托官爵臺臣奏托克托為相有大臣體修舉政務克濟艱危統兵平徐州收六合大功垂成浮言搆難就貶以沒已蒙録用其子還所收田産乞閔其勳舊給還宣命於是悉復其官爵召其子哈喇章為中書平章封申國公分省大同三寶帑知樞密院事殺太傅太平初上欲以巴咱爾為相辭曰臣老不足以任宰相若必以命臣非得太平同事不可於是密㫖令巴咱爾留太平毋還奉元太平行至沙井關聞命而止宿留久之皇太子惡其已去而復留也令御史大夫布哈劾太平違上命當正其罪詔拘收所授宣命吹斯戬因誣奏其罪安置土畨尋遣使至東勝逼令自裁年六十三評曰至正宰相惟太平德量深厚才識宏逺為時論所服故多爾而濟努都爾噶巴噶爾皆國勳舊拳拳推奬之不置不賢能若是乎當是時國勢日危朝政日亂奸邪視忠直如仇讐惟恐其去之不速而太平聞命即止宿留久之雖曰一飯不能忘君然忠不見信卒蹈危禍悲夫十二月以陳祖仁為甘肅參政時保布哈托歡內侍太子外結丞相吹斯戬驕恣不法御史傳公讓劾之忤皇太子意坐左遷治書侍御史陳祖仁乃上疏太子言御史糾正奸邪非一己之私言乃天下之公論臺臣審問尤悉故以上啓今殿下不察輒加阻抑使奸蠧情狀不得達於君父則亦過矣夫以二豎之微而於祖宗所遺之天下所立之臺諫漫不加恤可乎且殿下職止於監國撫軍問安視膳而豫奪賞罰之權自在君父今方育德春宫反使諫臣結舌凶人肆志豈惟君父徒擁虗器天下蒼生亦將奚望疏入太子大怒令大夫婁達實諭祖仁以所言雖是但托歡等初無是事御史糾言不實已與美除昔裕宗為太子凡事合奏者皆許啓聞非獨我今日如是也祖仁乃復上疏言御史所劾得之田野殿下所詢不出宫墻所以全此二人者正緣不知其奸故也然舉朝知之在野知之天下亦知之獨殿下未知耳且裕宗既領軍國重事理宜先閲其綱若至臺諌封章自是御前開拆假使必經東宫而君父或有差失諌臣上言太子將使之聞奏乎將寢抑之乎聞奏則傷父之心寢抑則陷父於惡殿下將安所處如知此說則今日言章不宜阻御史不可斥矣斥其言而美其除不知御史言為天下國家乎為一身官爵乎斥者去來者言言者無窮而美除有限殿下又將安處於是太子以其事聞二人皆辭退上又令婁達實諭㫖祖仁復言於上曰祖宗以天下傳之陛下今乃壞亂不可救雖曰天運使然亦刑賞不明所致區區二豎猶不能除况於大者願陛下顯斥二人勿令以辭退為名使海內明知賞罰則將士亦必效力天下可全若優遊不斷則臣有餓死於家誓不與之同朝牽連及禍矣上大怒時侍御史李國鳳亦言二人必當斥於是臺言自婁達實以下皆左遷而出祖仁為甘肅參政婁達實圖沁特穆爾叛奔大同二人得罪于東宫故叛附于博囉特穆爾元史續編卷十五
