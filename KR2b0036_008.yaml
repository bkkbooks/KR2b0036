body:
  text: 元史續編卷八明胡粹中撰壬子仁宗皇帝皇慶元年春正月敕振舉臺綱上諭御史大夫塔斯布哈曰凡大臣不法卿等劾奏毋避朕自裁之以多爾濟戩嗣淇陽王癸丑太隂犯太微東垣上相敕中書毋擬用翰林集賢儒臣上諭省臣曰翰林集賢儒臣須朕自選用毋輒擬奏人言御史臺任重朕謂國史院其任尤重蓋御史臺是一時公論國史院是萬世公論於是升翰林國史院為從一品評曰元世諸君雖不習於文字之學其所稟風氣完固天資淳厚故發言往往暗合理道如仁宗謂人言御史臺任重朕謂國史院尤重蓋御史臺是一時公論國史院是萬世公論至哉言乎雖知道之君子不是過也雖然持萬世之公論者苟不詢一時之公論以用其人則其所立言必非公論矣善乎劉因之言曰記録紛紛已失真語言輕重在詞臣若將字字論心術恐有無邉受屈人嗚呼任史筆者可不慎哉三月以達實哈雅為御史大夫癸酉車駕幸上都丙子太白晝見庚寅經天翰林學士承旨閻復卒復初為嚴實掌書記用王磐薦應奉翰林從幸上京賦詩規諷為世祖所知擢為學士尚書省罷世祖召問今欲用卿執政何如復謝不勝任世祖顧左右曰書生識義理存謙讓是也勿強嘗奉敕撰僧格輔政碑僧格敗坐免世祖曰使復以譽僧格得罪則朕亦嘗譽之矣乃不之罪成宗時召起為承旨嘗卜相於復復以哈喇哈遜對即召用之及是卒諡文康夏五月以阿薩爾為中書左丞相張閭為平章六月乙丑朔日食丁卯天雨毛秋七月賈鈞罷以許思敬為中書參政鈞以病告罷賜鈔三百定給安車還鄉九月以察罕為中書平章鄂博哈雅為參政冬十月辛未赦中書進三朝實録以吳澄為國子司業澄臨川人用力於聖賢之學初以程文海薦召至辭歸董士選復薦之至大初召為國子監丞至是遷司業澄嘗為教法四條一經學二行實三文藝四治事而未及用又嘗為學者言朱子於道問學之功多而陸子靜以尊德性為主蓋問學不本於德性則其教必偏于言語注釋之末故學必以尊德性為本議者遂以澄為陸氏之學非許氏尊性朱子本意未幾澄謝病去十二月李孟致仕以張圭為中書平章孟感知遇以國家為己任節賜豫惜名爵貴近惡其不便於己而心服其公無間言焉孟在政府雖多禆益而自視常不及因間請曰臣學聖人之學遭遇陛下堯舜之主而不能使天下為堯舜之民上負陛下下負所學乞罷政柄避賢路上曰朕在位必卿在中書其勿復言每入見必賜坐稱道復而不名嘗賜鈔十萬貫及令將作為治第孟辭曰臣布衣之際遇所望於陛下者非富貴之謂也悉不受因請告歸葬還朝懇求致仕又乞還國公印奏三上乃聽改和林行省為嶺北行省甲申熒惑鎮星辰星聚斗癸丑二年春正月以布哈為御史大夫安南犯邉以兵三萬餘犯鎮安州殺居民焚倉庫又陷祿洞等處分三道犯歸順州焚養和州二月特們德爾罷以圖呼嚕為中書左丞相以托歡塔喇罕為御史大夫丙午立皇后鴻吉哩氏丁未彗出東井夏四月乙亥車駕幸上都髙麗王章傳位于其子燾詔以燾為髙麗王詔以燾嗣王領征東左丞相章復命其弟嵩為世子五月以額卜德哷勒為中書平章巴爾托音為右丞鄂博哈雅為左丞圖勒噶特穆爾為參政六月乙未朔京師地震丙寅又震七月壬寅又震省臣奏乞避位不許先是圖呼嚕言臣職専燮理去秋至春亢旱民間乏食而又隕霜雨沙天文示變皆由不能宣上恩澤以致災異乞黜臣等以當天心上曰事豈關汝其勿復言至是以地震復請不允詔以宋儒周敦頤程皓程頤張載邵雍司馬光朱熹張栻吕祖謙及故中書左丞許衡並從祀孔子廟廷上都飢河決陳亳睢州開封陳留等縣漂民田廬秋七月辛卯太白晝見乙未丙辰復見丁巳經天八月戊午復見癸巳作佛事釋囚徒二十九人八月丁卯車駕還宫大風海溢以薛居敬為中書參政九月以諤勒哲知樞密院京師大旱疫上問弭災之道翰林學士程文海舉湯禱桑林事上奬諭之冬十月帝師多爾濟巴勒死桑莭扎實嗣明年又死衮噶諾爾布喇實嘉勒燦巴勒藏布嗣十一月詔行科舉初太宗九年因耶律楚材言命劉中歷諸路考試選士以論及經義詞賦為三科作三日程許専治一科能兼者聽取不失文義者為中選既而中沮世祖時王鶚獻計許衡立法皆未及行至是中書奏取士之法經學實修治之道詞賦乃藻繪之學隋唐以來専尚詞賦故士習浮華今擬専立德行明經科上然之乃下詔曰祖宗以神武定天下世祖皇帝徴用儒雅崇學校為育材之地議科舉為取士之方朕繼志述事祖訓是式若稽前代取士各有科目要宜以德行為首經術為先詞章次之浮華過實朕所不取爰命中書參酌古今定為條制其以明年八月天下郡縣興其賢能充賦有司次年二月會試京師朕將親䇿焉於是定諸色户內推舉年自二十五以上孝弟信義經明行修之士禮遣應試蒙古色目試二場第一場四書經問五第二場䇿問一漢人南人三場初場四書疑二經義一隨所治一經中場古賦一詔誥章表內科一道終場䇿問一天下選合格者三百人蒙古色目五十人漢人南人各七十五人赴會試者選一百人以二月初一初三初五日廷試以三月七日第一名賜進士及第從六品第二人以下及第二甲正七品第三甲正八品並賜進士出身國子生及伴讀願試者聽中選者於監學合得資品上從優銓注廷試揭榜進士謝恩賜恩榮宴進表謝行釋菜禮刻題名于國子監評曰人之資稟不同造就亦異故惇行者未必皆能文詞章者未必皆能修行是以漢之取士孝悌力田賢良方正孝亷居多而制䇿次之唐宋有能言極諫茂才異等召試館職之名不専於明經䇿試也元之科舉雖曰以德行為首經術為先然三場所試不過文詞亦何以考其德行哉且其立法定諸色户內推舉孝悌信義經明行修之士夫既曰孝弟信義經明行修矣則固無待於考試也今曰考試將考其孝悌信義耶抑考其修行耶斯二者皆非疑義賦䇿所可考也以疑義賦䇿考士不過可知其記誦之多寡行文之生熟耳名則是實則非也故自延祐甲寅逮至正丙午五十餘年孝悌信義經明行修之士雖能拔十一於千百而豪傑出衆之才終不肯俯就以求中有司之矩度是以不免棄璞於荆山遺珠於滄海卒之攀龍鱗附鳯翼以成我國朝興王之佐命也甲寅延祐元年春正月以劉正為中書平章髙昉為參政二月戊辰大寧地震四月甲申又震圖呼嚕髙昉罷以阿薩爾為右丞相趙世延為參政特們德爾録軍國重事三月壬辰太隂掩熒惑己亥白暈亘天貫日戊申車駕幸上都平章察罕致仕察罕在中書總持綱維得大臣體暮年居德安白雲山墅以白雲自號嘗入覲上望見曰白雲先生來也其被寵如此夏五月京兆立魯齋書院京兆為故儒臣許衡立魯齋書院降璽書旌之敕自今內侍勿授文階止授中官評曰王者出號發令何可輕也故書曰朕不食言又曰令出惟行勿惟反仁宗敕自今內侍勿授文階蓋懲武宗命爵之濫可謂善矣明年即授宦者續元暉昭文館大學士以至於僧沈明仁為榮祿大夫司空嚴吉祥為大司徒文吉祥為開府名爵之濫視前日抑又甚焉此元氏之治所以不能復古也秋八月戊子車駕還宫罷陜西行臺冬十一月以蕭拜珠為中書右丞達實密圖呼嚕知樞密院十二月復以李孟為中書平章上嘗與孟論用人之方孟曰人材所出非一途科舉得人為盛亦必先德行而後文辭乃可上深然其言復拜平章改封韓國公評失曰李道復之出處最為難知夷考其實則不過患得患而已當仁宗監國孟為參政損益庶務裁抑僥幸方是時君臣相得孟以一身任天下之重可也及武宗入立孟逃去不知所之蓋憂讒畏譏先事而去江湖之間樂之終身亦可也既而仁宗念其舊勞以譎對感動武宗遣使搜訪得之許昌當是時道復能如劉因受命而往拜職可辭可也既受密院之職中書之任則鞠躬盡瘁死而後已亦可也夫何受任未久則以歸葬請告致仕要君則不惟蹤迹髙峻不近人情而進退輕躁非人臣之義矣且其言曰臣學聖人之道遇堯舜之主而不能使天下為堯舜之民蓋欲庶幾乎伊尹者然太甲不明伊尹始終匡正未聞其避去也孟既致仕無復起之理不二年復為平章則其出處進退誠有不可曉者以愚度之其始逃也畏武宗之信讒而疑已其致仕也畏特們德爾之専政而軋己巳而特們德爾罷相雖再録軍國孟蓋瞷其寵眷漸衰不復顧忌所以幡然而復起歟由是而言非所謂患得患失者哉以齊履謙為國子司業初履謙與吳澄俱在國學教養有法二人罷去學制稍廢至是復以履謙為司業乃酌舊制議立升齋積分之法每季考其學行以次第升既升上齋踰再嵗始與私試孟仲月試經疑經義季月試詔誥章表䇿蒙古色目試明經䇿問辭理俱優者一分辭平理優為半分嵗終積至八分者尤髙等以四十人為額禮部集賢定其藝業及格者六人充嵗貢三年不通一經及在學不及一嵗者並黜之上從其議自是人人厲志多文學之士評曰昔伊川先生看詳學制請罷試為課以息爭敦讓齊履謙立升齋積分等法是誘之爭髙下也其何以為首善之地哉史臣以為自是人人厲志多文學之士夫文學之士多則德行之士少蓋不待言而自見矣乙亥二年春正月太白晝見二月戊子復見癸巳丙午經天乙亥詔遣使宣撫分十二道問民疾苦黜陟官吏並給銀印二月己卯朔以李孟知貢舉元明善等充考試官晉寧宣德等處飢三月乙卯廷試進士賜都克托里張起岩等五十六人及第出身有差先是至元乙酉三月乙亥太史奏文昌星明文運將興時世祖幸上京明日丙子上生於儒州是夜起岩亦生及上踐阼始設科取士而起岩遂為第一論者以為非偶然也丞相特們德爾平章李孟等奏下第舉人七十以上與從七品流官致仕六十以上與教授來遲及不試者依下第例恩分著為格從之張閭罷為江浙平章乙巳車駕幸上都加張留孫開府夏四月戊寅朔日食詔蠲天下逋欠稅課五月復立陜西行臺乙丑成紀縣山移是夜疾風電雹北山南移至夕河川次日再移平地突出土阜髙者二三丈陷沒民居加授宦者續元暉昭文館大學士江西湖廣飢以楊載為浮梁州同知載博涉羣書為文有迭宕氣年四十不仕召為翰林編修與修武宗實録調萬户府照磨科舉行載首應詔登第乃除同知浮梁州初趙孟俯得載所為文極推重之由是名動京師所著述人多傳誦其為文一以氣為主博而敏直而不肆自成一家言嘗語學者曰詩當取才漢魏而音節則以唐為宗自其詩出一洗宋季之陋評曰詩之為教本於溫柔和厚可以興觀羣怨其大要在得其性情之正而已欲得性情之正舍三百篇何以哉後世能詩者非不多然音節詞氣則皆靡矣元興言詩者稱范楊虞揭雖其推重一時然視唐人已瞪乎不可及况敢等而上之乎載之言曰詩當取才漢魏而音節則以唐為宗夫取才於漢魏則已畢矣而唐之音節又逺不及漢魏故杜甫稱李白曰清新庾開府俊逸鮑參軍又曰李侯有佳句往往似隂鏗其自謂則曰熟精文選理又曰續兒誦文選夫以李杜二公獨步唐人而所言猶若是則唐之音節不足宗可知也若曰取才於三百篇而音節以漢魏為宗斯可矣嗚呼若載也豈可謂知詩也哉秋七月畿內大雨水八月贛州民蔡五九反贛州賊蔡五九反陷汀州寧化縣僣稱王號詔江浙平章張閭討之己丑車駕還宫九月蔡五九伏誅餘黨悉平冬十月丙子朔客星犯太微垣以郭貫為中書參政特們德爾知樞密院事加特們德爾太師授僧沈明仁榮祿大夫司空十一月丙午客星變為彗犯紫微垣歷軫至壁十五宿二月庚寅乃滅赦以星變赦天下免各路差稅有差甲戌封皇姪和實拉為周王武宗長子也是為明宗左丞相阿薩爾等乞罷政不許阿薩滿言彗星由宰執非才願避賢路上曰此朕之愆其復乃職茍政有過差勿憚於改凡可以安民者乃悉言之庶上下交修天變可弭也丙辰三年春正月以瑪魯知樞密院詔免三省自實田租二年先是平章張閭言經理法世祖嘗行但其間多未盡實有以熟田作荒地者有懼差而析户者有富户買貧民田而仍其舊名輸稅者故小民病而賦入不增於是遣官經理河南江浙江西三省令民以其家所有田自實于官各位下及寺觀學校財賦一體從實自首各限四十日隱漏作弊者罪及流竄其田入官郡縣官失查勘致有漏失者論罪計三省自實官民田二百五十五萬六千餘頃然期限促迫富民黠吏並緣為姦以無為有虛具於籍者往往有之人不聊生盜賊並起弊反有甚於前者上思其言故有是詔時汴梁總管塔海亦言其害乃詔河南自實田每畝減半科收至泰定天厯盡革虛增之數民始獲安三月車駕幸上都太史令郭守敬卒守敬厯數水利得於家傳又與劉秉忠同學至元初用張文謙薦召見陳水利六事以為提舉諸路河渠治唐宋河堤皆復其舊後與王恂等更定新厯遷同知太史院恂卒繼為太史令其所撰厯書圖式最多並藏之官開通惠河陳水利凡十有一事河成兼提調漕運及是卒夏四月修殷比干墓唐狄仁傑祠敕衛輝昌平守令修治嵗時致祭以哈喇岱爾知樞密院褒賜淮東亷訪僉事苖好謙以善課農桑賜衣一襲五月甲申至戊申日赤如赭以拜特穆爾蕭拜珠並為中書平章鄂博哈雅為右丞郭貫為左丞布哈為參政六月追封孟軻父為邾國公母為邾國宣獻夫人河決汴梁封永隆特穆爾為保恩王以雅克特穆爾知樞密院秋八月以竒塔特為中書參政乙卯車駕還宫九月郭貫罷以王毅為中書右丞升縉山縣為龍慶州以帝生於其地特改今名癸丑太白晝見丙寅經天己未冀晉地震十月壬午河南亦震冬十月以髙昉為中書參政以趙孟俯為翰林學士承旨上在東宫素知其名及即位召除集賢侍講學士至是拜翰林承旨眷待甚厚呼子昻而不名又嘗以比唐李白宋蘇軾人有不悅者間之上皆不聽有上書言國史不宜令孟俯與聞者上曰趙子昻世祖所簡拔朕優以禮貌置之館閣使典述作此屬呶呶何也嘗敕賜鈔五百定既而曰中書每稱國用不足必持而不與其以普慶寺别貯鈔給之其見寵眷如此初趙孟俯用程文海薦起家為郎及文海為承旨致仕去孟俯代之先往拜其門而後入院人以為衣冠盛事十二月以圖呼嚕為陜西左丞相丁亥立皇子碩迪巴拉為皇太子太子仍兼中書令樞密使出周王和實拉鎮雲南和實拉不受命逃之漠北初武宗立上為太子時命以次傳於周王及議建儲丞相特們德爾欲固位取寵乃議以皇子為嗣碩迪巴拉既立為皇太子特們德爾又與太后幸臣實勒們譛周王於兩宫浸潤久之計遂得幸於是出和實拉鎮雲南次延安周王之臣圖呼嚕及武宗舊臣喇實等來會有嘉琿者與衆謀曰天下者我武皇之天下也出鎮本非上意由讒搆致然請聞之朝廷庶可杜離間遂與數騎馳去與陜西丞相阿斯罕平章塔齊爾西臺大夫托里貝中丞托歡發關中兵分道自潼關河中府入已而塔齊爾襲殺阿斯罕嘉琿王遂西走至金山西北諸王察罕台等咸來附評曰天下之事有理勝可以相校者惟君父之命為不可與校和實拉固武宗世嫡然仁宗在位親則叔父也分則君也君父有命其可與校乎雖曰有以次相傳之約出鎮為食前言然父雖不父子不可以不子君雖不君臣不可以不臣焉有不受命而逃者哉既不受命又挾藩臣發關中兵分道入冦則背叛之迹尤著矣人臣無將將則必誅敗走金山仁宗固含容而不討然無君之人要不可復立於天地之間它日文宗入立但當正以大義而廢之不當過為推讓以自取篡弒之惡也丁巳四年春正月以旺札勒為雲南平章壬戌冀寧地震授近侍旺札勒布哈翰林侍讀學士三月車駕幸上都以拜珠為大司徒拜珠安圗孫也夏五月以沁特穆爾鄂博哈雅並為中書平章竒塔特為右丞髙昉為左丞和卓張思明為參政額卜德哷勒罷六月特們德爾蕭拜珠罷開平人張弼家富弼死其奴索民財弗得驅之死治獄者教奴引弼子并鞠之丞相特們德爾受賂六萬緡不為直賀勝素惡其貪居同巷不與往來聞弼事以語御史中丞楊多爾濟楊多爾濟以語御史永隆特穆爾徐元素遂劾丞相逮治其左右事有驗上亦惡特們德爾欲誅之走匿太后宫太后為之請乃奪其印綬罷之以阿薩爾為右丞相王桂為參政額卜德哷勒為平章秋七月李孟罷以王毅為平章孟屢以老病乞罷上不得已從其請復以為承旨翰林日侍宴間禮遇尤厚乙丑成紀山崩土石潰徙壞田稼廬舍壓死居民監察御史馬祖嘗言山不動之物今而動焉由在野有當用不用之賢在官有當言不言之佞故然耳疏入大臣皆皆家待罪八月丙寅車駕還宫九月以博迪蘇為中書右丞相阿薩爾復為左丞相阿薩爾奏事畢上問曰卿等日所行者何事對曰奉行詔旨而已上曰卿等何嘗奉行朕旨雖祖宗遺訓朝廷法令皆不遵守夫法者所以辨上下定民志自古未有法不立而天下治者使人君制法宰相能守法則民知畏避免於事刑戮若法弛民慢怨詈並興求治難矣阿薩爾因言故丞相必用蒙古勳臣今臣回回人不厭人望因懇辭遂齊以宣政使博迪蘇為右丞相阿薩爾仍左丞相博迪蘇拉衮五世孫也評曰宰相之職寅亮天地燮調隂陽上以弼一人下以總百職不但遵祖宗遺訓守朝廷法令而已也夫法猶權衡也推移低昂則存乎其人故徒善不足以為政徒法不能以自行若以守法為能盡職則曹參之徒髙於臯夔稷契伊傅周召矣阿薩爾但以奉行詔旨為對固不知相之職業而仁宗責其不能守法亦豈足以盡任相之道哉京師産嘉禾一莖十一穗嶺北地震三日以圗們岱爾知樞密院戊午五年春正月甲戌懿州地震三月癸巳朔日食建鹿頂殿建於文德殿後書西天維摩經給金三千兩又書藏經給金九百兩銀一百五十兩三月戊辰廷試進士呼圗克岱爾霍希賢等五十人及第出身有差夏四月安吉王竒塔特布濟克卒以遷努史弼並為中書平章敬儼為參政張思明罷戊午車駕幸上都五月以伊拉齊為中書右丞德慶路地震隴西縣山崩術者趙子玉伏誅時衛王阿瑪噶貶髙麗子玉言於王府司馬曹塔布台曰阿瑪噶名應圖讖於是潛謀備兵器航海往髙麗取阿瑪噶至大都侯時而發行次利津縣事覺詔誅子玉等七人流諸王伊實等于江南布琳尼敦之叛伊實與錫里濟衛士托迪巴圗持兩端不助官軍進討敕流伊實江西錫里濟湖廣托迪衡州巴圗潭州鞏昌寧逺縣山崩秋八月車駕還宫以伊拉齊為中書平章髙昉為右丞和卓為左丞升音扎噶為參政冬十一月以忠嘉知樞密院己未六年春正月戊寅太隂犯心三月乙巳犯明堂甲戌又犯心七月壬戌八月丁巳亦如之二月丁亥朔日食特授僧從吉祥大司徒文吉祥開府初浮屠妙總統有寵上敕中書授五品官張思明執不可上大怒召見切責之對曰選法天下公器徑路一開來者雜遝故寧違旨受戾不忍隳祖宗成憲上心然其言而業已許之乃曰卿姑與之後勿為例乃以為萬億庫提點不與散官至是思明既罷遂超授從吉祥等官評曰浮屠氏之教以離塵絶俗清淨六根為事雖其身猶以為幻夫何有于爵祿况爵祿所以待天下之賢才所與共治者彼僧也於國無所事事而奚以官為哉張思明言之當而守之固可謂得大臣之體矣仁宗心然其言顧謂業已許之而與之夫天下之事患不知所以為是而入於非患不知所以為善而陷於惡如知其非與惡則速改以從善而已所謂業已許之姑與之云者是猶知烏喙足以殺人而固食之知水火足以焚溺而固蹈之其為愚也亦甚已哉三月以托克托呼為御史大夫封伊嚕特穆爾為恩王賜大興教寺鈔二萬錠夏四月以特們德爾為太子太師先是御史富珠哩翀言皇太子位正東宫既立詹事院以總家政宜擇年德老成道義崇重者為師保賔贊俾盡心輔導以廣緝熙之學制可乃以特們德爾為太子太師御史四十餘人劾其逞私蠧政難居師保之任不聽揚州火燒官民廬舍二萬三千三百餘區六月山東淮安諸處大水秋七月全寧守臣擅釋罪囚敕按之皇姊僧格喇實公主作佛事釋全寧府重囚二十七人敕按問其守臣阿從不法仍追所釋囚還獄八月以張思明為中書參政左丞相阿薩爾辭職上曰朕任卿未専耶對曰非近臣有撓政者耶曰無有然則何為而辭對曰臣自揆才薄恐誤陛下事若必欲任臣明願薦一人為助上問為誰阿薩爾再拜曰臣願得張思即日復拜張思明為參政庚子車駕還宫伏羌縣山崩閏月以御史大夫布呼為太師九月以徽政使多岱為太傅竒徹為中書參政冬十月以特穆爾布哈為御史大夫庚午太白晝見十二月以皇太子參決國政王毅罷毅以親老辭從之仍賜其父幣帛追封宋儒周敦頤為道國公庚申七年春正月辛巳朔日食上齋居服膳輟朝賀臺臣言比賜布爾罕丹山場旺扎勒布哈海舶稅會計其鈔皆數十萬定諸王軍民貧乏者所賜未嘗若是苟不撙節帑藏虛竭民益困矣省臣進曰臺臣所言良是若非整理朝綱法度愈壞乞罷臣等選任賢者上曰卿等不必言其各恭乃事癸未御大明殿受朝丁亥上不豫辛丑崩于光天宫夀三十六在位十年諡曰聖文欽孝皇帝廟號仁宗帝天性聰明恭儉通逹儒術妙悟釋典嘗曰明心見性佛教為深修身治國儒道為切又曰儒者可尚以其能維持綱常之道也平居服御質素淡然無欲不事遊田不喜征伐不崇貨利事皇太后終身不違顔色待宗戚勳舊始終以禮其孜孜為治一遵世祖之成憲云甲辰博迪蘇罷太后以特們德爾為右丞相二月壬午以赫嚕為中書平章杖中書參議吹斯戩坐鬻官刑部以法當杖太后命笞之太子曰不可法者天下之公卒正其罪評曰省臣鬻官法固當杖杖之所以辱之也笞與杖均之為辱雖從太后之命何害其為法也哉夫刑不上大夫參議中書執政之亞也杖而辱之不亦輕朝廷乎曷若貶而斥之為能全其國體也沁特穆爾托歡罷沁特穆爾罷平章托歡士罷大夫並為集賢大學以趙榮為中書平章茂巴爾為右丞張思明為左丞和卓罷治妖僧沈明仁罪先是省臣奏明仁強奪民田二萬頃誑誘愚俗十萬人私賂近侍妄受名爵已奉旨追奪請汰其徒還所奪民田其諸不法事宜令究問仁宗曰朕知是人姦惡其嚴鞫之既而江浙平章赫嚕言明仁擅度僧四千八百人獲鈔四萬餘定已辭服今遣其徒沈崇勝赴京行賂求援請逮赴江浙併治其罪從之至是始正其罪其冒度僧者籍為民削奪李孟官爵奪其平章國公制命仆其先墓碑額卜德哷勒鄂博哈雅罷額卜德哷勒為甘肅平章鄂博哈雅為湖廣平章特們德爾殺前中書平章蕭拜珠御史中丞楊多爾濟初楊多爾濟佐仁宗定內難有功李孟嘗稱其為侍從人材第一以剛直聞拜侍御史中丞特們德爾之再相也蕭拜珠為平章稍牽制之楊多爾濟又以糾正其罪為己任於是發張弼之獄仁宗震怒為不御酒數日因盡誅其大奴及同惡數人特們德爾逃匿不能得多爾濟持之益急近臣以太后旨召多爾濟至宫門責以違旨對曰待罪御史奉行祖宗法以得罪人非敢違太后旨也仁宗不忍重傷太后意但罷其相位而已及是仁宗崩特們德爾復入相乃宣太后旨召蕭拜珠楊多多爾濟與徽政使圖勒們御史大夫托克托呼責問之爾濟曰中丞之職恨不即斬汝以謝天下果違太后旨罪汝豈有今日耶特們德爾乃復引同時御史二人證其多爾濟唾之曰汝等備員風憲為是狗彘事耶皆慙俯首遂執二人載諸國門之外殺之是日風沙晦冥都人恟恟道路相視以目以旺札勒布哈為湖南宣慰使司農卿旺札勒布哈言先帝以土田頒賜諸臣者悉宜歸之官太子問所賜為誰對曰阿薩爾薩爾所得最多太子曰卿於先朝嘗請海舶之稅以阿奏而止今卿所言乃復私怨非公議也遂出之湖南三月庚寅皇太子即位大赦尊皇太后為太皇太后皇后為皇太后特們德爾進開府上柱國太師乙未日暈連環貶李孟為集賢侍講學士悉奪所受制命罷設行省丞相於是河南丞相額森特穆爾湖南丞相多爾濟迪音並降本省平章惟征東丞相髙麗王不降徴理在京錢榖命平章王毅徴理在京倉庫虧欠錢穀凡為糧七十八萬石責償於倉官及監臨出納者幣帛紕繆者責本處經該官吏償之以拜珠為中書平章拜珠為人宏逺端亮綽有祖風初襲為宿衛長遷太常禮儀院使太子聞其賢召之辭曰嫌疑君子所慎拜珠長宿衛而私侍東宫拜珠固得罪亦豈太子之福耶卒不往近臣獻七寶帶却之有獻七寶帶者因近臣以進上曰朕登大位不聞卿等進賢而為人獻帶是以利誘朕也其還之評曰人君之德莫大於賤貨而貴德克己以從諌然不出於中心之至誠則始勤終怠先得後失無以成其德垂令名於無窮也英宗初立責近臣以不進賢而為人獻帶從張養浩之諫而罷元夕張燈使出於中心之至誠進而不已其為盛德豈可量哉未幾即以製珠衣工緩杖其將作院使則是非真能賤貨而貴德者矣以諫造寺而殺御史觀音保等則是非真能克己以從諫者矣書曰德惟一動罔不吉德二三動罔不凶英宗二三其德如此能無南坡之及乎戊辰車駕幸上都夏五月特們德爾殺上都留守賀勝勝仁傑子也嘗從世祖征納延乘輿夜行足苦寒勝解衣以身溫之一日獵還伶人蒙采衣作獅子迎駕輿象驚逸不可制勝投身當象前得斷靷縱象乘輿乃安由是親寵代父為留守阿薩爾竒徹以勝發張弼之獄怨之乃誣勝迎詔書乘賜車不敬殺之阿薩爾竒徹罷阿薩爾為嶺北平章竒徹為集賢學士以拜珠為左丞相鼐喇固達實哈雅並為平章濟爾哈朗為參政殺嶺北平章阿薩爾中書平章赫嚕御史大夫托克托呼徽政使實勒們或告阿薩爾等與故約蘇穆爾妻伊埒薩巴謀廢立拜珠請鞫狀上曰彼若以太皇太后為詞奈何命悉誅之籍其家評曰廢立大事也非衆議不易行彼告宰相謀廢立則固有助之者矣不得其實而輒行誅伐可乎若慮其以太后為詞而先誅以滅口亦非也夫使其事固出於太后誅其人而不白其事太后之心固不能安茍太后素無此謀誅其人而不究其非則太后之心愈不安矣况大臣受誣國家濫刑皆危亡之事英宗初政若此其不能終宜哉以特們德爾為中書平章六月京師疫以喀喇托克托為御史大夫特穆爾布哈竒徹並知樞密院鼐喇固罷以亷恂為中書平章上太皇太后尊號號儀天興聖慈仁昭懿夀元全德大寧福慶徽文崇祐太皇太后河南飢上問其故羣臣皆莫對上曰良由朕治道未洽卿等又不盡心乃職隂陽不和災害荐至自今各務勤恪以應天心毋使吾民重困修祕密佛寺于延春閣詔上書言事者徑直以聞特們德爾等奏比詔內外直言得失今上封者或徑至御前乞令臣等開視乃入奏聞上曰言事者當直至御前如細民訴訟者則禁之評曰特們德爾欲先開視羣臣言章與魏相白去副封異矣其意不過欲壅蔽人主之視聽以肆其姦惡耳英宗能覺其姦亦可謂明哲之主然惡惡而不去宜其及於難也翰林學士和塔拉都爾默色譯進大學衍義上曰修身治國無踰此書賜鈔五萬貫秋八月下四川平章趙世延獄特們德爾以世延嘗劾其姦仁宗崩即遣使逮捕誣以不敬下獄請殺之并究治省臺諸臣上不允他日上幸涼亭從容謂近侍曰頃特們德爾必欲置趙世延於死地朕素聞世延忠良故每奏不納左右咸稱萬嵗世延由此得免賜女巫巴約特鈔萬五千緡益津縣雨黑霜九月建夀安寺給鈔一千萬定命丞相拜住督工冬十月杖將作院使伊蘇坐董製珠衣緩也戊午車駕還宫乙亥幸大護國仁王寺大賚諸王百官以登極故也計金五千兩銀七十八萬兩鈔一百二十一萬一千貫幣五萬七千三百六十四匹帛四萬九千三百二十二匹木綿九萬二千六百七十二匹布二萬三千三百九十八匹衣八百五十九襲鞍勒弓矢各有差十一月詔各郡建帝師殿以奉帕克斯巴其製視孔子廟有加髙昉罷十二月乙巳朔詔改元詔改明年為至治元年庚戌鑄銅佛像以庫春貝知樞密院茂巴爾罷以濟爾哈朗為中書右丞薛處敬為參政江浙平章巴延徹爾江西平章白薩敦有罪免並坐貪墨免官元史續編卷八
