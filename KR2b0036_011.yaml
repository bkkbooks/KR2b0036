body:
  text: 元史續編卷十一明胡粹中撰庚午至順元年春正月命趙世延等纂脩經世大典以巴延特穆爾為遼陽左丞相雲南諸王圗沁叛攻中慶路陷之圗沁及萬户布呼阿哈集賽等叛陷中慶殺亷訪司官執右丞錫都等以薩敦知樞宻院蔡文淵和尚並中書參政二月壬午朔以史惟良為中書左丞趙世安為御史中丞封皇姪額琳沁巴勒為鄜王明宗子也帝及皇后並受佛戒以鄂博哈雅為中書平章阿爾斯蘭哈雅南臺大夫多爾濟罷臺臣言其紊亂銓選貪汚著聞詔罷之以巴延知樞宻院詔諭中書曰昔世祖嘗以宰相一人總領庶務故政治出於一今雅克特穆爾為右丞相巴延既知樞宻院事左丞相其勿復置令民輸粟補官時内外旱災雅克特穆爾請行納粟補官之令於是定江南萬石者官正七品陜西千五百石河南二千五百石江南五千石從七品其餘品級有差於茶鹽錢榖官内叙用四川有能輸粟江陵者同河南例不願仕乞封父母者聼僧道輸已粟者加二字至六字師號勅贓罰銀鈔給大糦宗禋院以御史䑓贓罰鈔萬定金千兩銀五千兩付大糦宗禋院供祭祀評曰古者天子諸侯躬耕藉田以供宗廟粢盛王后夫人蠶繅以為衣服夫以天下國家之富貢賦所入豈不足以供祀事而必若是者敬之至也元文宗勅御史䑓以贓罰銀鈔供祀宗禋慢而不敬甚矣夫水曰盗泉仲尼不飲貪吏賄賕乃以薦諸上下神祗神其享之乎奎章閣學士和塔拉都爾黙色薩勒迪虞集辭職詔不允詔諭之曰昔我祖宗睿智聰明於致理之道自然生知朕以早嵗政渉艱阻既乏生知之明懵於治體故立奎章閣置學士員日以祖宗明訓古今治亂得失陳說於前使朕樂於聼聞卿等當推所學以稱朕意其勿復辭圗沁自立為雲南王偽授布呼為丞相阿哈呼喇呼為平章署置其餘官吏以兵攻晋寧州立城柵焚倉庫以拒命三月詔封皇子喇特納達喇為燕王徙吳王普爾普為濟陽王濟陽王瑪納濟為呉王廷試進士賜圗烈圖王文曄等九十七人及第出身有差命豫王喇特納實哩等將兵討雲南以河南平章徹珠為雲南平章八畨順元宣慰使特穆爾布哈為右丞從豫王由八畨道進討羣臣上尊號號曰欽天統聖至徳成功大文孝皇帝夏四月壬午朔命西僧作佛事於仁智殿自是日至十二月終罷辛丑明宗皇后班布爾實崩烏蒙土官禄余等叛附於圗沁禄余殺烏薩宣慰司官吏降於布呼羅羅諸蠻俱叛與布呼相應平章特穆爾布哈遇害禄余又以蠻兵抵烏撒順兒界立關拒守重慶五路萬户軍至雲南境值羅羅蠻萬餘人戰敗千户祝天祥引餘衆遁還五月賜故四川平章科綽等贈諡科綽及亷訪使和塔拉揚阿克皆為囊嘉特所害並賜贈諡榆次縣主簿台布特穆爾河中府通判塔塔爾皆為遼東軍所害並加褒贈戊午詔改元改今年天厯三年為至順元年羅羅斯土官薩斯嘉等叛附禄余薩斯嘉及阿漏土官阿剌里州土官徳益俱叛附禄余詔發諸道兵討雲南江浙河南江西三省調兵二萬命諸王約蘇圖卜特穆爾及樞宻院判洪淶將之與湖廣平章托歡㑹兵進討四川行省亦進軍至烏蒙戊辰車駕幸上都以伊拉齊為中書平章立雲南行樞宻院以徹爾特穆爾知院事特黙齊為同知嘉琿為副使發朶甘思朶思麻及鞏昌諸處軍萬三千人人乘馬三匹徹爾特穆爾等由四川嘉琿等從豫王由八畨分道進兵河溢大名殺知樞宻院庫春貝托克托穆爾等十二人庫春貝托克托穆爾及通政使濟爾哈朗翰林承㫖嘉琿達巴延額布根燕王宫相嘉琿達烏魯斯中政使尚特嘉努托噶台右阿克蘇衛指揮使諾海齊拜珠等疾雅克穆爾權勢崇重欲謀害之伊徳黙色圗們以變告按問並棄市籍其家秋七月以額爾吉納知樞宻院評曰額爾吉納前為雲南丞相不能正身格物以致叛亂羣下逐之逃入八畨今還京師當付諸司冦正其失守之罪乃更授以元樞之職甚矣文宗之無政刑也况樞府掌天下之戎政以禁暴禦侮不能撫馭一方至於見逐其何以任天下之重哉中書奏請節用省臣言近嵗帑稟空虚其費有五一賞賜二作佛事三創制衙門四濫冐支請五續増衛士請與院䑓及各集賽官同議减省從之河間海溢漂没運司鹽凡二萬六千七百餘引將作院使索珠等有罪誅索珠特們徳爾子也與弟觀音努姊夫太醫院使額爾哈雅坐怨望造符籙祭北斗咒詛事連刑部尚書烏瑪喇前御史大夫博囉上都留守瑪爾及額爾哈雅姊烏訥實宻遜俱坐誅籍索珠家産給大承天䕶聖寺為永業趙世延罷御史葛明誠奏世延年踰七十智慮耗衰固位苟容無補於事請斥歸田里詔中書議雅克特穆爾言世延向自陳致仕陛下以舊臣宜與共政中書御史之言盖不知前日有㫖也上曰如御史言世延固難任中書矣其仍任以翰林奎章之職以托音納爾為中書參政兩浙江東水沒民田五萬一百八十頃飢民四十萬五千五百餘户以奈瑪台謹濟勒並知行樞宻院事奈瑪台封宣寧郡王駙馬謹濟勒封鄆國公八月己未車駕還宫沙汰衛士省院䑓官奏定擬大内四宿衛每衛不過四百人累朝宿衛各不過二百人鷹坊萬四千二十四人當减四千人内饔九十九人及集賽當留者各百人累朝舊邸宫分饔人三千二百二十四人當留者有一千一百二十人媵臣集賽口共萬人當留者六千人其汰斥者歸本部著籍應役有容匿濫充者集賽官與其長杖五十七没家貲之半賞告者令監察御史常察之制可九月遼陽平章哈喇特穆爾嶺北平章哈巴爾圗坐罪免御史葛明誠劾奏哈喇特穆爾嘗坐贓杖免今復任宰執控制東藩亦足以見國家名爵之濫斥退黜罷為宜多羅台王文若奏嶺北鎮先朝太師伊徹察喇太傅哈喇哈遜為左右丞相保安邉境遂無北顧之憂今哈巴爾圗素無名譽號稱庸鄙錢榖甲兵懵無所知且以二相居前而繼以斯人賢不肖較然理宜罷斥並從之竄蘇蘇於雷州䑓臣劾奏蘇蘇叨居台鼎專肆貪淫兩經杖斷一百七幸䝉恩宥量徙湖廣不復畏法自守而乃汚濫百端乞屏逺裔以示至公詔永竄雷州史惟良罷以張友諒為中書左丞惟良再辭職詔允其請賜鈔百定癸巳白虹貫日封阿嚕為西靖王阿嚕阿瑪噶之子也又封阿固察為廣寧王瑪展為永寧王冬十月羣臣請立皇太子不許上曰卿等言誠是但燕王尚㓜徐議之未晩也薩敦騰吉斯並賜號達爾罕辛酉始親祀南郊上將親郊太常奏儀注已具有未盡者按前代典禮議行從之始服大裘衮冕以太祖配享蓋自世祖混一四海未遑正郊祀之禮至元三十一年四月成宗即位始為壇於都城七里遣司徒烏都岱率百官為大行皇帝請諡南郊為告天請諡之始大徳六年三月庚戌合祭天地五方帝遣左丞相哈喇哈遜行禮為攝祭天地之始十一年七月武帝即位命御史大夫特們徳爾告謝南郊為即位告謝之始英宗至治二年有旨議郊禮以太皇太后崩而止至是凡七世而南郊親祀之禮始克舉焉然品物儀注益加詳慎矣十一月甲戌熒惑退犯鬼宿積尸氣黜罷陜西左丞克呼及御史中丞華善䑓臣言陜西左丞克哷受人僮奴及鸚鵡請論如律上曰克埒官至宰執位重禄厚猶受人生口理宜罪之但鸚鵡㣲物以是論贓失於太苛其從重者議罪因勅自今饋禽鳥者勿論又奏中丞華善受婦人為贓遇赦見原然其人貪縱有汚䑓綱理宜追奪制命禁錮終身制可評曰饋禽鳥者勿論即鞭鞾受亦無傷之意也夫為人君者既知存大體以全待臣之禮則為人臣者當愈謹小節以明事君之義上下之間各盡其道而已矣不可遽謂不以論罪而受之也十二月立皇子燕王喇特納達喇為皇太子御史言昔裕皇由燕邸正儲位世祖擇耆臣王顒姚燧蕭㪺為之師傅賔客今宜慎選耆徳正學之臣輔導太子以宏養正之功上嘉納之大赦辛未二年春正月御製奎章閣記上嘗至閣中命取國史閱之左右舁匱以徃院長貳無敢言者編脩官吕思誠獨跪奏曰國史紀當代人君善惡自古無天子取觀之理遂止評曰古人有言守道不如守官故齊太史書崔杼之惡兄弟死者三人且國史紀當代人君善惡自古無天子取觀之理文宗非不知之但習聞唐太宗時史官進觀實録故欲舁匱以徃院長貳黙不敢言蓋畏觸忤而苟阿順耳吕思誠以一編脩獨抗言執奏可謂能守官矣文宗聞諫而止不亦尤賢乎哉雲南叛賊布呼伏誅行院奏去年十一月仁德府官庫楚集兵討雲南敗布呼于馬龍州殺布呼弟布延又戰於金馬山獲布呼及其弟巴延徹爾其黨拜布哈巴延特穆爾等十餘人誅之餘衆皆潰獨禄余獨鑿金沙江不下詔趣兵進討加僧寳峯司徒寳峯大承天䕶聖寺住持也四川兵擊禄余於七星關官軍至烏撒周泥驛禄余阿奴阿荅等率衆萬人進自山後間道潛出四川省臣庫楚圖卜特穆爾等擊屢戰敗之又戰於七星關六日凡十七戰賊兵大敗潰去辛卯皇太子喇特納達喇薨己酉白虹貫日二月收復雲南鎮西武靖王吹巴勒㑹豫王喇特納實哩及行省院兵十餘萬討雲南期伊哷特穆爾至三洦即及蘇爾約蘇㑹于曲靖馬龍等州遂進趨金沙江與阿哈軍相值戰敗之阿哈偽降分兵為三隊來襲吹巴勒等分十三隊擊敗之阿哈走大軍直趨中慶阿哈來迎戰遂就擒斬于軍前官軍垂及中慶賊兵七千猶拒戰伽橋下古壁口流矢中伊埒特穆爾左頰洞耳後拔矢復戰大㨗遂復行省治諸軍皆駐城中分兵追捕阿哈兵射中禄余降其民烏蒙東川諸部蠻兵夷獠皆欵服流蘇蘇徹爾特穆爾巴勒丹於廣海湖廣參政徹爾特穆爾與蘇蘇巴勒丹坐出怨言事覺鞫問欵服刑部議徹爾等杖一百七處蘇蘇死㑹赦流徹爾廣東巴勒丹廣西蘇蘇徙海南禁錮終身壬子太白晝見又犯昴以巴咱爾為中書平章多爾濟巴勒為參政髙履亨許有壬並為㕘政安置郯王徹辰圗於廣州坐妄言不道也三月丙戌雨土霾燕南亷訪使布扎爾坐贓遠竄坐前任福建受贓計鈔二萬二千餘定金五百餘兩銀三千餘兩男女二十二口他寳貨無算䑓臣言雖經赦宥乞追奪流竄詔如所請既而又劾江浙平章通通荒佚宴安才非輔相大都總管劉原仁稱疾久不視事及遷同知儲政院即就職僥倖巧宦避難就易工部尚書蘇炳性行貪邪詔皆罷之司徒香山陳符䜟香山言陶𢎞景胡笳曲有負扆非天厯終是甲辰君之語暗合陛下生年紀號受命寳之符乞録付史館頒示中外詔翰林集賢奎章禮部雜議於是諸儒臣咸謂𢎞景之曲雖於生年紀號若偶合者然陛下應天順人紹隆正統無待於旁引曲說以為符命從其所言恐啟䜟緯之端非所以定民志事遂寝浙西水旱諸路飢民八十餘萬人夏四月開全寧錫場全寧民王托歡獻銀礦詔設銀場提舉司𨽻中政院真定武陟地震逾月不止雲南平豫王等既復中慶與鎮西武靖王吹巴勒擒雲南諸賊額布呼根羅羅托克托穆爾博勒巴居澄江總管羅羅布哈布之叔沁逹罕偽署萬户哈喇岱爾及諸將校悉斬之遣使告㨗吹巴勒因言䝉古軍與哈喇章羅羅斯諸種人叛者或誅或降雖已畧定餘黨逃竄山谷不能必其不反側請留荆王額布根及諸王索諾木各領所部屯駐一二年以示威重餘軍皆遣還時已命特黙齊為平章遂令總制境内軍事五月額爾吉納罷以塔布台知樞宻院額爾吉納罷知行院加太尉伊埒布哈罷丙申車駕幸上都辛丑太白經天六月丁未晝見翰林學士呉澄卒澄泰定間辭歸臨川四方㳺學者千數百人從之著書至將終不輟有易書春秋禮記纂言學基學統二篇校定皇極經世書大戴禮太𤣥經老子莊子及樂律八陣圖郭璞葬書初澄所居草屋數間程文海題曰草廬學者因稱為草廬先生年八十五卒贈臨川郡公賜諡文正秋七月給衍聖公三品印藝文少監歐陽𤣥言衍聖公爵最五等秩登三品而用四品銅印不稱詔鑄從三品印給之評曰聖人道徳尊崇貴及後嗣不在乎爵秩也爵之崇卑秩之厚薄不係乎印也當是時朝臣之賢否國政之得失𤣥舎此不言而屑屑於衍聖公之印陋已哉曲赦雲南官軍還烏撒羅羅蠻復殺戎軍黄海潮等撒加伯又抄掠良民為亂命行省及行院凡關戍兵未可輕撤宜視緩急以制其變至是以禄余等懼罪竄伏降詔曲赦之竄竒徹台於廣東御史張掖言竒徹台在英宗朝陰與約爾珠謀誣告托歡徹爾異圖辭連潛邸致出居海南及道拉實據上都遣竒徹台以兵拒命疑其有異復擒以歸即追言約爾珠之謀以自解陛下不念舊惡擢任中書又因罪宥為四川平章今雲南未靖蜀境相接其人反覆難信宜竄斥之詔削官職并妻子禁錮於廣東仍勅御史凡憸人如竒徹台者其極言之毋隐於是䑓臣復言儲政院使哈扎圖布哈侍潛邸時受絹七十九匹又盗用庫物天厯初領兵盧溝橋遇敵即逃擅閉城門惑衆度支卿納克楚嘗匿善馬又矯増制命臣等議其罪宜杖除名從之以塔布台為御史大夫封巴延為浚寧王八月甲辰朔日食乙卯太白犯軒轅大星江浙水害稼田十八萬八千七百三十八頃詔皇子古嚕逹喇養之於雅克特穆爾家市諤爾根薩哩宅居之海南王周作亂討平之周糾率十九洞黎蠻二萬餘人為亂調廣東福建兵𨽻湖廣右丞伊喇薩納統領討捕平之萬安寺僧嚴吉祥有罪詔免其官司徒坐盗公物畜妻子也明年有㫖復還其印評曰盗公物干國典畜妻子違佛戒以彼之教律參此之法令嚴吉祥死有餘罪矣今乃僅免其官夫官非僧所宜受雖免其官為僧固自若也又况明年復還其印乎太湖溢漂安吉呉江民三千九百餘家九月禄余復冦雲南行省都事諾海死之東川總管普折兄那具㑹禄余兵殺烏撒宣慰使伊埒等共二十餘人又㑹其伯福姪阿福領䝉古兵擊羅羅斯行院以兵與賊五戰破之行省闕禄余拒遣都事諾海等奉詔徃諭禄余授以參政制命不受俄而賊大至諾海力戰乃還烏撒兵入順元境左丞特穆爾布哈禦之諾海復就陣宣詔招諭遂遇害特穆爾布哈斂兵還蒙古元帥齊喇引兵擊阿哈賊黨破其柵殺五百餘二人圗沁之弟必里克圗庫圗齊舉家赴海死獲圖沁弟人子三人誅之十一月壬申朔日食以耿煥為中書參政詔養雅克特穆爾之子塔喇海於宫中評曰以文而觀皇雅子古嚕逹喇養於克特穆爾之家而雅克特穆爾之子又養於宫中若周鄭交質然然其實則崇信異端惑於災福致君臣易位上下䙝狎豈所以正名分而絶覬覦也哉卒之騰吉斯作亂而塔喇海從坐伏誅然後知文宗寵愛之適所以禍之也十二月丁巳雨木冰河東亷訪副使和濟格爾等有罪免及燕南亷訪僉事闕不振免王士元郝志善並坐統綱官癸亥雨木冰壬申三年春正月髙麗王燾復位初燾以有疾傳位於其子楨至是疾愈復位以伊埒布哈為西臺大夫三月洛水溢皇子古嚕達喇更名雅克特古斯諸王伊埒特穆爾謀反伏誅安西王阿南逹之子伊埒特穆爾與輝和爾僧烏尼徳巴迪爾班第國師必嚕匝納實哩沙津阿固齊謀不軌鞫之獄成二人並皆誅夏四月戊申大寧地震命有司為巴延建祠立碑於汴梁五月雲南諸路饑詔蠲本省田租三年戊寅京師地震丁酉白虹並日出長竟天乙巳天鼓鳴於西北六月己亥朔赦録用多岱王士熙托歡等以趙世安為中書左丞秋八月乙巳天鼓鳴於東北己酉帝崩夀二十九在位五年諡曰聖明孝元皇帝廟號文宗九月辛巳地震冬十月庚子鄜王額琳沁巴勒即皇帝位初明宗有二子長曰托懽特穆爾出居静江次曰額琳沁巴勒文宗愛之得留京師封鄜王至是丞相雅克特穆爾以皇后命立鄜王為皇帝年七嵗矣大赦天下詔曰太祖啟闢疆宇世祖統一萬方成武仁英列聖相承厯數之歸實當自我明宗皇帝文宗皇帝文皇登極之始即以讓兄之詔明詔天下明宗朔方言還奄棄臣庶文宗洊正宸極仁義之至視民如傷恩澤之加無間逺邇顧育眇躬尤篤慈愛賔讓天之日皇后傳顧命於太師丞相雅克特穆爾等推固之初志以宗社属諸大兄之世嫡長諸王宗親同奉遺詔謂朕宜御神器以至順三年十月初四日即皇帝位大赦天下兩都及興和路免差稅三年腹裏郡縣稅糧免十之二江淮以南免夏租二分諸土木工役母剏造民間逋欠差稅課程盡行蠲免䑓憲及内外三品以上正官嵗舉才堪守令者一人廣海雲南梗化之民詔到限六十日内許出官免罪以薩敦為御史大夫薩勒迪為中書平章竒爾濟蘇為右丞圗勒噶特穆爾知樞宻院己酉太白犯斗十一月壬辰帝崩謚冲聖嗣孝皇帝廟號寧宗皇太后遣中書右丞竒爾濟蘇迎皇姪托歡特穆爾於静江初明宗北狩納哈爾努特氏女曰瑪里達生托歡特穆爾至順初明宗后班布爾實被讒遇害遂徙托歡特穆爾于髙麗使居大青島中尋移廣西之静江及文宗崩雅克特穆爾請立皇子雅克特古斯皇后不從命立鄜王及是崩雅克特穆爾復請立雅克特古斯后曰吾子尚幼托歡特穆爾在廣西今年十三矣且明宗之子理當立之乃遣竒爾濟蘇往迎評曰常人之情孰不親其所生况婦人之情尤憐愛其㓜子今文宗皇后排大臣之議捨親愛之子親挈大寳兩授其姪擁佑之勤至誠無間可謂以至公為心者矣厥後順帝信讒既行廢黜又親弑逆豈非萬世之罪人歟癸酉四年十月順帝改元統元年春正月癸酉太白晝見己亥鎮星退犯太微東垣上相三月雅克特穆爾卒雅克特穆爾自秉大權以來挾震主之威肆行無忌一宴或宰十二馬取泰定后為夫人前後尚宗室女四十人或有交禮三日遽遣歸者而後房充斥不能盡識一日宴趙世延宅男女列坐名鴛鴦㑹見座隅一婦甚麗意欲與俱歸顧左右曰此為誰對曰此自太師家人也至是荒淫日甚體羸溺血又以明宗崩實首謀逆恐皇子即位追前事故宿留數月不使登極而心志日以瞀亂遂卒夏五月戊寅京師地震六月己丑皇姪托懽特穆爾即皇帝位皇姪至自静江百官具穆鹵簿迎於良鄉雅克特爾既見與並馬徐行具陳迎立之意皇姪㓜且畏之一適無所答雅克特穆爾疑其意不可測故至京久不得立太史亦言皇姪不可立立則亂天下用是議未能决遷與延數月國事皆决于雅克特穆爾俄而病死皇太后乃大臣定議立皇姪為皇帝且曰萬嵗之後其傳於雅克特古斯遂奉上璽綬詔曰太祖世皇奄有四海列聖相承肆我皇祖武宗入纂大統致和之季皇考明宗皇帝逺居朔漢文宗皇帝定難克讓及皇考賔天洊正宸極治化方隆奄棄臣庶皇太后召大臣謂曰昔庫春貝托克托穆爾謀逆以明宗太子為名後逆臣既正其罪太子遂遷於外先帝深知其妄大漸顧命有曰大位其以朕兄乃子繼之時朕逺征南服立朕弟額琳沁巴勒以安百姓遂至於大故皇太后體承先志以武宗元孫明宗世嫡在予一人遣使迎還宗王大臣合詞推戴以至順四年六月初八日即皇帝位其赦天下以巴延為太師中書左丞相薩敦為太傅左丞相大霖雨京畿水平地丈餘飢民四十餘萬黄河溢江淮旱饑秋七月以馬祖常為御史中丞祖常伊囉勒琨雍古特部人八月鞏昌徽州山崩立皇后巴約特氏后雅克特穆爾之女奎章閣侍書學士虞集致仕集初以目疾乞解職舉治書侍御史馬祖常自代不報及祖常遷中丞光人龔伯燧游其門求集為薦引集以其非逺器不可祖常不以為然一日祖常設宴出薦牘請集署之集固拒不從祖常不恱上之將立也召諸老臣赴上都集亦與馬祖常使人告集曰御史有言矣先是文宗以上乳母失言明宗在日素謂上非其子黜之江都南召翰林承㫖額哩音特穆爾奎章閣大學士和塔拉爾黙色書其事于托卜齊雅托卜齊雅者國書也又命集書誥播告中外時䑓省皆文宗舊臣御史亦不敢斥言但風集使速去而已集乃謝病歸臨川伯燧後用事敗竟致殺身世始以集為知人集既去侍臣有以舊詔言者上不懌曰此我家事豈由彼書生耶遣使賜上尊酒金織文幣二召還禁林㑹疾作竟不至評曰昔陳餘張耳刎頸之交中途相失遂成仇讐甚矣朋友為難全也虞馬之交考於集中可謂厚而不薄矣奈何祖常小怨生隙遽肆廹逐而伯生退不患失和不苟同及龔伯燧敗公論益定二公之曲直黒白瞭然矣然當是時以舊詔為言者莫不欲擠伯生以迎合而順帝獨不以為意眷遇舊臣全其終始識量度越常人逺矣哉冬十月鳳翔山崩詔改元詔改今年為元統元年封薩敦榮王騰吉斯襲封太平王巴延進封秦王十一月成紀縣地裂山崩辛亥太陰犯太微東垣上相明年二月癸酉又犯復立𣙜茶運司江浙河南江西湖廣皆置江浙參政王克敬致仕克敬年五十九請老語人曰穴址而峻墉必危再實之木必傷其根無功徳而富貴何以異此故常懐止足之分也又曰世俗毎言勿認真為官臨事不認真豈盡忠之道乎其屬官所至有政績可紀時稱名卿評曰古人見道分明故言必中理行必合宜見道分明云者世俗所謂認真是也使人人居官認真則臨事焉有過失者哉勿認真三字特奸邪小人之論耳王克敬以臨事勿認真非名言當矣十二月廣西徭冦道州千戸郭震戰死元史續編卷十一
