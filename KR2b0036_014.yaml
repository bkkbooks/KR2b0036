body:
  text: 元史續編卷十四明胡粹中撰辛夘十一年春正月命江浙左丞博囉特穆爾討方國珍丁夘星隕蘭陽以工部尚書成遵為河間鹽運使遵與大司農圗嚕行視河議其疏塞之方自濟濮曹鄆汴梁大名行數千里掘井以量地之髙下測岸以究水之淺深考古博今以謂河之故道不可復而賈魯以為必塞北河疏南河使復故道役不大興害不能已丞相托克托先入其言遵與圖魯力陳其不可且曰山東連歉民不聊生若聚二十萬人於此地恐他日之憂又有重於河患者托克托曰汝謂民將反邪自辰至酉論辨終莫能入明日執政謂遵曰修河之役丞相意已定且有人任其責公勿多言幸為兩可之議遵曰腕可斷議不可易由是出之河間評曰河決固不可不塞非興大役不去大害其説亦是也時詘舉贏古人所深戒奈何山怵東連歉民不聊生而欲聚二十萬人於其地乎托克托於賈魯之說而違成遵之議故終以哉召亂至於亡國托克托安得逃其罪三月廷試進士賜文烈圖文允中等八十三人及第出身有差徴建寧處士彭炳為端本堂說書不至夏四月詔治河防以賈魯為總治河防使詔開黄河故道命魯以工部尚書充使發民十五萬軍二萬自黄陵岡南連白茅放於黄固哈等口又自黄陵西至陽青村合于故道凡二百八十里有竒仍命中書右丞伊蘇烏爾圗華同知樞宻哈斯以兵鎮之進魯秩二品授銀章令大小軍民官咸聴節制便宜興繕先是庚寅嵗河南北童謡云石人一隻眼挑動黄河天下反及魯治河果於黄陵岡得石人一眼而汝潁妖冦遂乗時而起評曰童謡固有之矣然石人非天造地設必人力為之意者都水之官循行河道講究修塞已非一日奸人惡其興役也故為是以恐之如牛腹中書帛之類歟當是時君昏於上政慢於下雖不修河雖無石人天下豪傑固將乗時而起何但汝潁也哉冀晉地震半月不止懐孟等州皆震車駕幸上都五月己酉朔日食頴州妖人劉福通反初欒州人韓山童祖父以白蓮㑹燒香惑衆謫從永平縣至山童言天下大亂彌勒佛下生河南及江淮愚民皆翕然信之福通與杜遵道羅文素盛文郁王顯忠韓咬兒復鼓妖言謂山童實宋徽宗八世孫當為中國主福通等刑白馬黒牛誓告天地同起兵為亂事覺縣官捕之急福通遂反山童就擒其妻楊氏及其子韓林兒逃之武安於是命同知樞宻院圖沁以兵討福通福通據朱臯攻破羅山真陽確山遂犯武陽葉縣等處轉陷汝寧府及光息州衆至十萬評曰崇尚佛教敬事僧迦莫元世諸君若也假而佛果有靈能陰翊王度當潛消其冦盜使國祚無窮可也奈何劉福通等以彌勒佛下生為名首亂天下卒至亡滅由此言之事佛求福反更得禍豈虚語哉秋七月遣使招諭方國珍達實特穆爾為國珍所敗乃命大司農達實特穆爾及江浙參政樊執敬浙東亷訪使董守慤同招諭之八月丁丑朔中興路地震蕭縣人李二等反李二等亦以燒香聚衆號芝麻李及其黨趙君用老彭攻陷徐州車駕還宫羅田人徐夀輝等反夀輝與麻城人鄒普勝等亦以妖術陰謀聚衆遂舉兵反以紅巾為號陷蘄水縣及黄州以額森特穆爾知樞宻院帥兵討捕河南盜賊命額森特穆爾及衞王庫春格爾率大軍出征河南妖冦知院婁章以兵同進討冬十月乙酉太白犯斗己丑晝見熒惑犯嵗星立中書分省于濟寧饒信等路雨黍及黒子信州及邵武雨黍饒州雨黒子大如黍米民多取食之衢州雨米如黍徐夀輝僭號據蘄水為都國號天完僭稱皇帝改元治平以鄒普勝為太師攻陷饒州執魏中立陷信州執于大本皆屈使従已畀之印命以官二人大罵不屈夀輝殺之十一月癸丑有星孛于婁甲寅孛見胃丙辰見昴丁巳太陰犯填星孛微見于畢河防成以賈魯為集賢大學士詔立河平碑自四月鳩工七月鑿河成八月決水故河九月舟楫通十一月諸埽堤托成復故道上遣使報祭河伯詔魯還京師賜丞相托克世襲達爾罕之號特命翰林承㫖歐陽𤣥製河平碑以旌勞績𤣥既為碑文又作至正河防記其畧以為治河一也有疏浚塞三者之異焉釃其流而導之曰疏去其淤因而深之曰浚抑其暴因而振之曰塞而疏浚之别又四曰生地曰故道曰河身曰减水河生地有直紆因其直而鑿之可就故道故道有髙卑髙者平之以趨卑髙卑相就則不壅不瀦河身有廣狭狭難受水水溢悍故以計闢之廣難為岸岸善崩故以計禦之减水河者水放曠則以制其狂水隳突則以殺其怒治隄則有剏築修築補築之異有剌水隄截河隄䕶岸隄縷水隄石船隄之等治埽則有岸埽水埽龍尾埽攔頭馬頭之分其為埽臺及推卷薶掛之法有用土石草木鐵杙絙之方魯嘗自言水工之功視土工為難中流之功視河濵為難決河口視中流又難北岸之功視南岸為尤難其用物之效草雖至柔而柔能狎水水漬之生泥泥與草併力重如碇然維持夾輔纜索之功實多是役也用物之凡榛木二萬七千榆栁雜梢六十六萬六千連根株者二千六百藁枯蒲葦雜草以束計者七百三十三萬五千有竒竹竿六十二萬五千葦席十七萬二千小石二千艘硾石三千艘繩索五萬七千所沈大船一百一十鐵纜三十二鐵猫三百三十四竹篾以斤計者十五萬釘鑚四萬七千四百有竒官吏軍民俸糧傭賃醫藥祭祀兼和買民地為河及雜物用鈔一百八十四萬五千六百三十六錠由魯習知河事故能成功江西妖人鄧南二作亂瑞州緫管禹蘇福擒斬之十二月丁丑太白經天括馬以多爾濟巴勒為中書平章烏克遜良禎為參政多爾濟巴勒言治國之道綱常為重前西臺侍御史張桓仗節死義宜旌之以勸來者又言祖宗用兵不専於殺人今倡亂者數人乃盡坐無罪之民為畔逆豈足以服人心其言頗忤托克托時托克托倚任汝中栢拜特穆爾兩人擅權用事而多爾濟巴勒正已立朝及是出為西臺大夫壬辰十二年春正月竹山賊冦襄陽總管柴肅等死之肅與監郡博囉特穆爾同死復召吕思誠為中書左丞徐夀輝陷武昌沔陽威順王庫春布哈及湖廣平章和尚棄城遁走推官俞述祖等死之夀輝遣偽將丁普郎陷漢陽興國鄒普勝陷武昌威順王及和尚等並遁去夀輝又遣曽法興陷安陸府知府超爾戰不勝宣死之又陷中興路山南宣慰同知諤古埒實出戰衆潰慰使錦州布哈遁又攻沔陽推官俞述祖領民兵捍禦力不能支城陷被執送夀輝所誘之使降述祖罵不輟夀輝怒支解之評曰和尚平章湖廣鎮守方隅棄城逃賊則支郡莫能自守而俞祖述一郡理官領民兵捍禦奮螳螂之臂以當覆車之轍其忠勇盖有餘矣彼方鎮大臣寧不知愧哉命逯魯曾等分討江淮盗賊以魯曾為添設淮東元帥領兩淮所募鹽丁討徐州命四川平章伊埒特穆爾為總兵官與右丞長吉討興元金州等處宣政同知僧格與湖北宣慰使多爾濟巴勒守襄陽二月以伊埓布哈為中書平章賈魯為添設左丞鄒平人馬子昭作亂討斬之徐夀輝陷江州總管李黼死之初盗陷蘄黄造船北岸欲南攻九江黼治城隍修器械募丁壯分守要害請兵于江西行省以扼賊衝不報及武昌既陷賊乗勝破瑞昌舳艫蔽江而下江西大震右丞博囉特穆爾方駐兵于江聞風宵遁游兵已及境黼檄鄉落聚木石於險處以遏其歸路黄梅縣主簿額森特穆爾願出擊賊黼與之出戰大敗賊兵逐北六十里鄉民乘險下木石殺獲二萬餘人黼曰賊不利於陸必以舟薄我乃令以長木數千冒鉄椎于杪暗植沿岸水中賊舟數千艘順流鼓譟而至遇椿不得動黼發火箭射之焚溺無算時東際淮甸西自荆湖守臣徃徃棄城而逃獨黼守孤城中外援絶而賊勢益熾二月甲申賊將薄城分省平章圗沁布哈自北門出走黼引兵登陴賊已焚西門張弩射之轉攻東門黼急徃救賊兵已入矣猶與之巷戰力不能敵乃揮劍叱之曰殺我無殺百姓賊刺之墮馬與兄子秉昭俱罵賊死州民聞之哭聲震天具棺葬之時黼兄冕居潁亦死于賊事聞贈黼淮南左丞隴西公謚忠文立廟江州以納琳為南臺大夫徳住為河南右丞賊侵滑濬命徳住為河南右丞守東明時徳住致仕於家聞命駞至東明浚城隍嚴備禦賊不敢犯三月徐夀輝陷南康袁饒等州平章多通遁夀輝先陷岳州攻衡州為洞官黄安撫所敗又遣偽將陶九陷瑞州復為禹蘇福所敗至是陷南康又遣其將歐祥陷袁州項普畧陷饒州河南左丞相台哈布哈収復南陽等處以特黙格為甘肅平章伊埒哲伯為江西左丞相特黙格為南臺大夫乞致仕不允以為平章甘肅又命伊埒哲伯出鎮江西領兵収捕饒信賊方國珍復叛台州路達嚕噶齊台哈布哈死之時朝廷方討徐州命江浙募舟師守大江用國珍懷疑走入海台哈布哈遣義士王大往諭拘留不遣其戚黨陳仲達往來議降台哈布哈率部衆張受降旗而前船觸沙不能行垂與國珍遇呼仲達申前議仲達目動氣索台哈布哈覺其有異手斬之前摶賊船射死五人賊躍入船又斫死二人賊羣至欲抱持過國珍船台哈布哈瞋目叱之奪刀又殺二人賊攢槊刺之中頸死猶植立不動投其尸海中事聞追贈江浙平章謚忠介評曰古之將兵伐叛有因其來降而受之者矣未聞身往議降者也夫來降有二心服為上力屈為次方國珍阻兵五年官軍討之不能勝則其力未屈也山東江淮湖湘羣盗並起朝廷皆無如之何則其心未服也力未屈心未服其徃來議降者特欵兵之計耳忠而台哈布哈輕身虎口往受其降輕敵寡謀喪身辱國雖有餘而知弗足稱矣陜西地震凡百餘日城郭頺圮陵谷遷變㑹州静寧荘浪尤甚㑹州公宇墻崩獲弩五百餘張長丈餘短者九尺人莫能挽因改定西為安定州㑹州為會寧州徐夀輝陷安吉路鄉民羅明逺起義兵復之立淮南行省治楊州轄揚滁和廬蘄黄高郵淮安安豐安慶等路設官二十五員以鴻和爾布哈實勒們並為平章曼濟為右丞秦從徳為左丞達實圗趙璉並參政以烏蘭哈達為中書參政湖廣參政鐡傑復岳州漢陽武昌武昌漢陽尋再陷四川平章約爾珠復忠萬夔雲陽等州命各行省分道收捕盜賊陜西平章伊埒特穆爾討㐮鄧州刑部尚書阿嚕討海寕賊江西右丞和尼齊參政多岱討江西賊以浙東宣慰使思寕普守蕪湖江西右丞烏呼訥江浙左丞羅羅與新濟曼濟哈雅同討饒信等處尊達訥實哩討方國珍額森特穆爾軍潰召還以為御史大夫左遷西臺大夫多爾濟巴勒為湖廣平章尋卒額森特穆爾駐軍沙河軍中夜驚遂潰退屯朱仙鎮詔以中書平章曼濟代還仍命為御史大夫西臺御史范文劉希曽周等十二人劾其喪師辱國托克托庇之怒中臺御史伯琦附托克托劾奏文等越分干譽乃左遷多爾濟巴勒出文等為各府判官由是人莫敢言事初范文等將上奏多爾濟巴勒臨署謂左右曰吾其為平章湖廣矣已而命下果然關中人遮留慰遣之間道得出至湖廣汝中栢等言於托克托曰不殺多爾濟巴勒丞相終不安乃命給軍餉民争輸粟總兵者希㫖侵辱之不為動托克托又遣國子助教旺扎勒至軍中風使害之旺扎勒至益加敬禮謂人曰平章國之勲舊吾茍傷之人將不食吾餘矣多爾濟巴勒感風疾竟卒于黄州評曰用兵之道勝有賞敗有刑故書曰用命賞于祖不用命戮于社予則孥戮汝孥戮汝云者罪非獨一身也盖重言以深儆之耳額森為特穆爾為將覆軍當伏孥戮之罪而托克托庇之更召臺端則是賞其敗矣以此行軍烏能勝哉當是時中臺之官以罪人為之長曾不知恥而西臺乃能連章論劾彼周伯琦者不反躬自愧顧以越分干譽塗汚正臣所謂小人之無忌憚也不有君子其能國乎夏四月癸卯朔日食以吹斯戩為中書平章撫建賊塗佑等攻陷卲武郡將呉諳達布哈討斬之宜黄賊塗佑及建寧應必達攻陷卲武為諳逹布哈所誅翰林承㫖歐陽𤣥致仕以為湖廣左丞致仕賜玉帶及鈔百錠給全俸終身評曰仕者之祿曰俸致仕而給全俸終身此朝廷待賢優老之美意然不居其位不治其事而茍食其禄非義也若辭而弗受不亦善乎車駕幸上都聶炳復荆門州炳知荆門才半嵗兵起荆門不守炳募土兵州七萬復之又與平章約爾珠復江陵及歸峽命南臺大夫納琳討方國珍給宣勅與台州民陳子由楊恕卿趙士正戴甲令其集民丁夾攻方國珍詔天下完城郭築隄防五月安置故瀛國公子和尚趙完普等于沙州御史齊齊克特穆爾等言諸處羣盗輒引亡宋故號以為口實宜徙和尚趙完普及親屬于沙州禁勿與人交通從之六月大名旱蝗飢民七十一萬六千九百八十口以杜秉彛為中書參政秋七月徽饒賊攻陷杭州江浙參政樊執敬戰死董摶霄率兵復之遂復徽州賊倉卒至城中無備執敬遽上馬率衆出中途與賊遇射死賊四人賊逐之又射死三人乃奮力斫賊執敬中槍而死時董摶霄從平章嘉琿復安豐乘勝攻濠州朝廷命移軍援江南遂渡江至徳清而杭州已陷嘉琿問計摶霄曰賊皆野人見杭州子女玉帛必縱恣不暇為備宜急攻之若退保湖州設賊乘銳趨京口則江南不可為矣嘉琿不能決諸將亦難之摶霄曰公江浙相君方面失陷而及今不取誰任其咎復拔劍顧諸將曰相君在是敢有慢令者斬遂進兵薄杭州賊迎敵摶霄麾壯士突前諸軍相繼夾擊凡七戰賊奔接待寺塞其門而焚之皆死遂復杭城已而賊復冦於潛摶霄又破之降賊將潘大奫等二千人賊又冦千秋關摶霄還於潛按軍不動左右請進兵摶霄曰未也遣人執白旗登山望賊約曰賊以吾為怯必懈汝伺其有間麾旗又伏兵城外授以火炮復約曰見旗動砲即𤼵已而旗動砲𤼵兵乃盡出斬數千級賊又攻三關摶霄分軍一出獨松一出百丈一出幽領然後㑹兵𢷬賊巢七戰尅之賊帥楊元等來降進克廣徳蘄賊合徽饒軍復犯徽州賊中有道士能作十二里霧摶霄引兵擊之賊大潰斬首數萬擒道士焚其妖書而斬之遂平徽州評曰古之為治者文事必有武備江浙居十三省之首壤地非不廣也金榖非不富也民庻非不多也盖東南之巨鎮而山賊猝至城無守備何哉承平日乆文恬武嬉任方面者皆蒙古色目貴㳺之子弟惟務逸樂不恤政治故也然省憲大臣皆遁一樊執敬獨力戰而死豈不為之猶賢乎哉如是則南人未必不可重用也徐夀輝兵陷福寧知州王巴延戰死方國珍攻台州浙東元帥伊徳黙色等擊走之以哈瑪爾為中書右丞齊王實勒們獻馬一萬五千匹丁卯太白犯嵗星詔以太傅右丞相托克托總兵討徐州命中書參政特哩特穆爾為江浙右丞與淮南右丞曼濟供給一應行軍所須省院臺各官屬並從禀受節制爵賞誅殺一聽便宜從事知院昻吉爾平章吹斯戩伊克扎爾古齊福夀並從出師賜托克托金三錠銀三十錠幣帛各千疋車駕還宫安陸賊將俞君正復陷中興荆門知州聶炳等死之君正復陷中興約爾珠與戰敗績奔松滋判官上都死之炳援絶城陷被執罵不絶口賊以刀抉其齒齒盡斷其左臂支解之賜額森特穆爾金帛御史及各臺院憲司總帥萬户府交章論額森特穆爾出征河南功績故有是賜評曰額森特穆爾潰軍於沙河得免誅僇幸矣今内外臺院憲司帥府交章論功賜以金帛則繆亂是非顛倒賞罰甚矣斯盖臺院司府知有托克托而不知有朝廷知有私黨而不知有公論故也欲無危亡得乎義民范忠等復中興路中興人范忠偕荆門僧李智帥義兵復中興路俞君正敗走龍鎮指揮按達拉哈瑪爾領兵入城約爾珠自松滋還屯兵于石馬托克托復徐州芝麻李遁走遂屠其城托克托以逯魯曽為淮南宣慰使募鹽丁及城邑趫捷通二萬人與所統兵俱發九月次徐州攻其南門賊出戰以鐵翎箭射馬首托克托不為動麾軍奮擊破之芝麻李遁去獲其黄繖鼓旗燒其積聚追擒偽千户數十人遂屠其城上命平章布哈迫爾即軍中加托克托太師趣還朝評曰民之従亂亦於力之不足勢之不得已也朝廷若能弔民伐罪撫順討逆使仁聞四馳義聲先路將前途倒戈壺漿來迎矣托克托復徐州不能致元兇於顯戮而遷怒齊民恣行夷滅其不仁若是豈王者之師哉他日髙郵堅守不下未必不有鑒乎此而托克托人禍天誅終不能免豈不昭昭矣乎然元之土宇分裂而無以為國亦始於此矣托克托復相也於恩怨無不報又用烏克遜良禎龔伯璲汝中栢拜特穆爾等為僚屬相與排異己者而斥之先是托克托西行伯勒齊爾布哈欲陷之死哈瑪爾屢為之解得召還托克托徳之引為右丞是時汝中栢參議省事平章以下莫敢異同唯哈瑪爾不為之下汝中栢因譖之遂議授皇改哈瑪爾宣政院使哈瑪爾深銜之哈瑪爾甞與托克托太子册寳托克托毎言即中宫有子將寘之何所以故久不行及將出師以汝中栢為治書使輔額森特穆爾居中汝中栢恐哈瑪爾為後患欲去之托克托不能決令與額森特穆爾謀額森特穆爾亦不従哈瑪爾知之譛托克托於皇后竒氏及皇太子後再出視師未及成功為羣小所搆竟以罪去冬十月丙午霍山崩前三日山如雷鳴禽獸驚散隕石數里和糴于遼陽栗豆五十萬石以昻吉爾為淮南平章新濟為江西平章十一月新濟與賊戰于湖口死之時内外觀望為政新濟初為南臺大夫獨持風裁執政惡之移湖廣平章威順王在武昌所為多縦暴非法新濟至謁王曰王帝室之胄古所謂伯父叔父也今徳意不聞而以淫獵賈怨非所謂自貽多福也王起握新濟手謝之悉罷其所為㑹汝潁盜起新濟募土兵完城隍以守賊遣二千人詐降新濟得其情械繫其渠魁數十人以俟命㑹召為大司農同僚受賂脫械賊大至内外響應武昌遂陷鄂人泣曰新濟不去吾豈為俘囚乎新濟入見具陳本末上大喜賜之食時宰不悦奏為江西平章至江東有詔令守江州而江州已陷賊據池陽太平號百萬新濟募兵得三千人趨銅陵克之擒周驢奪船六百艘軍聲大振遂復池州分兵攻石埭諸縣進據清水灣又大破之賊乆圍安慶聞風燒營遁遂進復湖口縣克江州留兵守之命王惟恭柵小孤山新濟自據畨陽口綴江西要衝以圖恢復而湖廣既陷江西被圍淮浙亦多故日乆援不至粮乏卒疲或勸以東南完實盍因粮以圗再舉新濟曰吾受命守江西必死於此賊乗大艦來攻編葦茷塞上下流火之新濟帥兵力戰衆死且盡新濟猶堅坐不動中流矢而仆賊素聞其名不忍害舁至宻室乃蘇羅拜餽食新濟斥之凡七日乃自力而起北向再拜曰臣力竭矣遂絶新濟河西人吹斯戩之子也十二月達實巴圖爾復襄陽以察罕特穆爾為汝寧府達嚕噶齊李思齊為知府穎州沈丘人察罕特穆爾與信陽州羅山人李思齊同起義兵破賊有功故皆用之詔議屯田立分司農司托克托言京畿近水地利召募江南人耕種嵗可収粟麥百萬餘石不煩海運京師足食上曰茍利國家其議行之於是西自西山南至保定河間北抵檀順東及遷民鎮凡係官地及原管各處屯田悉從分司農司立法佃種合用工價牛具農器榖種給五百萬錠命烏蘭哈達烏克遜良禎並為大司農卿又於江淮召募能種水田及修築圍堰之人各一千名為農師降空名添設職事勅牒十二道募農民一百名者授正九品二百名正八品三百名從七品就令管領所募之人所募農夫每名給鈔十錠由是嵗乃大稔癸巳十三年春正月以哈瑪爾為中書平章烏蘭哈達為右丞烏克遜良禎為左丞杜秉彛曼濟並參政方國珍降乙酉太陰犯太微東垣上相二月壬子又犯以達實巴圗爾為四川右丞賞復襄樊之功也戊戌大白熒惑辰星聚奎二月庚戌太白犯熒惑詔立托克托平徐勲徳碑評曰用大衆攻小冦曠日持乆雖獲鼓旗燒積聚而不能殱其渠魁何名為平徐况屠滅齊民豈足以言勲徳乎斯盖汝中栢拜特穆爾之徒欺其上以阿附權臣也定西静寧莊浪等處地震夏四月車駕幸上都江西左丞相伊埒哲伯復饒州賊兵奔潰伊埒哲伯與江浙左丞羅羅引兵由信州元帥韓邦彦哈達取道浮梁同復饒州蘄黄賊聞風奔潰以昻吉爾為嶺北左丞相泰州民張士誠反尋招降之白駒場亭民張士誠弟士徳士信反陷泰州命淮西宣慰副使額森布哈討之未幾士誠請降五月張士誠復攻陷髙郵知府李齊死之初淮南行省遣齊招降士誠被留乆之泰州平賊黨尚蜂聚士誠復鼓變殺參政趙璉走入湖復陷興化行省左丞偰哲篤偕宗王鎮髙郵出齊守甓社湖五月乙未賊數人呼譟入城省憲官皆逃齊急還城門已閉賊遂據髙郵連興化寳應詔赦至不得入賊紿言請李知府來乃受命行省强齊往至則下齊於獄齊雖辯説百端而士誠本無降意特遷延為繕守計官軍諜知之乃進攻城士誠呼齊使跪齊叱曰吾膝如鐵豈為賊屈士誠怒使曳倒搥碎其膝而剮之時論謂大科三魁若李黼台哈布哈及齊皆不負所學云士誠之再反也朝廷謂其有降意遣翰林待制孫撝淮南行省照磨盛昭相繼撫論授以官爵士誠皆留之二人不屈亦被殺六月立皇子阿裕爾實哩達喇為皇太子大赦立詹事院復安陸府知院實喇巴圗總河南軍平章達實巴圖爾總四川軍自襄陽分道而下復安陸府命淮南平章達實特穆爾福夀討張士誠秋七月丁卯泉州天雨白絲海水日三潮湖廣參政阿爾輝復漢陽武昌復江州以四川平章伊蘇烏爾圗華右丞旺札勒布哈鎮守中興九月乙丑朔日食壬辰太白經天車駕還宫南臺大夫納琳罷復道州瑞州臨江廣西元帥甄崇福復道州獲賊將周伯顔誅之江西左丞和尼齊以兵平富州臨江遂引兵復瑞州江西賊帥王善冦閩劉健討斬之連江縣巡檢劉濬募壯士與其子健拒賊數與鏖戰濬中箭墮馬健下馬掖之俱被執濬罵賊而死健亦以死拒賊善義之釋使収濬屍斂瘞健歸請帥府兵以復仇弗聴因盡散家貲結死士百人詐為工商流丐入賊中夜半發火大譟賊驚擾自相殺健手斬害其父者張破四并擒善及陳伯祥獻於帥府磔之於是授健古田縣尹評曰劉健孝足以復父之仇忠足以滅國之賊智勇俱全盖竒士也授以縣尹則賞不酬功用違其才矣使之提兵萬人豈不足以保障一方也哉冬十一月庚戌京師無雲而雷少頃有火墜於東南是日脩武襄垣二縣同大同疫死者大半授方國珍官國珍不受命従特哩特穆爾尊達納實哩之請授方國珍徽州路治中國璋廣徳路治中國瑛信州路治中督遣之任國珍疑懼不受命評曰猛虎出林蛟龍失水人皆得以制之方國珍搆兵六年屢敗官軍阻江海以自固盖未可以力勝也若因其請降厚以祿爵𨗳之臣順使彼無失其富貴不憂乎危亡則雖强暴之性可馴而為忠義矣乃以治中移之他路是激其怒而使之再叛也朝廷處置若此豈不謂之國無人焉者哉十二月復均房等州陜西平章博囉四川右丞達實巴圖爾復均房等州詔博囉等守之達實巴圖爾討東正陽江浙平章巴延特穆爾等擊徐夀輝於蘄水敗之夀輝遁走巴延特穆爾及南臺中丞曼濟哈雅四川參政哈喇圗左丞桑圗實哩西寧王英實等合軍討徐夀輝於蘄水敗之夀輝遁去獲其偽官四百餘人哈瑪爾進西天僧于帝僧教帝行房中之術號延徹爾法又進西畨僧且琳沁善秘宻法帝皆習之詔以西天僧為司徒且琳沁為大元國師各取良家女三四人奉之謂之供養甞謂上曰陛下尊居萬乘富有四海不過保有見世而已人生能幾何當受此秘宻大喜樂禪定於是上日從事於其法廣取婦女事淫戯選采女為十八天魔舞事滛宴而哈瑪爾妹壻圖嚕特穆爾與婁達實等十八號倚納克皆有寵在上前相與䙝狎甚至男女裸處號所處室曰色濟克烏格依猶華言事事無害也君臣宣淫而羣僧出入禁中無所禁止醜穢外聞皇太子年長尤深疾其所為而欲去之未能也甲午十四年春正月甲子朔汴河氷五色花草如繪畫三日方解乙丑熒惑犯嵗星復峽州二月以格爾為淮南平章吕思誠為湖廣左丞遣吏部侍郎貢師泰和糴浙西時江淮兵起京師食不足命師泰和糴於浙西得粮百萬石師泰還遷兵部侍郎整飭京師至上都驛户師泰騐其富貧而均其徭役民賴以甦豪貴以不利於己深嫉之㑹朝廷復欲和糴除師泰都水庸田使三月癸亥朔日食廷試進士賜薛朝晤牛繼志等六十三人及第出身有差以達實巴圖爾為四川平章江西左丞相伊埒哲伯卒江西自道通以寛容為政軍民懈弛伊埒哲伯至風采一新威聲漸振盜賊謀歸疑至是以疾卒所部為之喪氣夏四月癸巳朔介休縣地震車駕幸上都江西湖廣大飢疫詔討方國珍以阿爾烏遜為江浙右丞恩寧普為參政總兵討捕五月立南陽等處毛葫蘆萬户府募土人為兵免其差役令討賊自效因其鄉人自相團結號毛葫蘆故以名之六月張士誠冦揚州達實特穆爾兵敗續諸軍皆潰詔江浙參政佛家閭㑹達實特穆爾復進兵己酉士誠陷盱眙庚戌陷泗州官軍復潰伊洛溢秋七月汾州孝義縣地震八月車駕還宫以伊徹察喇為中書平章吕思誠為左丞藏布為參政冬十月命右丞相托克托總兵征高郵總制諸王各愛滿諸省各翼軍馬出征兵至高郵戰於城外大敗賊衆於六合縣勅諸司奏事先啓皇太子十二月以索諾木巴勒為平章僧格實哩為右丞鼎珠為左丞詔罷托克托兵柄以河南左丞相台哈布哈代總其軍御史袁賽音布哈等劾奏托國克托出師三月畧無寸功傾家之財為己用半朝廷之官以自隨其弟額森特穆爾庸才鄙器玷汚清臺綱紀不修貪淫益甚章三上詔令額森特穆爾都門聴㫖尋安置寧夏又詔托克托喪師費財坐視冦盗削官爵淮安安置陞台哈布哈為河南左丞相伊徹察喇加太尉錫錫知樞宻院一同總領諸處征進軍馬詔至軍中龔伯璲曰將在軍君命有所不受且丞相出師時嘗被宻㫖一意進討可也詔書且勿開開子則大事去矣托克托曰天子詔我而我不從是我與天抗也君臣之義何在乃聽詔客省副使哈喇岱曰丞相此行我輩必死他人之手今日寧死丞相前拔刀自剄死評曰前日交章論額森特穆爾河南功績者臺臣也今劾其庸才鄙器者亦臺臣也何公論之不定若是耶所以然者前日臺臣托克托之黨也而托克托之權方盛今日臺臣哈瑪爾之黨也而托克托之眷已衰故為是紛紛耳臺憲紀綱若此其何以為治哉紹興地震汪嘉努為御史大夫詔威順王庫春布哈還鎮湖廣王初以武昌被陷命奪其印至是以討賊立功還其印遣復歸鎮達實巴圖爾復河陰鞏縣京師大飢疫民有父子相食者造龍船於内苑上自製其樣長一百二十尺廣二十尺前瓦簾棚穿廊兩暖閣後柁殿樓子龍身并殿宇用五采金粧前有兩爪用水手二十四人皆衣紫衫金荔支帶四角頭巾自後宫至前宫山下海子内徃來遊戲行時龍首尾口眼皆動又自製宫漏髙六七尺廣半之造木為匱蔵壺其中運水上下匱上設三聖殿匱腰玉女捧時刻籌時至輒浮水而上左右二金神一縣鐘一縣鉦夜則神人自能按更而擊無分毫差鳴鐘鉦時獅鳳在側者皆自翔舞匱之東南有日月宫飛仙六人立宫前遇子午時自能耦進度仙橋達三聖殿復退立如前其精巧絶出人意皆謂前代所未有上既怠於政治惟事游晏以宮女十八人按舞名十八天魔又十一人奏龍笛頭管小鼔筝􅌙琵琶笙胡琴響板拍板海宫中贊佛則按舞奏樂宫官受秘宻法者得入餘不得與評曰古百工執藝事以諫懼作為竒巧以蠱惑上心也今龍舟刻漏皆帝所自製様則非工之罪矣故當時都人為之諺曰帝也斧鑿太子鼓鈸父子如此欲無危亡其可得乎乙未十五年春正月戊午朔以哈斯為中書平章竒巴延布哈為遼陽平章徐夀輝偽將倪文俊復陷沔陽威順王令其子執恩努等同元帥阿爾斯蘭水陸並進討文俊至漢川水淺文俊用火筏燒船報恩努遇害安置托克托於額齊納路上都飢遣兵備禦關陜諸處河南參政洪綽羅達實特穆爾守禦河南陜西參政舒嚕多元爾濟守潼關阿嚕烏遜守商州宗王嘉木揚實哩守興多岱備山東時河南賊數渡河焚掠州縣中書參議成遵言於丞相曰今天下州縣喪亂過半而河北稍安者以河為之障賊兵卒不能渡所以剥膚椎髓以供軍而民無深怨者視河南之民猶得保其室家故也今賊北渡而官軍不禦是大河之險已不能守河北之民復何所恃河北一揺國勢將若之何語未畢嗚咽不能言宰執而下皆揮涕乃入奏遣使罪守河將帥而防禦稍嚴閏月丙辰太白經天三月癸丑六月癸亥八月戊寅並如之二月己未劉福通以韓林兒稱小明王劉福通等自碭山夾河迎韓林兒至立為皇帝又號小明王建都亳州國號宋改元龍鳳以其母楊氏為皇太后杜遵道盛文郁為丞相羅文素劉福通為平章劉六知樞宻院拆鹿邑縣太清宫材建宫闕遵道等各遣子入侍遵道得寵専權福通命甲士撾殺之福通遂為丞相復稱太保以達實特穆爾為中書平章約約為遼陽左丞相立淮東等處宣慰司置司天長縣統濠泗義兵萬户府并洪澤等處義兵聽富民願出丁壯義兵五千名者為萬户五百名為千户一百名為百户降宣勅牌面汪嘉努罷三月徐夀輝光陷襄陽竄托克托於雲南鎮西路及其弟額森特穆爾徙四川碉門長子哈喇章肅州次子三寳努蘭州仍籍其家財貲産薊州雨血車駕幸上都夏四月分行省于彰徳命右丞藏布左丞烏克遜良禎徃治之以錫錫為御史大夫鼎珠為中書右丞相哈瑪爾為左丞相僧格實哩為平章錫錫既為大夫復拜哈瑪爾為相於是國家大柄盡歸其兄弟二人矣遣使招安張士誠遣翰林待制烏瑪喇等賷宣命印信牌面與鎮南王博囉布哈及淮南省憲官商議給付吕思誠罷五月詔削河南左丞相台哈布哈官爵命達實巴圖爾緫其兵御史伊埒呼圗克奏台哈布哈慢公虐民詔削其官仍令緫領和實衮從征命達實巴圖爾管領台哈布哈一應軍馬評曰命將大事也必審而後動擇而後用托克托以老師費財而罷之矣曽未半載台哈布哈又以慢公虐民見黜夫奕者舉棊不定不勝其耦命將出師而易置如丞此烏能取勝哉又况不數月復以台哈布哈為湖廣左相招捕盜賊夫慢公虐民之人豈可復用况官以有罪而削無功而復刑賞如此雖滅冦盜猶不可以為國也倪文俊復陷中興元帥多爾濟巴勒死之六月削奪集賢大學士吴直方等官爵御史哈喇圗劾奏托克托之師吴直方及其㕘軍阿哈長史和爾齊等並宜追奪從之以達實巴圖爾為河南平章保徳州地震徵徽州隠士鄭玉為翰林待制不至大明太祖皇帝起兵自和州渡江取太平路自紅巾妖寇倡亂南北郡縣多陷没故大明従而取之秋七月立防禦海道運糧萬户府于台州九月又分府于平江遣使招諭及備禦諸路命將作院判烏瑪喇招安濠泗淮南左丞相太平助之章佩大監布延特穆爾招安沔湖陽四川平章伊蘇烏爾圗華助之平章約爾珠等守禦廣江浙參政納琳哈喇㑹平章鼎鼎進取常州南臺大燦夫福夀守集慶親王實勒們守曹州知院逹爾瑪嘉勒等屯中興湖廣平章僧格額圗琿等守襄陽參政哈喇圗等守沔陽仍詔太平統諸軍収討所陷郡縣平章曼濟哈雅知院班珠爾瑪克守大江南岸同阿爾輝䕶臺以達實特穆爾為江浙左丞相便宜行事時江淮繹騷南北隔絶達實特穆爾獨治方面而任用非人肆通賄賂賣官鬻爵惟視貨之重輕為髙下由是謗議紛然而所部郡邑徃徃淪陷亦恬不以為意評曰古稱立賢無方而元之用人惟任世族若達實特穆爾才識庸下豈足以専治方面任旬宣之寄哉當是時朝廷大臣方正者無逾太平而才智如成遵董摶霄逯魯曽忠直如許有壬吕思誠者亦不為少皆以南人不専委任宜其不能以弭亂也車駕還宫九月以努都爾噶為中書平章鄂掄藏布並右丞杜秉彛許有壬並左丞成遵李稷實勒們並參政時以言為諱許有壬力言朝廷政務姑息賞重罰輕故將士貧掠玉帛子女而無鬬志遂倡招降之䇿其言多不載皆切中時病有僧自髙郵來言張士誠乞降衆幸事成皆喜有壬獨疑其妄呼僧詰之語塞不能對未幾有壬罷為集賢大學士兼太子諭徳太子以有壬前朝舊徳頗敬禮之一日入見方臂鷙禽以為樂見有壬至遽呼左右屏去冬十月立淮南行樞密院于揚州以慶通為淮南平章台哈布哈為湖廣左丞相仍命台哈布哈總兵招捕湖廣諸路盜賊給還原奪宣命鼎珠罷以病辭命太保就第達實巴圖爾攻劉福通軍大破之達實巴圖爾進次許州與福通軍遇戰於長葛為其所敗將士皆奔潰至中牟収散卒㑹劉哈喇布哈引兵來援大破賊兵復駐汴梁十二月敗賊於太康遂圍亳州偽宋主小明王遁走安豐十二月詔赦以天下兵起下詔罪己大赦以察罕特穆爾為刑部侍郎屢與賊戰於河南北有功故有是命哈瑪爾殺托克托托克托之貶雲南也行次大理騰衝知府髙惠欲以女事之許築室一程外以居雖有加害者可以無虞托克托曰吾罪人也安敢念及此巽辭拒絶惠銜之至是再徙阿恰齊之地惠𤼵鐵甲軍圍之哈瑪爾又矯詔遣使賜之鴆遂卒年四十二訃聞中書遣尚舍卿七十六至其地易衣冠以殮托克托儀狀雄偉頎然出千百人中而器識宏逺莫測其藴功髙社稷而不伐位極人臣而不驕輕貨財逺聲色好賢下士皆出於天性至於事君始終不失臣節雖古之有道大臣向以過之惟其惑於羣小急復私仇君子病焉評曰易曰比之匪人不亦傷乎哈瑪爾非路能殺托克托也托克托自取之耳夫小人之情狀於人當則吮􅏴䑛痔無所不用其諂及其失勢則攘臂下石無所不盡其力茍不絶之於其初未有不受其禍者也方伯特齊爾布哈欲害托克托之時哈瑪爾䕶之於内太平保全之于外及其復相托克托知哈瑪爾而不知太平者太平持公義不欲人之知哈瑪爾市私恩惟恐人之不知也不察乎此而仇君子比小人其及也宜哉置大兵農司詔有水田去處置大兵農司招誘夫丁有事則乗機招討無事則栽植播種凡置保定河間武清景薊等四處其屬又有兵農千户所二十四百户所四十四鎮撫司四荆州大水丙申十六年春正月立福建行省以江浙平章尊達納實哩南臺中丞阿嚕烏遜為平章福建亷使莊嘉為右丞元帥呉鐸為左丞司農丞努圖克齊益都總管卓思敬並參政以鼎珠為中書右丞相吹斯戩為御史大夫哈瑪爾錫錫罷哈瑪爾既相以前進西僧為恥告其父圖嚕曰我兄弟位宰輔宜導人主以正今圖嚕特穆爾専以淫䙝媚上天下士大夫必譏笑我有何面目見人我將除之且上目昏暗何以治天下皇太子年長聰明不若立為帝而奉上為太上皇其妹聞之歸告其夫圖嚕特穆爾恐太子為帝己必謂先見誅即以其事聞然不敢斥言淫䙝事苐曰哈瑪爾陛下年老故耳上大驚曰朕頭未白齒未落遽謂老耶錫毋因即與謀去哈瑪爾及錫錫計已定有㫖哈瑪爾與錫入朝御史大夫吹斯戩因劾奏二人罪惡上曰哈瑪爾兄弟雖有罪且與朕弟同乳姑緩其罰令出征遂罷哈瑪爾錫錫伏誅右丞相鼎珠等復糾哈瑪爾錫錫之罪不已乃命二人出城受詔遂徙哈瑪爾惠州錫錫肇州比行尋皆杖死初額森特穆爾就貶籍其家貲賜哈瑪爾及哈瑪爾死籍其家而所得額森特穆爾之軍藏封識固未嘗啓也中外皆謂上怒其譖托克托兄弟之故不知其罪由於不軌以是人皆快之薊州地震凡十日徐夀輝據漢陽建偽都二月禁銷毁販賣銅錢詔舉守令命六部諸監院正官各舉才堪守令者一人遣使祠曲阜張士誠陷平江入據之遂陷松江湖常州三月和買馬凡六萬匹大明取集慶南臺大夫福夀死之福夀初為淮南平章守禦有方遷南臺大夫先是集慶有警阿爾輝將苗軍來援事平留苗兵揚州而苗蠻獷悍殺阿爾輝以叛集慶援絶髙郵廬和相繼淪陷福夀募民兵勸出粟激厲固守及大明兵圍集慶福夀督兵出戰盡閉諸城門已而力不能支遂破百司奔潰福夀據胡床坐鳳凰臺下軍士四集遂被殺治書賀方守臣達年達薩亦死之立江浙行樞宻院治杭州命達實特穆爾兼知院節制諸軍便宜行事方國珍復降以為海道漕運萬户其兄國璋授衢州路總管是月有兩日相盪夏四月以吹斯戩為中書左丞相布哈為御史大夫五月以多岱為陜西左丞相車駕幸上都徐夀輝復寇襄陽陷常德灃州六月大明兵取廣徳彰徳李樹生黄𤓰先是童謡云李生黄𤓰民皆無家秋七月張士誠遣兵陷杭州江浙丞相達實特穆爾遁平章尊達納實哩戰死參政楊旺札勒等擊敗之評曰夫受人之託者死人之事逹實特穆爾以丞相兼知樞宻節制軍民得便宜行事朝廷所付託專且重矣寇至而遁一城且不保况東南千里之地手卒為士誠所逼逐身死名喪為天下笑悲夫八月徐夀輝遣倪文俊攻陷衡州元帥甄崇福戰死彗星見張宿色青白彗指西南長尺餘至十二月戊午朔始滅車駕還宫九月汝潁賊李武崔徳等攻破潼關參政舒嚕杰戰死豫王引兵復之武等敗走初潼關破豫王同知院鼎珠引兵収復令伯嘉努守之已而復陷伯嘉努兵潰豫王復引兵取之武等敗走復陷陜虢以察罕特穆爾為兵部尚書賊陷陜虢察罕特穆爾引兵復之又敗賊兵于平陸安邑詔以為兵部尚書僉河北行樞宻院事詔徙置江南行御史臺治紹興復以納琳為大夫冬十月丁未有星隕大名化為石従東南流芒尾如曳篲墮地有聲火焰蓬勃乆之乃息化為石青黒色形如狗頭其斷處若新割者命蔵于庫達實巴圖爾遣使來獻㨗初朝廷遣托歡出督兵達實巴圖爾父子親與劉福通對敵自巳至酉大戰數合逹實巴圖爾墜馬其子博囉特穆爾扶令上馬先還連發矢斃追者夜一鼓歩回營移駐陳留攻取夾河寨次髙柴店偪太康三十里賊以五百騎乗夜來刼營不克比曉官軍力戰自寅至巳斬賊首數萬擒偽將九人殺其偽丞相王顯忠羅文素遣博囉特穆爾報㨗上賜勞内殿拜達實巴圖爾為河南左丞相博囉特穆爾四川左丞淮安城陷江東亷訪使褚布哈死之初布哈與副使劉甲扞禦淮安甲守韓信城勢相掎角總兵者撓之檄甲别將兵擊賊賊因掘塹圍淮安芻餉路絶元帥呉徳秀運米萬斛入河為賊所抄攻圍日急總兵者屯下邳按甲不出遣使十九輩告急皆不應城中餓者仆道上即取啖之草木螺蛤魚蛙鳥燕及靴皮鞍䩞革廂敗弓之筋皆盡而後父子夫婦老稚更相食撤屋為薪人多露處坊陌生荆棘力既盡城陷禇布哈猶据西門力鬬中傷為賊所執殺而臠之子巴噶亦死布哈守淮安五年大小十百戰精忠大節人比之張巡云十一月有星流于東南河南陷亷訪副使堪布遁倪文俊陷岳州殺威順王子岱爾穆特爾復衡州湖廣參政額森特穆爾與左江義兵萬户鄧祖勝合兵復之以董摶霄同僉淮南行樞宻院初摶霄建議以淮南為南北襟喉江淮要衝其地一失兩淮皆未易服則救淮安誠為急務為今日計莫若於黄河上下瀕淮海之地及自沭陽抵沂莒諸州縣布連珠營毎三十里一總砦總砦中又設一小砦使烽堠相望而巡邏往來遇賊則併力野戰無事則屯種而食然後進有據退有守常為不可勝以待敵之可勝也又言海寜一境不通舟楫惟可陸運陸運之方毎人行十步三十六人可行一里三千六百人可行百里每人負米四斗以夾布囊盛之用印封識人不息負米不著地排列成行日行五百回計路二十八里輕行十四里重行十四里日可運米二百石人米一升可給二萬人此百里一日運糧之術也又淮南北之民壯者已盡為兵老㓜無所依宜置軍民防禦司籍其民以屯故也練兵積榖且耕且戰内定山東完固之邦外捍淮海出沒之寇而後恢復可圖也時不能用評曰摶霄百里一日運糧之術可施之於路近而兵少敵小而期促者耳若大敵在前擁兵數十萬千里饋糧曠日持乆則此法未易行行之亦未必善也夫其為説以三千六百人排列成行人行十步負米四斗三十六人行一里三千六百人行百里人不息肩米不著地徃來接運日行五百回計路二十八里輕行十四里重行十四里日可運二百石人食一升可給二萬人似矣假如兵二十萬路千里則當用運夫三十六萬人人日米一升先用米三千六百石矣運到米二千石是以三十六萬人供二十萬人之餉可乎又運夫所食不在其中湏各於所在地方支給若荒漠之地則所運之糧運夫且不足食焉能給軍嗚呼此書生之論可聽而不可行也河決河陰山東大水元史續編卷十四
