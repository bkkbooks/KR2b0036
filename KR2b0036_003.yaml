body:
  text: 元史續編卷三明胡粹中撰癸未二十年春正月立皇后鴻吉哩氏納沁孫戩通之女刑部尚書崔彧上時政十八事彧𢎞州人負才氣剛直敢言上甚器重之及是上䟽言十八事一曰開廣言路二曰妙選臺憲三曰樞宻院長貳擇有德望者為之四曰翰苑宜博訪南北耆儒以重此選五曰郝禎耿仁雖正典刑附阿哈瑪特者尚多罪同罰異公論未伸宜㳄第屛除六曰貴㳺子弟㓜不講學何以從政得如許衡者教國學則人才軰出七曰今起居注所書不過奏目宜擇䝉古漢人有聲望而慎重者居之使書帝王言動以垂無窮八曰憲曹無法可守姦人莫知顧忌宜定律令九曰官冗若徒省一官員併一衙門亦非經久之法宜㕘衆議立定成規十曰官僚有俸者量増無俸者特給既得所養可責其亷十一曰内地百姓流入江南者十五萬戸皆重賦繁徭所致宜蠲其積欠招集復業其不歸者與土著一體當役仍令民官滿替以户口増耗為殿最十二曰凡丞相安圗遷轉良臣為可阿哈瑪特擯斥者並宜㧞擢十三曰簿録姦黨財物不視為横得宜節濫用以資帑藏十四曰大都不當立留守司宜改為總管府十五曰中書左丞二而左丞缺宜改所增右丞為左丞十六曰行省不必置丞相平章止設左右丞以下庶内重不致勢均十七曰阿爾哈雅子姪姻黨分布權要官吏出其門者十七八其威權不在奏阿哈瑪特下宜罷其職勿使久據湖廣十八曰銓選類莫知賢否自今三品以上必引見而後授官疏奏即日命中書行其數事餘令與御史大夫約蘇特穆爾議行之中山民薛保住伏誅初保住上匿名書告變因殺宋丞相文天祥至是和爾郭斯奏保住欺罔朝廷希覬官賞勅誅之因言自今應訴者須實書其事赴省臺陳告敢以匿名書言事重者死輕者流發其事者賞其省臺理斷不平許擊登聞鼓以聞詔復征日本置征東行省以安塔哈為丞相徹爾特穆爾為右丞劉二巴圗爾為左丞命蒙古人習舟師者萬二千五百人同征日本五衛漢軍選留千餘人新附軍悉遣行安塔哈求軍官習水戰者命元帥張林招討張瑄總管朱清赴之評曰元起朔漠奄有天下雖㣲日本不害其為廣大也而世祖必欲服之勞民用兵卒至禍敗崔彧之諌非不明切而不能從豈非好大喜功如唐太宗之伐高麗也歟二月乙巳太隂犯心四月壬寅犯南斗五月丙寅掩心三月罷南城及五臺山建寺臺臣言伐木造寺凡四萬人及平灤造船役重詔罷之丙寅車駕幸上都廣州盗起討平之廣州新㑹縣林桂芳趙良鈐等偽號羅平國稱延康年號官軍擒斬之餘黨悉平以髙麗王睶領征東行省左丞相詔以睶世領行省規畫日本事宜於是中丞崔彧言江南相繼盗起皆縁拘水手造海船民不聊生日本之役宜姑止之江南四省軍須宜量民力勿强以所無給價必以實召募當從所欲俟民力稍甦東征未晩不從夏四月罷采民女用崔彧言罷之扎薩克罷以莽賚徹爾為中書平章耶律婁格王椅為參政建寜總軍總管黄華叛詔布哷齊史弼討平之華衆十萬號頭陀軍偽稱宋興祥五年犯崇安浦城圍建寜府詔討之明年華自殺其衆遂平秋七月復立司農寺樞宻副使張文謙卒車駕還宫省集賢院併入翰林為翰林國史集賢院四川溪峒皆平四川行省討平九溪十八峒以其酋長赴闕定其地之可以設官與其人之可以入官者大處為州小處為縣并立總管府聽順元路宣慰司節制冬十月鄂端宣慰司進嘉禾同頴九穗七穗六穗者各一耶律鑄罷坐不納職印妄奏東平人為逆間諜幕僚反黨罪囚阿里舒罷免仍沒家貲之半徙居山後二十二年卒後贈太師順寜王謚文忠十一月戊寅太白嵗星相犯官軍伐緬克之九月大軍發中慶十月至南甸右丞台布由羅必甸進軍十一月宗王桑阿克達爾命參政伊克徳濟取道阿昔江達鎮西阿禾江造舟二百下流至江頭城斷緬水路自將一軍從縹甸徑抵其國與台布㑹下令諸将分道攻取破其江頭城殺萬餘人别留軍守其地積粮餉給兵士甲申二十一年春正月上尊號赦右丞相和爾郭斯等上帝尊號曰憲天述道仁文義武大光孝皇帝大赦天下江淮行省平章䝉固岱獻珍珠凡百斤遣王積翁使日本未至為盗所殺上以其俗尚佛遣積翁與補陀僧如智往使積翁至對馬島夜為亂兵所殺三月丙寅幸上都丁夘太廟正殿成罷征東行省拘收其印定江南諸路官員職田至元初定隨路府州縣官職田上路達嚕噶齊十六頃下路十四頃上州散府十頃總管同知中州等皆八頃治中散府知府同知下州等皆六頃府判上州尹同知五頃散府上州判中州知州同知縣等及路經歴四頃中州判下州知州同知州判縣丞錄事司等皆三頃主簿縣尉錄事錄判二頃按察司十六頃副使八頃僉事六頃至是定江南諸路官職田各減其半夏六月封皇子托歡為鎮南王将兵征安南瓊州安撫使陳仲達言安南通謀占城遣兵二萬及船五百為援詔皇子督行省兵進討仍命索多帥師來㑹又遣竒嚕同其國使阮道學往責陳日烜運粮送占城助軍官兵至祿州日烜調軍拒守分兵為兩道其從兄興道王陳峻亦提兵界上所在俱有備禦阿爾哈雅不能進色特爾岱孫佑等與敵遇敗其兵遣使諭開路迎拜鎮南王不從官兵遂分六道取攻諸隘皆破之峻及日烜遁走令阮効鋭奉書謝罪并獻方物請班師日烜遂僭稱大越國主憲天體道大明光孝皇帝禪位於皇太子秋八月庚午車駕還宫九月甲申京師地震癸巳太白犯南斗嘉木揚喇勒智𤼵宋諸陵凡發塜墓之在紹興錢塘者一百一所戕殺平民四人受獻美女寳物無筭攘奪人財物計金一千七百兩銀六千八百兩玉帶九玉器一百十一雜寳貝一百五十二大珠五十兩鈔十一萬六千二百錠田二萬三千畝庇平民不輸分賦者二萬三千户以其陵中所收金銀寳物修紹興天衣寺評曰秦始皇冢項籍掘之漢諸陵赤眉發之唐諸陵温韜發之宋之諸陵在河南者金人發之在浙東者嘉木揚喇勒智𤼵之推原所由盖作俑於伍子胥也然五帝三王未聞有發其冢墓者後之人主亦可以少省哉立常平倉以五十萬石鈔給之冬十一月和爾郭斯敏珠爾多卜丹張雄飛溫徳亨罷召安圗復以為右丞相盧世榮史樞為左丞博囉穆蘇哈雅薩題勒宻實廉希恕為㕘政初上以雄飛廉貧特賜銀一千五百兩拜謝出加賜金五十兩及阿繖酒器雄飛封藏於家及罷政阿哈瑪特之黨特濟格勒矯詔追奪所賜後特濟格勒等誅或勸雄飛自明雄飛曰所以未敢輕用而封識以俟者正虞今日耳又况自辨乎禁私酤賣盧世榮言京師富豪釀酒價高而味薄以致課不時輸宜禁之官自酤賣向之嵗課一月可辦從之世榮既以利進常結貪刻之黨專事掊斂建議立法治財視常嵗當倍増而民不擾有詔㑹議人無敢言者董文用佯問世榮曰此錢取於右丞之家耶将取之於民耶取於右丞者則吾不知若取於民則有説矣牧羊者嵗嘗兩剪其毛今牧人日剪以獻主者固悦其得毛之多然羊無以避寒熱即死且盡毛又可得乎民財有限取之以時猶懼傷之若盡刻剥豈復有百姓耶世榮不能對丞相安圖嘆曰董尚書真不虚食俸祿者議者出謝文用曰君以一言折聚斂之臣而厚邦本真仁人之言其利溥哉世榮竟以是敗殺中書左司郎中周戭盧世榮以聚斂得幸驟陞執政權傾一時勢焰熏灼左司郎中周戭因議事㣲有可否誣以沮法奏杖一百然後斬之於是臣僚震懾無敢言者世榮因奏臣行事多為人所怨恐後有䜛之者上曰無妨朕疾足之犬狐不愛焉朕自知之遂令増其從人世榮又奏今日之事如數萬頃田昔無佃者草生其間臣今創佃已有耕者未耕者有纔播種及既生苖者然不令人守之為物蹂踐則可惜也今丞相安圗是守田者然不假之以力則佃者亦徒然耳守田者假之以力而天不雨亦終無成所謂天雨則陛下與臣添力是也上曰然世榮既以利自任懼怒之者衆乃以九事説上詔天下一免民間包銀二官吏俸免民帶納三免大都地稅四江淮貧民鬻妻子者官贖還之五逃移復業者免其差稅六免收醋課七江南佃主收佃客租課减免一分八添支内外官吏俸五分九定百官考課升擢之法大抵欲釋怨要譽上皆從之議選舉法不果行太宗朝耶律楚材請用儒術選士至元初上嘗命丞相史天澤條具當行大事亦嘗及科舉其後翰林學士承㫖王鶚以為言勅省部議奏程式而丞相和爾郭斯與留夢炎等皆言天下習儒者少而由刀筆得官者多上曰将若之何對曰惟貢舉取士為宜凡䝉古及儒吏隂陽醫術皆令試舉則人皆用心為學矣上然之㑹和爾郭斯罷而止事雖未行而科舉之制已昉於此焉評曰古今人才豈出一塗非科目所能盡也故惟鄉舉里選近古而可行不致於遺賢棄才惜乎世祖首議選舉而不能以行此也延祐設科雖稱得人然豪傑之士豈可以科第拘之哉御史中丞崔彧罷彧言盧世榮不可用忤㫖罷評曰大臣以道事君不可則止彧前諌征日本世祖不能從至是又以言盧世榮不可用而罷所謂有言責者不得其言則去者也乙酉二十二年春正月西州民趙和尚真定民劉驢兒謀反伏誅趙和尚自稱宋福王子以誑民劉驢兒有三乳自以為異謀作亂事覺皆磔裂以徇罷行御史臺以阿必實克為中書平章造大樽以木為質銀内而金外鏤為雲龍高一丈七尺置於殿下二月立規措所主經營錢榖以善賈為之秩從五品從盧世榮之請也參政博囉穆蘇哈雅因奏世榮親黨牛姓者前為提舉今浙西運司課程頗多擬除運副從之拘收銅錢申禁私造酒麯復立行臺臺臣言近中書奏罷行臺改按察司為提刑轉運司俾兼金榖而糾弹之職遂廢請丞相安圗與老臣議於是安圖亦言江南盗賊屢起行臺鎮遏居多然與行省並治杭州地甚逺僻江州居江浙湖南江西三省之間徙之為便從之已而復還治杭州三月戊辰車駕幸上都以鴻吉哩岱為中書左丞相索多卒于軍索多敗安南兵於清化府奪義安關降其臣彰憲昭顯等侯鎮南王托歡命索多屯天長以就食距大營二百餘里㑹有㫖班師托歡還而索多不知安南遣兵遮之於乾滿江索多戰死事聞賜謚襄愍夏五月以郭佑為中書參政秋七月造溫石浴室及更衣殿安南王日烜之弟益稷來降益稷及其弟文義明誠侯赴闕廣東宣慰使雲丹宻實入朝雲丹密實以所降渠帥郭逢貴等至京師言山寨降者百五十餘上問戰而後降耶招之即降耶對曰其首拒敵者已磔之矣是皆招降者也因言托爾珠兵後失於撫綏故盗賊互起人民漸耗宜擇良吏往治從之八月丙辰車駕還宫罷𣙜酤初民間聽自造酒毎米一石課鈔一貫盧世榮以官鈔五萬定為本官自酤賣毎米一石得息鈔十貫增舊十倍至是罷𣙜聽民自造但增課鈔一貫為五貫評曰酒醯生民口腹之日用者也聽民自造而收其課鈔已為非義况官自酤賣以奪其利乎罷𣙜酤而增課鈔五分之四所謂月攘一雞者也九月勅罷征安南軍改江淮行省為江浙行省割江北諸郡𨽻河南改江淮為江浙三十路一府明年又併福建𨽻入江浙以蒙固岱為左丞相董文用為參政文用力辭上曰朕任卿不在錢榖細務當察其大者事有不便但言之時上命建佛塔於宋故宫有司奉行甚急大雪入山伐木死者甚衆猶欲併建大寺文用至則曰非時役民民不堪命少徐之如何長官曰參政奈何格上命耶文用曰非敢格上命也但今日困民力而失民心豈上意耶聞者意阻文用俊第二子也太常卿徐世隆卒世隆初為嚴實掌書記見上於日月山時方圖南征以問世隆對曰孟子有言不嗜殺人者能一之上曰誠如卿言後遷翰林學士太常卿朝廷大政多所咨訪詔命典冊悉出其手朝儀祭禮皆自世隆發之年八十卒罷放征占城軍士復分立集賢院冬十一月盧世榮伏誅先是監察御史陳天祥上疏極論世榮姦惡其畧曰盧世榮素無文藝亦無武功輿贜輦賄輸送權門所獻貲貨不充别立欠券銀一千定由白身擢江西𣙜茶轉運使專務貪饕所犯贜私狼藉隠祕者難以枚舉發露者始可明言凡掊取於人及盗官物鈔以定計者二萬五千一百一十九金以定計者二十五銀一百六十八茶以引計者一萬二千四百五十八馬以疋計者十五玉器七事它物稱是已納見追人所共知竟不悔罪狂悖愈甚以苛刻為自安之䇿以誅求為干進之門雖居丞轄實専大政名為試騐實授正權校其所能敗闕如此夫宰天下猶製錦衣如欲騐其能否當先試以布帛倘無效績所損或輕今捐相位以較賢愚猶捨美錦以量工拙其不可亦明矣且天地生財嵗有常數惟取之有節故用之不乏世榮欲以一嵗之期致十年之積廣要增羡不念困窮視民如仇為國斂怨今取其所行與其所言已不相副畧舉數端始言能令鈔法如舊鈔今愈虛始言能令百物自賤物今愈貴始言課程増三百萬定不取於民而辦今廹脅諸路官司増數包認始言能令民快樂今民間不勝其擾若不曲突徙薪終見焦頭爛額臣亦知阿附則榮寵可期違忤則禍患難測緘黙自固亦豈不能正以國家關係不淺憂深慮切不得不言疏聞召天祥與世榮俱至上都命御史中丞敖拉特穆爾等鞫治引世榮於上前皆欵服遂誅之十二月丁未皇太子珍戩薨太子初從姚樞竇黙學性至孝仁厚恭儉嘗服綾袷為瀋所漬命重臣染治左右請更製太子曰吾欲織百端非難顧此物未敝豈宜棄之東宫香殿成或請鑿池為流觴曲水太子曰古有肉林酒池爾欲吾效之耶暇則與贊善王恂等講論經典及貞觀政要武經等書李謙宋道等朝夕不離側又招致郭佑何偉徐琰馬紹楊居寛何榮祖楊仁風諸儒子並出入東宫阿哈瑪特專國未嘗少假顔色王著知太惡其姦故矯令搆變殺之盧世榮言利得幸尤深非之世榮卒得罪僧格素主世榮聞太子有言竟不敢救詔割隆興路為分地江西行省以嵗課羡鈔四十七萬貫來獻太子怒曰朝廷但令汝等安百姓百姓安錢粮何患不足百姓不安錢粮何用盡郤之參政劉思敬遣弟思恭獻新民百六十户太子問所從來對曰征重慶時所俘乃蹙然曰歸語汝兄此屬宜隨所在放遣為民王嘉惲進承華事畧凡二十事李謙𤓰爾佳之竒陳十事悉納焉時上春秋高南臺御史某上書請内禪太子聞之收大懼中臺留章不奏特濟格勒阿繖等欲發其事奏請百司吏案大索天下埋沒錢榖欲因以露之都事尚文白匿其牘不與特濟格勒等以聞命宗正色徹肯取視文大夫與丞相先劾特濟格勒乃阿哈瑪特餘黨贜罪狼藉上震怒曰汝等無罪耶丞相進曰臣等無所逃罪但此軰名載刑書而為此舉動揺人心上怒觧塔竒濟竟坐死太子益憂懼不自安遂薨年四十三賑糶京師貧民命於京師南城各設三鋪遣官吏發倉粟減其直以賑糶凡民凡白米毎石减鈔五兩南粳米減三兩嵗以為常評曰民之貧者以營計之不足也分田授業使各安其生而不奪其時不傷其力則衣食自足矣減價糶粟意則誠美然亦必入錢而後得粟如無錢者何又况止於京師天下貧民安得人人而濟之哉丙戌二十三年春正月復改司農寺為大司農司罷征日本時有司徴斂大為奸利董文用入奏言國家疲可寳之民取僻陋無用之小邦列其條目甚悉上亦以日本未嘗相侵今安南犯邊宜置日本專事交趾詔罷征日本召阿巴齊赴闕仍散所雇民船評曰日本固未嘗相侵然安南犯邊亦非其本意特以徴其入朝責以六事不得已而抗禦之耳盍亦反其本哉罷征日本是矣而専事交趾亦非也詔勸課農桑至元初詔守令以户口増田野闢詞訟簡盗賊息賦役均五事備者為上選三事有成為中選四事不備及五事俱不舉者黜降有差至是復詔克勤奉職者升奨其怠於事者笞罷之宋降臣吕文煥致仕以其子為宣慰使二月禁兵器命諸道按察司分巡郡縣毎嵗二月分蒞按治十月還司召曲阜教授陳儼京兆蕭㪺蜀人虞應龍儼㪺皆不至惟應龍赴京師封陳益稷為安南王居之湖廣詔復征安南以阿爾哈雅為安南行省左丞相鄂囉齊為平章烏瑪喇伊埒黙色阿里昝順樊楫並㕘政發江西湖廣江浙三省軍七萬船五百艘運粮十七萬分道進討諸将悉受鎮南王節制王由女兒關進阿巴齊為前鋒烏瑪喇由海道凡十七戰皆㨗三月以敏珠爾多卜丹為中書右丞楊居寛為參政車駕幸上都遣侍御史程文海訪求江南賢才先是文海言省院諸司皆㕘用南人惟臺憲無之江南風俗南人所諳參用為宜上以語御史大夫約蘇特穆爾對曰當擇賢者以聞上曰汝漢人用事者豈皆賢耶至是臺臣奏遣文海與行臺官博采公潔知名之士即命賷詔以往上素聞趙孟薖葉李名宻諭文海必致此二人文海又薦趙孟頫余慿萬一鶚張伯鶉胡夣魁曽希顔孔洙曽冲子凌時中包鑄等二十餘人評曰自古亡國之臣興王之良佐也彼不能用而亡此能用之則其興也宜世祖得江南拳拳焉訪求賢才可謂知所務矣然何地無才以天下之大當求之天下獨求之江南不亦隘乎以李起南為江西𣙜茶轉運使起南嘗言江南茶毎引價三貫六百文今宜増毎引五貫事下中書議因令起南為運使遣約蘇穆爾鈎考荆湖錢榖中書擬約蘇穆爾平章托克托呼參政上曰約蘇穆爾小人事朕方五年授一理算官足矣托克托呼人奴之奴令史宣使才也讀卿所進擬令人恥之其以朕意諭安圗評曰人君用人孰不欲進君子而退小人惟不知其為小人而進之不辨其為君子而退之於是乎不足以成善治而危亡繼之世祖知約蘇穆爾小人而猶用焉何異於知烏堇足以殺人而食之者乎夫理算官亦非輕選也用小人為之則傷民斂怨為害不細矣宰執用人若此豈獨可恥哉安圖蓋不得而辭其責也夏五月乙酉熒惑犯太㣲右執法京師旱六月丙申太白犯御女封播州楊邦憲妻田氏為永安郡夫人領安撫司事鴻吉哩岱阿必實克和塔拉罷以色徹肯為中書平章特穆爾為左丞秋七月罷遼陽行省詔定官制中書省除中書令外左右丞相並一員平章二員左右丞並一員參政僉省並二員樞宻院除院使外知院一員副使僉院並二員院判一員御史臺大夫一員中丞侍御史治書並二員行臺同六部尚書侍郎郎中員外郎並二員其餘衙門並委都省斟酌裁减仍詔諭中外評曰元之官名最為不正中書政本既有中書令矣復設左右丞相則丞相特中書令之佐職耳既以令為虚設左右揆為正宰相而復設平章政事則又以平章為宰相之貳矣然平章政事非宰相而何名之不正莫此為甚至其末流丞相而遥授焉則冗濫極矣又况員数之多乎置四川甘肅行省初四川𨽻陜西省後分陕西省於四川至是始置四川行省治成都甘肅行省治甘州九月八馬兒等國入貢一曰八馬兒二曰須門那三曰僧急里四曰南無力五曰馬蘭丹六曰那旺七曰丁呵兒八曰來來九曰急蘭亦䚟十曰蘓木都刺並貢方物冬十月己亥車駕還宫太白犯左執法河决河决開封祥符陳留把太康通許鄢陵闕濤闕闕尉闕陽武延津中牟原武胙等十五州縣發民丁二十一萬四千三百三十三人分築隄防立海道運糧萬户府以張瑄朱清並為萬户帝師達爾瑪巴拉實哩死䇿喇實巴鄂爾嘉勒嗣同僉樞宻院趙良弼卒良弼女直人本珠嘉氏音訛為趙家因為姓趙爾氏事上藩邸為陜西宣撫司參議官阿拉克岱勾較錢榖煆煉死者二十人良弼陳大義詞氣懇欵卒密不能誣琿塔噶叛良弼與汪惟正决議誅竒塔特布哈喇卜和卓其後人告廉希憲商挺有異志引良弼為証上切責之欲斷其舌良弼誓死保二臣忠良上意解奉使日本其國王使人先求國書不與至脅之以兵良弼曰不見汝主寜持吾首去書不可得也日本知不可屈遣人隨入覲上知之曰卿可謂不辱君命矣因奏日本險逺以有用民力填無窮巨壑勿擊便上從之以為同僉樞宻院辭歸懐孟以溫縣别業地三十頃析為二六與懐州四卑孟州永𨽻廟學是年卒後贈太保謚文正丁亥二十四年春正月以程鵬飛為中書右丞阿里為左丞巴雅爾哈雅為參政初立國子學初太宗朝以馮志常總教國子命侍臣子弟十八人就學至元初上命選十一人以長者四人從許衡童子七人從王恂至是立國子學於城東定制設祭酒司業監丞博士助教正錄伴讀等官生員百二十人𨽻集賢院大德八年增至二百人至大四年增至三百人延祐二年又增一百二十人用趙孟頫元明善所議貢試之法凡䝉古由科舉出身授從六品色目漢人逓降一級嵗貢八人上四人充部令史下四人各路教授其南城國子學遂為大都路學云評曰貢試之法䝉古色目與漢人逓降品級已非公論教授一郡之師表也而居部令史下選則大非崇儒重教之意矣蓋教授陞轉之難部令史遷擢之易故也以此立法恬於進取者能㡬何人哉閏二月勅祀帝堯廟毎嵗春秋二仲丙子日致祠平原郡公趙與芮卒以其子孟桂襲封以敏珠爾丹為中書平章范文虎為右丞商議樞宻院事詔復立尚書省以僧格特穆爾並為平章諤爾根薩哩為右丞葉李為左丞實都馬紹並參政中書仍設丞相平章參政並二員大都飢三月庚寅車駕幸上都更造至元寳鈔先是造交鈔以絲為本毎銀伍十兩易絲鈔一千兩諸物直並從絲例又造中統元寳鈔其文以十計者四曰一十文二十文三十文五十文以百計者三曰一百文二百文五百文以貫計者二曰一貫文二貫文毎一貫同交鈔一兩二貫同白銀一兩設諸路平凖庫主平物價使相依凖不至低昻毎路以一萬二千定為鈔本後又添造釐鈔二文三文五文凡三等尋以不便而罷然元寳交鈔行之既久物重鈔輕至是遂改造至元鈔自二貫至五文凡十一等毎一貫文當中統鈔五貫文仍隨路開庫貿易金銀以平凖鈔法毎花銀一兩入庫該價二貫出庫與二貫五分赤金一兩入庫該價二十貫出庫與二十貫五百文仍與中統鈔通行子母相權務在新者無冗舊者無廢其鈔昏爛者許就庫倒換入工墨錢三十文若貫百分明㣲有破損並令行用違者罪之所收昏鈔毎季解省部燒毁行省州縣委省憲官監燒鈔版先用木後鑄銅易之大抵元之鈔法至此蓋再變矣評曰錢幣所以權百貨也百貨天之所生地之所産嵗出有限而錢幣特國家爐鞲楮墨之所為者耳又况米粟布帛日耗月費而錢幣不可衣食流轉無窮必使錢幣為母而常少百貨為子而常多自然子母相權而可行之經久若錢幣與百貨之數同等則物重鈔輕亦其自然之勢也今元寳交鈔行之久而不能權百物者亡他子倍於母而已不推其本而更造至元鈔至元鈔他日子倍於母亦豈能無物重鈔輕之患哉又况以至元鈔一貫當中統鈔五貫則是自相輕重貴賤民志其能有定乎然當是時猶通行者則由隨路貿易金銀以平凖鈔法故也其後二十餘年至元鈔仍如交鈔而改用銀鈔銅錢以輕重失宜其弊益甚而止終元之世大抵鈔少則行鈔多則滯後之欲更錢幣者可不鍳兹諸王色徹圗部雨土凡七晝夜沒死牛馬馬八兒國入貢貢竒獸一類騾而巨毛白黒間錯名阿塔必即夏四月諸王納延反殺御史臺吏王良弼坐誹訕尚書省政事殺之籍其家上親征納延發上都先是有告納延反者上使巴延往覘之多載衣裘入其境輒以與驛人既至納延設宴謀執之巴延覺與從者出分三道驛人以得衣裳故争獻健馬由是得脫馳還白状上乃詔親征以巴延從因奏李庭董士選等将漢軍得以漢法戰從之六月以趙孟頫為兵部郎中孟頫宋安僖王子偁五世孫性敏而力於學程文海薦之入見才氣英邁神采煥發如神仙中人上顧之喜使坐左丞葉李上或言孟頫宋宗室子不宜近左右上不聽時詔議贜罪滿至元鈔二百貫者死孟頫曰始造中統鈔時以銀為本虚實相權及今二十年輕重相去至數十倍故改中統鈔為至元鈔後二十年至元鈔必復如中統鈔矣若計鈔抵法疑於太重古者以米絹為二實銀錢為二虚以絹計贜最為適中或以其譏國法責之曰今朝廷用鈔故犯法者以鈔計贜汝以為非豈沮格至元鈔耶孟頫曰法者人命所係議有重輕則人不得其死矣孟頫奉詔與議不敢不言公不揆事理欲以勢相凌耶其人有愧色上欲大用之議者以為難乃除兵部郎中評曰法者天下之平也一有不平則人無所措手足矣蓋以理而言吏而受賕固可為罪不必論其多寡然原其情則少者有可矜多者難幸免以少者或窘於衣食而多者則其末流將無所不至故也於是有滿貫至死之文且死者不可復生今以至元鈔二百貫為限它日物重鈔輕十不當一則一衣一食皆足以殺人無乃輕人命乎孟頫之論當矣秋七月壬寅熒惑犯輿鬼癸丑白虹貫日八月乙丑納延平車駕還宫納延黨塔布台率兵六萬逼行在而陣前軍敗之獲瀋其輜重千餘餘黨實都爾犯咸平宣慰托爾楚兵出州伊埒薩哈分兵趨懿州納延潰擒之其黨悉平從叛諸王謫赴江南三省從軍自效九月辛亥熒惑犯太微西垣上将壬子太白犯南斗高麗王來朝冬十月戊午朔日食殺中書參政郭佑楊居寛僧格檢劾中書虧欠鈔六千餘定平章敏珠爾多卜丹即自引伏參政楊居寛以為實掌銓選錢榖非所專僧格怒令左右拳其頰與參議貝降王巨濟各欵服遣實都奏聞上令丞相安圗共議毋令他日得以脅問誣伏為詞數日僧格又奏參政郭佑多所逋負尸位不言上命窮治與居寛皆坐棄市及僧格敗詔以二人死非其罪給還家貲復立遼陽行省以色徹肯羅壘特穆爾並為平為章洪察球爾為右丞伊埒薩哈左丞楊仁風阿喇卜丹並參政十一月熒惑犯太微東垣上相以僧格為尚書右丞相左丞葉李言前省臣所不能行者僧格能行之宜為右丞相制可僧格復請以特穆爾代為平章又請以諤爾根薩哩為平章遷葉李右丞馬紹左丞評曰葉李在宋朝則詆斥賈似道在元朝則黨庇僧格何忠於前而佞於後耶所以然者李本功利之徒其攻似道圖進用而已蓋訐而似直者也世祖以其忠直而任諸執政當是時安圖賢相也李豈不知之而昵比僧格不過為固禄位計耳此趙孟頫所以薄其為人也自郭佑楊居寛死行省督責逋負嚴峻至無所償逮及親隣械掠不勝楚毒自裁及死繫獄者以百數中外騷然廷臣莫敢言徹爾奏僧格姦貪誤國害民狀詞語激切上怒命批其頬徹爾辯愈力且曰臣數僧格罪不顧身者為國計耳茍畏聖怒則姦臣何由而除民害何由而息且使陛下有拒諫之名臣竊懼焉上乃悟僧格由是敗庚子太白晝見十二月丙寅亦如之大都路水十二月命西僧作佛事坐静於大殿寝殿萬壽寺五臺山等處凡三十三㑹詔招捕盗賊丞相僧格御史大夫約蘇特穆爾言江南歸附十年盗賊迄今未清宜降㫖立限招捕而以安輯責州縣之吏其不能者黜之葉李言臣在漳州十年詳知其事大抵官軍嗜利與賊通者尤難弭息宜令各鎮守官軍仍以三年遷轉庶革斯弊上皆從之鎮南王軍次安南陳日烜棄城走入海戊子二十五年春正月毁中統鈔版上畋于近郊以蒙固岱為江浙左丞相毁宋宫室為塔寺西僧嘉木揚喇勒智以宋宫室為塔一為寺五以雲南王額森特穆爾鎮大理三月丁亥熒惑犯太微東垣上相戊子車駕還宫遥授松江民曹夢炎浙東宣慰副使夢炎願嵗輸米萬石乞免他徭且求官職僧格以為請故有是命鎮南王托歡軍還陳日烜遣使來謝罪進金人以代已罪詔諭日烜入朝徐邳州雨雹大如雞卵傷麥夏四月廣東民董賢舉等作亂雲丹宻實討平之賢舉等七人皆稱大老聚衆反剽掠吉贛瑞撫龍興南安詔雄汀諸郡江西行院副樞雲丹宻實帥兵討之明年十月獲賢舉及丘應祥等送京師其黨遂平浙西大水杭蘓湖秀大水詔輟上供米二十萬石賑其貧者萬安寺佛像成凡費金五百四十兩水銀二百四十斤諸王庫庫岱叛綽和爾執之來歸河決襄邑詔皇孫北征撫諸軍討叛王和爾郭斯哈坦圗嚕罕等六月處州民栁世英等作亂浙東宣慰副使史耀討平之秋八月癸亥尚書省成九月置徴理司專治合追財榖以甘肅參政圗烈揚阿僉省吳誠並為徴理司使僧格又奏請以參政實都户部尚書王巨泉濟參議阿薩爾山東按察使何榮祖扎爾古齊圗固勒府卿李佑奉御吉丹御史戎益僉樞宻院崔彧斷事官燕真刑部尚書安佑御史巴延等理算江浙江西福建四川甘肅安西六省錢榖仍給兵為衛於是天下騷然江淮尤甚評曰理算錢榖非美政也而何榮祖崔彧等亦任其事而不辭者斯蓋僧格之深計欲屈名臣涖之以杜塞言者而彧等畏之亦不敢辭也海都犯邊巴圗約蘇圗迎撃死之以諤爾根薩哩為尚書省平章冬十月遣瀛國公趙㬎學佛于吐畨十一月以何榮祖為中書參政遣禮部侍郎李思衍等使安南立僧格輔政碑大都民史吉等請立石為僧格頌徳上曰民欲立則立之仍告僧格使之喜也於是翰林製文題曰王公輔政之碑樹於省前樓覆其上而丹雘之改釋教總制院為宣政院以唐吐番來朝於宣政殿故名其官僧俗並用軍民通攝秩從一品以僧格兼院使十二月以董文用為御史中丞初安圗奏文用為工部鷹侍郎阿哈瑪特疾之使監奏其不給鷹食上怒促捕之及入上望見曰董文用豈為汝治鷹食者邪至是拜中丞乃舉胡祗遹王惲雷膺荆幼紀許權孔從道等十餘人為按察使徐琰魏初為行臺中丞當時以為極選時僧格當國貴戚見之皆屏息文用獨不附之僧格使人風文用頌已功不答又自謂文用曰百司皆具食丞相府矣亦不答但取外郡所上盗賊之目謂之曰百姓非不欲安樂急法暴斂至此耳御史臺所以救時政之不及丞相當助之不當抑之也僧格愈恨摭拾臺事文用不為屈具奏其奸状詔報語宻而人不之知僧格方譖文用戇傲沮撓尚書省事上曰彼御史職也何罪僧格乃不敢言樞宻副使商挺卒挺曹州人金亂走冠氏與元好問楊奐逰東平嚴實聘為諸子師實卒子忠濟辟挺經歴上在關中召對稱㫖因從南征及憲宗崩上北還道遣張文謙與挺計事挺曰軍中當嚴符信以防奸詐文謙追及言之上大悟駡曰無一人言及此非商孟卿㡬敗大計速遣使至軍立約未㡬阿里布格果使人至執将而斬之誅阿拉克岱爾琿塔噶挺功為多上嘗以古良稱之趙炳之死事連挺下獄久之得釋復以為樞宻副使卒江浙丞相䝉固岱殺南臺中丞劉宣時䝉固岱悍戻縱恣常慮臺臣糾劾而尤畏宣一日宣與大夫出城見有以軍船載葦者御史張諒詣之知為省官所使詣揚州覆實蒙固岱怒使人入建康偵伺臺中違失臺官皆懼隂託以自解惟宣不為動䝉固岱日羅織宣罪逮繫宣子於揚州獄又令建康酒務淘金等官以罪免者誣告行臺沮壊錢榖事聞朝廷遣官往鞫治宣及御史六人俱就逮行省列兵衛驅廹之宣不勝憤遂自剄始宣将行以一緘付從子自誠令勿啓視宣死視其書云觸怒大臣誣搆成罪豈能與壟斷小人交口辨訟屈膝為容於怨家之前身為臺臣義不受辱當自引決但不獲以身徇國為恨耳嗚呼天乎實鍳此心且别有公文陳䝉古岱罪狀治書侍御史霍肅為叙其文讀者悲之行省奏宣罪重自殺竟不得白其寃然宣忠義節操為世所重聞者莫不悼惜延祐中臺臣以為言賜宣彭城公謚忠憲元史續編卷三
