body:
  text: 元史續編編年類提要臣等謹按元史續編十六卷明胡粹中撰粹中名由以字行山隂人永樂中官椘府長史此書大㫖以明初所修元史詳於世祖以前攻戰之事而略於成宗以下治平之迹順帝時事亦多闕漏因作此以綜其要起世祖至元十三年終順帝至正二十八年編年繫月大書分注有所論斷亦隨事綴載全仿通鑑綱目之例然綱目訖五代與此書不能相接其曰續編蓋又續陳桱書也黃虞稷千頃堂書目載有此書十六卷又别出元史評而不著卷數疑當時或析其評語别為一本以行如後漢書贊之例歟其中書法如文宗之初知存泰定太子天順年號而於明宗元年轉削而不紀仍書文宗所改之天厯二年進退未免無據又英宗南坡之變書及其丞相云云蓋欲仿春秋之文而忘其當為內辭亦劉知幾所謂貌同心異者其他議論雖尺尺寸寸學步宋儒未免過於刻畫然如謂張世傑奪舟斷港未能决性命於義利之間謂吳直方勸托克托舊作脫脫今改正大義滅親為不知春秋之義持論亦未嘗不正至于文宗隂謀害兄更能據故老傳聞揭史家未發之隱尤為有關于懲戒商輅等修續綱目全取此書為藍本並其評語亦多採之至明太祖起兵稱王以後續綱目即分注元年斥其國號而粹中獨大書至正直至二十八年八月而止內外之辭未嘗少紊其持論之公非輅等之所及又宋末二主不豫以統亦協其平鄭瑗井觀瑣言乃曰胡粹中元史續編又下于陳桱續編德祐北遷閩廣繼立宋之統緒猶未絶也乃遽抑景炎祥興之年于分書非綱目書蜀漢東晋之例云云何其偏歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
