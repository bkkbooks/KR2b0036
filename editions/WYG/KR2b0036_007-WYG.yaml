body:
  text: 元史續編卷七明胡粹中撰戊申武宗皇帝至大元年春正月以阿舒布哈為左丞相行御史大夫事浙東西饑紹興慶元台州廣徳建康鎮江六路饑死者二萬六千餘饑户四十六萬有竒以沒入朱家家物貨鬻鈔三十萬定賑之西僧敺上都留守李璧有上都開元寺西僧强市民薪民訴于璧璧方詢其地由僧已率其黨持白挺突入公府隔案引璧髪捽諸捶扑交下拽之以歸閉諸空室久乃得脱奔訴於朝僧竟遇赦免評曰留守之官惟天子之都有之葢謂車駕巡幸則留其兵以鎮守京邑備禦非常付託甚重非威足以懾奸邪權足以應機變曷能勝其任哉李璧留守上都而西僧得持杖突入公府其兵衛禁防疏濶亦甚威武葢不足稱矣宜其受辱也然奔訴諸朝而僧竟以赦免元政不綱一至於此可勝嘆哉三月戊寅車駕幸上都以胡長孺為寧海縣主簿長孺博通經史儒術宋季倅福寧州國亡歸金華永康山中世祖時用有司舉召見以為集賢脩撰與時相議不合改教授揚州元貞初攝建昌録事時程文海方貴顯其家勢凌鄉里人莫敢過問樹外門侵官道長孺命亟撤之至是調主寧海簿長孺為人光明宏偉得葉味道之傳於學涵養主敬黙存静觀超然自得慨然以斯道自任一時學者皆慕之與從兄之綱之紀齊名人稱為三胡云夏四月以托克托穆爾為中書平章遥授額爾吉納丞相等官遙授額爾吉納特穆勒徳爾右丞相哈喇和爾塔爾古台左丞相達實圖平章敏珠爾右丞又封阿舒布哈唐國公三寶努渤國公香山賔國公嘉琿太尉魏國公隴西雲南大震烏撤烏䝉三日中地震者六江淮河南山東大饑有父食其子者遥授宦者李邦寧左丞相邦寧錢唐人宋小黄門也從瀛國公入見世祖命給事内廷警敏稱㫖以為章佩監遷禮部尚書提㸃太醫院使上之初立也命邦寧為江浙平章辭曰臣以閹腐餘命無望更生前朝赦而用之使得承乏中涓髙爵厚禄寵榮過甚今陛下復欲置之宰輔臣何敢當縱且宰輔者佐天子共治天下者也奈何辱以寺人陛下不臣惜如天下後世何誠不敢奉詔上大悦加大司徒遥授左丞相勅行省宣慰等官非宣召毋輒赴闕以多来結托故禁之行都成立中都留守司濟寧大水入城遣禮部尚書阿爾輝等使安南緬國告即位也以阿爾輝及吏部侍郎李京兵部侍郎髙復禮使安南禮部侍郎管綽斯戩兵部侍郎多爾濟使緬汰省樞宻院官樞宻院世祖時樞臣六員成宗増至十三員今署事者三十二員乞省之勅罷塔斯岱等十一人以豢虎人徹爾濟蘇為監察御史塔喇海罷以塔斯布哈為右丞相竒塔特布濟克為左丞相秋八月特授和托太師為建第給鈔二萬錠九月丙寅蒲縣地震乙亥車駕還宫泉州大商馬合丹的進珍異寶帶評曰昔世祖時伯克瑪哈瑪廸沙進獻大珠要價數萬上曰珠何用當留是錢以賑貧者大哉帝王之識量也成宗則商胡竒塔特獻寳貨武宗則泉州大商進珍寳二君豈所謂無忝爾祖者哉以阿舒布哈知樞宻院封圗們為陽翟王冬十月辛丑太白犯南斗以西僧嘉勒斡巴勒為翰林承㫖省臣請避位省臣言夏秋之間鞏昌地震歸徳暴風㤗安濟寧真定大水廬舍蕩析人畜被災江浙饑荒之餘疾癘大作死者相枕藉父賣其子夫粥其妻哭聲震野有不忍聞此皆臣等不才猥當大任以致政事多舛乖戾隂陽使百姓䝉災願退避賢路上曰災異事有由来非爾等所致但當慎其所行以圗固勒伊蘇克布哈並知樞宻院省臣請汰冗官節財用省臣言世祖時諸司官有定員後畧増置成宗時又有㫖併省邇者一司至二三十員事不改舊而官日増又逓陞品級非便請依大徳十年定員其冗濫者悉與減汰又言今廪藏空虛中都築城大都建寺及為諸貴人營造私第軍民不得休息而用度日廣毎賜一人輒至萬定惟陛下裁察又言銓選錢糧各司乞毋干豫上曰已降制書諸人毋干中書之政他日或有乗朕忽忘持内降文記及傳㫖至中書者其執以来朕將加罪十一月庚申太白晝見禁回回商人馳驛省臣言回回商人持璽書佩虎符乗驛馬名求珍異而以一豹上獻復邀回賜似此甚衆臣等以為虎符國之信器驛馬使臣所需今以畀商人非宜乞一槩追之制可閏月太傅哈喇哈遜卒以齊勤特穆爾為中書平章罷江南進砂糖己酉二年春正月越王圗喇有罪賜死圗喇太祖次子察罕岱四世孫有勇力以手縛阿固台功封越王賜紹興路為其分地圗喇居常怏怏有怨望意去年秋上幸凉亭將御舟圖喇前止之曰人言一箭中麋毋曰自能百兔未得未可遽止葢國俗儕輩相靳之語上由是銜之及宴萬嵗山圗喇醉起解腰帶擲地瞋目謂上曰爾與我者至此耳上疑其有異志鞫之辭服遂誅之羣臣上尊號皇太子諸王百官上帝尊號曰統天繼聖欽文英武大章孝皇帝詔天下弛山澤之禁被災百姓内郡免差稅一年江淮惟免夏稅内外大小職官普覃散官一等有出身人考滿加散官一等追收内降璽書塔斯布哈竒塔特布濟克言諸人恃恩徑奏璽書不由本省直下翰林給與者今覈其數自大徳六年至至大元年所出凡六千三百餘道皆干田土户口金銀鐵冶悉課程進貢竒貨錢糓選法詞訟造作等事害及于民請追奪今後不由中書者乞勿與制可定釋奠禮春秋二丁牲用太牢乙未恭謝太廟以受尊號恭謝為親祀之始二月皇太子幸五臺寺三月車駕幸上都封額布根為襄寧王羅丹為雲南王梁王有風疾詔以羅丹代鎮其地夏四月江北山東河南北蝗令進獻者得乗驛省臣言杭州驛半年使人過者千三百餘輩有桑古保赫鼎進獅豹鴉鶻留二十七日人畜食肉千三百餘觔請自今逺方以竒獸異寳来者依舊驛逓其商人因有所獻者令自備資力從之更僧俗相敺令皇太子言宣政院先奉㫖敺西僧者截手詈者斷舌此法昔所未聞有乖國典僧俗相犯已有明憲乞更其令又言宣政院文案不檢之劾於憲章有碍遵舊制為宜並從秋八月平章石天麟卒天麟事太宗佐耶律楚才釐正庶務為中書斷事官憲宗遣使海都拘留二十八年得還拜中書左丞有譛安圗受海都官爵者世祖怒天麟曰海都宗親非仇敵比安圗不拒絶之所以釋其疑心而導之臣順也事遂解江南道觀藏宋主遺像為僧𤼵其事將置極刑以問天麟對曰遼主后銅像在西京者今尚有之不聞有禁令也亦得釋年七十餘賜以所御金龍杖頭曰杖此可出入宫掖上即位進平章至是卒年九十二立尚書省初托克托嘉琿帕哈哩迪音請復立尚書省分理財用臺臣言至元中阿哈瑪特綜理財賦立尚書省三載併入中書其後僧格用事奏復立事敗又併歸中書自大徳以来四方地震水災嵗仍不登百姓重困便民之政正在今日若復立尚書省治賦必増置所司濫設官吏非益民之事也且理財在人若止命中書未見其不可上曰卿言良是此三臣願任其事姑聽其行為左焉至是立尚書省以竒塔特布濟克為右丞相托克托丞相三寳努保巴並平章約希為右丞孟克特穆爾為左丞郝彬為參政劉楫商議省事改各行省為行尚書省以尚書省條畫頒詔天下敢有阻撓者罪之仍命舊事從中書新政從尚書省以塔喇海知樞宻院永平隕霜殺禾賜太師和托名多爾濟戩九月頒行至大銀鈔約希言鈔法大壊請更之圖新鈔式以進塔斯布哈言此大事請與老臣更議不從乃更造銀鈔頒行之初世祖嘗以文綾織為中統銀貨自一兩至三兩五兩十兩凡五等毎兩同白銀一兩而未及行至是銀鈔行乃下詔曰昔世祖始造中統交鈔以便民用嵗久法墮更造至元寶鈔今又二十三年物重鈔輕不能無弊乃循舊典造至大銀鈔毎一兩准至元鈔五貫白銀一兩赤金一錢隨路立平凖行用庫買賣金銀倒換昏鈔或民間絲線布帛赴庫回易依時值給價設常平倉豐年收糴遇歉減價出糴以遏沸湧金銀私買賣及海舶興販金銀銅錢絲綿布帛下海者並禁之中統鈔詔到日一百日盡數赴庫倒換茶鹽酒醋商税諸色課程至大銀鈔與至元鈔一體收受其銀鈔二兩至二釐凡十六等鈔法至是葢三變云削奪江浙平章嘉琿封爵行臺劾嘉琿詐言家貧冒受賜貨物折鈔二萬定且其人無一善可稱魏國公封爵宜追奪詔從之丙戌車駕還宫詔行銅錢立資國院尚書省言以銀鈔為母至元鈔為子宜與銅錢通行大都立資國院山東河東遼陽江淮湖廣四川立泉貨監六産銅之地設提舉司十九鑄錢曰至大通寶者毎一文准銀鈔一釐曰大元通寶者毎一文准至大錢十文與歴代錢通用其當五當三折二並以舊數用之復内降制㫖尚書省言三宫内降制㫖曩中書奏請勿行臣等以謂宜仍舊行之倘於大事有害則復奏請上是其言又奏乞盡以中書之務歸尚書從之以實廸為陜西左丞相立度支院冬十月以皇太子為尚書令御史大夫阿舒布哈卒以布琳尼敦為御史大夫阿舒布哈初事世祖平納延有功及安西之亂翊戴甚著勞效因得執政有蹴踘者命賜鈔十五萬貫阿舒布哈諫曰以蹴踘受上賞則竒技滛巧日進賢者將日退矣臣死不敢奉詔乃止嘗入侍見上容色日瘁進曰天下祖宗之天下陛下之位祖宗之位今陛下不思付託之重而惟麴蘖姬嬪是好是猶以兩斧伐孤樹未有不仆者也因命進酒阿舒布哈頓首謝曰臣方欲陛下節飲而陛下反命臣行酒是臣之言不信於陛下也左右皆賀得直臣卒謚忠烈後追封順寧王詔天下釋大辟百人以皇太后有疾故以濟爾哈朗喀喇托克托達都並兼知樞宻院十二月陽曲縣地震以巴延阿薩爾並為尚書平章和爾多卜丹為右丞特哩托歡賈鈞並為參政庚戌三年春正月減省中書官吏自客省使而下一百八十一員以李孟同知樞宻院事初孟既逃去有譛于上者曰内難初定時孟嘗勸皇太子自取上弗之信一日太子同上侍太后宴忽戚然改容上曰吾弟何不樂太子起謝曰今日之歡李道復之功居多適思之不自知其變於色也上即命搜訪之得於許昌徑山召見謂宰臣曰此皇祖妣命為朕賔師者宜速任之乃授平章集賢大學士同知樞宻院事丁亥白虹貫日立皇后鴻吉哩氏増減省院臺官員令中書官吏如安圗時例存設遷敘又減樞宻院官存知院七員同知副使僉院各二員同僉一員増御史臺官大夫中丞侍御治書各二員省通政院官六員存十二員二月寧逺王庫庫楚等謀反庫庫楚與越王圗喇子喇特納實哩謀為不軌事覺下庫庫楚獄賜其妻旺扎勒死竄喇特納實哩及其妻子于拜特穆爾所輝和爾僧特哩等二十四人同謀並磔于市阿薩爾濟爾哈朗罷三月壬辰車駕幸上都夏四月戊辰太白晝見六月以和爾多卜丹為中書右丞鄂齊爾為左丞秋八月甲寅白虹貫日以呼喇楚喇實並為御史大夫九月車駕還宫冬十月甲辰朔太白經天戊申上皇太后尊號號曰儀天興聖慈仁昭懿夀元皇太后以特古勒徳爾為西臺大夫十一月加托克托太師封義國公樂實封齊國公江浙左丞相達實宻江西左丞相拜布哈入朝復命朱虎張文龍治海漕朱淸子虎張瑄子文龍復治海漕各以所籍宅一區田百畆還之十二月殺武衛都指揮使鄭阿爾斯蘭尚書省臣奏鄭阿爾斯蘭與兄榮祖段叔仁等謀為不軌鞫之誣服詔叔仁等十七人並正典刑辛亥四年春正月癸酉朔上不豫庚辰崩于玉徳殿在位五年夀三十一謚武宗帝當富有之大業慨然欲創治改法而有為故其封爵大盛而遙授之官衆錫賚太隆而泛賞之恩薄至元大徳之政於是稍有更變云壬午罷尚書省托克托三寶努約希本巴王羆並伏誅流孟克特穆爾于海南以其變亂舊章流毒百姓誅貶之罷城中都竒塔特布濟克罷以特們徳爾為中書右丞相喀喇托克托為左丞相李孟諤勒哲並為平章塔斯布哈沙順並為御史大夫知樞宻院事復改行尚書省為行中書省召用先朝舊臣召先朝諳知政務素有聲望老臣平章程鵬飛董士選太子少傅李謙少保張閭右丞陳天祥尚文劉正左丞郝天挺中丞董士珍太子賔客蕭㪺參政劉敏中王思亷韓從益侍御趙君信亷訪使程文海杭州路逹嚕噶齊阿哈瑪特皆給傳詣闕同議庶務二月喀喇托克托罷為江浙左丞相以平章李孟兼領國子學事三月庚寅皇太子即位大赦時欲用隂陽家言即位東宫副詹事王約言於太保曲樞曰正名定分當御大内入奏之遂即位於大明殿黜罷陜西平章博囉特穆爾等御史言尚書省臣蠧國亂政已正典刑黨人布在百司亦須次第沙汰今中書奏用博囉特穆爾為陜西平章烏瑪喇江浙平章庫哩濟蘇甘肅平章逹實特穆爾河南參政烏遜江浙參政各人前任犯罪深重咸乞罷黜制曰可以李士英為中書左丞額卜徳埒勒為右丞察罕為參政寧夏地震遣宦官李邦寧釋奠國學上以邦寧舊臣遣行釋奠禮方就位忽大風起殿上及兩廡燭盡滅邦寧悚息伏地諸執事者皆伏良久風息乃成禮邦寧因慚悔累日評曰祭祀所以交神明故將有事焉必先射以觀徳及期則齋以告䖍戒以告潔刑罪喪疾之人不敢以與執役况敢主其祭乎邦寧閹腐餘醜其為刑疾孰甚焉而使之釋奠曽謂仲尼不如林放乎神不享非禮大風之變吾先聖豈可誣哉仁宗英主宜不至此李孟以平章兼領國學而致其君以非禮事先聖罪葢不容揜矣夏四月以張閭為江浙平章上戒之曰以汝先朝舊臣故命汝往民為邦本無民何以為國汝其上體朕心下養斯民罷行至大銀鈔銅錢詔曰世祖皇帝參酌古今立中統至元鈔法天下流行公私䝉利五十年于兹矣比者尚書省不究利病輒意變更既創至大銀鈔又鑄至大大元銅錢鈔以倍數太多輕重失宜錢以鼔鑄弗給新舊恣用曽未再期其弊滋甚爰咨廷議輿言皆願變復舊制其罷資國院衆貨監提舉司買賣銅器聽民自便應尚書省已𤼵各處至大鈔本銅錢截日封貯行使者赴行用庫倒换南陽等處風雹五月定翰林院官員數承㫖五員學士侍讀侍講直學士各二員復太常禮儀院為太常寺内侍楊光祖等並授𢎞文館學士光祖為秘書卿譚振宗武備卿闗居仁尚乗卿並授𢎞文館學士大同獻麒麟宣寧縣民家産犢而死頗類麒麟車載以獻左右曰古所謂瑞物也上曰五榖豐熟百姓安業乃為瑞耳初上御便殿李孟進曰陛下御極物價頓減方知聖人神化之速敢以為賀上蹙然曰卿等能盡力賛襄使兆民乂安庶㡬天心克享至於秋成尚未敢必今踐祚曽未逾月寧有物價頓減之理朕託卿甚重前言非所賴也孟愧謝上嘗覽貞觀政要諭翰林侍講阿拉克特穆爾曰此書有益於國家其譯以國語刋行俾䝉古色目人誦習之評曰李孟可謂功臣矣非大臣也夫大臣之道事君而格其非心豈有先事逢迎以愚誑之者哉且物價低昻由嵗之豐歉楮之多寡所致幣少而嵗豐則物價自減幣多而嵗歉則物價自増亦理勢使然雖堯湯在位亦不能制其􅊠昂焉有新君御極數月物價頓減之理乎孟為是愚誑而其君能覺之亦可謂明也已噫李孟且若是彼䝉古色目之徒烏足怪哉秋七月甘州地震大風有聲如雷閏月遣使祠曲阜命國子祭酒劉賡以太牢致祠詔興學校舉賢才上諭省臣曰國子學世祖深所注意如博果宻等皆䝉古人而教以成才朕今親定國子生額為三百人仍増陪堂生二十人通一經以次補伴讀著為式諤勒哲李孟等言方今進用儒者而老成日以凋謝四方儒士有成才者請擢任國學翰林秘書太常或儒學提舉等職俾學者有所激勸上曰善自今勿限資級果才而賢雖白身亦任用之八月遥授安南王陳益稷入見益稷言自世祖朝来歸妻子皆為其國人所害朝廷因遥授王爵賜漢陽田五百頃俾自贍今臣年㡬七十而有司拘所受田就食無所上謂省臣曰益稷慕義来歸宜厚賜以懐逺人其進勲爵授田如故詔改元詔曰踰年改元厥有彝典其以至大五年為皇慶元年冬十一月罷營繕李孟奏錢糧為國之本先朝毎量入為出恒務撙節故倉庫充牣今毎嵗支鈔六百餘萬定又土木營繕百餘處計用數百萬定内降㫖賞賜復用三百餘萬定北邉軍需又六七百萬定今帑藏見貯止十一萬餘定若此安能周給自今不急浮費宜一切停罷上納其言悉罷諸營繕都水監傳㫖給驛往杭州取所造龍舟省臣諫曰陛下踐阼誕告天下凡非宣索毋得擅進誠取此舟有乖前詔亟命止之明年又罷營諸王大臣私第竄諸王布琳尼敦等布琳尼敦等誣告班布爾實不法詔竄布琳尼敦圗罕於河南伊克鼐爾於揚州納琳於湖廣台納於江西巴勒楚納克於雲南以阿薩爾為中書平章十二月庚辰太白經天癸未壬辰如之勅内降㫖一切勿行省臣言世祖定立選法升降以示激勸今官未及考或無故更代或躐等進階僭受國公丞相等職諸司已裁而復置者有之今春以来内降㫖除官者千餘人其中欺偽豈能盡知壊亂選法莫此為甚上曰自今凡内降㫖一切勿行浙西水災免海漕糧四分之一存留賑濟元史續編卷七
