body:
  text: 元史續編卷十明胡粹中撰戊辰致和元年九月壬申文宗皇帝改天厯元年泰定皇太子即位上都亦改天順元年春正月脩京城二月庚申詔改元詔天下改泰定五年為致和元年免河南自實田糧一年被災州郡稅糧一年流民復業者差稅三年疑獄繫三嵗不决者咸决之壬戌太白晝見壬申雨霾己卯上受佛戒於京師戊子車駕幸上都先是將幸桞林御史王獻等以嵗飢諫上曰其禁衛士毋擾民家命御史二人巡察之徙懐王圗卜特穆爾居江陵勅蒙古色目人親喪不得丁憂有犯者除名從逹實特穆爾道拉實之請也陜西河南四川郡縣饑夏五月廣西妖僧陳慶安作亂尋討平之庚辰有流星大如缶秋七月辛酉朔寧夏地震庚午帝崩於上都夀三十六帝雖裕宗長孫以自立故文宗登極不為立廟諡世止稱為泰定帝評曰泰定在位五年大水旱蝗無嵗無之而又天變于上則太白經天白虹貫日雨土風雹地變于下則山崩海溢地震河决曽弗之恤而日事宴樂新作棕殿造玉御牀製金寳蓋以貯舎利屢興工功營建塔寺以祈福福何自而至哉於是飢饉連年而募民納粟盗賊並起而立格招捕民瘼日滋而分道遣使宣撫宋本言事不報張珪上疏不從所謂本之則無如之何者也享年不永固其所宜然國勢衰削亦自此矣己卯大寧地震丙戌太白犯軒轅大星八月甲午同僉樞宻院事雅克特穆爾等舉兵京師執中書平章額卜徳哷勒等下獄遣使迎懐王圖卜特穆爾於江陵初帝自晉王入居大統道拉實柄國狡愎自用災異數見而周懐二王播遷南北人心思之是年春帝畋柳即林以疾還宫諸王們都阿穆爾台等與雅克特穆爾謀上有不諱諸扈從者執諸王大臣殺之居京師者即縳省䑓官宣言太子正位傳檄守禦諸關及幸上都們都等從雅克特穆爾與安西王喇特納實哩等居守時額森鼐私至上都與道拉實謀不利于懐王帝崩道拉實與梁王旺沁遼王托克托結黨害政人皆不平於是雅克特穆爾與安西王陰結勇士八月甲午黎明百官集興聖宫雅克特穆爾率額哩音特穆爾博囉等十七人皆露刃號於衆曰武皇有聖子二人正統皆歸之有不順者斬乃手縳平章額卜徳哷勒巴延徹爾分執左丞多岱參政王士熙參議托克托呉秉道侍御史特黙格丘世傑治書托歡詹事丞王桓等皆下獄即遣前河南參政明埒棟阿等馳驛迎懐王於江陵仍宻諭河南平章巴延令備兵迎䕶雅克特穆爾與安西王共守内廷又與右丞趙世延翰林承㫖伊拉齊通政使哈沙等分典機務調兵守居庸關及蘆兒嶺徴諸衛兵屯京師及白馬甸太和嶺遷民中鎮下郡縣造兵器出金帛犒軍士雅克特穆爾直宿禁逹旦不寐一夕或再徙人莫知其處雅克特穆爾綽和爾之子托克托呼孫巴延青哈之孫謹濟爾之子也雅克特穆爾以拜布哈為中書左丞相達實哈雅為平章蘇蘇為左丞王布琳吉達為樞密副使雅克特穆爾又遣且薩里布哈迎懐王令達實特穆爾詐為懐王使者揚言已次近郊又令奈曼偽自北来稱周王亦整兵南行聞者皆恱又徴宣靖王邁努諸王雅克布哈于山東雅克特穆爾遣使召西臺侍御史瑪扎爾台陜西平章特黙齊皆不至惟雅克特穆爾之子騰吉斯與其叔父薩敦自上都逃来遂命二人守居庸等闗雅克特穆爾自為知樞密院事以特黙齊為御史中丞上都道拉實殺諸王們都等諸王們都阿穆爾台庫庫楚平章瑪嚕集賢學士烏魯斯布哈太常禮儀院使噶海齊等十八人同謀援大都事道拉實殺之陜西大旱人相食雅克特穆爾遣御史喇嘛凱巴等招諭陜西皆見殺河南行省殺其平章竒嚕右丞拜特穆爾參政圗卜台甲辰懐王發江陵庚戌次汴梁明埒棟阿至懐王遂發江陵召鎮南王特穆爾布哈威順王庫春布哈湖廣平章之特穆爾布哈来㑹執右丞瑪哈穆特送京師以博索代命河南省造銀符以給有功者又命出府庫金千兩銀四千兩鈔七萬一千定頒賜將士有司造乗輿供帳遂陞平章巴延為左丞相遣兵守潼闗時伊埒特穆爾家居汴梁巴延矯制起為本省參政辭曰皇子北還若問參政受命何人則將無詞以對巴延怒而明埒棟阿嘗為伊埒特穆爾所劾因說巴延收之丞相拜布哈亦與之有隙乃編置于海南阿克蘇衛指揮使托克托穆爾自上都来歸命守古北口上都遣兵分道南侵托克托穆爾與戰敗之斬其將竒徹擒奈曼岱上都諸王及用事臣議分道南侵留遼樞王托克托太師多岱左丞相道拉實知密院特穆爾圗居守命諸王實喇平章奈曼岱詹事竒徹来戰托克托穆爾禦之斬竒徹擒奈曼岱實喇敗走丁巳懷王圗卜特穆爾入京師丙辰雅克特穆爾備法駕蘇郊迎丁巳王入居大内遣蘇宣諭中外凡金榖銓選刑訟興造悉由中書諸司及近侍敢有隔越奏請者以違制論從監察御史糾訪又賜上都來歸將士官吏鈔物有差以蘇蘇為中書平章曹立為右丞張友諒為參政巴延為御史大夫趙世延為中丞特穆爾布哈知樞宻院伊蘇岱爾同知院事額森鼐為宣徽院使上都兵入遷民鎮管州上都諸王額森特穆爾平章圗們岱爾自遼東以兵入遷民鎮巴特瑪等以所部兵入管州殺掠吏民造兵器括馬造兵器十萬事江浙江西湖廣六萬内都四萬遣使分行畿内河南等路拘括民間馬匹賜鎮南王等金帛鎮南王特穆爾布哈威順王庫春布哈宣靖王邁努各賜金五十兩銀五百兩幣三十匹以明埒棟阿庫庫岱並為中書平章九月上都兵攻碑樓口進逼崞州雅克特穆爾督兵禦之殺中書平章額卜徳哷勒特黙格流左丞多岱參政王士熙等於遠州上都皇太子即位改元天順壬申懐王雅克特穆爾即皇帝位於京師大赦天下九月丁卯雅克特穆爾率諸王大臣請懐王早正大位王辭曰大兄在朔方朕安敢紊天序圗卜特穆爾曰人心向背機不客髪一或失之噬臍無及王曰必不得已必明示天下壬申王即位於大明殿詔曰昔世祖之後成武仁英以公天下之心相傳咸遵祖訓至於晉邸具於有盟書願守藩服而與賊臣特克實等同謀冐干寳位今六年灾異迭見權臣道拉實自用疎逺勲舊廢棄忠良變祖宗法度大行賔天利於立㓜專握國柄用成其奸宗王大臣以宗社之重統緒属於朕躬朕以菲徳宜俟大兄固讓再三咸謂天下不可一日無主周王遼隔朔漠民庶皇皇誠懇廹切朕姑從所請謹俟大兄之至以遂初心已於致和元年九月十三日即皇帝位改今年為天厯元年大赦天下評曰夫有天命而得天下者謂之天子天命不在不容以强為天命所在不得而苟避昔者舜避堯之子禹避舜之子皆終陟帝位者天命所在故也項羽㓕秦王莽簒漢而終至覆㓕者天命不在故也豈有今日姑居其位明日將辭其位如奕棋位之不定者哉元之文宗既從雅克特穆爾諸臣推戴即而改元矣下詔天下乃曰姑從所請謹俟大兄之至以遂固讓之初心夫既踐天子之位矣則他日無降為人臣之禮既改元天厯矣則後日無削去紀年之理即位改元天下之大事烏可輕哉且和實拉在當時雖武宗之世嫡在先朝則文宗之罪人彼其逃君父之命負背叛之誅竄身漠北正以春秋之法其不可以君天下亦明矣文宗既不明此義姑以推讓為辭又不誠此心終以戕殺獲罪豈非所謂為人君父而不通於春秋之義必蒙首惡之名者歟封雅克特穆爾為太平王遣將兵擊遼東軍以太平路為食邑賜金五百兩銀二千五百兩鈔萬定平江官地五百頃以雅克特穆爾為中書右丞相知樞宻院加巴延太尉曹立罷以伊實通斡為中書右丞張思明為左丞多爾濟為江浙左丞相阿爾斯蘭為南䑓大夫乙亥上都兵襲破居庸關雅克特穆爾還軍次榆河旺沁兵襲破居庸闗將士皆潰丙子㳺兵至大口雅克特穆爾還軍次榆河帝出齊化門視師丁丑雅克特穆爾来見曰乗輿一出人心必驚軍旅之事臣請以身任之上于是即日還宫雅克特穆爾等與上都兵戰擊走之雅克特穆爾與上都兵戰于白浮之野手刃七人于陣敗其兵托克托穆爾與遼東軍戰薊州之檀子山㑹大霧旺沁等遁獲其頒詔及徴兵遼東使者悉誅之以拜布哈圗勒噶特穆爾雅克布琳並知樞宻院拜布哈尋加太保上都兵入古北口雅克特穆爾出戰敗其兵擒駙馬博囉特穆爾等斬之旺沁收敗卒復来戰列陣白浮後之西至夜薩敦托克托穆爾前夾攻敗走之追及昌平斬數千級降萬餘人旺沁單騎亡去薩敦追之弗及而還既而又分兵入古北口掠石槽雅克特穆爾遣兵倍道而前掩擊之大兵既至轉戰四十餘里至牛頭山擒駙馬博囉特穆爾平章蒙古達實特穆爾院使蘇爾逹琿悉斬以徇降者萬人餘皆奔竄於復遣薩敦出古北口逐之托克托穆爾又與遼東軍戰薊門南殺獲無算京師戒嚴初募京師丁壯千人守城又調河南軍老㓜五萬増守京師丁壯守直沽調臨清運糧軍三千五百並御河分守山東丁壯萬人守諸處海港居庸關累石以為固代州鴈門闗崞州陽武關嵐州天澗口皮庫口保徳州塞底天橋白羊三關石州塢堡口汾州向陽闗烏門關吉州馬頭秦上嶺二闗靈石縣陰地關皆令穿塹壘石調丁壯守之上都兵入紫荆關進逼涿州諸王呼喇台等兵入紫荆關將士皆潰行院官布延烏兵徳美指揮使伊蘇岱爾將兵援之又遣托克托穆爾將四千徃救援卒南走掠保定同知阿里舒及故平章張珪子景武等率民持梃擊死數百人㑹額森鼐軍至殺阿里舒及景武兄弟五人呼喇台游兵進逼南城乃令户出壯丁持杖從軍士乗城諸門列瓮貯水以防火托克托穆爾章吉與額森鼐合擊敵兵於良鄉南轉戰至盧溝橋呼喇台被創遂遁去召雲南左丞相額爾吉納不至評曰泰定在位五年嘗立皇太子天下人心已有所屬望矣今而崩逝神器有歸理無可疑者而京師搆兵懐王入立事勢異常此額爾吉納所以不至也歟再召不至疑若有為者然乃進不能効力於泰定退不能保障於一方卒之為圗卜沁布哈等所逐其忠智舉不足稱矣西臺大夫額森特穆爾引兵入河中府河東官吏皆棄城走雅克特穆爾與陽翟王太平戰於􅀥林擊斬之西䑓執詔使送上都使者頒即位詔於甘肅行至陜西行䑓官塗毁詔書械使者送上都以托克托穆爾額布勒二人知樞宻院伊拉齊為御史大夫圗們岱爾復入古北口北雅克特穆爾撃却之齊王伊埓特穆爾等圍上都道拉實等出降齊王及元帥布哈特穆爾等圍上都道拉實等奉皇帝寳出降梁王旺沁遁走終殺遼王托克托天順帝不載所冬十月丁未告祭南郊時富珠哩翀以太常僉院充禮儀使詳記行禮節文於笏遇至尊不敢直書識以兩圏上偶取笏視曰此為皇帝字乎因大笑以笏還翀由是見重嘗呼子翬不名達實哈雅罷以竒徹台為中書平章伊埒布哈為御史中丞陜西兵至鞏縣據虎牢守將潰走儲仗悉為所獲又奪武關守將楊克忠等軍亦潰罷内郡及行省兵以布哈特穆爾知樞宻院雅克特穆爾辭知院命其叔父布哈特穆爾代之元帥伊蘇岱爾執湘寧王巴拉實哩歸於京師巴拉實哩泰定帝弟子也承上都命起兵陷冀寧還次馬邑被執所俘男女千人悉縱還家毁顯宗廟室升順宗祔右穆第二成宗右穆第三武宗左昭第三仁宗左昭第四英宗右穆第四室評曰顯順二君皆裕宗庶孽未嘗一日君臨天下特以武皇繼統而追王順宗泰定入立而推尊顯廟稽諸典禮則二廟皆不當立揆之人情順宗之廟若不可廢則顯宗之廟亦不當毁矣又况泰定得國於英宗未嘗干武宗之統也文宗何為而深讐之乎他日順帝撤文宗廟主豈非所謂出乎爾者必反乎爾者歟加雅克特穆爾逹爾罕之號詔諭羣臣曰今臣僚惟丞相雅克特穆爾大夫巴延許兼三職署事餘並從减省盗殺太尉布哈初布哈乗亂率衆掠居庸以北民皆為所擾至是盗入其家殺之興和路捕得盗論死刑部議布哈不道衆所聞知幸遇盗殺而本路隐其罪惡獨論盗死於法不當中書以聞上嘉而從之十一月額森鼐兵至武安額森特穆爾以軍降於是河東郡縣盡殺其所署官吏陜西兵方偪汴梁地聞之亦解去廢泰定皇后巴拜哈斯居東安州尋弑之蘇蘇有罪杖徒坐受賂杖一百七徙襄陽以母老復留京師躬祀太廟評曰告祭南郊躬祀太廟皆人君即位之始事古所謂告嗣天子王矣者也而猶以推讓為辭天地祖宗豈可欺也哉遣使迎皇兄周王和實拉於漠北皇子寳寧更名太平訥命養於大司農敏珠爾家以敬儼為中書平章伊埒布哈為右丞徹爾特穆爾為左丞癸未殺道拉實等道拉實磔尸於市旺沁賜死茂穆蘇寧珠薩題勒宻實額森特穆爾皆棄市評曰道拉實雖專國柄然猶盡心於所事兵敗力屈分當一死今乃出降遂受顯戮失大臣之道矣然文宗殺降亦非也拜布哈罷四川平章囊嘉特反囊嘉特自稱鎮西王以其省左丞托左克托為平章前雲南亷訪使楊静為丞殺平章科綽等燒絶棧道烏蒙路教授杜岩肖勸其罷兵入朝囊嘉特以其妄言杖一百七禁錮之十二月作佛事大明殿延春閣興聖宫隆福宫萬嵗山並命僧建佛事竄額森鼐於南寧追贈諸王圗們等爵諡贈圗們果王阿蘇瑪特毅王庫庫楚等十七人並賜功臣號及官階爵諡阿爾輝特穆爾等六人在上都謀南歸不克而死詔並賜贈諡卹其家復遣治書薩題等奉迎周王改封安西王喇特納實哩為豫王以徹爾特穆爾為中書右丞伊埒特穆爾為左丞趙世安為參政勅蒙古色目人親喪願丁憂者聽評曰子生三年然後免於父母之懐故三年之喪天下之通喪也䝉古色目不生於空桑獨無父母之愛乎且自天地以來有父子然後有君臣若為君者教其臣以無父則為臣者他日必至於無君其始也道拉實以色目疎族而别之於三年喪之外文宗入國首革其弊當矣加巴延太保布哈特穆爾太尉香山司徒復遣使召額爾吉納不至陜西大旱饑自泰定二年不雨至是嵗大飢人相食河北山東有年是嵗天下課稅之數金二萬四千四百三十兩銀七萬七千五百一十八兩銅二千三百八十斤鐵九十二萬四千五百四十三斤課鈔一千八百七十五定四十八兩鉛一千七百九十八斤錫丹礬磏粉課三千四百十定竹木課鈔一萬二千九百六十定鹽二百五十六萬四千引該課鈔七百六十六萬一千定茶課二十八萬九千二百一十一定酒醋課五十四萬一千九百五十定錢二十萬一千一百一十七索商課九十九萬八千三百定厯日鈔四萬五千九百八十定契本鈔九千一百十四定河泊山蕩窑冶鈔六萬一百一十定房地門攤三萬八千九百五十二定池塘蒲葦荻柴柳竹薑漆山查等課六千七百五十五定抽分撞岸牙例五百三十八定食羊乳牛魚苗羊皮麴酵等課二千三百二十六定煤炭磁課二千六百七十二定通為鈔九百六十七萬六千一百五十八定又包銀差發鈔九百八十九定錢一百一十三萬三千一百十九索絲一百九萬八千八百四十二斤絹三十五萬五百三十匹綿七萬二千十五斤布二十一萬一千二百二十三匹又印造鈔三十四萬一千四百一十定夏稅鈔十四萬九千二百七十三定秋糧一千二百十一萬四千七百石而海運之數三百二十一萬五千四百石己巳文宗皇帝天厯二年春正月己未朔立都督府以總左右欽察及龍翊等衛以特穆爾布哈為中書左丞相王毅為平章竒徹台知樞宻院雅克特穆爾為御史大夫起復史惟良為中丞齊王伊埒特穆爾薨復遣中書左丞伊哷特穆爾奉迎周王丙戌周王和實拉即皇帝位於和寧之北上之初即位也詔天下曰謹俟大兄之至遂朕王固讓之心遣哈克繖薩題等相繼奉迎朔漠諸皆勸周王南還遂發北邊諸王阿齊台元帥圗烈訥萬户瑪嚕等帥兵以從舊臣博囉尚嘉努哈巴爾圗隨至金山之北行省平章普爾普武寜王徹辰圗僉院特穆爾布哈俱來迎正月己酉薩題等並至見王于行幄以皇弟命勸進丙戌遂即帝位仍命薩題還報詔招諭囊嘉特初御史䑓奏囊嘉特拒命罪不可宥宜悉追奪所授制命省臣言今方許其自新則御史言宜且勿行從之遂遣人招諭囊嘉特攻播州誘其弟陜西元帥布哈台弗從囊嘉特乞師於鎮西武靖王吹巴勒吹巴勒以兵守關隘乃攻播州猫兒埡宣慰使楊雅爾布哈開關納之又遣人招其弟布哈台不從斬其使囊嘉特遂焚雞武大橋又焚棧道中書奏請節用中書奏賞賚不得濫及無功鷹鶻獅豹舊支肉價二百餘定今増至萬三千八百定控鶴舊止六百二十八户今増二千四百户佛事嵗費以今比舊多金千一百五十兩銀六千二百兩鈔五萬六千二百定幣帛三萬四千餘匹請悉减汰從之中政院又言皇后日用所需鈔十萬定幣五萬匹綿五千斤詔鈔予所需之半幣給一萬匹賜潛邸說書劉道衡等官道衡等四人從七品薛允等十六人從八品汴梁州縣官扈從者三十四人並陞階秩陜西大饑諸路飢民凡一百二十三萬四千餘口流民又數十萬二月庚寅雅克特穆爾復為右丞相遣宣靖王邁努詣行在辛卯京師立皇后鴻吉哩氏后名布達實哩駙馬魯王多阿克巴拉女遣使祠曲阜以翰林侍講學士曹元用徃祠追尊皇妣伊竒哩氏唐古氏並為皇后伊竒哩氏諡仁獻章聖唐古氏諡文獻昭聖己酉熒惑犯井合淝縣地震囊嘉特據金州分兵逼襄陽陜西省督軍禦之又命湖廣省臣托歡薛博囉及鄭昂霄等帥兵進討仍令薩題勒宻實將本部蒙古軍㑹鎮西武靖王等同進仍發河南山東江浙江西兵㑹討播州土官楊雅爾布哈來降立奎章閣學士院在興聖殿西命儒臣進經史之書考帝王之治秩正二品以和塔拉都哩黙色趙世延為大學士薩勒迪虞集並為侍書學士三月戊午朔車駕自北漠次格根察罕辛酉京師遣右丞相雅克特穆爾北迎大駕遣雅克特穆爾奉皇帝璽詣行在又遣知院圗勒噶特穆爾中丞巴濟拉翰林直學士瑪哈穆特興瑞院使嘉琿宣徽副使章吉中政僉院托音通政院使諾海太醫院使吕廷玉給事中約羅中書斷事官呼魯古爾右司郎中巴哩珠左司員外郎王徳明禮部尚書巴勒噶齊等從行奉金千五百兩銀七千五百兩備賜予於是上復諭廷臣曰寳璽既北上繼今國事其遣人聞於行在改懐邸所臨幸郡名建康曰集慶江陵曰中興瓊州曰乾寧潭州曰天臨行在遣伊哷特穆爾還京師諭㫖曰朕至上都宗王大臣皆必來㑹有司當備供帳聞上都積貯已為道拉實所耗費大都府藏聞亦空虛若有不足其以御史䑓大司農司宣徽宣政等院所貯充之雲南亂逐其左丞相額爾吉納雲南諸王達實布哈與圗卜沁布哈及平章瑪蘇庫等集衆五萬數丞相額爾吉納專擅十罪將殺之額爾吉納逃入八畨達實布哈等仍偽署官吏丁亥雨土霾夏四月癸巳雅克特穆爾見帝於行在詔加太師以哈巴爾圗為中書平章巴延特穆爾知樞密院博囉為御史大夫雅克特穆爾奉上寳璽帝諭之曰凡京師百官朕弟所用者並仍舊其諭以朕省意雅克特穆爾因奏陛下君臨萬方國家大事所任者院䑓而已宜擇人而居之帝然其言乃撮用武皇舊臣特哈巴爾圗等又立行樞宻院命昭武王和斯兼領賽音穆爾邁努並同知院事是日宴諸王大臣於行殿帝從容謂䑓臣曰太祖嘗有訓美色名馬人皆玩之然方寸一有係累即能敗名喪徳卿等亦嘗念及此乎世祖初立䑓省命塔齊爾巴特嘉勒二人恊司其政天下國家譬如一人之身中書則右手也樞宻其左手也左右手有病治之以良醫所謂良醫御史䑓是也故省院缺失必御史䑓治之凡諸王百司違法越禮一聼舉劾風紀重則貪墨懼猶斧斤重則入木深也朕有缺失卿等亦當以聞不汝責也又命索羅傳㫖諭省院諸臣曰世祖立省院䑓及百司庶府職掌有定制集律令章程為萬世法成宗以來列聖罔不恪遵成憲今朕繼統凡百司庶政詢謀僉同標譯所奏以告軍務宻院當即以聞毋間夙夜他事必先中書毋得隔越陳請倘違朕意必罰無赦丁酉行在命特穆爾圗為上都留守行在遣使至京師立上為皇太子癸卯遣左丞相特穆爾布哈攝告即位於郊廟社稷又遣武寧王徹辰圗及哈巴爾圗至京師即立上為皇太子評曰文宗自去嵗九月壬申踐祚今年四月癸卯巳八閱月紀元天厯已及二載詔令所頒徧及海内盖居天子之位行天子之事乆矣而又告祭郊廟得見於上下神祗冊立皇后共承宗廟社稷焉有復為皇太子之理乎夫騎虎者勢不能下明宗貪其寳位而不審於理勢之不可其及也宜哉行在以徹爾特穆爾為中書平章竒爾濟蘇為右丞又以齊喇濟爾噶朗並為甘肅平章呼喇台江浙平章諾海嶺北平章送寳官吏升秩一等從者賚以幣帛行在詔申飭臺綱御史言嶺北國家肇基之地方面重寄豈可輕任曩平章塔竒濟奴事道拉實崛起驟遷今年已七十眊昏殊甚左丞茂穆蘇本晉邸小民以女妻道拉實遂得進用郎中羅里亦市井細人圗嚕忽起自衛卒並宜罷斥帝曰御史言甚善其並黜之因諭䑓臣曰自今當言者勿有所憚苟被劾之人營求伸訴朕必罪之或亷非其實毋輒以上聞評曰申飭䑓綱固為治之一端然是時明宗大位雖正鑾輿未旋人心之懐疑者猶多歸附者未固而連出宰輔申飭䑓綱芒角於是乎露矣權奸猜貳遂起邪謀所以致翁果察圗之變歟皇太子封博囉布哈為鎮南王河西旱蝗山東河南北饑飢民凡六十七萬六千餘户皇太子遣使赦囊嘉特罪囊嘉特聽命蜀地悉定五月丁巳朔皇太子賜雅克特穆爾先墓碑後贈其曽祖巴圗徹爾溧陽王祖圗圗爾哈昇王父綽和爾揚王車駕次都爾伯珍皇太子遣翰林承㫖額哩音特穆爾鄂爾多相繼徃迎之皇太子建大承天䕶聖寺給儲慶司所貯金三十定銀百定皇后亦助銀五百兩壬申車駕次圗都爾哈封琳沁巴勒為桞城郡王以巴濟拉為西䑓大夫衆嘉努為中丞選用潛邸舊臣及扈從士受制命者八十五人六品以下二十六人丁丑皇太子發京師太子親迎車駕鎮南王特穆爾布哈伊蘇昂吉逹賚布哈多爾濟巴勒巴延額布根等諸王駙馬庫庫楚及百官皆從六月丁未太白晝見浙東饑紹興慶元台州婺州飢民十一萬八千九十户秋七月丙辰朔日食丁巳皇太子次上都癸亥太白經天八月乙酉朔車駕次翁果察圗丙戌皇太子入見庚寅帝暴崩丙戌皇太子入見宴於行殿庚寅帝暴崩皇太子入哭盡哀雅克特穆爾以皇后命奉皇帝寳授太子遂還評曰聞之故老言雅克特穆爾奉上璽綬之時明宗從官有不為之禮者雅克特穆兒且怨且懼既而帝暴崩雅克特穆爾聞哭聲即奔入帳中取寳璽扶文宗上馬南馳本史乃言皇太子入哭盡豈哀雅克特穆爾以皇后命奉皇帝寳授太子其說不合即宋太宗燭影離席之意當時忌諱有不敢明言之者歟壬辰皇太子南還次博囉察罕以巴延為中書左丞相竒徹台阿爾斯蘭哈雅趙世延並為平章多爾濟為右丞阿榮趙世安並參政達實特穆爾知樞密院特穆爾布哈特穆爾圗並為御史大夫誅囊嘉特以嘗指斥乗輿坐大不道棄市籍其家評曰囊嘉特舉甲兵叛君父罪當大逆不但指斥乗輿而已也今既赦其叛逆之罪矣又以嘗指斥乘輿誅之棄信失刑豈足以安反側斯圗卜沁布哈之徒所以連兵而不解也己亥皇太子復即皇帝位於上都大赦詔曰太祖創業列聖相承至於世祖一統寰宇裕皇天不假年成宗入繼纔十餘載我皇考武宗歸膺大寳志不存私以仁廟居東宫遂嗣宸極甫及英皇天降割於我家晉邸違盟據有神器天示譴告竟殞厥身於是宗臣叶謀舉義正名討罪揆諸統緒属在朕躬朕念大兄播遷朔漠以賢以長厯數宜歸力推再四羣臣以天位乆虛則衆志弗固恐隳大業雖從請而臨御秉初志之不移是以固讓之詔始頒奉迎之使即遣恭上寳璽逺迓於塗受寳即位即授朕皇太子寳乃率臣民北迎大駕而先皇帝䟦渉山川䝉犯霜露道里遼逺自春徂秋徒御弗慎屢爽節宣八月一日次翁果察圗朕兼程前進相見之頃悲喜交集何期數日之間而宫車晏駕國家多難遽至於斯諸王大臣以先帝付託之重天命所在誠不可違請即正位以安九有乃以八月十五日即皇帝位於上都可大赦天下自天厯二年八月十五日昧爽以前罪無輕重咸赦除之遣竒徹台先還京師經理庶務雅克特穆爾阿榮留上都監給恩賚金幣建龍翔集慶寺於建康命阿榮趙世安等督工䑓臣監造於是南臺御史上封事曰臣聞使民以時使臣以禮陛下龍潛建業居民困於供給幸而獲睹今日莫不跂望非常之恩今奪農時毁民居以創佛寺臺臣表正百司委以監造豈其禮哉昔漢髙復豐沛兩縣光武免南陽稅三年今不務此而隆重佛教何以慰斯民之望且佛教慈悲方便今尊佛氏而害生民無乃違其教乎書奏上為免大夫監役立藝文監羣玉内司藝文監專校讐儒書以國語敷譯秩從三品以宋本為大監歐陽𤣥為少監其屬有藝林庫廣成局羣玉内司秩正三品掌圖書寳玩凡上御之物置監司司尉亞尉僉司司丞以禮部尚書庫庫兼監司並𨽻奎章閣學士院丙午晝晦自庚子至是日皆晝霧夜晴封雅爾鼐實哩為遼王科綽為肅王以瑪扎爾台為上都留守瑪扎爾台前為西䑓侍御坐塗毁詔書得罪以其兄巴延有功故特官之己酉帝發上都安置拜布哈於集慶臺臣劾拜布哈昔以贓罷天厯初因人成功遂居相位既矯詔以瑪嚕家貲賜平章蘇蘇又與蘇蘇潛呼日者推測聖算今奉詔寛宥宜竄海島以杜奸萌上曰流竄海島朕所不忍其併妻子置之集慶加封張留孫為上卿大宗師真君九月丁卯帝入京師達實特穆爾罷䑓臣劾其阿附道拉實又與旺沁舉兵犯闕今既待以不死而又付之兵柄非便詔罷之額森鼐伏誅冬十月上大行皇帝諡號諡曰翼獻景孝皇帝廟號明宗大寧路地震免中書左丞張思明官臺臣言思明在仁宗朝阿附特們徳爾間諜兩宫仁宗灼見其奸既行黜降及英宗朝特們徳爾再相復授右丞稔惡不悛竟以罪廢今又冐居是官宜從屏斥詔免官召還多岱王士熙等十二人放歸田里復授乳媪夫鄂爾多大司徒印鄂爾多明宗乳媪夫也武宗時以為大司徒仁宗摘其印至是雅克特穆爾以為言上乃命給還之評曰乳媪夫近習嬖倖之人而授以大司徒印賤名器辱朝廷甚矣武宗既失之於前文宗又失之於後非所以蓋前人之愆也十一月以多爾濟伊都呼為河南左丞相中書奏近制行省不設丞相上曰多爾濟先朝舊臣不當以例拘以庫春貝知樞宻院位衆知院上湖廣徭蠻㓂邉凡二百八十餘處命行省平章脫歡招捕髙麗王燾請傳位於其子楨燾以有病不能朝請命其子楨襲位以揭傒斯為奎章閣授經郎傒斯早有文名大徳間游湖湘程文海盧摯咸器重之文海因妻以從妹列薦於朝至是擢授經郎以教勲戚大臣子孫上時幸閣中有所咨訪奏對稱㫖嘗呼曼碩而不名每中書奏用儒臣必問曰其才何如掲㬅碩以薩勒迪為中書右丞詔百官陳時政得失十二月以西僧年扎克策喇實嗣為帝師帝師至上命朝臣一品以下咸郊迎大臣俯伏進觴帝師不為動惟國子祭酒富珠哩翀舉觴立進曰帝師釋迦之徒天下僧人師也予孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之慄然翀初名思温字伯和從臨江蕭克翁學克翁先夜夢大鳥止所居翼覆軒外出視之冲天而去明日翀至至因為易今名而字子翬後又從京兆蕭㪺游學益宏肆姚燧以書抵㪺曰燧見人多矣學問文章無足與子翬比倫者於是㪺以女妻之翀遂為一代名臣評曰人有恒言勢大力强理到自服元之帝師其初以妖術惑世誣民國人習為常俗故雖萬乘之君屈於匹夫而不以為辱於是王公卿相靡然尊敬甘心屈下莫敢誰何而帝師遂傲睨一世矣富珠哩翀獨折以片言不為之屈不惟浩然之氣正大剛直足以抑其方强之勢亦由詞理俱到有以服其心使不自覺其笑而起也昔許衡嘗燕見世祖方與帝師並坐衡拜世祖奏事而不為帝師禮帝師有慍色世祖知之因問衡曰孔佛之道孰為貴衡曰佛之道金玉寳貝是也孔子之道五榖布帛是也帝師黙然故老相傳如此而史闕不載嗚呼若衡翀豈非能以理服人者哉改封鎮南王特穆爾布哈為宣讓王初鎮南王圗卜布哈薨子博囉布哈幼詔特穆爾布哈襲其封博囉布哈既長特穆爾布哈請以王爵歸之上嘉其有讓特改封之以伊埒布哈為御史大夫命江浙行省印佛經二十七藏陳益稷卒益稷自世祖朝來歸遥授安南王居漢陽府至是卒謚忠懿是嵗户部嵗入之數金三百二十七定銀一千一百六十九定鈔九百二十九萬七千八百定幣帛四十萬七千五百匹絲八十八萬四千四百五十斤綿七萬六百四十五斤糧一千九十六萬五十三石元史續編卷十
