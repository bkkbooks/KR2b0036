body:
  text: 元史續編卷五明胡粹中撰乙未成宗皇帝元貞元年春正月以濟爾哈朗為御史大夫阿喇卜丹為中書參政楊炎龍為左丞封皇姑囊嘉特章為魯國大長公主駙馬曼濟台為濟寧王賜金印江東亷訪僉事實保有罪自殺杖季讓除名饒州守阿勒呼木治中趙良不法實保與讓受金縱不問事覺實保自殺杖讓除名二月翰林承㫖留夢炎致仕上以其在先朝言無所隠厚賜遣之初世祖嘗問夢炎葉李優劣於孟頫對曰夢炎臣之父執其人重厚篤於自信好謀能斷有大臣器葉李所讀之書臣皆讀之所知所能臣皆知之能之世祖曰汝以夢炎優於李耶夢炎為宋状元至宰相當賈似道誤國依阿取容李以布衣乃伏闕上書是賢於夢炎也汝以父執不敢斥言可賦詩譏之孟頫賦詩有往事已非那可說且將忠直報皇元之句世祖歎賞焉評曰以人品論之葉李誠不如夢炎以風節觀之夢炎亦何以過葉李夫士不遇盤根錯節無以别利器草非疾風亦無能以表其勁夢炎依阿取容於賈似道世祖所知而葉李依阿取容於僧格則世祖所未見也取人於一事葉李為優求其全體夢炎終勝嗚呼若夢炎真可謂士君子立身一敗萬事瓦裂者歟罷江南茶稅以其數三千定添入江西𣙜茶運司嵗額緬國入貢獻舍利寶玩括馬除官吏所乗悉括之以吕天麟為中書參政三月安南入貢慰國衆也且謝寛貰恩并貢方物壬辰地震罷營造以東作方興罷諸不急營繕惟帝師塔張法師宫不罷詔選官専令中書擬奏省臣言樞宻院御史臺例應奏舉官屬其餘諸司不宜奏請今皆請之非便詔自今以後専令中書擬奏夏四月封乳母楊氏為趙國安翼夫人増京師兩城賑糶米肆上以京師米貴廣益世祖之制設三十肆𤼵米七萬餘石糶之其後毎年増糶多至四十萬石行之既久又為豪强嗜利之徒用計巧取弗能周及貧民於是令有司籍貧民户數置半印號簿文帖各書其户名口數逐月對帖以給大口三斗小口半之其價視賑糶之直三分減一謂之紅貼糧與賑糶並行每嵗不下二十餘萬石閏月建五臺山佛寺為太后建寺於五臺命將作院使伊濟工部尚書宋徳柔董其役蘭州黄河清上下三百餘里清凡三日五月蠲逋欠詔自元貞元年五月以前逋欠錢糧者皆罷徴以滿逹勒僉書樞宻院事滿逹勒巴延之子也太后言其父盡心王室欲令代其父官上以其年㓜故有是命江南州郡水饒常湖鎮江建康太平皆水六月戊申歴城清河溢秋汴梁蝗髙麗王求為太師中書令不允翰林承㫖董文用進世祖實録勅上書者命中書開視以聞西平王鄂囉齊駙馬濟寧王曼濟台犯法詔皆諭之隴北亷訪司鞫張萬户不法西平王撓其事曼濟台私殺罪人臺臣劾奏有㫖皆諭之申飭貢舉儒吏冬十月戊辰太白晝見賜帝師玉印雙蟠龍紐文曰大元帝師統領諸國僧尼中興釋教之印十一月甲戌太白經天暹羅来貢進金字表十二月荆南僧晉昭伏誅坐偽造佛書有不道語太師御史大夫約蘇特穆爾卒約蘇特穆爾博爾濟之孫器量𢎞達世祖嘗賜號伊囉勒諾延華言能官也務振臺綱遇事廷辯有直臣風總兵討奈曼有功拜太傅從上撫軍北邉及定䇿佐命進太師卒後追封廣平王謚忠憲丙申二年春正月丙戌太白晝見復立安西王相府安西王傅塔竒勒圖特穆爾請復立王相府上曰去嵗阿南達嘗面陳朕以世祖定制諭止之今復奏請豈欲以四川京兆悉為彼有耶賦税軍站皆朝廷所司姑從汝請置王相府惟行王傅事以圗沁為御史大夫臺臣言漢人為同僚者嘗為奸人捃摭其罪由此不敢盡言請於近侍錫保齊舒庫爾齊中擇人用之上曰安用此曹其選漢人識達事體者為之詔諸王公主駙馬非奉㫖毋輒罪官吏立中御府以圗魯卜唐古並為府卿二月博果宻罷以段貞為中書平章罷進蒲萄酒以蒲萄園業皆還之民三月丙子幸上都實都伏誅實都言晉王噶瑪拉多爾岱言約蘇特穆爾皆有異圖樞宻院鞫之無驗詔言晉王者死言伊囉勒者讁從軍夏五月安西王遣使告饑上諭使者曰世祖以分賚之難嘗有聖訓阿南達亦知之矣若言貧乏豈獨汝耶去嵗賜鈔二十萬定又給以糧今復與則諸王以為不均不與汝又言人多饑死其給糧萬石擇貧者賑之括馬牛羊詔民間馬牛羊百取其一羊不滿百者亦取之惟色目人及數乃取六月降官吏受賕條格凡三十等秋七月以朱清為江西參政張瑄為河南參政廣西盜起討平之廣西賊陳飛雷通藍青謝𤼵冦昭梧藤容等州湖廣左丞八都馬辛討平之詔告捕盜賊者賞强盜一名五十貫竊盜半之應捕者又半之皆徴諸犯人犯人無徴者官給又詔求弭盜方畧燕南河北道亷訪使陳天祥上疏曰盜賊之起各有所因除嵗凶諉之天時宜且勿論已如軍旅不息工役荐興厚斂煩刑皆足致盜中間保䕶滋長之者赦令是也赦者小人之幸君子之不幸故一嵗再赦善人喑啞前志嘗言之矣彼强梁之徒執兵殺人有司盡力以擒之朝廷加恩以釋之旦脱係累暮即行刼又復督勒有司結限追捕賊皆經慣習以為常既不感恩又不畏法夫凶殘悖逆性已預定誠非善化能移惟是嚴刑可制所擬事條皆切於時用天祥乃嚴督有司捕得盜賊皆杖殺之亡入它境者輒揣知所向宻授方畧遣官追捕南至漢江二千餘里悉皆就擒無得免者由是東方盜為之息平隂女子劉金蓮假妖術惑衆天祥捕繋而杖之于市神怪屏息因劾山東宣慰使貪暴不法事格不行天祥遂以任滿辭去評曰季康子患盜問於孔子孔子答以茍子之不欲雖賞之不竊辭約而理當百世不能易也天祥上弭盜方畧獨切於妄赦理固有之所以致盗豈在兹乎至於謂凶頑悖逆性已預定誠非善化能移惟是嚴刑可制則其言雖近理而實害理不可不察也夫聖人所謂唯上智與下愚不移者謂下愚不可使為上智耳豈真謂性有善惡之不同其惡者終不可化而為善耶但謂氣質有如此之異於是習於善則為善習於惡則惡耳茍化民者作而新之寧有不能挾出於汚染之間者哉五帝三王之世豈無頑惡之民以善化之故惡者少而善者多若謂嚴刑可以制惡人則秦始皇之時當外户不閉而田野之間讓畔讓路矣天祥之言駁而不純故不得不論冬十月甲辰脩大都城壬子車駕還宫贛州劉六十作亂討平之定徴江南夏税法國初取民内郡曰丁税地稅即唐之租庸調也江南曰夏稅秋税即唐之兩税也丁税地税之法始於太宗朝每户出粟二石後増為四石後又定令諸侯民户每丁出粟一石驅丁五升新户丁驅各半之老㓜不與有耕種者驗其牛具地土之厚而徴之丁税少而地税多者納地税地税少而丁税多者納丁税工匠僧道驗地官吏商賈驗丁仍命嵗書其數于册及世祖即位而輸納收受關防㑹計之法愈備至元十七年又定全科户毎丁粟三石驅丁一石地税每畆三升減半科户毎丁一石新收交參户第一年五斗第二年一石三年至五年毎年遞増二斗五升六年入丁税協濟户毎丁粟一石地税毎畆三升隨路近倉輸粟逺倉毎粟一石折輕賫鈔二兩富户逺輸下户近納每石俱帶鼠耗三升分例四升定輸納之期為三初限十月中限十一月末限十二月其江南秋夏税之法初用姚元之請依宋舊例折輸綿絹雜物後令輸米三之一餘折鈔以七百萬定為率嵗得羡鈔十四萬定其輸止用宋斗斛盖宋二石當今七斗云至是又定江南徴夏税之制秋税止命輸租夏税則輸木綿布絹絲綿等物所輸之數視糧為差每糧一石諸路分不同江浙之婺州等路江西之隆興等路皆折輸三貫福建泉州等處折輸二貫紹興及漳州等五路折輸一貫五百文大抵因其地髙下以為直焉評曰古者什一而税即後世所謂田租成方一里出長轂一乗即後世所謂户調嵗役民不過三日即後世所謂丁庸故論者以唐之租庸調最為近古後變而為兩税元有天下内郡所收曰地税丁税即所謂租庸江南所收曰夏税秋税即所謂兩税盖兼用之亦鄉遂用貢都鄙用助之意歟丁酉大徳元年春正月以張斯立為中書叅政二月封緬王詔曰祖宗肇造區宇以来萬邦莫不畏威懐徳先朝臨御之日爾國使人稟命入覲詔已允請爾乃食言是以我閫帥加兵於彼兹者爾遣子信合八的奉表来朝宜示含𢎞特加優渥今封的立普哇拿阿迪提牙為緬王賜銀印信合八的為緬國世子錫以虎符仍勑雲南等處邉將毋擅加兵爾國官民各宜安業以王慶端為中書右丞詔改元赦天下改今年元貞三年為大徳元年三月以額森特穆爾為中書平章梁徳珪為右丞巴特瑪琳沁為左丞立江淮等處財賦總管府五臺山佛寺成皇太后将親往祈祝監察御史李元禮上封事曰太后臨幸五臺其不可有五盛夏禾嫁方茂民食所仰騎從經過無不蹂踐一也親勞聖體往復暑途萬一失調悔将何及二也陛下守成持盈舉動必書書而不法將焉用之三也勞民傷財以奉土木四也佛本西方聖人以慈悲方便為教不與物競雖窮天下珍玩供養不為喜雖無一物為獻亦不怒今太后欲為兆民祈福而先勞聖體使天子違缺定省五也伏望儉以養徳静以頤神不祈福而福自至矣臺臣不敢以聞其後侍御史旺沁與中丞崔彧不合取元禮章封入奏之曰崔中丞私漢人李御史大言謗佛不宜建寺上大怒勅丞與相諤勒哲鞫之平章博果宻讀其書諤勒哲曰其意正吾同往吾嘗以此諫太后曰我非喜建寺盖以先帝嘗許為之非汝所知也博果宻曰他御史懼不敢言惟一御史敢言此可賞也博果宻等入言之上沉思良久曰御史言是也遂罷旺沁復元禮職評曰李元禮之疏可謂切直矣成宗初聞之而怒以其謗佛也徐思之而惟知其言之有禮而非謗也不獨復元禮之職而能罷旺沁之官如是則忠讜日進而䜛佞日退矣非明哲之君何以能此崔彧素稱忠直而於此不惟不能諫又匿元禮之疏不敢以聞豈非所謂見義不為無勇者哉丙子車駕幸上都夏四月癸巳朔日食省臺議上風憲事宜省臺臣僚奏阿喇卜丹及崔彧陳臺憲事宜臣等議乞依舊不立臺選惟御史及本臺首領官許自舉用亷訪使必擇䝉古人為使或闕則以色目世臣子孫為之其次參用色目漢人各省文案聽行臺委官檢覆有宿衛近侍奉特㫖令臺憲擢用者必須明奏然後任之行臺御史秩滿而有效績者或遷内臺或呈都省遷調亷訪使亦如之不稱職者省臺擇人代回未歴有司者授任牧民經省臺同選者聽臺自調中書或用臺察之人亦宜臺臣同議各官府風憲官毋得輒入體察制曰可五月河決汴梁𤼵三萬餘人塞之上思州叛蠻黄勝許遣其子志寶来降漳河溢六月褒賜湖廣叅政崔良知以良知亷貧特賜鈔千定乙未太白晝見有星隕于崇仁縣化為圓石緑色和州歴陽縣江漲漂萬八千五百餘家汴梁南陽大旱衡州酃縣山崩秋八月車駕還宫冬十月戊午太白經天十一月戊子甲辰復經天以髙麗世子謜為髙麗王加王昛為逸夀王昛告老故有是命大都總管錫迪坐贜釋不治錫迪坐贜當罷上以故臣子特減其罪崔彧言不可使復任上曰卿等與省臣誡之若後復然則寘爾死地矣評曰法者人君所與天下共者也以故臣子特減其罪則廢法矣法廢而欲治天下得乎其後江浙平章嘉琿徳爾黙色南臺中丞張閭互相告劾兩釋不問元之政綱凌遲墮廢不待至正之末而後見也復立芍陂等屯田改雲南行臺為陜西行臺徙治京兆而雲南改立亷訪使其後遂定天下為二十二道内八道𨽻中臺山東東西道濟南置司河東山西道太原置司燕南河北道真定置司江北河南道汴梁置司淮西江北道廬州置司山南江北道荆州置司江北淮東道楊州置司山北遼東道大寧置司江南十道𨽻南臺江東建康道寧國置司江西湖東道隆興置司江南浙西道杭州置司浙東海右道婺州置司嶺北湖南道潭州置司嶺南廣西道静江置司海北廣東道廣州置司海北海南道雷州置司福建閩海道福州置司江南湖北道武昌置司陕西四道𨽻西臺陜西漢中道鳯翔置司河西隴北道甘州置司西蜀四川道成都置司雲南諸道中慶置司是嵗水旱濟南反金復州水旱大都遼陽潘陽廣寧水順徳河間大名平陽旱河間平樂交河疫死六千五百餘人江南常州建徳溫韶澧南雄常徳臨江皆大水廬夀陽淮安饑戊戍二年春正月詔減田租詔以水旱減郡縣田租十分之三傷甚者盡免之老病單弱户並免差税三千賜翰林集賢儒臣王惲等鈔有差上以兩院儒臣王惲問復王構趙與􅝾王之綱楊文郁王徳淵王顒宋渤盧摯耶律有尚李泰郝采楊麟皆先朝耆徳清貧守道各賜鈔有差凡二千一百餘定詔祭太廟増用馬初太保月察察而等奏請廟享増用馬從之至是特祭太廟用馬牛一羊鹿野豖天鵝各七餘品如舊為特祭之始國俗重馬湩其馬牲既與三牲同登于爼而割奠之饌復與籩豆俱設將奠牲盤酹馬湩則䝉古大祝升詣第一座呼帝后神諱以致祭年月日數牲齊品物致其祝語列室皆如之禮畢則以割奠之餘撒于櫺星門外名曰抛撒茶飯盖以國俗行事尤其所重也二月辛酉熒惑太白嵗星聚危熒惑犯嵗星立浙西都水庸田司専主水利以張九思梁徳珪並為中書平章楊炎龍為右丞乙酉車駕幸上都丞相諤勒哲奏請節用上諭省臣曰毎嵗天下金銀鈔幣出入㡬何諸王駙馬賜與及一切營建所用㡬何其㑹計以聞於是諤勒哲奏嵗入之數金一萬九千兩銀六萬兩鈔三百六十萬定然猶不足於用於至元鈔本借二十萬定自今敢以節用為請上嘉納焉為罷中外土木之役罷建康金銀銅冶轉運司還淘金户於原籍嵗辦金悉責有司評曰生財有大道誠不在於淘冶煎煉也罷之宜矣然還淘金户於原籍而責嵗辦金於有司金何從而出乎所謂止沸而不能離薪者也三月責降道州守臣逹嚕噶齊阿琳巴哈總管周克敬坐虛申麥熟不賑饑民臺臣言雖經赦宥宜降一等從之夏四月燕南山東兩淮江浙郡縣蝗凡一百五十處五月以何榮祖為中書平章巴特瑪琳沁為右丞六月西臺侍御托歡坐罪罷以受賂不法也罷江南門攤夏稅臺臣言江南宋時行兩稅法自阿爾哈雅改為門攤増課錢至五萬定宣慰張國紀又請復科夏稅與門攤併徵以圖陞進湖湘重罹其害於是上命中書趣罷之禁諸王擅行令㫖越例開讀者併所遣使拘執以聞秋七月大雨河決漂歸徳屬縣田廬禾稼詔免田租一年遣使召髙麗王謜復以其父昛統國政謜擅命妄殺中書奏罪當廢詔遣右丞楊炎龍僉樞宻院洪君祥召其入侍以昛仍知國事江西江浙水九月丙申帝還宫御史中丞崔彧卒彧以敢言任中丞十年世祖時中書請以為丞世祖曰彧不愛於言惟可使任言責然居臺中久守正不阿人多疾之寶泉提舉張簡父子訟彧不法十餘事按問無驗繫獄死御史鄂囉實喇劾奏彧上怒其妄言笞而遣之彧遂以病辭上諭之曰卿之辭退誠是然勉為朕少留遂加平章政事彧尋奏先朝在籍儒人皆復其家今宜遵舊制俾亷訪司勉勵上深然之至是卒至大初贈太傅追封鄭國公謚忠肅以王慶端為中書平章冬十二月戊午太白經天括馬除牝孕者三嵗以上並拘之増置各路推官上路二員下路一員以哈喇哈遜為江浙左丞相由本省平章陞定諸稅錢三十分取一命廉訪司嵗察舉所部亷幹者各二人己亥三年春正月中書省臣請避位不許省臣以天變請避位上曰此漢人所説豈可盡從卿但當擇賢者任之評曰天道之變由人為所感欲弭天變在君臣脩政而已今宰執特請避位而不聞増脩徳政變何自而弭夫應天以實不以入成宗以為卿等但當擇賢者任之其知任賢為脩政之本矣嗚呼賢哉封伊瑪和爾為定逺王伊瑪和爾阿里布格子也後改封定王復以王昛為髙麗王遣工部尚書額森特穆爾翰林侍制賈汝舟賷詔往諭之以哈喇哈遜為中書左丞相流髙麗柄臣趙仁規崔冲紹于逺州二人附王謜擅命妄殺至是丞相諤勒哲等奏世祖時罷髙麗省院臺改立僉議府宻直司監察司今謜加仁規等司空司徒侍中之職昛又給仁規赦九死奨諭文書及私造厯擅冩皇朝帝系謜擅殺人仁規進女侍為巫蠱等事上乃命杖之流仁規于安西冲紹于鞏昌乙巳太白經天二月癸丑朔車駕幸栁林庚辰幸上都罷四川福建行省三月遣補陀僧一山使日本命何榮祖等更定律令上諭榮祖曰律令良法也宜早定之對曰臣所擇者三百八十條一條有該三四事者上曰古今異宜不必相沿但取宜於今者江浙平章嘉琿等有罪勅皆勿問行臺劾教化受財三萬餘定嘉琿復言平章徳爾布哈斂財賦時盜鈔三十萬定及行臺中丞張閭受李元善鈔百定勅俱勿問夏四月以伊埒布哈為中書左丞五月復立征東行省哈克繖還言王昛不能服其國人朝廷宜遣官共理之遂立征東行省以庫哩濟蘇為平章秋七月放江南諸寺佃户為民省臣言江南諸寺佃户五喇十餘萬本皆編民嘉木揚勒智冒入寺籍宜加釐正從之勅禁捕鶖揚州淮安蝗在地者為鶖啄食飛者以翅擊死乃禁捕鶖八月己酉朔日食不應太史言是日已時日當食二分有竒至期不食衆懼保章正齊履謙曰當食不食在古有之矧巳時近午陽盛隂微故當食不食遂考唐開元以来當食不食者凡十事以聞評曰日月行天有常度故交食可推䇿而知日食不應推䇿者之過也齊履謙為太史不能引過而曲為己時近午陽盛隂微之説以欺其君其失甚矣唐開元以来當食不食者皆闕於推步而非有它也乃引以文過則其過益甚矣履謙於當時在端亮之列而猶若此惜哉九月壬辰流星有聲如雷起自河鼓沒于牽牛之西色赤尾長丈餘己亥車駕還宫冬十月壬子立皇后巴約特氏十一月杭州火復置諸路恵民藥局初太宗於燕京等十路置局官給銀五百定為本用營子錢以備藥物擇良醫主之以療貧民世祖末年以失陷官本罷之至是依舊例復置皆令各路正官提調評曰給醫藥以療貧民之有疾病者此愛民之仁濟物之義也而出銀為本月營子錢以備藥物則與民爭利而有害於仁政矣十二月以諤爾根薩理為中書平章初諤爾根薩哩以僧格故罷政有言其在太史院時數言國家災祥事大不敬請下吏治世祖大怒欲抵言者罪諤爾根薩理頓首謝曰陛下含容臣萬死莫報然欲致言者罪恐自是無為陛下言事者世祖嘉其長厚使復領太史院上之未即位也數召之不往以其得大臣體深重之毎召對不名賜坐視諸侯王語左右曰若全平章於今無名此乃命復入中書諤爾根薩哩父竒塔特薩哩學佛師之曰萬全因以父字為全氏云命皇姪哈尚出鎮北邉寧逺王庫庫楚總兵北邉怠於備禦命哈尚代之哈尚者裕宗第二子達爾瑪巴拉之長子母曰逹吉鴻吉哩氏所謂興聖皇太后也元史續編卷五
