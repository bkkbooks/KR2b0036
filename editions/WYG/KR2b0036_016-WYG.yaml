body:
  text: 元史續編卷十六明胡粹中撰甲辰二十四年春正月大明滅偽漢陳理出降湖南北江西相繼歸於大明三月詔削博囉特穆爾官爵坐匿婁達實等削官爵罷兵權候路通許歸四川鄉里初婁達實以帝母舅故上數為太子寢其事而太子不従丞相吹斯戬宦者保布哈皆附太子必窮究其事又圖沁特穆爾先與中書右丞額森布哈有隙額森布哈因譖其詆毁朝政而博囉素與圖沁友善且知其誣遣人白其非罪皇太子因誣博囉與婁達實等謀為不軌下詔削奪於是禍亂不解矣評曰博囉與察罕父子兵争曲直無甚相逺朝廷若能處置得宜命察罕專收復河南博囉平定山東各責其成功而晉冀則朝廷自遣人戍守彼各不得駐兵如此則禍患庶㡬其有瘳乎今察罕既不奉割冀寧之詔曲不在博囉矣東宫無道而婁達實得罪出走博囉匿之無大惡也况達實巴圖爾勲在王室博囉亦不為無功縁情定罪猶當議免何至遽削奪其官爵乎激成其變禍亂不解雖博囉怙終自取覆滅亦順帝不能駕御之所致也夏四月甲午朔博囉特穆爾拒命詔庫庫特穆爾討之壬子歲星逆行入端門自去年九月東行入右掖門犯右執法出端門留守三十餘日犯左執法今又逆行入端門出右掖門又犯右執法愽囉特穆爾遣兵犯闕皇太子出奔愽囉知詔命調遣非出帝意皆吹斯戬所為遂令圖沁特穆爾舉兵向闕入居庸關知院伊蘇詹事布埒齊迎戰于皇后店布埒齊力戰伊蘇不援而退皇太子率侍衞兵出光熙門東走古北口趨興松圗沁特穆爾以兵入京師殺右丞相吹斯戬圖沁兵至清河列營時京師無備城中大震令百官吏卒分守使達喇國師至其軍問故以必得吹斯戬保布哈為對詔慰解之不聽乃執二人與之圖沁兵自健徳門入覲帝於延春閣慟哭請罪上宴賚之圖沁乃還詔復博囉特穆爾官爵加太保以圖沁特穆爾為中書平章五月甲子黄河清衞輝路界庫庫特穆爾以皇太子命遣兵攻大同庫庫以太子命討博囉屯兵冀寧其東道以白索爾珠領兵三萬守禦京師中道以摩該珠占領兵四萬西道以關保領兵五萬合擊之關保等進逼大同評曰以皇太子命討博囉則國㡬乎無君矣順帝至是盖徒擁虗器而已夫家齊而後國治國治而後天下平威令不行於一家豈足以服四海哉博囉特穆爾復舉兵犯闕入京師博囉留兵守大同而自率兵與圖沁婁達實復大舉向闕駐兵健徳門外與婁達實等入見帝于宣文閣訴其非罪皆泣上亦泣乃賜宴博囉欲追襲太子婁達實止之博囉又使翰林承㫖張翥草詔削奪庫庫官爵發兵討之翥不從或勸之翥曰吾臂可斷筆不能操上知其不可奪命他學士為之博囉亦不以為怨六月癸卯三星晝見白氣横突其中甲辰火星夜見如晝丁未星隕秋七月庫庫特穆爾以兵迎皇太子白索爾珠以兵請太子西行㑹博囉前鋒入居庸關皇太子親帥兵禦于清河伊蘇軍昌平士卒皆無鬬志太子馳還都城白索爾珠入平則門遂扈従太子出順承門由雄霸河間取道達冀寧癸亥太白嵗星合于翼甲子嵗星犯左執法金木二星相去八寸大明取廬州皇太子至冀寧八月壬辰朔日食以博囉特穆爾為中書右丞相婁達實為平章圖沁特穆爾為御史大夫伊蘇知樞宻院仍詔博囉監修國史節制天下軍馬其部屬皆布列省臺百司又招諭博囉庫庫皆朕股肱視同心膂自今各棄宿忿弼成大勲博囉既専國數月間誅狎臣圖魯特穆爾博迪斡爾密等罷三宫不急造作沙汰宦寺减省錢糧禁西僧作佛事數遣使請太子還宫使至太原拘留不報張士誠逐達實特穆爾以其弟士信為江浙左丞相初士誠逼杭州達實特穆爾出走富陽得苗軍為左帥楊旺扎勒擊敗士誠兵乃得還因以旺扎勒丞而苗軍素無紀律抄掠肆暴旺扎勒日驕不可制然屢敗士誠士誠乃遣曼濟哈雅以書詐降詞多不遜達實特穆爾不可旺扎勒固請許之士誠復邀王爵又不許復請爵為三公旺扎勒又力為之請遂授太尉士誠雖曰降而城池甲兵錢榖皆自據如故又素忌旺扎勒欲圖之及而達實特穆爾亦厭旺扎勒所為乃陰與定計殺旺扎勒其弟巴延旺扎勒既死士誠遂遣兵入杭州朝廷因授其弟士信為平章由是方面大權悉歸張氏達實特穆爾徒存虗名而已時右丞達蘭特穆爾郎中真保二人諂事士誠多受其金帛數媒糵達實特穆爾之短以故士誠遂有不相容之勢至是士信使王晟等面數達實特穆爾過失勒其自陳老病移咨省院恬退又言丞相非士信不可即逼取符印遷于嘉興幽之而士信遂自為丞相評曰旺扎勒苗軍帥固不可與共事然達實特穆爾若能正已格物厲以忠義日漸月漬理無不化譬之鷹犬然飽其肉而謹其縧索必為之用乃任用非人惟事貨賄郡邑淪沒恬不為意彼習見若此猛鷙之性其豈能馴伏哉及其厭惡反與士誠謀去旺扎勒是自剪爪牙也且士誠得志與旺扎勒孰重輕旺扎勒死而盜得以操戈逐我矣均之為死也死而不辱雖百世猶以為榮受辱而死死已晚矣嗚呼若南臺大夫布哈特穆爾為得其死哉九月張士誠殺南臺大夫布哈特穆爾士誠既自稱吳王諷行臺為之請實授于朝御史大夫布哈特穆爾不従即使人至紹興索其臺印布哈特移爾封其印置諸庫曰我頭可斷印不可與又迫之登舟曰我可死不可辱也從容沐浴更衣與妻子訣賊詩二章乃仰藥死臨死擲杯地上曰我死矣逆賊當踵我亡也後數日達實特穆爾聞之嘆曰大夫且死吾不死何為遂命左右以藥酒進飲之而死布哈特穆爾字兼善達魯奈曼氏特黙格之子也前中書左丞許有壬卒有壬歴事七朝垂五十年國家大事無不盡言皆根据天理而曲盡人情當權奸恣睢忤意者誅竄隨之有壬不為巧避遇事必明辯力争不知有生死利害君子多之有壬善書能屬文歐陽𤣥謂其雄渾閎雋涌如層瀾迫而求之則淵靚深實盖深許之也謚曰文忠乙巳二十五年春正月封李思齊許國公二月辛丑日旁有一月一星汴梁路見三月壬戌白虹貫日日有暈内赤外青皇太子下令討博囉特穆爾下令于博囉特穆爾軍中曰博囉特穆爾襲據京師余既受命總督天下諸軍恭行天罰少保平章庫庫特穆爾躬勒將士分道進兵諸王駙馬及陜西平章李思齊等各統軍馬尚其奮義努力克期恢復以婁達實拜特穆爾並御史大夫博囉特穆爾出二皇后竒氏幽之后名旺扎勒呼圖克高麗人生太子立為二皇后性穎黠知讀書好施與恤貧建齋上既怠於政治后與太子謀内禪遣内侍保布哈諭意丞相太平不答復召至宫賜酒申前情太平依違而已由此計不得行至是皇太子下令討博囉博囉怒嗾御史武起宗奏后外撓國政宜遷出居外帝不答遂矯詔幽后于諸色總管府令其黨姚巴延布哈守之夏四月關保入大同五月丁酉熒惑犯太微垣甲子京師天雨氂長尺許或言于帝曰龍師也命拾而祀之六月以黎安道為中書參政戊申京師雨魚時大雨有魚隨雨而落長尺許人取而食之出皇后竒氏還宫博囉特穆爾復逼后還宫取印章偽為后書召太子復出幽之后數納美女于博囉至是始得還宫以和尼齊為御史大夫皇太子加李思齊中書平章邠國公復以為詹事兼四川行院秋七月填星嵗星熒惑聚于角亢乙酉博囉特穆爾伏誅婁達實圖沁特穆爾皆遁走博囉既握國柄恣為淫虐威順王之子和尚忿其無君數言于帝受宻㫖與儒士徐士本謀結勇士上都馬金諾海巴延達爾特古斯布哈和尼呼圗克洪巴拜黄哈喇巴圖雲從龍陰圗刺之帝期以事濟放鴿鈴為號使士本掌之博囉入奏事行至延春閣李樹下巴延達爾自衆奮出斫之中其腦上都馬等競前斫死之於是封和尚為義王誅黎安道方托克托雷一聲皆博囉特穆爾之黨也京師大水大赦八月丁亥朔京師戒嚴珠占以兵入城大掠門不開者三日珠占摩該軍至城外縁城而上碎平則門鍵以入遂大掠以洪巴拜特古斯布哈訥哷圖並為中書平章丁未皇后鴻吉哩氏崩九月皇太子還京師遣使函博囉首往冀寧召太子還庫庫特穆爾扈從至京以巴咱爾為太師中書右丞相庫庫特穆爾為太尉左丞相知樞宻院以方國珍為淮南左丞相分省慶元評曰夫駕馭雄傑消除禍亂貴審乎勢而中其機則有以折其心而散其謀也國珍兄弟以拒捕入海不得已弄兵以自救而朝廷力不能討使得恣睢倔强於黒子彈丸之地及官軍授再敗台哈布哈死則叛亂之志萌矣當是時因其請降以髙官厚爵奬其遷善悔過彼顧惜祿位保全富貴自將格其非心黨與一散後更陸梁取之如反掌耳乃吝惜名爵授之郡佐彼則有山頭望廷尉而已至是亂雄日滋國勢日削崇以相位是假虎以翼何足以導其臣順哉冬十月以哈喇章知樞宻院圗嚕為御史大夫托克托穆爾為中書右丞達實特穆爾特哩實克並參政婁達實伏誅益王昆都特穆爾樞宻副使觀音努擒婁達實誅之詔封庫庫特穆爾為河南王總制諸道軍馬詔張良弼俞寳孔興等悉聽調度又命代皇太子親征總制關陝晉冀山東等處并迤南一應軍馬諸王各愛滿應該總統凡軍務錢糧名爵黜陟予奪悉聽便宜行事閏月戊辰太白辰星熒惑聚斗十一月大明取泰州十二月詔立竒氏為皇后改竒氏為索隆噶氏詔告天下仍封其曾祖以下三世為王圗沁特穆爾伏誅圖沁以餘兵往巴爾斯之地命嶺北左丞相舒蘇及知院魏賽音布哈同討獲之伏誅以賔國公五十八知樞宻院庚子嵗星掩房是嵗分置南臺于福建御史大夫穆旺扎勒特爾奏南臺移置紹興近因道梗兩廣福建凡公文至臺風信不便徑申内臺又未委事情虗實宜於福建置分臺令吾道文字徑由轉達内臺為便從之丙午二十六年春正月以博囉實勒為御史大夫温扎木知樞宻院以實喇達哩為中書左丞相二月庫庫特穆爾還河南分立省部以自隨尋居懷慶又居彭徳評曰庫庫特穆爾至是其情見矣前日猶以博囉為辭今博囉已滅朝廷授以王爵付之兵柄總制諸道軍馬悉聽便宜行事待之不可謂不誠任之不可謂不重庫庫茍有忠義之心奬率三軍以収復為事鞠躬盡力斃而後已可也夫何志得氣滿狥身忘國分立省部以自隨既不能謀謨於内又不能敵愾於外盤桓猶豫徑歸河南及京畿危急遣兵徐駐濟南則是其心竊窺鷸蚌之勝負而欲収漁人之功者也卒之大勢已去寰宇盡失竄伏沙煙漠草之間而欲以興復為名吾誰欺欺天乎人謂庫庫為元忠臣吾不信也黄河北徙上自東明曹濮下及濟寧皆被害丁丑嵗星退行犯房丁亥白虹亘天凡五道其第三道貫日又有氣横貫東南良久乃滅張良弼拒命庫庫特穆爾遣兵攻之李思齊等以兵與良弼合庫庫遣關保珪林齊以兵西攻良弼于鹿臺思齊與圗魯卜孔興等皆與良弼合庫庫遣朱珍盧旺屯河中闗保等㑹珠占商暠約攻良弼良弼遣子弟質于思齊連兵拒守關保等戰不利思齊請詔和解之三月廷試進士賜哈逹布哈張棟等七十二人及等出身有差以曼濟托克托穆爾知樞宻院夏四月立皇太子妃鄂齊爾蘇逹勒氏大明取淮安徐宿泗濠夀潁高郵等州五月以托克托布哈為御史大夫六月介休縣地震癸酉流星起自心沒于近噣秋七月辛巳朔日食星隕石州大如斗徐溝縣地震甲午太白經天以李思齊為太尉丙辰泉州三秀山崩河南鞏縣亦地震山崩八月以陳友定為福建平章以方國珍為江浙左丞相其弟國瑛國珉姪明善並為平章以實勒們為御史大夫禮部侍郎滿尚賔自鳳翔還京師尚賔與吏部侍郎温都爾罕持詔諭李思齊開通川蜀道路思齊方兵争不奉詔尚賔等留鳳翔一年至是始還辛丑有星孛于東北見紫微垣權星之側大如斗東南行犯天棓辛丑則在尾壬寅在女二度癸丑在女九度甲辰在虗乙巳又在紫微垣北斗權星玉衡之間在軫南行經漸臺輦道去虛宿壘壁陣西始滅大清河決大明兵圍平江冬十月庫庫特穆爾遣兵駐濟南十一月大明取杭湖嘉興紹興諸路甲辰太白犯歳星辛丑蒲城縣洛岸崩壅水絶流三日十二月庚午和順崖崩壓死穴居避亂者七十人丁未二十七年春正月乙未絳州聞天鼓鳴其聲如空中戰鬭者李思齊張良弼圗魯卜㑹於河南推思齊為盟主㑹于故乾元殿基推思齊為盟主以拒庫庫二月以七十為中書平章伊埒布哈為御史大夫乙丑永州晝晦大雨雹城中人舉燈而食雞棲于塒雨雹踰時方明三月丁丑朔萊州大風有異鳥至鳥翅大如席庚子京師大風晝晦夏五月丙子朔白氣亘天凡二道以旺扎勒布哈為中書右丞相温普為平章庫庫特穆爾擬用所屬官二千六百一十員從之以實勒們為嶺北左丞相山東地震雨白氂六月丙午朔日食晝如夜丁巳龍見皇太子宫太子寢殿後新甃井中有龍出光焰燭人宫女震懾仆地又長寧寺有龍纒繞槐樹飛去樹皮皆剥評曰太子潛龍也今龍見於其宫中則不安其潛矣况光焰燭人繞樹飛去是潛龍而有飛龍之象斯盖當時有逼迫内禪之謀故其兆先見歟沂州山崩摩該叛庫庫特穆爾李思齊遣張良弼部將郭謙守黄連寨庫庫部將闗保珪林齊商暠珠占引兵拔其寨謙走㑹摩該為變闗保等亦夜遁思齊解而西摩該殺衛輝守將俞仁輔彰德守將范國英引軍至清化聞懷慶有備遂還彰德秋八月詔皇太子總督天下兵馬詔曰元良撫軍古今成憲曩者海内兵戈逾兹一紀故察罕特穆爾仗義興師汛掃汴洛克平青齊為國捐軀深可哀悼其子庫庫特穆爾繼志成功皇太子計安宗社累請出師朕重國本遂授庫庫特穆爾總戎重寄加以王爵俾代其行而李思齊張良弼等懷異搆兵故盜賊愈熾深貽朕憂詢諸衆謀僉謂太子聰明仁孝文武兼資爰命以中書令樞宻使總天下兵馬諸王駙馬各道總兵將吏一應軍機政務生殺予奪事無輕重如出朕裁其庫庫特穆爾領本軍自關以東肅清江淮李思齊統本軍自鳳翔以西與侯巴延達實進取川蜀以少保圗嚕為陜西左丞相本省駐劄總本部及張良弼孔興圗魯卜各枝軍馬進取襄樊王信本軍固守信地别聽調遣詔書到日汝等悉宜洗心滌慮同濟時艱庫庫特穆爾不受分兵之命詔下皇太子亦不行而分兵之命庫庫終不肯受摩該陳庫庫特穆爾罪狀詔罷其兵權命進討之初太子之奔太原也欲用唐肅宗武靈故事庫庫不従及還京竒皇后遣人諭庫庫以重兵擁太子入城脅帝内禪庫庫逆知其意未至京城三十里即散遣其軍故太子深銜之及是累促出師江淮但遣其弟托音特穆爾及摩􅔜等徃而西兵互相勝負屢詔和解庫庫乃殺詔使天下努等而跋扈之迹遂彰保自察罕起兵即為將勇冠諸軍摩􅔜最善論兵尤所信任至是兩人見庫庫所為有不臣之漸皆叛之列其罪惡疏于朝詔以庫庫特穆爾不遵君命罷其兵柄命摩􅔜討之評曰庫庫玩寇養亂厚自封植挾天子以令諸將其所以異於羣雄無幾然其名猶曰元臣也及分兵詔下而不受命則不臣之迹見矣况屢詔和解不從又殺天子之使其無君孰甚焉律以春秋之法庫庫為亡元罪人之首歟立大撫軍院以右丞相旺扎勒特穆爾扎翰林承㫖達爾瑪平章旺勒並知院事詹事院同知李國鳯參政旺扎勒特穆爾為副使以特哩特穆爾為中書添設左丞相陳敬伯為平章巴咱爾為太師永平王九月大明兵入平江執張士誠詔丞相伊蘇分省山東錫蘭達哩分省大同詔伊蘇會摩該取真定已而不克伊蘇還河間摩該歸彰德皇太子以王信為山東平章加信父宣司徒淮南平章沂國公冬十月詔削奪庫庫特穆爾官爵居河南削太傅丞相諸職仍前河南王以汝州為其食邑其弟托音特穆爾為集賢學士同居河南其帳前諸軍算濟珪林齊統之河南諸軍李克􅂜統之闗保本部軍馬仍舊自統山東諸軍伊蘇統之山西諸軍錫蘭達哩統之河北諸軍摩該統之丙辰福州地震丁卯太白歲星熒惑聚斗赦以和尼齊丁好禮為中書平章以闗保分省晉寧封許國公大明取沂州擒王宣王信遁走大明取温台慶元大明取益都平章巴拜降宣慰使布延布哈等死之布延布哈及總管胡濬知院張俊俱死遂取嶧州般陽濟陰濟南東平萊州於是山東悉歸於大明矣十二月癸卯朔日食以摩該為中書平章知樞宻院詔會諸軍守禦山東命丞相伊蘇知院托和齊平章烏林岱摩該知院希扎丹津特穆爾江文清嚕爾等㑹楊誠陳秉直巴延布哈俞勝各部諸軍守禦山東又命闗保往援以楊誠陳秉直並中書平章荘嘉為參政大明取福州平章庫庫楚遁行宣政院使托爾死之兵入杉闗取邵武時延平建寧福州興化彰泉皆陳友定所據大明兵由海道徑取福州方國珍降于大明陳祖仁等伏闕上書不報祖仁與承㫖王時待制黄冔編修黄肅等伏闕上書言近者南軍陷全齊逼畿甸朝廷雖命伊蘇出師而兵少力孤中原諸軍左牽右掣調度失宜京師四面全無屏蔽宗社安危正在今日臣等以為馭天下之勢當論其輕重强弱先後緩急前日南兵逺在一方而庫庫特穆爾近在肘腋故宜先致討則以南兵逺而輕庫庫近而重也今庫庫勢窮南兵突至則宜先救難則以庫庫弱而緩南兵强而急也陛下與太子當審此事勢改弦更張因時制宜如膠於前説執其偏見動以言者為庫庫遊説而鉗天下之口卒有意外之變大事去矣上不省又上書太子言近日降詔削河南軍權雖所當然然此項軍馬終為南兵所忌設使或有異心待之以誠其心自沮今未有所見遽以此名加之彼若甘心為此其害有不可勝言者况庫庫屢上書疏明其心曲則是其心未絶於朝廷冀望開悟為今之計不過戰守遷三䇿戰則資其掎角守則望其勤王遷則假其藩衞極力勉勵猶恐遲晚豈可棄數萬之師於一方哉一旦有唐𤣥宗倉卒之出此時雖碎首殺身何濟於事故今不復避忌惟以宗社存亡為重奉疏以聞亦不報明年八月京城破祖仁將出健德門死於兵祖仁𦕈一目貌寢身短而負氣剛正議論偉然其學於天文地理兵律百家皆通其要為詩文有法世多稱傳之評曰人君撥亂反正必先於正身修德繼之以用賢退不肖夫然後能齊至正之末順帝淫昏太子狂躁内政専於婦寺外權歸於奸雄是猶木之蠧在根本而不由於枝葉也雖使庫庫臣順南兵不至亦不能理尚何輕重强弱先後緩急之論哉陳祖仁不揣其本而拳拳以馭天下之勢為言當是時大事已去何待有意外之變其亦不審於天下之勢矣然負氣剛正則廷臣未易及也戊申二十八年春正月壬申朔皇太子命關保固守晉寧總統諸軍如庫庫拒命當以大義相裁就便擒拿詔諭庫庫特穆爾詔曰比者伊蘇上奏卿以書陳情深自悔悟及省來意良用惻然朕視卿猶子卿何惑於憸言不體朕心隳其先業卿今能自悔固朕所望卿其思委任肅清江淮之意即將冀寧真定諸軍就行總制度河直擣徐沂以康靖齊魯則職任之隆當悉還汝衛輝彰徳皆為王城卿毋以摩該為名縱軍侵暴其晉寧諸軍已命關保總制䇿應戡定山東將帥宜各悉心庚寅彗星見昴畢以巴延特穆爾為御史大夫大明取福建擒陳友定汀州總管陳谷珍以城降漳州達嚕噶齊徳哷黙色死之漳泉興建延邵皆降兵至漳州徳哷黙色嘆曰吾不才位三品有死而已吏白招諭使者至請出城迎之徳哷黙色從容謂曰爾苐往吾行出矣乃詣㕔事具公服北面再拜畢引斧斫其印又大書手版曰大元臣子即就位端坐拔佩刀自刺既死猶手執刀按膝坐儼然如生長樂縣尹都木逹亦自縊二月詔削奪庫庫特穆爾封邑命圗嚕李思齊等討之詔曰庫庫特穆爾本非察罕之宗俾嗣職任冀承遺烈畀以相位陟以師垣崇以王爵授以兵柄顧乃慿藉寵靈遂肆跋扈構兵闗陜專事併吞圗嚕首發奸謀闗保乃心王室陳其罪惡請正邦典其令圖嚕李思齊帥兵東下共行天討於是庫庫自澤州退守晉寧闗保守澤潞與摩該軍合癸卯武庫火大明兵至河南李思齊等走入闗大明兵由東昌棣州進取河南李思齊張良弼等解兵而西思齊次渭南良弼次蒲城二將又㑹兵駐潼闗火焚良弼營思齊移軍葫蘆河調所部張徳斂瑪蘇繙拒守大明兵入潼闗思齊棄輜重奔鳳翔大明遂取河南嵩陜汝等州河北衛輝彰徳廣平諸路三月庚寅彗星見西北有星流于東北衆小星隨之其聲大震夏四月隕霜殺菽五月大明取廣海廣東西海南北皆歸附左右兩江亦降李克彞棄河南奔還陜西克彞奔陜西復推思齊托總兵於是珪林齊托克張意據盩厔商暠據武功克彞據岐山任從政據隴州六月甲寅大聖夀萬安寺災秋七月癸酉京城紅霧如火照人自旦至辰方息乙亥黑氣起百步内不見人従寅至巳方消摩該攻晋寜庫庫特穆爾與戰敗其兵擒摩該及闗保殺之摩該闗保等攻平陽軍勢甚振數請戰庫庫不應一日諜知方分軍掠祁縣即夜出師薄其營擊之大破其衆二人皆被擒庫庫遣使來聞詔摩該闗保間諜構兵可依軍法處治遂皆殺之詔罷大撫軍院殺知院巴延特穆爾等詔復庫庫特穆爾官爵封邑仍前河南王太𫝊左丞相命統見軍直扺河北伊蘇由東道水陸並進圗嚕率關陜兵出潼關取河洛李思齊出七盤金商克復汴梁四道進兵掎角毋分彼此温普索爾珠等軍東西布列乘禨掃殄遼陽丞相額森布哈郡王知院厚孫等軍扞禦海口藩屏畿輔皇子悉總天下軍馬裁決庶務具如前詔八月壬戌白虹貫日庫庫特穆爾自晉寧退保冀寧大明兵至通州知院巴延特穆爾戰敗死之乙丑白虹貫日詔淮王特穆爾布哈監國慶通為中書左丞相同守京城帝出北奔帝御清寧殿集三宫后妃皇太子同議避兵北行左丞相實勒們知院和斯宦者趙巴延布哈諌以為不可帝不聴巴延慟哭曰天下者世祖之天下陛下當以死守奈何棄之臣等願帥軍民諸集賽台出城拒戰卒不聽夜半開健德門北去先是實勒們傳㫖令太常禮儀院使阿爾輝等奉太廟列室神主與太子同北行即與太樂署令王嗣宗等襲䕶奉遷大明兵入京城淮王特穆爾布哈與丞相慶通出齊化門皆被殺平章朴賽音布哈丁好禮參政郭庸刑部尚書張庸集賢侍講學士閔本翰林待制黄冔太子司經拜珠太樂署令趙𢎞毅皆不屈而死國亡後一年帝駐應昌又一年四月丙戌因痢疾殂夀五十一在位三十六年太尉旺扎勒等奉梓宫北𦵏謚曰惠宗大明以帝知順天命特加號曰順帝而封其孫宻迪哩巴拉為崇禮侯元史續編卷十六
